<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Theme Orange Compact</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="The Orange Compact theme is dedicated to applications with strong dimensions constraints." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li>Theme Orange Compact</li></ul><p>Framework</p><h1>Theme Orange Compact</h1><p>The Orange Compact theme is dedicated to applications with strong dimensions constraints.</p></section><h2>Overview</h2><pre><code>🧬 Theme version: 2.5.0
</code></pre><p>Some products may have heavy and very rich user interfaces with a lot of components and elements to display and with which users can interact. Thus for such products there are specific constraints of dimensions, spaces and sizes. That is the reason why this theme exists.</p><blockquote class="aside note"><p class="label">Note</p><p>This theme is related to Orange theme module to use some raw tokens of colors.</p></blockquote><blockquote class="aside note"><p class="label">Note</p><p>It contains also colors dedicated to charts.</p></blockquote><blockquote class="aside important"><p class="label">Important</p><p>The Orange Compact theme is read only: it cannot be suclassed or derivated.</p></blockquote><h2>How to use the theme</h2><p>You can use <a href="orangecompacttheme/index.html"><code>OrangeCompactTheme</code></a> directly. To use the <a href="orangecompacttheme/index.html"><code>OrangeCompactTheme</code></a> without further modifications, you will have to use the <code>OUDSThemeableView</code> for your root view and give it an instance of <a href="orangecompacttheme/index.html"><code>OrangeCompactTheme</code></a>. Keep in mind the themes are <i>Swift class objects</i> and can be heavy, so you may use only as instance as singleton and not store any properties.</p><pre class="swift"><code>@main
struct YourApp: App {
    var body: some Scene {
        WindowGroup {
            OUDSThemeableView(theme: OrangeCompactTheme()) {
                // Your root view
            }
        }
    }
}
</code></pre><p>Then, in your views, you can simply use the theme through an environment variable to get the tokens:</p><pre class="swift"><code>struct SomeView: View {

    // Get OUDS environment variable for theme thanks to themeable view
    @Environment(\.theme) var theme
    
    var body: some View {
        
        // Use the theme to retrieve the tokens
        // For spaces: theme.spaces
        // For sizes: theme.sizes
        // For borders: theme.borders
        // For elevations: theme.elevations
        // For opacities: theme.opacities
        // For colors: theme.colors
        // For button configuration: theme.button
        // For link configuration: theme.link
        // Etc.
    }
}
</code></pre><p>This theme embeds and registers the fonts for the <code>Orange Compact</code> theme, you just need to use the theme object as is.</p><h2>Tunable theme</h2><p>The theme can be tuned with <code>Tuning</code> object to give at init. Some tuning object exists.</p><pre class="swift"><code>// Define your theme tuning
let tuning = Tuning(hasRoundedButtons: true, hasRoundedTextInputs: true, hasRoundedAlertMessages: true)

// Apply it to your theme
let theme = OrangeCompactTheme(tuning: tuning)
// Or in one line
let theme = OrangeCompactTheme(tuning: Tuning(hasRoundedButtons: true, hasRoundedTextInputs: true, hasRoundedAlertMessages: true))

// Or apply predefined tunings
let orangeFranceTheme = OrangeCompactTheme(tuning: Tuning.OrangeFrance)
let orangeBusinessTheme = OrangeCompactTheme(tuning: Tuning.OrangeBusiness)
let maxitTheme = OrangeCompactTheme(tuning: Tuning.MaxIt)
</code></pre><p>A default tuning is applied for this theme:</p><table><thead><tr><th>Tunable elements</th><th>Default values</th></tr></thead><tbody><tr><td>rounded corners buttons</td><td>❌ false</td></tr><tr><td>rounded corners text inputs</td><td>✅ true</td></tr><tr><td>rounded corners alert messages</td><td>❌ false</td></tr></tbody></table><h2>Typography</h2><h3>Helvetica Neue</h3><p>The Orange theme uses <i>Helvetica Neue</i> typography. This font is already available through iOS. It is possible to use another typography, by the ones recommended are the ones defined in tokens.</p><pre class="swift"><code>// The three following instanciations are the same
let theme = OrangeCompactTheme()
let theme = OrangeCompactTheme(fontFamily: OrangeBrandFontRawTokens.familyBrandDefault)
let theme = OrangeCompactTheme(fontFamily: "HelveticaNeue") // Which is PostScript name of the font

// This instanciation won't work as the font family is not recognised
let theme = OrangeCompactTheme(fontFamily: "Helvetica Neue")
</code></pre><h3>Other fonts</h3><p>However if, in very particular cases, you need to use another font family, you can try using it by changing the value in the theme init.</p><pre class="swift"><code>// Supposing you want to use another font:
// - like the Luciole font (https://luciole-vision.com/) (very good for accessibility)
// - or the Roboto font (https://fonts.google.com/specimen/Roboto) (to support cyrillic alphabet)
// - or hevletica Neue Arabic (for arabic alphabet Helvetica flavoured)
// 1. Add the TTF files in your project
    
// 2. Register the fonts with, for example, the function below
private func registerFonts() {
    let fonts = Bundle.main.urls(forResourcesWithExtension: "ttf", subdirectory: nil)
    fonts?.forEach { CTFontManagerRegisterFontsForURL($0 as CFURL, .process, nil) }
}

// 3. At theme init, given the font family name, add it to the theme.
// Keep in mind that it might not work because PostScript name is used combining
// font family name and font weight.
// For Luciole font, use "Luciole", for Roboto font, use "Roboto", etc.
let theme = OrangeCompactTheme(family: theFontFamilyNameInPostScript)
</code></pre><blockquote class="aside note"><p class="label">Note</p><p>Specific rules to compute PostScript value are defined in <code>PostScriptFontNamesMap.swift</code></p></blockquote><blockquote class="aside tip"><p class="label">Tip</p><p>If your font family is not well managed, you can <a href="https://github.com/Orange-OpenSource/ouds-ios/issues">send an issue and explain your needs</a></p></blockquote><blockquote class="aside important"><p class="label">Important</p><p>For production products and official tools, <i>Helvetica Neue</i> is preferred and should be used</p></blockquote><blockquote class="aside tip"><p class="label">Tip</p><p>If for your needs Helvetica Neue is not relevant (because does not support cyrilic, or not enough accessible, or not aligned with your needs), <a href="https://github.com/Orange-OpenSource/ouds-ios/discussions">feel free to open a discussion</a></p></blockquote><blockquote class="aside caution"><p class="label">Caution</p><p>For ecodesign principles you should challenge the use of fonts because they can increase the needed storage of your apps</p></blockquote><blockquote class="aside important"><p class="label">Important</p><p>Always check the license and terms of uses of the font your are using (distribution, hsoting, usage for comemrcial things, etc.)</p></blockquote><h2>How to enrich the theme</h2><p>You cannot derivate the <i>Orange Compact</i> theme.</p><h2>How it looks like</h2><h3>Actions</h3><p><picture><img alt="A button component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_button_orangecompact.png"/></picture></p><h3>Content display</h3><h4>Bullet list</h4><p><picture><img alt="A bullet list component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_bullet_list_orangecompact.png"/></picture></p><h3>Controls</h3><h4>Checkboxes</h4><h4>Radios</h4><h4>Switches</h4><h4>Chips</h4><h4>Text input</h4><p><picture><img alt="A text input component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_textinput_orangecompact.png"/></picture></p><h3>Indicators</h3><h4>Badge</h4><p><picture><img alt="A badge component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_badge_orangecompact.png"/></picture></p><h4>Tags</h4><h3>Layouts</h3><h4>Dividers</h4><h3>Navigations</h3><h4>Link</h4><p><picture><img alt="A link component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_link_orangecompact.png"/></picture></p><h4>Tab bar</h4><h2>Topics</h2><h3>Group</h3><ul><li><a href="orangecompacttheme/index.html"><code>class OrangeCompactTheme</code><p>The <code>Orange Compact</code> theme is an Orange theme but tailored for some products with heavy UI.</p></a></li></ul><h3>Classes</h3><ul><li><a href="orangecompactthemecolorchartsemantictokensprovider/index.html"><code>class OrangeCompactThemeColorChartSemanticTokensProvider</code><p>A class which wraps all <b>color semantic tokens of charts</b>, <i>multiple</i> or not, and expose them. This provider should be integrated as a <code>AllColorChartSemanticTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users.</p></a></li><li><a href="orangecompactthemecolordecorativesemantictokensprovider/index.html"><code>class OrangeCompactThemeColorDecorativeSemanticTokensProvider</code><p>A class which wraps all <b>color semantic tokens of decorative colors</b> and expose them. This provider should be integrated as a <code>AllColorDecorativeSemanticTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users.</p></a></li></ul><h3>Extended Modules</h3><ul><li><a href="foundation/index.html"><code></code></a></li><li><a href="swiftuicore/index.html"><code></code></a></li></ul></article></noscript><div id="app"></div></body></html>
