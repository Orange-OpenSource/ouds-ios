<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeCompactTheme</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="The `Orange Compact` theme is an Orange theme but tailored for some products with heavy UI." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange Compact</a></li><li>OrangeCompactTheme</li></ul><p>Class</p><h1>OrangeCompactTheme</h1><p>The <code>Orange Compact</code> theme is an Orange theme but tailored for some products with heavy UI.</p><pre><code>final class OrangeCompactTheme</code></pre></section><h2>Usages</h2><p>Some products may have heavy and very rich user interfaces with a lot of components and elements to displays and with which users can interact. Thus for such products there are specific constraints of spaces and sizes, even if these products must be Orange flavored. That is the reason why this team is created: a kind of <code>OrangeTheme</code> but wih adjustments on some tokens like spacings and sizings.</p><p>To get the theme:</p><pre class="swift"><code>    @Environment(\.theme) var theme
</code></pre><h2>Integration</h2><p>To use this theme, inject it to your view using <code>OUDSThemeableView</code> and get it through environment variable.</p><pre class="swift"><code>    @main
    struct YourApp: App {
        var body: some Scene {
            WindowGroup {
                OUDSThemeableView(theme: OrangeCompactTheme()) {
                    // Your root view
                }
            }
        }
    }
</code></pre><h2>Theme tuning</h2><p>The theme can be customized a bit for more flexibility thanks to <code>Tuning</code> object. You just need to give a predefined tuning configuration at theme init to build the one you need.</p><p>To apply the tuning:</p><pre class="swift"><code>    // Define your theme tuning
    let tuning = Tuning(hasRoundedButtons: true, hasRoundedTextInputs: true, hasRoundedAlertMessages: false)

    // Apply it to your theme
    let theme = OrangeCompactTheme(tuning: tuning)
    // Or in one line
    let theme = OrangeCompactTheme(tuning: Tuning(hasRoundedButtons: true, hasRoundedTextInputs: true, hasRoundedAlertMessages: false))

    // Or apply predefined tunings
    let orangeFranceTheme = OrangeCompactTheme(tuning: Tuning.OrangeFrance)
    let orangeBusinessTheme = OrangeCompactTheme(tuning: Tuning.OrangeBusiness)
    let maxitTheme = OrangeCompactTheme(tuning: Tuning.MaxIt)
</code></pre><h2>Typography</h2><h3>Helvetica Neue</h3><p>The Orange brand strongly relies on the <i>Helvetica Neue</i> font family. Thus each Orange brand should, or must, use it. For iOS the <i>Helvetica Neue</i> font family is available at system level, so it is not needed to get it through external assets. By default an instance of <code>OrangeCompactTheme</code> uses as font family the token <code>OrangeBrandFontRawTokens.familyBrandDefault</code>, which is today <i>Helvetica Neue</i>. If you want to use another font family, you will have to send the suitable token or the suitable font family. However, beware, iOS API relies also on the PostScript name of the font. To be sure of the value to use, look at the font book of your device. It is recommended to use the font raw tokens.</p><pre class="swift"><code>    // The following instanciations work
    let orangeTheme = OrangeCompactTheme()
    let orangeTheme = OrangeCompactTheme(fontFamily: OrangeBrandFontRawTokens.familyBrandDefault)
    let orangeTheme = OrangeCompactTheme(fontFamily: "HelveticaNeue") // Which is PostScript name of the font
    let orangeTheme = OrangeCompactTheme(fontFamily: "Helvetica Neue")
</code></pre><h3>Helvetica Neue Arabic</h3><p>Because the <i>Helvetica Neue</i> font family does not manage arabic alphabet but latin one, it is possible apply another font family to the theme like the <i>Helvetica Neue Arabic</i>. This font family assets can be retrieved through the <a href="https://brand.orange.com/en/brand-basics/typography">Orange Brand website (authentication needed)</a>. PostScript name management has been implemented for this font family, thus the weight are managed and it is only needed to add the font assets to the project, register them and define the font family name to use.</p><pre class="swift"><code>    let orangeTheme = OrangeCompactTheme(fontFamily: "Helvetica Neue Arabic")
</code></pre><h2>Tokens versions</h2><ul><li><p>Core OUDS version: 1.10.0</p></li><li><p>Core Orange version: 1.2.0</p></li><li><p>Brand Orange Compact version: 2.5.0</p></li></ul><blockquote class="aside since"><p class="label">Since</p><p>0.17.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(fontfamily:tuning:)/index.html"><code>init(fontFamily: FontFamilySemanticToken?, tuning: Tuning)</code><p>Constructor of the OrangeCompact theme with its own providers of tokens. It uses also the providers of charts colors from Orange theme (<code>OrangeThemeColorChartSemanticTokensProvider</code>).</p></a></li></ul></article></noscript><div id="app"></div></body></html>
