<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSThemeableView</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="This is a kind of root `SwiftUI.View` to add at the top level of your views tree so as to define as an environement variable the theme which will be applied. Any theme to apply must be a child of `OUDSTheme`, direct or not." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Welcome to Orange Unified Design System</a></li><li>OUDSThemeableView</li></ul><p>Structure</p><h1>OUDSThemeableView</h1><p>This is a kind of root <code>SwiftUI.View</code> to add at the top level of your views tree so as to define as an environement variable the theme which will be applied. Any theme to apply must be a child of <code>OUDSTheme</code>, direct or not.</p><pre><code>@MainActor struct OUDSThemeableView&lt;Content&gt; where Content : View</code></pre></section><h2>Overview</h2><p>To use this special <code>View</code> and apply the <i>theme</i>, you must wrap your app root view inside, like:</p><pre class="swift"><code>    // Add themeable view to your root view to use the OrangeTheme
    OUDSThemeableView(theme: OrangeTheme()) {
        YourRootView()
    }

    // Or use your custom theme if you want
    OUDSThemeableView(theme: YourCustomTheme()) {
        YourRootView()
    }
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(theme:content:)/index.html"><code>init(theme: OUDSTheme, content: () -&gt; Content)</code></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul></article></noscript><div id="app"></div></body></html>
