<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Getting Started with OUDS</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="How to add the package as dependency, import libraries and use theme and components for your apps." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Welcome to Orange Unified Design System</a></li><li>Getting Started with OUDS</li></ul><p>Article</p><h1>Getting Started with OUDS</h1><p>How to add the package as dependency, import libraries and use theme and components for your apps.</p></section><h2>Integrate OUDS</h2><h3>Use Swift Package Manager</h3><p>If you want to add the iOS library of <i>Orange Unified Design System</i>, you need to add our <i>Swift Package</i> into your project. To do that, add a new <i>package dependency</i> to your <i>Xcode</i> project by refering to it by <code>github.com/Orange-OpenSource/ouds-ios</code>. You are free to choose whether or not you want a branch or a specific tag, pick the solution you want.</p><p>You can <a href="https://github.com/Orange-OpenSource/ouds-ios/wiki/50-%E2%80%90-About-versions,-releases-and-builds">refer to the wiki</a> for more details about versions, releases and tags. You can find release tags (e.g. <i>1.0.0</i>) and release candidates tags (e.g. <i>1.0.0-rc3</i>).</p><h3>Import the librairies you need</h3><p>You should use one (or several) of the following imports for your needs, which are basically <i>Swift Package</i> products.</p><blockquote class="aside tip"><p class="label">Tip</p><p>We recommend to embed in your apps only the ones you need to avoid to embed useless assets.</p></blockquote><pre class="swift"><code>import OUDSThemesContract // If you want to define your theme, use themes or OUDSThemeableView
import OUDSModules // To use modules
import OUDSComponents // To use components
import OUDSThemesOrange // To use the default Orange theme
import OUDSThemesOrangeCompact // To use the Orange Compact theme
import OUDSThemesSosh // To use the Sosh theme
import OUDSThemesWireframe // To use the Wireframe theme
import OUDSTokensComponent // If you need to override or use directly components tokens
import OUDSTokenSemantic // If you need to override or use directly semantic tokens
import OUDSTokensRaw // If you need to override or use directly raw tokens
import OUDSFoundations // For some utilities
</code></pre><h3>Or more simple, import umbrella library</h3><blockquote class="aside note"><p class="label">Note</p><p>We do not recommend this solution because from our point of view use of tailored imports is better to import only the needed elements. use of umbrella products can increase app sizes and needed storage because it emebds plenty of assets (images, fonts, etc.) and useless constants.</p></blockquote><p>Import the <i>Swift Package</i> product which suits your needs:</p><table><thead><tr><th>Umbrella</th><th>Description</th></tr></thead><tbody><tr><td>OUDSSwiftUI</td><td>All librairies listed above and all themes</td></tr><tr><td>OUDSSwiftUIOrange</td><td>All librairies listed above but with only Orange and Orange Compact themes</td></tr><tr><td>OUDSSwiftUIWireframe</td><td>All librairies listed above but with only Wireframe theme</td></tr><tr><td>OUDSSwiftUIOrangeSosh</td><td>All librairies listed above but with only Orange and Sosh themes</td></tr></tbody></table><h3>Chose your theme</h3><p>The <i>Orange Unified Design System</i> framework provides today four themes:</p><table><thead><tr><th>Theme</th><th>Description</th></tr></thead><tbody><tr><td>Orange</td><td>The default one for Orange products and can be enriched / derivated</td></tr><tr><td>Orange Compact</td><td>For some Orange products with heavy / rich UI and dimensions constraints</td></tr><tr><td>Sosh</td><td>For Sosh products</td></tr><tr><td>Wireframe</td><td>For mockups, prototypes and prooves of concepts witouth Orange-flavoured styles</td></tr></tbody></table><h3>Apply a theme</h3><blockquote class="aside tip"><p class="label">Tip</p><p>Keep in mind only one theme can be used within one <code>OUDSThemeableView</code>.</p></blockquote><h3>Trick for Xcode Preview</h3><p>If you use Xcode <code>#Preview</code> blocks, you will have to be sure the theme is instanciated and injected through the <code>OUDSThemeableView</code>. Because it is not possible today to override the legit <code>#Preview</code> block, you can instead use some of our utilities to wrap your content inside the <code>OUDSThemeableView</code> automatically. These utilities come with the themes modules. Without them you may face errors about undefined theme.</p><pre class="swift"><code>// Apply Orange theme
#Preview {
    SampleView()
        .orangePreview()
}

// Apply Orange Compact theme
#Preview {
    SampleView()
        .orangeCompactPreview()
}

// Apply Sosh theme
#Preview {
    SampleView()
        .soshPreview()
}

// Apply Wireframe theme
#Preview {
    SampleView()
        .wireframePreview()
}
</code></pre></article></noscript><div id="app"></div></body></html>
