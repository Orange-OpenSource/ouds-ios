<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Welcome to Orange Unified Design System</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Orange Unified Design System: Build Sharper. Ship faster. Perform better." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li>Welcome to Orange Unified Design System</li></ul><p>Framework</p><h1>Welcome to Orange Unified Design System</h1><p>Orange Unified Design System: Build Sharper. Ship faster. Perform better.</p></section><h2>Overview</h2><pre><code>🧬 Core version: 1.10.0
</code></pre><p><i>Orange Unified Design System</i> is the new design system unified and cohesive across all platforms to build Orange mobile applications for everyone everywhere. Its objective is to propose a set of guidelines about how to apply the Orange brand on mobile applications. It also provides series of components and modules that show in details how to use this in the Orange apps.</p><p><i>Orange Unified Design System</i> has been implemented in two code repositories:</p><ul><li><p>a SwiftUI code library exposed as Swift Package for all Apple platforms (<a href="https://github.com/Orange-OpenSOurce/ouds-ios">Orange-OpenSource/ouds-ios</a>)</p></li><li><p>a demo application named <i>Design System Toolbox</i> that can be launched to show the guidelines, components and modules (<a href="https://github.com/Orange-OpenSOurce/ouds-ios-design-system-toolbox">Orange-OpenSource/ouds-ios-design-system-toolbox</a>)</p></li></ul><p>This demo app also shows how to use the library or to style existing components. Using these resources will allow you to create Orange branded applications faster and will inherit all the work that was done to make sure that all presented codes are fully tested regarding the brand, the ecodesign, the open source and the accessibility compliances.</p><p>You can get details about the this design system in <a href="https://unified-design-system.orange.com/">the official website unified-design-system.orange.com</a>.</p><blockquote class="aside note"><p class="label">Note</p><p>Orange Unified Design System framework supports iOS / iPadOS 15 and later.</p></blockquote><blockquote class="aside important"><p class="label">Important</p><p>Orange Unified Design System framework focuses first on iOS / iPadOS, but other platforms like macOS, visionOS, watchOS and tvOS are supported.</p></blockquote><blockquote class="aside tip"><p class="label">Tip</p><p>Feel free to submit pull requests if you can improve the support of any platforms!</p></blockquote><h2>Data and privacy</h2><p>The Orange Unified Design System library is a Software Development Kit (SDK) that allows developpers to create Orange branded mobile applications. As such:</p><ul><li><p>this SDK does not handle any personnal data</p></li><li><p>this SDK does not require any device permission to work</p></li></ul><h2>Topics</h2><h3>Essentials</h3><p></p><ul><li><a href="gettingstarted/index.html"><p>Getting Started with OUDS</p><p>How to add the package as dependency, import libraries and use theme and components for your apps.</p></a></li><li><a href="tokens/index.html"><p>Tokens</p><p>Design tokens represent the small, repeated design decisions that make up a design system’s visual style. Tokens wrap hard-coded static values, such as hexadecimal codes for color, with self-explanatory names. They are used to define the look and feel and the style of everything. They are exposed through the themes and can be used as they are.</p></a></li><li><a href="themes/index.html"><p>Themes</p><p><i>Themes</i> are applications of specific values for <i>components tokens</i> and dimensionsemantic tokens_ using in the end <i>raw tokens</i>. A <i>theme</i> contains any relevant tokens which can be used for components rendering. A <i>theme</i> can use its own assets like fonts and icons.</p></a></li><li><a href="components/index.html"><p>Components</p><p><i>Components</i> are the <code>View</code> objects you can add in the views of your apps, like buttons, links, cards etc.</p></a></li><li><a href="modules/index.html"><p>Modules</p><p>A <i>module</i> can be seen as a set of features and components to fill a need.</p></a></li></ul><h3>Classes</h3><ul><li><a href="oudstheme/index.html"><code>class OUDSTheme</code><p>This is a basic theme any theme must be a subclass off, or all themes must have as ancestor. A Swift <code>class</code> has been used so as to allow to easily override some attributes and have inheritance, without having for developers to implement all tokens. Any properties of an overridable theme should be defined so as to provide defaults values. We allow this theme to be derivated and be overriden. <a href="oudstheme/index.html"><code>OUDSTheme</code></a> can be seen as a kind of “abstract class” in <i>object oriented paradigm</i>, or <i>theme contract</i>. Because <code>OUDSTheme</code> is not a <i>final</i> class, its type cannot be seen as <code>Sendable</code>, that is the reason why this conformity is unchecked.</p></a></li></ul><h3>Protocols</h3><ul><li><a href="allalertcomponenttokensprovider/index.html"><code>protocol AllAlertComponentTokensProvider</code><p>Something which provides all component tokens of alert</p></a></li><li><a href="allbadgecomponenttokensprovider/index.html"><code>protocol AllBadgeComponentTokensProvider</code><p>Something which provides all component tokens of badge</p></a></li><li><a href="allbarcomponenttokensprovider/index.html"><code>protocol AllBarComponentTokensProvider</code><p>Something which provides all component tokens of bars</p></a></li><li><a href="allbordersemantictokensprovider/index.html"><code>protocol AllBorderSemanticTokensProvider</code><p>Something which provides all semantic tokens of border</p></a></li><li><a href="allbulletlistcomponenttokensprovider/index.html"><code>protocol AllBulletListComponentTokensProvider</code><p>Something which provides all component tokens of bullet list</p></a></li><li><a href="allbuttoncomponenttokensprovider/index.html"><code>protocol AllButtonComponentTokensProvider</code><p>Something which provides all component tokens of button</p></a></li><li><a href="allcheckboxcomponenttokensprovider/index.html"><code>protocol AllCheckboxComponentTokensProvider</code><p>Something which provides all component tokens of checkboxes</p></a></li><li><a href="allchipcomponenttokensprovider/index.html"><code>protocol AllChipComponentTokensProvider</code><p>Something which provides all component tokens of chip</p></a></li><li><a href="allcolorchartsemantictokensprovider/index.html"><code>protocol AllColorChartSemanticTokensProvider</code><p>Something which provides all semantic tokens of colors charts</p></a></li><li><a href="allcolordecorativesemantictokensprovider/index.html"><code>protocol AllColorDecorativeSemanticTokensProvider</code><p>Something which provides all semantic tokens of colors charts</p></a></li><li><a href="allcolormodesemantictokensprovider/index.html"><code>protocol AllColorModeSemanticTokensProvider</code><p>Something which provides all semantic tokens of colors modes</p></a></li><li><a href="allcolorsemantictokensprovider/index.html"><code>protocol AllColorSemanticTokensProvider</code><p>Something which provides all semantic tokens of colors</p></a></li><li><a href="allcontrolitemcomponenttokensprovider/index.html"><code>protocol AllControlItemComponentTokensProvider</code><p>Something which provides all component tokens for control-item-layout-based components</p></a></li><li><a href="alldimensionsemantictokensprovider/index.html"><code>protocol AllDimensionSemanticTokensProvider</code><p>Something which provides all semantic tokens of _</p></a></li><li><a href="alldividercomponenttokensprovider/index.html"><code>protocol AllDividerComponentTokensProvider</code><p>Something which provides all component tokens of divider</p></a></li><li><a href="alleffectsemantictokensprovider/index.html"><code>protocol AllEffectSemanticTokensProvider</code><p>Something which provides all semantic tokens of effects</p></a></li><li><a href="allelevationsemantictokensprovider/index.html"><code>protocol AllElevationSemanticTokensProvider</code><p>Something which provides all semantic tokens of elevation</p></a></li><li><a href="allfontsemantictokensprovider/index.html"><code>protocol AllFontSemanticTokensProvider</code><p>Something which provides all semantic tokens of font</p></a></li><li><a href="allgridsemantictokensprovider/index.html"><code>protocol AllGridSemanticTokensProvider</code><p>Something which provides all semantic tokens of grid</p></a></li><li><a href="alliconcomponenttokensprovider/index.html"><code>protocol AllIconComponentTokensProvider</code><p>Something which provides all components tokens for icons</p></a></li><li><a href="allinputtagcomponenttokensprovider/index.html"><code>protocol AllInputTagComponentTokensProvider</code><p>Something which provides all component tokens of input tag</p></a></li><li><a href="alllinkcomponenttokensprovider/index.html"><code>protocol AllLinkComponentTokensProvider</code><p>Something which provides all component tokens of link</p></a></li><li><a href="allopacitysemantictokensprovider/index.html"><code>protocol AllOpacitySemanticTokensProvider</code><p>Something which provides all semantic tokens of opacity</p></a></li><li><a href="allpincodeinputcomponenttokensprovider/index.html"><code>protocol AllPinCodeInputComponentTokensProvider</code><p>Something which provides all component tokens of pin code input</p></a></li><li><a href="allquantityinputcomponenttokensprovider/index.html"><code>protocol AllQuantityInputComponentTokensProvider</code><p>Something which provides all component tokens of quantity input</p></a></li><li><a href="allradiobuttoncomponenttokensprovider/index.html"><code>protocol AllRadioButtonComponentTokensProvider</code><p>Something which provides all component tokens of radio buttons</p></a></li><li><a href="allselectinputcomponenttokensprovider/index.html"><code>protocol AllSelectInputComponentTokensProvider</code><p>Something which provides all component tokens of select input</p></a></li><li><a href="allsizesemantictokensprovider/index.html"><code>protocol AllSizeSemanticTokensProvider</code><p>Something which provides all semantic tokens of size</p></a></li><li><a href="allskeletoncomponenttokensprovider/index.html"><code>protocol AllSkeletonComponentTokensProvider</code><p>Something which provides all component tokens of skeleton</p></a></li><li><a href="allspacesemantictokensprovider/index.html"><code>protocol AllSpaceSemanticTokensProvider</code><p>Something which provides all semantic tokens of space</p></a></li><li><a href="allswitchcomponenttokensprovider/index.html"><code>protocol AllSwitchComponentTokensProvider</code><p>Something which provides all component tokens of switch / toggle</p></a></li><li><a href="alltagcomponenttokensprovider/index.html"><code>protocol AllTagComponentTokensProvider</code><p>Something which provides all component tokens of tag</p></a></li><li><a href="alltextareacomponenttokensprovider/index.html"><code>protocol AllTextAreaComponentTokensProvider</code><p>Something which provides all component tokens of text area</p></a></li><li><a href="alltextinputcomponenttokensprovider/index.html"><code>protocol AllTextInputComponentTokensProvider</code><p>Something which provides all component tokens of text input</p></a></li><li><a href="tokensprovider/index.html"><code>protocol TokensProvider</code><p>Protocol to add to any semantic or component tokens provider so as to be gather with all providers and given to the theme for initialization</p></a></li></ul><h3>Structures</h3><ul><li><a href="oudsthemetuning/index.html"><code>struct OUDSThemeTuning</code><p>To ease flexiblity of themes and enhance their adoption some parts of the theme can be tuned. This allows for example to have a theme defined by the Brand but to apply some customization.</p></a></li><li><a href="oudsthemeableview/index.html"><code>struct OUDSThemeableView</code><p>This is a kind of root <code>SwiftUI.View</code> to add at the top level of your views tree so as to define as an environement variable the theme which will be applied. Any theme to apply must be a child of <code>OUDSTheme</code>, direct or not.</p></a></li></ul><h3>Type Aliases</h3><ul><li><a href="tuning/index.html"><code>typealias Tuning</code><p>Type alias to keep things simple and short</p></a></li></ul><h3>Enumerations</h3><ul><li><a href="oudsversions/index.html"><code>enum OUDSVersions</code><p>Gathers the components and themes versions exposed through Tokenator based on Figma tokens</p></a></li></ul><h3>Extended Modules</h3><ul><li><a href="swiftuicore/index.html"><code></code></a></li></ul></article></noscript><div id="app"></div></body></html>
