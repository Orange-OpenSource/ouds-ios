<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSLegacyTabBarModifier</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="`ViewModifier` to manage an edge case about Liquid Glass configuration of Apple OS and Xcode versions." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSLegacyTabBarModifier</li></ul><p>Structure</p><h1>OUDSLegacyTabBarModifier</h1><p><code>ViewModifier</code> to manage an edge case about Liquid Glass configuration of Apple OS and Xcode versions.</p><pre><code>@MainActor struct OUDSLegacyTabBarModifier</code></pre></section><h2>Overview</h2><p>If an app is compiled with Xcode 27 for iOS 27, Liquid Glass is forced by the system and considered as enabled by OUDS. If an app is compiled with Xcode 26 for iOS 26, the <i>UIDesignRequiresCompatibility</i> flag is read and OUDS considers wether or not Liquid Glass is enabled. If an app is compiled with Xcode 26 for iOS 18 and lower, Liquid Glass is considered as unavailable, disabled.</p><p>The edge case is when the OS version is 27, the flag <i>UIDesignRequiresCompatibility</i> stils exists but the app is compiled with Xcode 26. This case is extreme: the system does not force Liquid Glass, the flag is here, and OUDS cannot only rely on the OS version. Thus, this <a href="."><code>OUDSLegacyTabBarModifier</code></a>  will define an environment value saying any legacy layout things (appearances, selector, divider) must be displayed.</p><p>**You must use this <code>ViewModifier</code> with care, and only if you are using Xcode 26 and  <i>UIDesignRequiresCompatibility</i> to YES **. Prefer build with Xcode 27 without the <i>UIDesignRequiresCompatibility</i>  flag.</p><pre class="swift"><code>  OUDSTabBar(selectedTab: ..., count: ...) { ... )
    .modifier(OUDSLegacyTabBarModifier())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>2.2.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init()/index.html"><code>init()</code><p>Instanciates the <code>OUDSLegacyTabBarModifier</code> and displays error messages in the standard output</p></a></li></ul><h3>Instance Methods</h3><ul><li><a href="body(content:)/index.html"><code>func body(content: OUDSLegacyTabBarModifier.Content) -&gt; some View
</code><p>Defines environement variable to precise the legacy tab bar must be forced</p></a></li></ul></article></noscript><div id="app"></div></body></html>
