<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSTag</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Tag is a UI element that allows to display short info like a label, keyword, or category. Tag helps users quickly find, group, or understand content." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSTag</li></ul><p>Structure</p><h1>OUDSTag</h1><p>Tag is a UI element that allows to display short info like a label, keyword, or category. Tag helps users quickly find, group, or understand content.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor struct OUDSTag</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../indicators/index.html">Indicators</a></li></ul><h2>Appearances</h2><p>Tags have two appearances so as to highlight or not their content:</p><ul><li><p><b>emphasized</b>: A tag with a solid, high-contrast background. Used to draw strong attention to important labels or categories. Emphasized tags stand out prominently against the interface and are ideal for primary or high-priority information.</p></li><li><p><b>muted</b>: A tag with a subtle, light, or semi-transparent background. Used for secondary or less prominent information. Muted tags blend more with the background, providing a softer visual emphasis compared to emphasized tags.</p></li></ul><h2>Status</h2><p>Tags have seven status depending on the context of the information they represent. Each state is designed to convey a specific meaning and ensure clarity in communication.</p><ul><li><p><b>Neutral</b>: Default or inactive state. Used for standard labels, categories, or when no specific status needs to be communicated.</p></li><li><p><b>Accent</b>: Used to draw attention to new features, recommendations, or content suggestions. Invites users to explore and engage with new offerings, creating an exciting and engaging experience.</p></li><li><p><b>Positive</b>: Indicates success, confirmation, or a positive status. Commonly used to highlight completed actions or approved items.</p></li><li><p><b>Warning</b>: Signals caution or a potentially risky situation. Used to draw attention to items requiring user awareness or intervention.</p></li><li><p><b>Negative</b>: Represents errors, critical issues, or urgent attention needed. Used to highlight problems or failed actions.</p></li><li><p><b>Info</b>: Conveys informational messages or supplementary details. Used for neutral, helpful, or contextual information.</p></li><li><p><b>Disabled</b>: Shows that the tag is inactive and cannot be interacted with. Appears faded or greyed out. This is not allowed when loader is activated.</p></li></ul><h2>Shape</h2><p>Tags can have two shapes:</p><ul><li><p><b>Rounded</b>: A tag with fully rounded corners, creating a pill-shaped appearance. Rounded tags offer a softer and more approachable look, suitable for most modern interfaces.</p></li><li><p><b>Square</b>: A tag with sharp, square corners. Squared tags provide a more formal, structured, or technical feel. They are often used in business contexts to label promotions, offers, or important notices.</p></li></ul><h2>Size</h2><p>Tags can have two sizes:</p><ul><li><p><b>Default</b>: The standard tag size, suitable for most use cases and offering good readability.</p></li><li><p><b>Small</b>: A compact tag with reduced height and font size. Used when saving space is important or when grouping elements visually.</p></li></ul><h2>Layout</h2><p>There are four available layouts for tags:</p><p>-<b>Text only</b>: A tag that displays only text. Used for simple labels, categories, or keywords without additional visual elements.</p><p>-<b>Text + Bullet</b>: A tag with a small indicator (dot) alongside the text. Used to show status, presence, or activity next to the label.</p><p>-<b>Text + Icon</b>: A tag that includes an icon before the text. Used to visually reinforce the meaning of the tag, such as status, type, or action.</p><ul><li><p><b>Text + Loader</b>: A tag that combines a loading spinner (or progress indicator) with text. Used to indicate that a process or action related to the tag is in progress.</p></li></ul><h2>Code samples</h2><pre class="swift"><code>    // Text only with neutral status, for emphasized appearance with rounded shape in default size
    OUDSTag(label: "Label",  status: .neutral(), appearance: .emphasized, shape: .rounded, size: .default)
    // Or also
    OUDSTag(label: "Label")
    // Or from a localizale and a bundle
    OUDSTag(LocalizedStringKey("label_wording"), bundle: Bundle.module)

    // Tag with neutral status with bullet
    OUDSTag(label: "Label", status: .neutral(leading: .bullet)

    // Tag with neutral status with a custom decorative icon
    OUDSTag(label: "Label", status: .neutral(icon: Image(decorative: "ic_heart")))
    // If your layout is in RTL mode but your tag has an icon with another meaning because of bad orientation,
    // you can flip the icon
    OUDSTag(label: "Label", status: .neutral(icon: Image(decorative: "ic_heart"), flipIcon: true))

    // Text with neutral status with bullet
    OUDSTag(label: "Label", status: .neutral(bullet: true))

    // Tag with loader with rounded shape in small size
    OUDSTag(loadingLabel: "Label", shape: .rounded, size: .small)
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-tag">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A tag component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/indicators/tag/component_tag_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A tag component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/indicators/tag/component_tag_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A tag component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/indicators/tag/component_tag_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A tag component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/indicators/tag/component_tag_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.4.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>0.18.0</p></blockquote><h2>Topics</h2><h3>Structures</h3><ul><li><a href="status/index.html"><code>struct Status</code><p>The status of an <code>OUDSTag</code> determines the leading element, the background and the content colors of the tag according to the category.</p></a></li></ul><h3>Initializers</h3><ul><li><a href="init(_:tablename:bundle:status:appearance:shape:size:hasloader:)/index.html"><code>init(LocalizedStringKey, tableName: String?, bundle: Bundle, status: OUDSTag.Status, appearance: OUDSTag.Appearance, shape: OUDSTag.Shape, size: OUDSTag.Size, hasLoader: Bool)</code><p>Creates a tag with a localized label, looking up the key in the given bundle.</p></a></li><li><a href="init(label:status:appearance:shape:size:hasloader:)/index.html"><code>init(label: String, status: OUDSTag.Status, appearance: OUDSTag.Appearance, shape: OUDSTag.Shape, size: OUDSTag.Size, hasLoader: Bool)</code><p>Creates a tag with simple label and maybe with leading element (bullet or icon).</p></a></li><li><a href="init(loadingkey:tablename:bundle:shape:size:)/index.html"><code>init(loadingKey: LocalizedStringKey, tableName: String?, bundle: Bundle, shape: OUDSTag.Shape, size: OUDSTag.Size)</code><p>Creates a tag in the loading state with a localized label, looking up the key in the given bundle.</p></a></li><li><a href="init(loadinglabel:shape:size:)/index.html"><code>init(loadingLabel: String, shape: OUDSTag.Shape, size: OUDSTag.Size)</code><p>Creates a tag in the loading state.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul><h3>Enumerations</h3><ul><li><a href="appearance/index.html"><code>enum Appearance</code><p>Represents the appearance of an <code>OUDSTag</code></p></a></li><li><a href="shape/index.html"><code>enum Shape</code><p>Defines the shape of an <code>OUDSTag</code></p></a></li><li><a href="size/index.html"><code>enum Size</code><p>Defines the size of an <code>OUDSTag</code></p></a></li></ul></article></noscript><div id="app"></div></body></html>
