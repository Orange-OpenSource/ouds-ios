>emphasized</i></p></dd><dt>shape</dt><dd><p>The shape of the tag, i.e. the corners style. Default set to <i>rounded</i>.</p></dd><dt>size</dt><dd><p>The size of the tag. Default set to <i>default</i>.</p></dd><dt>hasLoader</dt><dd><p>If an optional loader (or progress indicator) is displayed before the <code>label</code> or not. It will replace the <code>icon</code> if provided. Default set to <i>false</i>.</p></dd></dl><h2>Discussion</h2><p>Use the <code>View/disabled(_:)</code> method to have tag in disabled state. This helper has no effect when loader is added. When loader is added, <code>status</code> and <code>appearance</code> are ignored.</p><pre class="swift"><code>    OUDSTag(label: "Label")
</code></pre></article></noscript><div id="app"></div></body></html>
