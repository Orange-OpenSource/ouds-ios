<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSLink</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Link is a UI element that allows to navigate from one location to another, either within the same page or across different pages in the same resource, or to an external resource. Link’s primary function is navigation and it communicates its interactive nature visually and semantically." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSLink</li></ul><p>Structure</p><h1>OUDSLink</h1><p>Link is a UI element that allows to navigate from one location to another, either within the same page or across different pages in the same resource, or to an external resource. Link’s primary function is navigation and it communicates its interactive nature visually and semantically.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor struct OUDSLink</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../layouts/index.html">Layouts</a></li><li><a href="../navigations/index.html">Navigations</a></li></ul><h2>Overview</h2><p>The <a href="."><code>OUDSLink</code></a> proposes layout with text only or text with icon. It also proposes layout to navigate forward or backward. The link can be displayed in <code>small</code> or <code>default</code> size.</p><h2>Text only or Text and icon layout</h2><p>This layout is used to open a link or to display a specific feature (like send feedbacks, show more, …)</p><pre class="swift"><code>    // Text only in small size
    OUDSLink(text: "Feedback", size: .small) { /* the action to process */ }

    // From a localizable and a bundle
    OUDSLink(LocalizedStringKey("feedback_link"), bundle: Bundle.module, size: .small) { }

    // Text and icon in default size
    OUDSLink(text: "Feedback", icon: Image("ic_heart"), size: .default) { /* the action to process */ }
</code></pre><h2>Navigation layout</h2><p>This layout is used to navigate backward or forward.</p><pre class="swift"><code>    // Navigate to next page with link in a small size
    OUDSLink(text: "Feedback", indicator: .next, size: .small) { /* the action to process */ }

    // Navigate to previous page with link in a default size
    OUDSLink(text: "Back", indicator: .back, size: .default) { /* the action to process */ }
</code></pre><h2>Colored Surface</h2><p>If link is placed on colored surface using <code>OUDSColoredSurface</code>, the default colors (content text and icon or arrow) are automatically adjusted to switch to monochrom.</p><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-link">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A link component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/link/component_link_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A link component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/link/component_link_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A link component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/link/component_link_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A link component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/link/component_link_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>2.2.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>0.11.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(_:tablename:bundle:icon:size:action:)/index.html"><code>init(LocalizedStringKey, tableName: String?, bundle: Bundle, icon: Image?, size: OUDSLink.Size, action: () -&gt; Void)</code><p>Creates a link with a localized text and optional icon, looking up the key in the given bundle.</p></a></li><li><a href="init(_:tablename:bundle:indicator:size:action:)/index.html"><code>init(LocalizedStringKey, tableName: String?, bundle: Bundle, indicator: OUDSLink.Indicator, size: OUDSLink.Size, action: () -&gt; Void)</code><p>Creates a link with a localized text and a navigation indicator, looking up the key in the given bundle.</p></a></li><li><a href="init(text:icon:size:action:)/index.html"><code>init(text: String, icon: Image?, size: OUDSLink.Size, action: () -&gt; Void)</code><p>Create a link with text and icon.</p></a></li><li><a href="init(text:indicator:size:action:)/index.html"><code>init(text: String, indicator: OUDSLink.Indicator, size: OUDSLink.Size, action: () -&gt; Void)</code><p>Create a link with a “before <code>Indicator</code>” (<code>OUDSLink.Indicator.back</code>) or “after  indicator” (<code>OUDSLink.Indicator.next</code>) beside the text.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul><h3>Enumerations</h3><ul><li><a href="indicator/index.html"><code>enum Indicator</code><p>Represents the arrow / chevron / indicator of an <code>OUDSLink</code>.</p></a></li><li><a href="size/index.html"><code>enum Size</code><p>Represents the size of an <code>OUDSLink</code>.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
