<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSToolBarTop</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="The top toolbar (aka navigation bar on iOS and iPadOS 18 and lower) sits at the top of the screen and provides contextual information and controls related to the current view. It typically displays the page title, and may include navigation actions such as “Back” or “Close” as well as supplementary actions. It can contains leading and trailing actions." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSToolBarTop</li></ul><p>Structure</p><h1>OUDSToolBarTop</h1><p>The top toolbar (aka <i>navigation bar</i> on iOS and iPadOS 18 and lower) sits at the top of the screen and provides contextual information and controls related to the current view. It typically displays the page title, and may include navigation actions such as “Back” or “Close” as well as supplementary actions. It can contains leading and trailing actions.</p><ul id="availability"><li>iOS 15.0+</li><li>visionOS 1.0+</li></ul><pre><code>@MainActor struct OUDSToolBarTop</code></pre></section><h2>Overview</h2><p><code>toolBarTop(_:hasLargeTitle:subtitle:leadingItems:trailingItems:)</code>  View helper applies a SwiftUI toolbar configuration.</p><h2>Appearances</h2><p>With Liquid Glass / iOS 26+ the OS will change the rendering of the toolbar items depending to the context:</p><ul><li><p>The OS can group the items of same types in one group with kind of rectangle (e.g. views with menus)</p></li><li><p>But for buttons items they will remain isolated</p></li><li><p>The placement of the title can be leading or centered depending to the length of the text</p></li><li><p>The text can be truncated if there is not enough remaining space</p></li><li><p>The OS can apply another style for the back button</p></li></ul><p>Without Liquid Glass / iOS 18 and lower, the OS won’t change that much the style of the toolbar items, Items won’t be visually grouped.</p><p>Globaly the appearence of the * navigation bar* elements is changed by the <code>oudsNavigationBarAppearance</code> helper of <code>View</code> that must be applyed on the root view of the <code>NavigationStack</code> for example.</p><h2>Technical constraints</h2><p>To be sure for iOS 18 and lower the back buttton and text have the good color, in your main view apply the following accent color:</p><pre class="swift"><code>    struct AppMainView: View {
        var body: some View {
            ContentView()
                .accentColor(theme.colors.contentDefault)
        }
    }
</code></pre><h2>Platform considerations</h2><ul><li><p>The component is available on iOS, iPadOS, and visionOS</p></li><li><p>The component is not available for watchOS, tvOS and macOS</p></li></ul><h2>Badges uses</h2><p>For iOS 26 with Liquid Glass, the system badge is used because the <a href="../oudsbadge/index.html"><code>OUDSBadge</code></a> does not provide a suitable rendering with the glassified effect applied on the top toolbar. For iOS until 18 and without Liquid Glass <a href="../oudsbadge/index.html"><code>OUDSBadge</code></a> is always used.</p><h2>Code sample</h2><pre class="swift"><code>    ContentView()
        .toolBarTop("Title",
            leadingItems: {
                OUDSToolBarItem(navigation: .back())
            },
            trailingItems: {
                OUDSToolBarItem(label: "Label") { /* Action to process */ }
                OUDSToolBarItem(icon: Image(decorative: "some_image"), accessibilityLabel: "Label") { /* Action to process */ }
            }
        )
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-ios-tool-bar-top">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Liquid Glass</h3><h4>Orange</h4><p><picture><img alt="A top toolbar component in light mode with Liquid Glass effect and Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_liquidglass_orange_light.png"/></picture> <picture><img alt="A top toolbar component in dark mode with Liquid Glass effect and Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_liquidglass_orange_dark.png"/></picture></p><h4>Orange Compact</h4><p><picture><img alt="A top toolbar component in light mode with Liquid Glass effect and Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_liquidglass_orangecompact_light.png"/></picture> <picture><img alt="A top toolbar component in dark mode with Liquid Glass effect and Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_liquidglass_orangecompact_dark.png"/></picture></p><h4>Sosh</h4><p><picture><img alt="A top toolbar component in light mode with Liquid Glass effect and Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_liquidglass_sosh_light.png"/></picture> <picture><img alt="A top toolbar component in dark mode with Liquid Glass effect and Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_liquidglass_sosh_dark.png"/></picture></p><h4>Wireframe</h4><p><picture><img alt="A top toolBar component in light mode with Liquid Glass effect and Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_liquidglass_wireframe_light.png"/></picture> <picture><img alt="A top toolbar component in dark mode with Liquid Glass effect and Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_liquidglass_wireframe_dark.png"/></picture></p><h3>Without Liquid Glass</h3><h4>Orange</h4><p><picture><img alt="A top toolbar component in light mode without Liquid Glass effect and Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_orange_light.png"/></picture> <picture><img alt="A top toolbar component in dark mode without Liquid Glass effect and Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_orange_dark.png"/></picture></p><h4>Orange Compact</h4><p><picture><img alt="A top toolbar component in light mode without Liquid Glass effect and Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_orangecompact_light.png"/></picture> <picture><img alt="A top toolbar component in dark mode without Liquid Glass effect and Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_orangecompact_dark.png"/></picture></p><h4>Sosh</h4><p><picture><img alt="A top toolbar component in light mode without Liquid Glass effect and Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_sosh_light.png"/></picture> <picture><img alt="A top toolbar component in dark mode without Liquid Glass effect and Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_sosh_dark.png"/></picture></p><h4>Wireframe</h4><p><picture><img alt="A top toolbar component in light mode without Liquid Glass effect and Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_wireframe_light.png"/></picture> <picture><img alt="A top toolbar component in dark mode without Liquid Glass effect and Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbartop/component_toolbartop_wireframe_dark.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.0.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>1.4.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(title:haslargetitle:subtitle:leadingitems:trailingitems:)/index.html"><code>init(title: String, hasLargeTitle: Bool, subtitle: String?, leadingItems: () -&gt; [OUDSToolBarItem], trailingItems: () -&gt; [OUDSToolBarItem])</code><p><code>ViewModifier</code> to define an OUDS top toolbar.</p></a></li></ul><h3>Instance Methods</h3><ul><li><a href="body(content:)/index.html"><code>func body(content: OUDSToolBarTop.Content) -&gt; some View
