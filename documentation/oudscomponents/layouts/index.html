<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Layouts</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Some components can be used for layouts." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>Layouts</li></ul><p>Article</p><h1>Layouts</h1><p>Some components can be used for <b>layouts</b>.</p></section><h2>Overview</h2><h3>Colored Surface</h3><p>Colored backgrounds use surface colors to maximize the contrast with content. The colors of several OUDS components (for instance <a href="../oudsbutton/index.html"><code>OUDSButton</code></a> or <a href="../oudslink/index.html"><code>OUDSLink</code></a>) are automatically adjusted if they are placed on <a href="../oudscoloredsurface/index.html"><code>OUDSColoredSurface</code></a>. To do so, some tokens associated with these specific colors can be customized and are identified with the <i>Mono</i> suffix (for instance <i>colorBgDefaultEnabledMono</i> of <i>OrangeThemeButtonComponentTokensProvider</i>).</p><h4>How it works</h4><p>According to the color, the <code>OUDSColoredSurface</code> component adds in SwiftUI environment two flags:</p><ul><li><p><code>oudsUseMonochrome</code>: to inform a component that needs to use mono version of tokens</p></li><li><p><code>oudsOnColoredSurface</code>: to inform a component it is placed on colored surface even if the mono is off</p></li></ul><h4>How to use</h4><pre class="swift"><code>    // The folowing view has a colored background "onStatusPositiveEmphasized" with
    // - a text with the color adapted according to the adjusted colorScheme      
    // - a button that uses the mono version of tokens

    // As view
    OUDSColoredSurface(color: theme.colorModes.onStatusPositiveEmphasized) {
        VStack {
            Text("Status Positive Emphasized")
            .foregroundColor(theme.colors.contentDefault)

            OUDSButton(text: "Button") {}
        }
    }

    // As view modifier

    VStack {
        Text("Status Positive Emphasized")
        .foregroundColor(theme.colors.contentDefault)

        OUDSButton(text: "Button") {}
    }
    .coloredSurface(theme.colorModes.onStatusPositiveEmphasized)
</code></pre><h4>Debuging contrast ratios</h4><p>Some countries set up new laws so as to force companies to have a better accessibility of their digital services. This is for example the case for France with the <a href="https://accessibilite.numerique.gouv.fr/">Référentiel Général d’Amélioration de l’Accessibilité</a>, also named “RGAA”.</p><p>The WCAG specifications, for AA level, defines a contrast ratio of 4.5:1 for textual elements (i.e. texts), and 3:1 for non-textual elements (i.e. link’s chevron). However it is highly recommended for mobile devices to reach AAA level because of the screen sizes and luminosity issues, i.e. 7:1 for texts and 4.5:1 for non-textual elements.</p><p>Some components like <a href="../oudsbutton/index.html"><code>OUDSButton</code></a> or <a href="../oudslink/index.html"><code>OUDSLink</code></a> can be used on <a href="../oudscoloredsurface/index.html"><code>OUDSColoredSurface</code></a> ; thus in that case we can know the surface color for a given component on it, and compute the contrast ratio, and in the end display or not warnings.</p><p>To do that, some steps must be followed in your component implementation:</p><ul><li><p>Rise the flag to allow debugging (e.g. i #DEBUG mode)</p></li><li><p>Get the environement variable defined by the colored surface containing the applied color</p></li><li><p>In the component implementation, add a line of code comparing the color to test and that surface</p></li><li><p>Then keep an eye on your logs ; warnings will be added there if WCAG 2.1 3:1, 4.5:1 or 7:1 ratios are not reached, depending to the methods you call</p></li></ul><pre class="swift"><code>// Rise the flag
#if DEBUG
OUDSWCAG21Ratios.oudsDebugWCAG21Colors = true
#endif

// Supposing we are in your component View / ViewModifer struct

// Get the applied surface color
@Environment(\.oudsSurfaceColor) var surfaceColor

// In the function defining the color to apply, add the line below
// where colorTokenToApply is the color to apply from a theme:

// Non-textual components, in AA
OUDSWCAG21Ratio.debugContrastRatio(colorToApply, surfaceColor, .nonTextual)

// Textual components and AAA to check
OUDSWCAG21Ratio.debugContrastRatio(colorToApply, surfaceColor, .AAA)
</code></pre><h3>Divider</h3><h4>How it works</h4><p>A divider is used to separate content elements in a view. Two kinds of divider are proposed:</p><ul><li><p><a href="../oudshorizontaldivider/index.html"><code>OUDSHorizontalDivider</code></a>: to separate elements stacked vertically (e.g. in <code>VStack</code>)</p></li><li><p><a href="../oudsverticaldivider/index.html"><code>OUDSVerticalDivider</code></a>: to separate elements stacked horizontally (e.g. in `HStack)</p></li></ul><p>A divider can be colored using color enumerated in the <code>OUDSDividerColor</code>.</p><h5>Horizontal</h5><h5>Vertical</h5><h4>How to use</h4><pre class="swift"><code>// Add a vertical divider between items
HStack {
    Text("Hello world!")
    OUDSVerticalDivider(color: .brandPrimary)
    Text("Happy to see you")
}

// Add an horizontal divider between items
VStack {
    Text("Hello world!")
    OUDSHorizontalDivider(color: .brandPrimary)
    Text("Happy to see you")
}
</code></pre></article></noscript><div id="app"></div></body></html>
