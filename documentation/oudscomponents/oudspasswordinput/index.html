<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSPasswordInput</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Password input is a UI element that allows to securely and confidentially capture a user’s password. As it is based on the `OUDSTextInput`,  it offers same layout and the same elements of configuration." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSPasswordInput</li></ul><p>Structure</p><h1>OUDSPasswordInput</h1><p>Password input is a UI element that allows to securely and confidentially capture a user’s password. As it is based on the <code>OUDSTextInput</code>,  it offers same layout and the same elements of configuration.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>visionOS 1.0+</li></ul><pre><code>@MainActor struct OUDSPasswordInput</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../controls/index.html">Controls</a></li></ul><h2>Layout</h2><p>Passwords input is based on several configurable UI elements:</p><ul><li><p><b>label</b>: It is used to describe the purpose of the input.</p></li><li><p><b>placeholder</b>:  A prefix is not common and is discouraged in a Password Input component. In very specific cases, it can provide context or format requirements (e.g., “DEV-” for test accounts, “admin-” as a pattern to define an admin password)</p></li><li><p><b>lock icon</b>: it helps to reinforce the security context.</p></li><li><p><b>Helper text</b>:  A supporting text conveys additional information about the password field.</p></li></ul><h2>Outlined style</h2><p>By <b>default</b>, the input is with a subtle background fill and invisible bottom border, creating a softer and more contained look.</p><pre class="swift"><code>   // An outlined text input
   OUDSPasswordInput(label: "Your password", password: $password, isOutlined: true)

   // With a localizable from a bundle
   OUDSPasswordInput(LocalizedStringKey("password_label"), bundle: Bundle.module, password: $password)
</code></pre><h3>Rounded layout</h3><p>As the<code> OUDSTextInput</code>, rounded corners can be enabled or disabled using the <code>hasRoundedTextInputs</code> values of the <code>Tuning</code> object in your theme configuration.</p><h2>Status</h2><p>As <code>OUDSPasswordInput</code> is based on the<code> OUDSTextInput</code>, all the status are the same and have the same behavior available here <code>OUDSTextInput.Status</code></p><h2>Accessibility considerations</h2><p>By default no haptics are done by the component for the trailing action. However you should think about cases wher you will have to make the devices vibrates. You can refer to the <a href="https://developer.apple.com/design/human-interface-guidelines/playing-haptics">Human Interface Guidelines of Apple</a>.</p><h2>Code samples</h2><pre class="swift"><code>    // The password to display and edit
    @State var password: String = ""

    // A basic password input with label
    OUDSPasswordInput(label: "Password", password: $password)

    // Add a leading icon and helper text to more context
    OUDSPasswordInput(label: "Password", password: $password, lockIcon: true, helperText: "Your password must be between 8 and 20 characters long.")

    // Password with prefix
    OUDSPasswordInput(label: "Password", password: $password, prefix: "CORP-")

    // Make password visible
    OUDSPasswordInput(label: "Password", password: $password, isHiddenPassword: .constant(false))
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-password-input">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A text input component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/passwordinputs/component_passwordinput_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A text input component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/passwordinputs/component_passwordinput_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A text input component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/passwordinputs/component_passwordinput_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A text input component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/passwordinputs/component_passwordinput_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.2.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>1.2.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(_:tablename:bundle:password:ishiddenpassword:placeholder:prefix:lockicon:helpertext:isoutlined:constrainedmaxwidth:status:)/index.html"><code>init(LocalizedStringKey, tableName: String?, bundle: Bundle, password: Binding&lt;String&gt;, isHiddenPassword: Binding&lt;Bool&gt;, placeholder: String?, prefix: String?, lockIcon: Bool, helperText: String?, isOutlined: Bool, constrainedMaxWidth: Bool, status: OUDSTextInput.Status)</code><p>Creates a password input with a localized label, looking up the key in the given bundle.</p></a></li><li><a href="init(label:password:ishiddenpassword:placeholder:prefix:lockicon:helpertext:isoutlined:constrainedmaxwidth:status:)/index.html"><code>init(label: String, password: Binding&lt;String&gt;, isHiddenPassword: Binding&lt;Bool&gt;, placeholder: String?, prefix: String?, lockIcon: Bool, helperText: String?, isOutlined: Bool, constrainedMaxWidth: Bool, status: OUDSTextInput.Status)</code><p>Creates a password input.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul></article></noscript><div id="app"></div></body></html>
