<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSChipPicker</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A picker allowing to expose several filter chips and proposing single or multiple selections." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSChipPicker</li></ul><p>Structure</p><h1>OUDSChipPicker</h1><p>A picker allowing to expose several <i>filter chips</i> and proposing single or multiple selections.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>visionOS 1.0+</li></ul><pre><code>@MainActor struct OUDSChipPicker&lt;Tag&gt; where Tag : Hashable</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../controls/index.html">Controls</a></li></ul><h2>Overview</h2><p>Each chip contains a “tag”, i.e. a supposed to be unique value. The picker will expose choosen values through this “tag”. It has also some configuration elements which will override the one applied to nested <a href="../oudsfilterchip/index.html"><code>OUDSFilterChip</code></a>.</p><h2>Accessibility considerations</h2><p><i>Voice Over</i> will use several elements to describe the component. The picker itself does no have any defined accessiiblity value, label or identifier ; it remains in the users hands to define which one will be used. However if defined in the <a href="../oudschippickerdata/index.html"><code>OUDSChipPickerData</code></a> the items inside the picker will have such accessibility identifiers.</p><h2>Code samples</h2><pre class="swift"><code>    // Define the elements to display in filter chip using OUDSChipPickerData.
    enum Drink: String, CaseIterable {
        case virginHolyLava, ipaBeer, mineralWater
    }

    var someDataToPopulate: [OUDSChipPickerData&lt;Drink&gt;] {
        [
            OUDSChipPickerData(tag: Drink.virginHolyLava,
                               layout: .textAndIcon("Virgin Holy Lava", icon: Image(systemName: "flame")),

            OUDSChipPickerData(tag: Dring.ipaBeer,
                               layout: .textAndIcon("IPA Beer", icon: Image(systemName: "dog.fill")),

            OUDSChipPickerData(tag: Drink.mineralWater,
                               layout: .textAndIcon("Mineral water", icon: Image(systemName: "waterbottle.fill")),
        ]
    }

    /// Single selection case

    // Prepare the selection, with a value previously selected
    // Use the data and the binding for the picker.
    @State var selection: Drink = .mineralWater

    // Here the picker with title, selection and data
    OUDSChipPicker(title: "Select a drink", selection: $selection, chips: someDataToPopulate)

    /// Multiple selection case

    // Prepare the selection, with a value previously selected
    // Use the data and the binding for the picker.
    @State var selections: [Drink] = [.mineralWater]

    // Here the picker with title, selection and data
    OUDSChipPicker(title: "Select a drink", selections: $selections, chips: someDataToPopulate)
</code></pre><h2>Design documentation</h2><p>There is no online specification as this component is not an official OUDS one.</p><h2>Theme rendering</h2><h3>Orange</h3><p><picture><img alt="A chip picker component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/chips/chippicker/component_chippicker_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A chip picker component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/chips/chippicker/component_chippicker_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A chip picker component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/chips/chippicker/component_chippicker_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A chip picker component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/chips/chippicker/component_chippicker_wireframe.png"/></picture></p><blockquote class="aside since"><p class="label">Since</p><p>0.17.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(title:selection:chips:itemsspacing:)-7xdsd/index.html"><code>init(title: String?, selection: Binding&lt;Tag&gt;, chips: [OUDSChipPickerData&lt;Tag&gt;], itemsSpacing: SpaceSemanticToken?)</code><p>Defines the single selection picker view which displays using <a href="../oudsfilterchip/index.html"><code>OUDSFilterChip</code></a> view the <a href="../oudschippickerdata/index.html"><code>OUDSChipPickerData</code></a> The user will be able to choose only one option in this picker.</p></a></li><li><a href="init(title:selection:chips:itemsspacing:)-8w8zd/index.html"><code>init(title: String?, selection: Binding&lt;Tag?&gt;, chips: [OUDSChipPickerData&lt;Tag&gt;], itemsSpacing: SpaceSemanticToken?)</code><p>Defines the single selection picker view which displays using <a href="../oudsfilterchip/index.html"><code>OUDSFilterChip</code></a> view the <a href="../oudschippickerdata/index.html"><code>OUDSChipPickerData</code></a>. The user will be able to choose zero or one option in this picker.</p></a></li><li><a href="init(title:selections:chips:itemsspacing:)/index.html"><code>init(title: String?, selections: Binding&lt;[Tag]&gt;, chips: [OUDSChipPickerData&lt;Tag&gt;], itemsSpacing: SpaceSemanticToken?)</code><p>Defines the multiple selection picker view which displays using <a href="../oudsfilterchip/index.html"><code>OUDSFilterChip</code></a> view the <a href="../oudschippickerdata/index.html"><code>OUDSChipPickerData</code></a>. The user will be able to choose zero or one or seevral options in this picker.</p></a></li><li><a href="init(title:tablename:bundle:selection:chips:itemsspacing:)-2l8cv/index.html"><code>init(title: LocalizedStringKey?, tableName: String?, bundle: Bundle, selection: Binding&lt;Tag?&gt;, chips: [OUDSChipPickerData&lt;Tag&gt;], itemsSpacing: SpaceSemanticToken?)</code><p>Defines the single selection picker view with a localized title, looking up the key in the given bundle.</p></a></li><li><a href="init(title:tablename:bundle:selection:chips:itemsspacing:)-7905f/index.html"><code>init(title: LocalizedStringKey?, tableName: String?, bundle: Bundle, selection: Binding&lt;Tag&gt;, chips: [OUDSChipPickerData&lt;Tag&gt;], itemsSpacing: SpaceSemanticToken?)</code><p>Defines the single selection picker view with a localized title, looking up the key in the given bundle.</p></a></li><li><a href="init(title:tablename:bundle:selections:chips:itemsspacing:)/index.html"><code>init(title: LocalizedStringKey?, tableName: String?, bundle: Bundle, selections: Binding&lt;[Tag]&gt;, chips: [OUDSChipPickerData&lt;Tag&gt;], itemsSpacing: SpaceSemanticToken?)</code><p>Defines the multiple selection picker view with a localized title, looking up the key in the given bundle.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul></article></noscript><div id="app"></div></body></html>
