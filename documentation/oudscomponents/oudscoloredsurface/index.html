<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSColoredSurface</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Used to define if a content is used on a colored surface." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSColoredSurface</li></ul><p>Structure</p><h1>OUDSColoredSurface</h1><p>Used to define if a content is used on a colored surface.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor struct OUDSColoredSurface&lt;Content&gt; where Content : View</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../layouts/index.html">Layouts</a></li></ul><h2>Overview</h2><p>It applies the <code>color</code> to the background and set the <code>oudsColoredSurface</code> environment variable to <i>true</i>. This variable is useful, for example, to change the style of a component according to its environment (e.g monochrome mode on <code>OUDSButton</code>).</p><pre class="swift"><code>  OUDSColoredSurface(color: theme.colorModes.onBrandPrimary) {
     OUDSButton(icon: Image("ic_heart"), appearance: .strong) {}
  }
</code></pre><h2>Theme rendering</h2><h3>Orange</h3><p><picture><img alt="A colored surface with text, button and link in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/layouts/coloredsurface/component_coloredsurface_orange.png"/></picture></p><blockquote class="aside since"><p class="label">Since</p><p>0.13.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(color:content:)/index.html"><code>init(color: OUDSColoredSurface&lt;Content&gt;.SurfaceColor, content: () -&gt; Content)</code><p>Create a view with background color applied on the <code>content</code> view.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul><h3>Type Aliases</h3><ul><li><a href="surfacecolor/index.html"><code>typealias SurfaceColor</code><p>A type alias to use for clarity reasons ; a surface color is in the end a token</p></a></li></ul></article></noscript><div id="app"></div></body></html>
