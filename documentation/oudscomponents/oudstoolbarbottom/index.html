<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSToolBarBottom</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="The bottom toolbar is a kind of navigation bar component used to display leading and trailing actions at the bottom of the screen when supported." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSToolBarBottom</li></ul><p>Structure</p><h1>OUDSToolBarBottom</h1><p>The bottom toolbar is a kind of navigation bar component used to display leading and trailing actions at the bottom of the screen when supported.</p><ul id="availability"><li>iOS 15.0+</li><li>visionOS 1.0+</li></ul><pre><code>@MainActor struct OUDSToolBarBottom</code></pre></section><h2>Overview</h2><p><code>toolBarBottom</code> View helper applies a SwiftUI toolbar configuration.</p><h2>Platform considerations</h2><ul><li><p>Available on iOS, iPadOS, and visionOS</p></li><li><p>Not available on watchOS, tvOS and macOS</p></li></ul><h2>Guidelines</h2><ul><li><p>Test the use of the <code>toolBarBottom</code> for both iOS with Liquid Glass and not Liquid Glass</p></li><li><p>If you use both an  <a href="../oudstabbar/index.html"><code>OUDSTabBar</code></a> with the <code>toolBarBottom</code>, the toolbar will be above the tabbar for iOS lower than 26, <b>not recommended</b></p></li><li><p>If you use both an  <a href="../oudstabbar/index.html"><code>OUDSTabBar</code></a> with the <code>toolBarBottom</code>, the toolbar will be <b>behind</b> the tabbar for iOS 26+, so not usable, <b>not recommended</b></p></li><li><p>Avoid use of both <code>toolBarBottom</code> and <a href="../oudstabbar/index.html"><code>OUDSTabBar</code></a> in the same page</p></li></ul><h2>Code samples</h2><p>Define leading and trailing items for the bottom toolbar</p><pre class="swift"><code>    SomeView()
        .toolBarBottom(leadingItems: {
                OUDSToolBarItem(label: "Some label") { /* Action to process */ }
            }, trailingItems: {
                OUDSToolBarItem(icon: Image(decorative: "some_image"), accessibilityLabel: "Label") { /* Action to process */ }
        })
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-ios-tool-bar-bottom">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Liquid Glass</h3><h4>Orange</h4><p><picture><img alt="A bottom toolbar component in light mode with Liquid Glass effect and Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbarbottom/component_toolbarbottom_liquidglass_orange_light.png"/></picture> <picture><img alt="A bottom toolbar component in dark mode with Liquid Glass effect and Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbarbottom/component_toolbarbottom_liquidglass_orange_dark.png"/></picture></p><h4>Orange Compact</h4><p><picture><img alt="A bottom toolbar component in light mode with Liquid Glass effect and Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbarbottom/component_toolbarbottom_liquidglass_orangecompact_light.png"/></picture> <picture><img alt="A bottom toolbar component in dark mode with Liquid Glass effect and Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/toolbar/toolbarbottom/component_toolbarbottom_liquidglass_orangecompact_dark.png"/></picture></p><h4>Sosh</h4><p><picture><img alt="A bottom toolbar component in light mode with Liquid Glass effect and Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.d
