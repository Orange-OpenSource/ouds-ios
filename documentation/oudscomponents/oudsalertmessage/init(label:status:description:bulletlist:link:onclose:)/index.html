<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>init(label:status:description:bulletList:link:onClose:)</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Creates a alert message." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../../index.html">Components</a></li><li><a href="../index.html">OUDSAlertMessage</a></li><li>init(label:status:description:bulletList:link:onClose:)</li></ul><p>Initializer</p><h1>init(label:status:description:bulletList:link:onClose:)</h1><p>Creates a alert message.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li></ul><pre><code>@MainActor init(label: String, status: OUDSAlertStatus = .positive, description: String? = nil, bulletList: [String] = [], link: OUDSAlertMessage.Link? = nil, onClose: (() -&gt; Void)? = nil)</code></pre></section><h2>Parameters</h2><dl><dt>label</dt><dd><p>Label displayed in the alert message. Main message that should be short, clear, and readable at a glance.</p></dd><dt>status</dt><dd><p>The status of the alert message. Its background color and its icon color are based on this status. There are two types of statuses (see <a href="../../oudsalertstatus/index.html"><code>OUDSAlertStatus</code></a>)</p></dd><dt>description</dt><dd><p>An optional supplementary text in an alert message. Use only when additional detail or guidance is needed beyond the label. It should remain short, clear and scannable, helping the user to understand what happened and what he can do next.</p></dd><dt>bulletList</dt><dd><p>An optional list of bullet points to be displayed in the alert message following the label or the optional <code>description</code>.</p></dd><dt>link</dt><dd><p>An optional link to be displayed in the alert message. It can be used to trigger an action.</p></dd><dt>onClose</dt><dd><p>An optional callback invoked when the close button is clicked. If <code>nil</code>, the close button is not displayed and the alert message remains visible until the context changes (e.g., the issue is resolved, the screen is refreshed). Otherwise, the alert message is dismissable and includes a close button, allowing the user to dismiss it when he has acknowledged the message.  Some alerts must remain visible to ensure user is aware of important information; others can be closed to reduce visual clutter.</p></dd></dl><h2>Discussion</h2><p>Use the <code>View/disabled(_:)</code> method to have component in disabled state.</p><pre class="swift"><code>    OUDSAlertMessage(label: "Success! Your form was submitted.", status: .positive)
</code></pre></article></noscript><div id="app"></div></body></html>
