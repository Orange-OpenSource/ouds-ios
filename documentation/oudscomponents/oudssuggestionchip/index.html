<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSSuggestionChip</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Suggestion chip is a UI element that allows to present recommended or predictive options based on user’s input or context, and is commonly used to capture filtering decisions. Suggestion chip is typically non-selected by default and can be tapped or clicked to apply the suggestion, streamlining input and enhancing usability. Chips can show multiple interactive elements together in the same area, such as a list of selectable movie times, or a serie of email contacts. Best suited for category-based filters that do not require additional visual elements." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSSuggestionChip</li></ul><p>Structure</p><h1>OUDSSuggestionChip</h1><p>Suggestion chip is a UI element that allows to present recommended or predictive options based on user’s input or context, and is commonly used to capture filtering decisions. Suggestion chip is typically non-selected by default and can be tapped or clicked to apply the suggestion, streamlining input and enhancing usability. Chips can show multiple interactive elements together in the same area, such as a list of selectable movie times, or a serie of email contacts. Best suited for category-based filters that do not require additional visual elements.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor struct OUDSSuggestionChip</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../controls/index.html">Controls</a></li></ul><h2>Accessibility considerations</h2><p>This component does not define in its side some accessibility hints. If you use this component, you must define such hints so as to explain to your users which actions are available for which interactions.</p><h2>Code samples</h2><pre class="swift"><code>    // Icon only
    OUDSSuggestionChip(icon: Image("ic_heart"), accessibilityLabel: "Heart") { /* the action to process */ }

    // Text only
    OUDSSuggestionChip(text: "Heart") { /* the action to process */ }

    // Text from a localizable and a bundle
    OUDSSuggestionChip(LocalizedStringKey("category_chip"), bundle: Bundle.module) { }

    // Text and icon
    OUDSSuggestionChip(icon: Image("ic_heart"), text: "Heart") { /* the action to process */ }
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-suggestion-chip">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A suggestion chip component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/chips/suggestionchip/component_suggestionchip_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A suggestion chip component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/chips/suggestionchip/component_suggestionchip_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A suggestion chip component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/chips/suggestionchip/component_suggestionchip_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A suggestion chip component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/chips/suggestionchip/component_suggestionchip_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.3.0</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>0.17.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(_:tablename:bundle:action:)/index.html"><code>init(LocalizedStringKey, tableName: String?, bundle: Bundle, action: () -&gt; Void)</code><p>Creates a chip with a localized text only, looking up the key in the given bundle.</p></a></li><li><a href="init(icon:_:tablename:bundle:action:)/index.html"><code>init(icon: Image, LocalizedStringKey, tableName: String?, bundle: Bundle, action: () -&gt; Void)</code><p>Creates a chip with a localized text and icon, looking up the key in the given bundle.</p></a></li><li><a href="init(icon:accessibilitylabel:action:)/index.html"><code>init(icon: Image, accessibilityLabel: String, action: () -&gt; Void)</code><p>Creates a chip with an icon only.</p></a></li><li><a href="init(icon:accessibilitylabel:tablename:bundle:action:)/index.html"><code>init(icon: Image, accessibilityLabel: LocalizedStringKey, tableName: String?, bundle: Bundle, action: () -&gt; Void)</code><p>Creates a chip with an icon only.</p></a></li><li><a href="init(icon:text:action:)/index.html"><code>init(icon: Image, text: String, action: () -&gt; Void)</code><p>Creates a chip with text and icon.</p></a></li><li><a href="init(text:action:)/index.html"><code>init(text: String, action: () -&gt; Void)</code><p>Creates a chip with a text only.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul></article></noscript><div id="app"></div></body></html>
