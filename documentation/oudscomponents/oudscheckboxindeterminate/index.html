<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSCheckboxIndeterminate</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Checkbox is a UI element that allows to select multiple options from a set of mutually non exclusive choices. Checkbox that does not show icon or text, provides greater flexibility when creating other components that require a checkbox to be displayed." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSCheckboxIndeterminate</li></ul><p>Structure</p><h1>OUDSCheckboxIndeterminate</h1><p>Checkbox is a UI element that allows to select multiple options from a set of mutually non exclusive choices. Checkbox that does not show icon or text, provides greater flexibility when creating other components that require a checkbox to be displayed.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor struct OUDSCheckboxIndeterminate</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../controls/index.html">Controls</a></li></ul><h2>Indicator states</h2><p>The checkbox indicator has three available states:</p><ul><li><p><b>selected</b>: the checkbox is filled with a tick, the user has made the action to select the checkbox</p></li><li><p><b>unselected</b>: the checkbox is empty, does not contain a tick, the user has made the action to unselect or did not select yet the checkbox</p></li><li><p><b>indeterminate</b>: like a prefilled or preticked checkbox, the user did not do anything on it yet</p></li></ul><p>In you are looking for a checkbox with only two possible values, refer to <a href="../oudscheckbox/index.html"><code>OUDSCheckbox</code></a>.</p><h2>Particular cases</h2><p>An <a href="."><code>OUDSCheckboxIndeterminate</code></a> can be related to an error situation, for example troubles for a formular. A dedicated look-and-feel is implemented for that if the <code>isError</code> flag is risen.</p><h2>Accessibility considerations</h2><p>Note also the component must be instanciated with a string parameter used as accessibility label. It is a good pratice (at least) to define a label for a component without text for accessibility reasons. This label will be vocalized by <i>Voice Over</i>. The vocalization tool will also use, after the label, a description of the component (if disabled, if error context), and a fake trait for checkbox.</p><h2>Cases forbidden by design</h2><p><b>The design system does not allow to have both an error situation and a disabled component.</b></p><h2>Code samples</h2><pre class="swift"><code>    // Supposing we have an indeterminate state checkbox
    @Published var selection: OUDSCheckboxIndicatorState = .indeterminate

    // A simple checkbox, no error, not in read only mode
    OUDSCheckboxIndeterminate(selection: $selection, accessibilityLabel: "The cake is a lie")

    // A simple checkbox, but is an error context
    OUDSCheckboxIndeterminate(selection: $selection, accessibilityLabel: "The cake is a lie"), isError: true)

    // Never disable an error-related checkbox as it will crash
    // This is forbidden by design!
    OUDSCheckboxIndeterminate(selection: $selection, accessibilityLabel: "The cake is a lie"), isError: true).disabled(true) // fatal error
</code></pre><h2>Suggestions</h2><p>According to the <a href="https://r.orange.fr/r/S-ouds-doc-checkbox">documentation</a>, the checkbox by default must be used in unselected state.</p><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-checkbox">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A checkbox component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/checkboxes/checkbox/component_checkbox_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A checkbox component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/checkboxes/checkbox/component_checkbox_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A checkbox component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/checkboxes/checkbox/component_checkbox_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A checkbox component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/checkboxes/checkbox/component_checkbox_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>2.4.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>0.12.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(selection:accessibilitylabel:iserror:isreadonly:)/index.html"><code>init(selection: Binding&lt;OUDSCheckboxIndicatorState&gt;, accessibilityLabel: String, isError: Bool, isReadOnly: Bool)</code><p>Creates a checkbox with only an indicator.</p></a></li><li><a href="init(selection:accessibilitylabel:tablename:bundle:iserror:isreadonly:)/index.html"><code>init(selection: Binding&lt;OUDSCheckboxIndicatorState&gt;, accessibilityLabel: LocalizedStringKey, tableName: String?, bundle: Bundle, isError: Bool, isReadOnly: Bool)</code><p>Creates a checkbox with only an indicator.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul></article></noscript><div id="app"></div></body></html>
