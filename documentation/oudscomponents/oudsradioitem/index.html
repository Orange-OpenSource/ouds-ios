<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSRadioItem</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Radio button item is a UI element that allows to select a single option from a set of mutually exclusive choices. Radio button item covers a wider range of contexts by allowing to toggle the visibility of additional text labels and icon assets." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSRadioItem</li></ul><p>Structure</p><h1>OUDSRadioItem</h1><p>Radio button item is a UI element that allows to select a single option from a set of mutually exclusive choices. Radio button item covers a wider range of contexts by allowing to toggle the visibility of additional text labels and icon assets.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor struct OUDSRadioItem</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../controls/index.html">Controls</a></li></ul><h2>Layouts</h2><p>The component can be rendered as two different layouts:</p><ul><li><p><b>default</b>: the component has a leading indicator, a label and optional texts, and an optional trailing decorative icon</p></li><li><p><b>reversed</b>: like the <i>default</i> layout but with a trailing radio indicator and a leading optional decorative icon</p></li></ul><h2>Indicator states</h2><p>The radio indicator has two available states:</p><ul><li><p><b>selected</b>: the radio is filled with a filled circle, the user has made the action to select the radio</p></li><li><p><b>unselected</b>: the radio is empty, does not contain anything, the user has made the action to unselect or did not select yet the radio</p></li></ul><h2>Particular cases</h2><p>An <a href="."><code>OUDSRadioItem</code></a> can be related to an error situation, for example troubles for a formular. A dedicated look and feel is implemented for that if the <code>isError</code> flag is risen. In that case if the component displayed an icon, this icon will be replaced automatically by an error icon.</p><p>In addition, the <a href="."><code>OUDSRadioItem</code></a> can be in read only mode, i.e. the user cannot interact with the component yet but this component must not be considered as disabled. The radio can be also outlined in some cases.</p><p>The component does not follow the right-to-left (RTL) / left-to-right (LTR) mode returned by the system as it could have some meaning to have for example the indicator in trailing position for LTR mode and vice versa. However, if the component has an icon in leading position (RTL mode) or in trailing position (LTR), the content of the icon is never changed. It could lead to a loss of meaning or semantics in the icon. Thus a specific flag can be used to flip the icon content whatever the layout direction is. It prevents the user do implement its own rules to flip or not image.</p><h2>Accessibility considerations</h2><p><i>Voice Over</i> will use several elements to describe the component: if component disabled / read only, if error context, the label and optional texts and a custom radio trait. No accessibility identifier is defined in OUDS side as this value remains in the users hands.</p><h2>Forbidden by design</h2><p><b>The design system does not allow to have both an error situation and a read only component.</b> <b>The design system does not allow to have both an error situation and a disabled component.</b> <b>The design system does not allow to have both a read only and a disabled component.</b></p><h2>Code samples</h2><p>The <a href="."><code>OUDSRadioItem</code></a>can be used outside a dedicated picker, thus it does not need any tag and associated type.</p><pre class="swift"><code>    // Supposing we have an unselected state
    @Published var selection: Bool = false

    // A leading radio with a label.
    // The default layout will be used here.
    OUDSRadioItem("Lucy in the Sky with Diamonds", isOn: $selection)

    // Localizable from bundle can also be used
    OUDSRadioItem(LocalizedStringKey("option_label"), bundle: Bundle.module, isOn: $selection)

    // A leading radio with a label, but in read only mode (user cannot interact yet, but not disabled).
    // The default layout will be used here.
    OUDSRadioItem("Lucy in the Sky with Diamonds", isOn: $selection, isReadOnly: true)

    // A leading radio with a label, and an additional label but without text.
    // The default layout will be used here.
    OUDSRadioItem("Lucy in the Sky with Diamonds", isOn: $selection, extraLabel: "The Beatles")

    // A leading radio with an additional label.
    // The default layout will be used here.
    OUDSRadioItem("Lucy in the Sky with Diamonds", isOn: $selection, extraLabel: "The Beatles", description: "1967")

    // A trailing radio with a label, a description, an icon, a divider and is about an error.
    // The reversed layout will be used here.
    OUDSRadioItem("Rescue from this world!",
                  isOn: $selection,
                  description: "Put your hand in mine",
                  icon: Image(decorative: "ic_heart"),
                  isReversed: true,
                  isError: true,
                  hasDivider: true)

    // If on error, add an error message can help user to understand error context
    OUDSRadioItem("Rescue from this world!",
                  isOn: $selection,
                  isError: true,
                  errorText: "Something wrong",
                  hasDivider: true)

    // A leading radio with a label, but disabled.
    // The default layout will be used here.
    OUDSRadioItem("Rescue from this world!", isOn: $selection)
        .disabled(true)

    // Never disable a read only or an error-related radio as it will crash
    // This is forbidden by design!
    OUDSRadioItem("Kaboom!", isOn: $selection, isError: true).disabled(true) // fatal error
    OUDSRadioItem("Kaboom!", isOn: $selection, isReadOnly: true).disabled(true) // fatal error
</code></pre><p>If you need to flip your icon depending to the layout direction or not (e.g. if RTL mode lose semantics  / meanings):</p><pre class="swift"><code>    @Environment(\.layoutDirection) var layoutDirection

    OUDSRadioItem("Cocorico !",
                  isOn: $selection,
                  icon: Image(systemName: "figure.handball"),
                  flipIcon: layoutDirection == .rightToLeft,
                  isInversed: layoutDirection == .rightToLeft)
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-radio-button">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A radio item component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/radios/radioitem/component_radioitem_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A radio item component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/radios/radioitem/component_radioitem_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A radio item component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/radios/radioitem/component_radioitem_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A radio item component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/radios/radioitem/component_radioitem_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.4.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>0.12.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(_:ison:extralabel:description:icon:flipicon:isoutlined:isreversed:iserror:errortext:isreadonly:hasdivider:constrainedmaxwidth:action:)/index.html"><code>init(String, isOn: Binding&lt;Bool&gt;, extraLabel: String?, description: String?, icon: Image?, flipIcon: Bool, isOutlined: Bool, isReversed: Bool, isError: Bool, errorText: String?, isReadOnly: Bool, hasDivider: Bool, constrainedMaxWidth: Bool, action: (() -&gt; Void)?)</code><p>Creates a radio with label and optional helper text as description, icon, divider. Supposed to be integrated inside a <a href="../oudsradiopicker/index.html"><code>OUDSRadioPicker</code></a>.</p></a></li><li><a href="init(_:tablename:bundle:ison:extralabel:description:icon:flipicon:isoutlined:isreversed:iserror:errortext:isreadonly:hasdivider:constrainedmaxwidth:action:)/index.html"><code>init(LocalizedStringKey, tableName: String?, bundle: Bundle, isOn: Binding&lt;Bool&gt;, extraLabel: String?, description: String?, icon: Image?, flipIcon: Bool, isOutlined: Bool, isReversed: Bool, isError: Bool, errorText: String?, isReadOnly: Bool, hasDivider: Bool, constrainedMaxWidth: Bool, action: (() -&gt; Void)?)</code><p>Creates a radio with a localized label, looking up the key in the given bundle.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul></article></noscript><div id="app"></div></body></html>
