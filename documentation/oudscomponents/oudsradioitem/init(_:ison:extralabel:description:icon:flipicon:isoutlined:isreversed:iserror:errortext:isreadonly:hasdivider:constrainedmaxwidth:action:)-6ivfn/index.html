<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>init(_:isOn:extraLabel:description:icon:flipIcon:isOutlined:isReversed:isError:errorText:isReadOnly:hasDivider:constrainedMaxWidth:action:)</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Creates a radio with label and optional helper text as description, icon, divider. Supposed to be integrated inside a ``doc://OUDSComponents/documentation/OUDSComponents/OUDSRadioPicker``." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../../index.html">Components</a></li><li><a href="../index.html">OUDSRadioItem</a></li><li>init(_:isOn:extraLabel:description:icon:flipIcon:isOutlined:isReversed:isError:errorText:isReadOnly:hasDivider:constrainedMaxWidth:action:)</li></ul><p>Initializer</p><h1>init(_:isOn:extraLabel:description:icon:flipIcon:isOutlined:isReversed:isError:errorText:isReadOnly:hasDivider:constrainedMaxWidth:action:)</h1><p>Creates a radio with label and optional helper text as description, icon, divider. Supposed to be integrated inside a <a href="../../oudsradiopicker/index.html"><code>OUDSRadioPicker</code></a>.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor init(_ label: String, isOn: Binding&lt;Bool&gt;, extraLabel: String? = nil, description: String? = nil, icon: Image? = nil, flipIcon: Bool = false, isOutlined: Bool = false, isReversed: Bool = false, isError: Bool = false, errorText: String? = nil, isReadOnly: Bool = false, hasDivider: Bool = false, constrainedMaxWidth: Bool = false, action: (() -&gt; Void)? = nil)</code></pre></section><h2>Parameters</h2><dl><dt>label</dt><dd><p>The main label text of the radio, must not be empty</p></dd><dt>isOn</dt><dd><p>A binding to a property that determines whether the toggle is on or off.</p></dd><dt>extraLabel</dt><dd><p>An additional label text of the radio, default set to <code>nil</code></p></dd><dt>description</dt><dd><p>A description, like an helper text, should not be empty, default set to <code>nil</code></p></dd><dt>icon</dt><dd><p>An optional icon, default set to <code>nil</code></p></dd><dt>flipIcon</dt><dd><p>Default set to <code>false</code>, set to true to reverse the image (i.e. flip vertically)</p></dd><dt>isOutlined</dt><dd><p>Flag to get an outlined radio, default set to <code>false</code></p></dd><dt>isReversed</dt><dd><p><code>true</code> of the radio indicator must be in trailing position, <code>false</code> otherwise. Default to <code>false</code></p></dd><dt>isError</dt><dd><p><code>true</code> if the look and feel of the component must reflect an error state, default set to <code>false</code></p></dd><dt>errorText</dt><dd><p>An optional error message to display at the bottom. This message is ignored if <code>isError</code> is <code>false</code>. The <code>errorText</code>can be different if switch is selected or not.</p></dd><dt>isReadOnly</dt><dd><p>True if component is in read only, i.e. not really disabled but user cannot interact with it yet, default set to <code>false</code></p></dd><dt>hasDivider</dt><dd><p>If <code>true</code> a divider is added at the bottom of the view.</p></dd><dt>constrainedMaxWidth</dt><dd><p>When <code>true</code>, the item width is constrained to a maximum value defined by the design system. When <code>false</code>, no specific width constraint is applied, allowing the component to size itself or follow external modifier. Defaults to <code>false</code>.</p></dd><dt>action</dt><dd><p>An additional action to trigger when the radio button has been pressed</p></dd></dl><h2>Discussion</h2><pre class="swift"><code>    OUDSRadioItem("Virgin Holy Lava",
                  isOn: $selection,
                  extraLabel: "Very spicy",
                  description: "No alcohol, only tasty flavors",
                  icon: Image(systemName: "flame")
</code></pre><p><b>The design system does not allow to have both an error situation and a read only mode for the component.</b></p><p><b>Remark 1: As divider and outline effect are not supposed to be displayed at the same time, the divider is not displayed if the outline effect is active.</b></p><p><b>Remark 2: If <code>label</code> and <code>description</code> strings are wording keys from strings catalog stored in <code>Bundle.main</code>, they are automatically localized. Else, prefer to provide the localized string if key is stored in another bundle.</b></p></article></noscript><div id="app"></div></body></html>
