<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Content Display</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Some components can be used for content display." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>Content Display</li></ul><p>Article</p><h1>Content Display</h1><p>Some components can be used for <b>content display</b>.</p></section><h2>Overview</h2><h3>Bullet List</h3><p>The <a href="../oudsbulletlist/index.html"><code>OUDSBulletList</code></a> is a UI element that helps to display related individual text items grouped together; items usually start with a number or a bullet.</p><p><a href="../oudsbulletlist/index.html"><code>OUDSBulletList</code></a> is also known as <i>Unordered list</i> or <i>Ordered list</i> and is not an interactive element by default.</p><pre class="swift"><code>// Bare list with 3 items
OUDSBulletList(type: .bare) {
    OUDSBulletList.Item("Label 1")
    OUDSBulletList.Item("Label 2")
    OUDSBulletList.Item("Label 3")
}

// Item of Unordered list with bullet as tick, a text style
// body medium and text bold
OUDSBulletList(type: .unordered(asset: .tick),
              textStyle: .bodyMedium,
              isBold: true)  {
    OUDSBulletList.Item("Label 1")
    OUDSBulletList.Item("Label 2")
    OUDSBulletList.Item("Label 3")
}

// Ordered list with 3 items in first level,
// and one item as sub item (second level),
// and 2 items as sub item in (third level)
OUDSBulletList(type: .ordered) {
    OUDSBulletList.Item("Label 1") {
        OUDSBulletList.Item("Label 1.1") {
            OUDSBulletList.Item("Label 1.1.1")
            OUDSBulletList.Item("Label 1.1.2")
        }
    }
    OUDSBulletList.Item("Label 2")
    OUDSBulletList.Item("Label 3")
}
</code></pre></article></noscript><div id="app"></div></body></html>
