<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSCheckboxItemIndeterminate</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Checkbox is a UI element that allows to select multiple options from a set of mutually non exclusive choices. Checkbox item covers a wider range of contexts by allowing to toggle the visibility of additional text labels and icon assets." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSCheckboxItemIndeterminate</li></ul><p>Structure</p><h1>OUDSCheckboxItemIndeterminate</h1><p>Checkbox is a UI element that allows to select multiple options from a set of mutually non exclusive choices. Checkbox item covers a wider range of contexts by allowing to toggle the visibility of additional text labels and icon assets.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor struct OUDSCheckboxItemIndeterminate</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../controls/index.html">Controls</a></li></ul><h2>Layouts</h2><p>The component can be rendered as two different layouts:</p><ul><li><p><b>default</b>: the component has a leading indicator, a label and optional helper texts, and an optional trailing decorative icon</p></li><li><p><b>inverse</b>: like the <i>default</i> layout but with a trailing checkbox indicator and a leading optional image</p></li></ul><h2>Indicator states</h2><p>The checkbox indicator has three available states:</p><ul><li><p><b>selected</b>: the checkbox is filled with a tick, the user has made the action to select the checkbox</p></li><li><p><b>unselected</b>: the checkbox is empty, does not contain a tick, the user has made the action to unselect or did not select yet the checkbox</p></li><li><p><b>indeterminate</b>: mike a prefilled or preticked checkbox, the user did not do anything on it yet</p></li></ul><p>If you need a checkbox with only two states to manage use instead <a href="../oudscheckboxitem/index.html"><code>OUDSCheckboxItem</code></a>.</p><h2>Particular cases</h2><p>An <a href="."><code>OUDSCheckboxItemIndeterminate</code></a> can be related to an error situation, for example troubles for a formular. A dedicated look and feel is implemented for that if the <code>isError</code> flag is risen. In that case if the component displayed an icon, this icon will be replaced automatically by an error icon.</p><p>In addition, the <a href="."><code>OUDSCheckboxItemIndeterminate</code></a> can be in read only mode, i.e. the user cannot interact with the component yet but this component must not be considered as disabled.</p><p>The component does not follow the right-to-left (RTL) / left-to-right (LTR) mode returned by the system as it could have some meaning to have for example the indicator in trailing position for LTR mode and vice versa. However, if the component has an icon in leading position (RTL mode) or in trailing position (LTR), the content of the icon is never changed. It could lead to a loss of meaning or semantics in the icon. Thus a specific flag can be used to flip the icon content whatever the layout direction is. It prevents the user do implement its own rules to flip or not image.</p><h2>Accessibility considerations</h2><p><i>Voice Over</i> will use several elements to describe the component: if component disabled / read only, if error context, the label and helper texts and a custom checkbox trait.</p><h2>Forbidden by design</h2><p><b>The design system does not allow to have both an error situation and a read only component.</b> <b>The design system does not allow to have both an error situation and a disabled component.</b> <b>The design system does not allow to have both a read only and a disabled component.</b></p><h2>Code samples</h2><pre class="swift"><code>    // Supposing we have an indeterminate state checkbox
    @Published var selection: OUDSCheckboxIndicatorState = .indeterminate

    // A leading checkbox with a label.
    // The default layout will be used here.
    OUDSCheckboxItemIndeterminate("Hello world", selection: $selection)

    // A leading checkbox with a label, but in read only mode (user cannot interact yet, but not disabled).
    // The default layout will be used here.
    OUDSCheckboxItemIndeterminate("Hello world", selection: $selection, isReadOnly: true)

    // A leading checkbox with a label and a description as helper text.
    // The default layout will be used here.
    OUDSCheckboxItemIndeterminate("Bazinga!", selection: $selection, description: "Doll-Dagga Buzz-Buzz Ziggety-Zag")

    // A trailing checkbox with a label, an helper text and an icon.
    // The reversed layout will be used here.
    OUDSCheckboxItemIndeterminate("We live in a fabled world",
                                  selection: $selection,
                                  description: "Of dreaming boys and wide-eyed girls",
                                  isReversed: true,
                                  icon: Image(decorative: "ic_heart"))

    // If on error, add an error message can help user to understand error context
    OUDSCheckboxItemIndeterminate("We live in a fabled world",
                                  selection: $selection,
                                  isError: true,
                                  errorText: "Something wrong",
                                  hasDivider: true)

    // A leading checkbox with a label, but disabled.
    // The default layout will be used here.
    OUDSCheckboxItemIndeterminate("Hello world", selection: $selection)
        .disabled(true)

    // A leading checkbox with a label and and icon but with the icon flipped vertically
    OUDSCheckboxItemIndeterminate("Cocorico !",
                                  selection: $selection,
                                  icon: Image(systemName: "figure.handball"),
                                  flipIcon: true)

    // Never disable a read only or an error-related checkbox as it will crash
    // This is forbidden by design!
    OUDSCheckboxItemIndeterminate("Hello world", selection: $selection, isError: true).disabled(true) // fatal error
    OUDSCheckboxItemIndeterminate("Hello world", selection: $selection, isReadOnly: true).disabled(true) // fatal error
</code></pre><p>If you want to manage the RTL mode quite easily and switch your layouts (flip image, indicator in RTL leading i.e. in the right):</p><pre class="swift"><code>    @Environment(\.layoutDirection) var layoutDirection

    OUDSCheckboxItemIndeterminate("Cocorico !",
                                  selection: $selection,
                                  icon: Image(systemName: "figure.handball"),
                                  flipIcon: layoutDirection == .rightToLeft,
                                  isReversed: layoutDirection == .rightToLeft)
</code></pre><h2>Suggestions</h2><p>According to the <a href="https://r.orange.fr/r/S-ouds-doc-checkbox">documentation</a>, the checkbox by default must be used in unselected state.</p><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-checkbox">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A checkbox item component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/checkboxes/checkboxitem/component_checkboxitem_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A checkbox item component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/checkboxes/checkboxitem/component_checkboxitem_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A checkbox item component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/checkboxes/checkboxitem/component_checkboxitem_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A checkbox item component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/checkboxes/checkboxitem/component_checkboxitem_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>2.4.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>0.12.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(_:selection:description:icon:flipicon:isreversed:iserror:errortext:isreadonly:hasdivider:constrainedmaxwidth:action:)/index.html"><code>init(String, selection: Binding&lt;OUDSCheckboxIndicatorState&gt;, description: String?, icon: Image?, flipIcon: Bool, isReversed: Bool, isError: Bool, errorText: String?, isReadOnly: Bool, hasDivider: Bool, constrainedMaxWidth: Bool, action: (() -&gt; Void)?)</code><p>Creates a checkbox with label and optional helper text, icon, divider.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul></article></noscript><div id="app"></div></body></html>
