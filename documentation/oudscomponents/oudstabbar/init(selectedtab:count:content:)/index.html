number of tabs hosted in the tab bar, must be a positive non-null integer</p></dd><dt>content</dt><dd><p>The list of items to add in the tab bar</p></dd></dl><h2>Discussion</h2><p>The <code>selectedTab</code> binding is updated whenever the user taps a tab item, allowing the parent view to observe or drive tab selection programmatically.</p><pre class="swift"><code>    @State private var selectedTab = 0

    OUDSTabBar(selectedTab: $selectedTab, count: 2) {
        SomeView()
            .tabItem {
                Label("Label 1", image: "some-image")
             }
             .tag(0)
        OtherView()
            .tabItem {
                Label("Label 2", image: "some-image")
             }
             .tag(1)
    }
</code></pre></article></noscript><div id="app"></div></body></html>
