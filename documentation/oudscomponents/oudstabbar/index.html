<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSTabBar</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="The Tab bar is a system navigation component with a position which can vary depending to the OS. The tab bar can be found at the bottom of the screen for iOS. It can vary for iPadOS. It allows users to switch between the sections of an app. Each tab can be represented by a label, optionally paired with an icon, and maintains persistent visibility across top-level destinations." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSTabBar</li></ul><p>Structure</p><h1>OUDSTabBar</h1><p>The Tab bar is a system navigation component with a position which can vary depending to the OS. The tab bar can be found at the bottom of the screen for iOS. It can vary for iPadOS. It allows users to switch between the sections of an app. Each tab can be represented by a label, optionally paired with an icon, and maintains persistent visibility across top-level destinations.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>visionOS 1.0+</li></ul><pre><code>@MainActor struct OUDSTabBar&lt;Content&gt; where Content : View</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../navigations/index.html">Navigations</a></li></ul><h2>Appearances</h2><p>iOS 26 brings Liquid Glass, the new Apple look and feel which will prevent developers to define specific styles for some critical components like bars. Because today the OUDS tab bar relies on native component and is not designed from scratch, some elements will look different between iOS 26 and older versions:</p><ul><li><p>background color of tab bar can be changed for iOS lower than 26</p></li><li><p>background color of tab bar does not change since iOS 26</p></li><li><p>normal / unselected tab item color can be changed for both image and text only for iOS lower than 26</p></li><li><p>with iOS 26 no token of color are applied on unselected / normal tab item because only the image will be changed and not the text making theme not readable in dark color scheme</p></li></ul><p>In addition the badges colors will be the same and cannot be changed (except with token definition). These particular badges do not rely on <a href="../oudsbadge/index.html"><code>OUDSBadge</code></a> component, the native API is used instead.</p><p>Because Liquid Glass is available since iOS 26, the tab bar will be liquified / glassified since this OS version, not before.</p><p>If you use SF Symbols for images, if they exist their <i>fill</i> variant will be automatically used in the tab bar (native behaviour).</p><h2>Platform considerations</h2><ul><li><p>This component is tailored for iOS</p></li><li><p>On iPadOS the tabs do not apply the fonts since iPadOS 18</p></li><li><p>Because macOS does not support UIKit and because UIKIt is used to define the style of the tab bar, there is not styling of the tab bar for macOS</p></li><li><p>visionOS with is specific UI does not apply colors on tab bars and things are glasssified</p></li><li><p>The component is not available for watchOS</p></li><li><p>The component is not available for tvOS</p></li></ul><h2>Guidelines</h2><p>OUDS guidelines recommends to:</p><ul><li><p>limit when possible the number of items to 5</p></li><li><p>use both images and texts in tab bar items</p></li><li><p>use badges only when needed to avoid to have heavy tab bar</p></li><li><p>be sure the selected information is not only defined by the color of the tab; you may need to change the shape or the fill of the image</p></li><li><p>if a badge must be displayed, prefer short texts. If the text is a decimal value greater than 99, prefer display “+99”</p></li><li><p>if decorative images are used for tab bar item, apply <i>template</i> rendering mode on it to apply color on tabs</p></li></ul><h2>Technical constraints</h2><ul><li><p>You must use in your tab bar items images with <b>a size of 26 x 26</b>, otherwise rendering could be unaligned with Figma specifications</p></li><li><p>Because the component cannot compute the ideal width of the selected tab indicator (for iOS before 26 and iPadOS before 18), ideal width based on the tab bar item content, this indicator is not displayed for iOS lower than 26 in landscape mode and iPadOS.</p></li></ul><h2>Accessibility considerations</h2><ul><li><p>If your tabs embedded in the <code>OUDSTabBar</code> do not contain texts but only images, add an accessibility label introducing the journey for this tab</p></li><li><p>If your tabs embedded in the <code>OUDSTabBar</code> display a badge (empty or with text), vocalize it in your tab to let users know what it is (unread messages, new things, etc) by using accessibiltiy value</p></li></ul><pre class="swift"><code>    OUDSTabBar {
        SomeView()
            .tabItem {
                Label {
                    Text("Emails") // The text is vocalized first
                        .accessibilityValue("5 unread emails") // A value vocalized after the text
            } icon: {
                Image(systemName: "mail").accessibilityHidden(true)
            }
        }
        .badge(5) // The value you give to the badge
    }

</code></pre><h2>Selection of tabs</h2><p>For iOS lower than 26, a selected tab indicator can be displayed in the <code>OUDSTabBar</code> if the <code>count</code> parameter is defined (to the number of tabs in the component) and if the <code>selectedTab</code> binding value is equal to a given tag associated to a tab item. Otherwise the indicator won’t appear; these parameters are mandatory to compute the location of the indicator. This rule is only applied if selected tab indicator must be displayed. When the user taps a tab, the <code>selectedTab</code> binding is updated automatically, keeping the parent view in sync.</p><h2>Technical considerations</h2><p>In order to improve the Developer eXperience the current <code>OUDSTabBar</code> implementation lets users define their own tab items. OUDS applies only appearances and styles on elements to prevent users to define raw data to assign to the component before being rendered like a <i>picker</i>. Thus users will need to add their own accessiiblity label if badges are used or also apply <i>template</i> rendering mode on images if needed. Thus it will be also possible to use Liquid Glass new API with animations and items stacking.</p><h2>Code samples</h2><pre class="swift"><code>    // Use the OUDS tab bar to wrap tab bar items and associated views
    // Item tagged 0 will be selected first, 3 tabs are embedded.
    // Image with size of 26 x 26
    @State private var selectedTab = 0

    OUDSTabBar(selectedTab: $selectedTab, count: 3) {

        // Add the views with the SwiftUI tab item and labels
        // No need to define colors, everything is done inside OUDSTabBar
        SomeView()
            .tabItem {
                Label("Label 1", image: "image_1")
            }
            .tag(0) // Must match the selectedTab binding value
        OtherView()
            .tabItem {
                Label {
                    Text("Label 2")
                } icon: {
                    Image(decorative: "image_2")
                        .renderingMode(.template) // Mandatory to apply color on selected item
                }
             }
            .tag(1) // Must be used for the selectedTab binding
        LastView()
            .tabItem {
                Label("Label 3", image: "image_3")
            }
            .tag(2) // Must be used for the selectedTab binding
    }
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-ios-tab-bar">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Liquid Glass</h3><h4>Orange</h4><p><picture><img alt="A tab bar component in light mode with Liquid Glass effect and Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_liquidglass_orange_light.png"/></picture> <picture><img alt="A tab bar component in dark mode with Liquid Glass effect and Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_liquidglass_orange_dark.png"/></picture></p><h4>Orange Compact</h4><p><picture><img alt="A  tab bar component in light mode with Liquid Glass effect and Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_liquidglass_orangecompact_light.png"/></picture> <picture><img alt="A  tab bar component in dark mode with Liquid Glass effect and Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_liquidglass_orangecompact_dark.png"/></picture></p><h4>Sosh</h4><p><picture><img alt="A  tab bar component in light mode with Liquid Glass effect and Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_liquidglass_sosh_light.png"/></picture> <picture><img alt="A  tab bar component in dark mode with Liquid Glass effect and Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_liquidglass_sosh_dark.png"/></picture></p><h4>Wireframe</h4><p><picture><img alt="A  tab bar component in light mode with Liquid Glass effect and Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_liquidglass_wireframe_light.png"/></picture> <picture><img alt="A  tab bar component in dark mode with Liquid Glass effect and Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_liquidglass_wireframe_dark.png"/></picture></p><h3>Without Liquid Glass</h3><h4>Orange</h4><p><picture><img alt="A tab bar component in light mode without Liquid Glass effect and Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_orange_light.png"/></picture> <picture><img alt="A tab bar component in dark mode without Liquid Glass effect and Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_orange_dark.png"/></picture></p><h4>Orange Compact</h4><p><picture><img alt="A  tab bar component in light mode without Liquid Glass effect and Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_orangecompact_light.png"/></picture> <picture><img alt="A  tab bar component in dark mode without Liquid Glass effect and Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_orangecompact_dark.png"/></picture></p><h4>Sosh</h4><p><picture><img alt="A  tab bar component in light mode without Liquid Glass effect and Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_sosh_light.png"/></picture> <picture><img alt="A  tab bar component in dark mode without Liquid Glass effect and Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_sosh_dark.png"/></picture></p><h4>Wireframe</h4><p><picture><img alt="A  tab bar component in light mode without Liquid Glass effect and Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_wireframe_light.png"/></picture> <picture><img alt="A  tab bar component in dark mode without Liquid Glass effect and Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/navigations/tabbar/component_tabbar_wireframe_dark.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.0.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>1.0.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(content:)/index.html"><code>init(content: () -&gt; Content)</code><p>Defines the tab bar component with given tab bar items. If you target iOS lower than 26, prefer instead <code>OUDSTabBar(selectedTab:count:content:)</code></p></a></li><li><a href="init(selectedtab:count:content:)/index.html"><code>init(selectedTab: Binding&lt;Int&gt;, count: UInt8, content: () -&gt; Content)</code><p>Defines the tab bar component with given tab bar items and a two-way binding to the selected tab index. Number of tabs and selected tab are needed to compute the selected tab indicator for iOS lower than 26. If you target iOS 26+ or other platform, prefer instead <code>OUDSTabBar(content:)</code>.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code><p>Uses a native SwiftUI <code>TabView</code> populated with the given content where <i>tab item</i> elements are defined. Rendering wil change depending to OS version, with a top divider and a selected tab indicator for legacy layouts.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
