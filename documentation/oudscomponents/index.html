<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Components</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="The catalog of all components provided by OUDS. It contains also `View` extensions and `ViewModifiers` to apply tokens and styles on components and higher-level views." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li>Components</li></ul><p>Framework</p><h1>Components</h1><p>The catalog of all components provided by OUDS. It contains also <code>View</code> extensions and <code>ViewModifiers</code> to apply tokens and styles on components and higher-level views.</p></section><h2>Overview</h2><p>Components are grouped in several categories, the same as the ones defined in the <i>Figma</i> design kit: <i>Actions</i> component are for example buttons. <i>Navigations</i> group contains links, <i>inputs</i> group has checkboxes, radio buttons and switches, <i>layouts</i> group is dedicated to things like dividers. You can get more details about them in the categories below:</p><ul><li><p><a href="actions/index.html">Actions</a></p></li><li><p><a href="contentdisplay/index.html">Content Display</a></p></li><li><p><a href="controls/index.html">Controls</a></p></li><li><p><a href="dialogs/index.html">Dialogs</a></p></li><li><p><a href="indicators/index.html">Indicators</a></p></li><li><p><a href="layouts/index.html">Layouts</a></p></li><li><p><a href="navigations/index.html">Navigations</a></p></li></ul><h2>Customize components</h2><h3>Apply a specific shadow effect (elevation tokens)</h3><p>The unified design system implemented by OUDS iOS library allows to apply <i>elevation effets</i> on a <code>View</code>, i.e. a shadow under the component. Because the design tool in use is <i>Figma</i> which defines such shadow with a <i>blur</i> and a <i>spread</i> radiuses, and because <i>SwiftUI</i> uses only its own <i>radius</i> definition, an extension of <code>View</code> has been implemented to let users apply some effect using an <a href="https://ios.unified-design-system.orange.com/documentation/oudstokenssemantic/elevationcompositesemantictoken"><code>ElevationCompositeSemanticToken</code></a> from the <a href="https://ios.unified-design-system.orange.com/documentation/oudstokenssemantic/">OUDSTokensSemantic</a> library thanks to the method <code>shadow(elevation: ElevationCompositeSemanticToken)</code>.</p><pre class="swift"><code>// For example, apply the elevation effect "drag" from your theme:
myView.shadow(theme.elevations.drag)
</code></pre><p>In details how it works:</p><pre class="swift"><code>// In the theme this "drag" has been defined for example like:
@objc open var drag: ElevationCompositeSemanticToken { ElevationCompositeSemanticToken(ElevationRawTokens.bottom_3_500) }

// And if you look deeper, the raw token "bottom_3_500" can be like:
public static let bottom_3_500 = ElevationCompositeRawToken(x: x0, y: y300, blur: blur400, color: ColorRawTokens.opacityBlack320)

// Blur will be used to compute the radius value
</code></pre><h3>Apply a specific typography (font tokens)</h3><p>Your application identity can be strongly based on the <i>typography</i> you use, i.e. the font family you choose and other configuration details like the font size or the font weight.</p><p>With OUDS, typography depends to the class size, i.e. whether or not the application is in <i>compact mode</i> or in <i>regular mode</i>, and is defined with a <a href="https://ios.unified-design-system.orange.com/documentation/oudstokenssemantic/multiplefontcompositesemantictoken"><code>MultipleFontCompositeSemanticToken</code></a> defined in the <a href="https://ios.unified-design-system.orange.com/documentation/oudstokenssemantic/fontsemantictokens/"><code>FontSemanticTokens</code></a>.</p><p>The <i>theme</i> contains lots of <code>MultipleFontCompositeSemanticToken</code> listing all the combinations of typography you can apply, and these <i>composite semantic tokens</i> use <i>composite raw tokens</i>. For example:</p><p>However the <i>theme</i> must know which <i>font family</i> to apply, and this font family can be a <i>custom one</i> or the <i>system one</i>. Thus, we let the users define the font family they want by overriding the <code>family</code> property. This value will be used to compute the typography, if not defined the default system font will be used.</p><p>Thus, if you want to apply a specific typography to a <code>View</code> (supposing the semantic tokens are defined in the theme), just call the method you want and gives as parameter the theme (to get the custom font if defined):</p><pre class="swift"><code>// Apply typography "body default small"
myView.bodyDefaultSmall(theme)

// Apply typography "label strong X large"
myView.labelStrongXLarge(theme)

// Etc.
</code></pre><p>In details how it works:</p><pre class="swift"><code>// Here is a definition of a semantic token inside the theme for typography "displayMedium":
@objc open var displayMedium: MultipleFontCompositeSemanticToken { 
MultipleFontCompositeSemanticToken(compact: bold750, regular: bold1050) 
}

// And here are the raw tokens definitions:
let bold750 = FontCompositeSemanticToken(size: size750, lineHeight: lineHeight850, weight: weightBold)
let bold1050 = FontCompositeSemanticToken(size: size1050, lineHeight: lineHeight1150, weight: weightBold)
</code></pre><p>These view modifiers are available for any <code>View</code> object, <a href="https://ios.unified-design-system.orange.com/documentation/oudscomponents/swiftuicore/view">you can get the curated list in the documentation</a>.</p><h3>Apply a specific border (border tokens)</h3><p>This module exposes the helper <code>border(style:width:radius:color:)</code> so as to apply border semantic tokens on a view in order to define a border effect. The helper is available through <code>View</code>, and tokens through the provider of the theme.</p><pre class="swift"><code>@Environment(\.theme) private var theme

var body: some View {
    SomeView()
        .border(
             style: theme.borders.styleDefault,
             width: theme.borders.widthThin,
             radius: theme.borders.radiusNone,
             color: theme.colors.borderDefault)
}
</code></pre><h3>Apply specific colors</h3><p>Colors can be applied on view for background and foreground colors, foreground style, accent color or tint color. Some helpers are available in the OUDS API to avoid to use the <code>color(for:)</code> method.</p><pre class="swift"><code>// Given a color at theme.colors.bgPrimary
// This token can have light and dark declinations 

@Environment(\.theme) private var theme

// Apply a foreground style
someView.foregroundStyle(theme.colors.bgPrimary)

// Apply a foreground color
someView.foregroundColor(theme.colors.bgPrimary)

// Apply a background
someView.background(theme.colors.bgPrimary)

// Apply an accent color
someView.accentColor(theme.colors.bgPrimary)

// Apply a tint color
someView.tint(theme.colors.bgPrimary)
</code></pre><h2>Flip images according to layouts</h2><p>Images bring meanings, and are used in components. But sometimes, depending to your layouts (right to left (RTL) or left to right (LTR)), if the whole layout of your app changes, the images in use can loose meanings or have another one (except if they are asymetric). Even if some assets can be defined in a project with specific RTL/LTR variants, images can be loaded outside and in some case, in the end, must not be mirrored.</p><p>If your application manages several languages with RTL and LTR, here is a simple trick to flip the icons depending to the layout for the cases you want. The <code>flipIcon</code> flag available in components can be used.</p><pre class="swift"><code>// Get the layout direction in your View
@Environment(\.layoutDirection) private var layoutDirection

// Because by default icons are not flipped, i.e. more LTR flavoured, use a simple comparison
// (layoutDirection == .rightToLeft)

// For example in a checkbox item
OUDSCheckboxItem(...,
                 flipIcon: (layoutDirection == .rightToLeft),
                 )
</code></pre><h2>Change font family according to locale or preferred language</h2><p>If you use for example one of the Orange themes, you may for sure use the <i>Helvetica Neue</i> font family. However, this font family manages latin alphabet and not arabic alphabet. Nevertheless a trick can be done to use the suitable <i>Helvetica Neue</i> font family according to the language.</p><pre class="swift"><code>/// Returns the Helvetica Neue font family to use depending to the preferred language or locale
func localizedHelveticaFont() -&gt; String {
    return (OUDSUtils.isArabicLanguageInUse() ? "Helvetica Neue Arabic" : "Helvetica Neue")
}

/// Instanciate your Orange theme using the font family.
/// Thus when the user will change the app language the app will be restarted, repainted and the theme updated
let localizedOrangeTheme: OUDSTheme = OrangeTheme(fontFamily: localizedHelveticaFont())
</code></pre><blockquote class="aside caution"><p class="label">Caution</p><p>For legal reasons OUDS does not provide the Helvetica Neue Arabic nore Helvetica Neue assets. You will have to get them and register the fonts files in your app</p></blockquote><blockquote class="aside note"><p class="label">Note</p><p>For cyrillic alphabet the Orange Brand does not provide <i>Helvetica Neue</i> variant, you can use <i>Arial</i> instead</p></blockquote><h2>Registering font assets</h2><p>If you need to use some fonts like <i>Helvetica Neue Arabic</i>, you will need to add the TTF files in your project and somewhere somehow register them.</p><pre class="swift"><code>private static var fontsAlreadyRegistered = false

// Fonts are defined in Resources/Fonts in TTF files.
private func registerFonts() {
    if !Self.fontsAlreadyRegistered {
        let fonts = Bundle.main.urls(forResourcesWithExtension: "ttf", subdirectory: nil)
        fonts?.forEach { CTFontManagerRegisterFontsForURL($0 as CFURL, .process, nil) }
        Self.fontsAlreadyRegistered = true
    }
}
</code></pre><h2>Topics</h2><h3>Structures</h3><ul><li><a href="oudsalertmessage/index.html"><code>struct OUDSAlertMessage</code><p>Alert message is a UI element that displays system feedback, status changes or required action; throughout detailed, prominent, persistent and actionable communication. Alert message includes functional icon and semantic colour, and may include as well a close button and/or action link. Alert Message does not disappear automatically and remains visible until dismissed or resolved by the user.</p></a></li><li><a href="oudsbadge/index.html"><code>struct OUDSBadge</code><p>Badge is a UI element that emphasizes system notifications, status, or the categorization of an information, throughout colour only. Badge is rendered as a coloured shape, without icon, text or number; and its chosen size remains unchanged regardless of the changes of the interface size.</p></a></li><li><a href="oudsbulletlist/index.html"><code>struct OUDSBulletList</code><p>Bullet list is a UI element that helps to view in related individual text items grouped together; items usually starting with a number or a bullet. Bullet list is also known as <i>Unordered list</i> or <i>Ordered list</i> and is not an interactive element by default.</p></a></li><li><a href="oudsbutton/index.html"><code>struct OUDSButton</code><p>Button is a UI element that triggers an action or event, and is used to initiate tasks or confirming an action. Button appears in different layouts, styles and states to indicate hierarchy or emphasis.</p></a></li><li><a href="oudscheckbox/index.html"><code>struct OUDSCheckbox</code><p>Checkbox is a UI element that allows to select multiple options from a set of mutually non exclusive choices. Checkbox that does not show icon or text, provides greater flexibility when creating other components that require a checkbox to be displayed.</p></a></li><li><a href="oudscheckboxindeterminate/index.html"><code>struct OUDSCheckboxIndeterminate</code><p>Checkbox is a UI element that allows to select multiple options from a set of mutually non exclusive choices. Checkbox that does not show icon or text, provides greater flexibility when creating other components that require a checkbox to be displayed.</p></a></li><li><a href="oudscheckboxitem/index.html"><code>struct OUDSCheckboxItem</code><p>Checkbox is a UI element that allows to select multiple options from a set of mutually non exclusive choices. Checkbox item covers a wider range of contexts by allowing to toggle the visibility of additional text labels and icon assets.</p></a></li><li><a href="oudscheckboxitemindeterminate/index.html"><code>struct OUDSCheckboxItemIndeterminate</code><p>Checkbox is a UI element that allows to select multiple options from a set of mutually non exclusive choices. Checkbox item covers a wider range of contexts by allowing to toggle the visibility of additional text labels and icon assets.</p></a></li><li><a href="oudscheckboxpicker/index.html"><code>struct OUDSCheckboxPicker</code><p>A picker allowing to expose several checkboxes and select some of them within the others. Each checkbox contains a “tag”, i.e. a supposed to be unique value. The picker will expose the choosen values using this “tag”. It has also some configuration elements which will override the one applied to nested <a href="oudscheckboxitem/index.html"><code>OUDSCheckboxItem</code></a> (divider, read only and error mode, layout and outlined)</p></a></li><li><a href="oudscheckboxpickerdata/index.html"><code>struct OUDSCheckboxPickerData</code><p>The data to use to populate the picker of <a href="oudscheckboxitem/index.html"><code>OUDSCheckboxItem</code></a> objects. Each property in this <a href="oudscheckboxpickerdata/index.html"><code>OUDSCheckboxPickerData</code></a> is used to define the suitable <a href="oudscheckboxitem/index.html"><code>OUDSCheckboxItem</code></a>.</p></a></li><li><a href="oudschippicker/index.html"><code>struct OUDSChipPicker</code><p>A picker allowing to expose several <i>filter chips</i> and proposing single or multiple selections.</p></a></li><li><a href="oudschippickerdata/index.html"><code>struct OUDSChipPickerData</code><p>The data to use to populate the picker of <a href="oudsfilterchip/index.html"><code>OUDSFilterChip</code></a> objects. Each property in this <a href="oudschippickerdata/index.html"><code>OUDSChipPickerData</code></a> is used to define the suitable <a href="oudsfilterchip/index.html"><code>OUDSFilterChip</code></a>.</p></a></li><li><a href="oudscoloredsurface/index.html"><code>struct OUDSColoredSurface</code><p>Used to define if a content is used on a colored surface.</p></a></li><li><a href="oudscoloredsurfacemodifier/index.html"><code>struct OUDSColoredSurfaceModifier</code><p><code>ViewModifier</code> which helps to apply a predefined color mode on a view. This mode is based on <code>OUDSColoredSurface.SurfaceColor</code> and defines which tyê of color scheme and monochrome must be considered.</p></a></li><li><a href="oudsfilterchip/index.html"><code>struct OUDSFilterChip</code><p>Filter chip is a UI element that allows to select or deselect an option within a series, and is commonly used to capture filtering decisions. Filter chip allows to filter content by being selected or deselected. It can be toggled “On” or “Off” to refine displayed results, and selected Filter Chips remain visually distinct to indicate active filters.</p></a></li><li><a href="oudshstack/index.html"><code>struct OUDSHStack</code><p>Creates an <code>HStack</code> with spacing scaled according to <code>horizontalSizeClass</code> base on OUDS <code>MultipleSpaceSemanticToken</code>.</p></a></li><li><a href="oudshorizontaldivider/index.html"><code>struct OUDSHorizontalDivider</code><p>Divider is a UI element that allows to structure the content by visually separating the content zones. Divider improves readability and content organization without introducing a stronger visual hierarchy like a heading or a container would. A horizontal Divider is used to separate content laid out one under the other (<code>VStack</code>). The divider can be colored using dedicated <a href="oudsdividercolor/index.html"><code>OUDSDividerColor</code></a> colors. The thickness (height) is fixed by dedicated token from <code>OUDSTheme</code>.</p></a></li><li><a href="oudsicon/index.html"><code>struct OUDSIcon</code><p>Use to provide an asset to ouds in order to be added in some components. The icon can be flipped for RTL consideration and an associated <code>acessibilityLabel</code>must be provided if the icon is not decorative.</p></a></li><li><a href="oudsinlinealert/index.html"><code>struct OUDSInlineAlert</code><p>Inline alert is a lightweight UI element, placed in the content flow, that displays information, system feedback, status changes throughout short, prominent, persistent and non actionable communication. Inline alert includes functional icon and semantic colour, and does not include a close button and/or action link. Inline alert does not disappear and remains visible.</p></a></li><li><a href="oudsinputtag/index.html"><code>struct OUDSInputTag</code><p>Input tag is a UI element that allows to enter multiple values, each represented as a tag. As users type and submit values (usually by pressing enter, comma, or tab), each value is transformed into a tag. Input tag is often used for adding labels, categories, or participants.</p></a></li><li><a href="oudslink/index.html"><code>struct OUDSLink</code><p>Link is a UI element that allows to navigate from one location to another, either within the same page or across different pages in the same resource, or to an external resource. Link’s primary function is navigation and it communicates its interactive nature visually and semantically.</p></a></li><li><a href="oudsnavigationstack/index.html"><code>struct OUDSNavigationStack</code><p>Use a navigation stack to present a stack of views over a root view. and let system applies theme colors on navigation bar appearance.</p></a></li><li><a href="oudspasswordinput/index.html"><code>struct OUDSPasswordInput</code><p>Password input is a UI element that allows to securely and confidentially capture a user’s password. As it is based on the <code>OUDSTextInput</code>,  it offers same layout and the same elements of configuration.</p></a></li><li><a href="oudspincodeinput/index.html"><code>struct OUDSPinCodeInput</code><p>PIN code input is a UI element that allows to capture short, fixed-length numeric codes, typically for authentication or confirmation purposes, such as a four, six or eight-digit personal identification number (PIN). PIN code input is presented as a series of individual input fields or boxes, each representing a single digit, to enhance readability and encourage accurate input, while supporting smooth keyboard navigation and secured input masking if needed.</p></a></li><li><a href="oudsradio/index.html"><code>struct OUDSRadio</code><p>Radio button is a UI element that allows to select a single option from a set of mutually exclusive choices. Radio button that does not show icon or text, provides greater flexibility when creating other components that require a Radio button to be displayed.</p></a></li><li><a href="oudsradioitem/index.html"><code>struct OUDSRadioItem</code><p>Radio button item is a UI element that allows to select a single option from a set of mutually exclusive choices. Radio button item covers a wider range of contexts by allowing to toggle the visibility of additional text labels and icon assets.</p></a></li><li><a href="oudsradiopicker/index.html"><code>struct OUDSRadioPicker</code><p>A picker allowing to expose several radio buttons and choose only one within the others. Each radio button contains a “tag”, i.e. a supposed to be unique value. The picker will expose the choosen value through this “tag”. It has also some configuration elements which will override the one applied to nested <a href="oudsradioitem/index.html"><code>OUDSRadioItem</code></a> (divider, read only and error mode, layout and outlined)</p></a></li><li><a href="oudsradiopickerdata/index.html"><code>struct OUDSRadioPickerData</code><p>The data to use to populate the picker of <a href="oudsradioitem/index.html"><code>OUDSRadioItem</code></a> objects. Each property in this <a href="oudsradiopickerdata/index.html"><code>OUDSRadioPickerData</code></a> is used to define the suitable <a href="oudsradioitem/index.html"><code>OUDSRadioItem</code></a>.</p></a></li><li><a href="oudssuggestionchip/index.html"><code>struct OUDSSuggestionChip</code><p>Suggestion chip is a UI element that allows to present recommended or predictive options based on user’s input or context, and is commonly used to capture filtering decisions. Suggestion chip is typically non-selected by default and can be tapped or clicked to apply the suggestion, streamlining input and enhancing usability. Chips can show multiple interactive elements together in the same area, such as a list of selectable movie times, or a serie of email contacts. Best suited for category-based filters that do not require additional visual elements.</p></a></li><li><a href="oudsswitch/index.html"><code>struct OUDSSwitch</code><p>Switch is a UI element that allows to toggle between two states, typically “On” and “Off”, and used to enable or disable features, options or settings. Switch that does not show icon or text, provides greater flexibility when creating other components that require a Switch to be displayed.</p></a></li><li><a href="oudsswitchitem/index.html"><code>struct OUDSSwitchItem</code><p>Switch item is a UI element that allows to toggle between two states, typically “On” and “Off”, and used to enable or disable features, options or settings. Switch Item covers a wider range of contexts by allowing to toggle the visibility of additional text labels and icon assets.</p></a></li><li><a href="oudstabbar/index.html"><code>struct OUDSTabBar</code><p>The Tab bar is a system navigation component with a position which can vary depending to the OS. The tab bar can be found at the bottom of the screen for iOS. It can vary for iPadOS. It allows users to switch between the sections of an app. Each tab can be represented by a label, optionally paired with an icon, and maintains persistent visibility across top-level destinations.</p></a></li><li><a href="oudstag/index.html"><code>struct OUDSTag</code><p>Tag is a UI element that allows to display short info like a label, keyword, or category. Tag helps users quickly find, group, or understand content.</p></a></li><li><a href="oudstextarea/index.html"><code>struct OUDSTextArea</code><p>Text area is a UI element that allows to type, edit, or select longer blocks of textual data, such as comments, messages or descriptions; by expanding vertically and offering more space to input text. It provides a visual and interactive affordance for multiline text entry while supporting labels, placeholders, descriptions, and validation feedback.</p></a></li><li><a href="oudstextinput/index.html"><code>struct OUDSTextInput</code><p>Text input is a UI element that allows to enter, edit, or select single-line textual data. Text input is one of the most fundamental form elements used to capture user input such as names, emails, passwords, or search queries. It provides a visual and interactive affordance for text entry while supporting labels, placeholders, icons, descriptions, and validation feedback.</p></a></li><li><a href="oudstoolbarbottom/index.html"><code>struct OUDSToolBarBottom</code><p>The bottom toolbar is a kind of navigation bar component used to display leading and trailing actions at the bottom of the screen when supported.</p></a></li><li><a href="oudstoolbaritem/index.html"><code>struct OUDSToolBarItem</code><p>A strongly typed toolbar item container used inside:</p></a></li><li><a href="oudstoolbartop/index.html"><code>struct OUDSToolBarTop</code><p>The top toolbar (aka <i>navigation bar</i> on iOS and iPadOS 18 and lower) sits at the top of the screen and provides contextual information and controls related to the current view. It typically displays the page title, and may include navigation actions such as “Back” or “Close” as well as supplementary actions. It can contains leading and trailing actions.</p></a></li><li><a href="oudsvstack/index.html"><code>struct OUDSVStack</code><p>Creates a <code>VStack</code> with spacing scaled according to <code>verticalSizeClass</code> base on OUDS <code>MultipleSpaceSemanticToken</code>.</p></a></li><li><a href="oudsverticaldivider/index.html"><code>struct OUDSVerticalDivider</code><p>Divider is a UI element that allows to structure the content by visually separating the content zones. Divider improves readability and content organization without introducing a stronger visual hierarchy like a heading or a container would. A vertical Divider is used to separate content laid out side by side (<code>HStack</code>). The divider can be colored using dedicated <a href="oudsdividercolor/index.html"><code>OUDSDividerColor</code></a> colors. The thickness (width) is fixed by dedicated token from <code>OUDSTheme</code>.</p></a></li></ul><h3>Enumerations</h3><ul><li><a href="accessibilityfocusable/index.html"><code>enum AccessibilityFocusable</code><p>Value to use as a <code>AccessibilityFocusState</code> to request focus.</p></a></li><li><a href="oudsalertstatus/index.html"><code>enum OUDSAlertStatus</code><p>The status of the alerts. <a href="oudsalertmessage/index.html"><code>OUDSAlertMessage</code></a> background color and its icon color are based on this status. <a href="oudsinlinealert/index.html"><code>OUDSInlineAlert</code></a> icon and text color are based on this status.</p></a></li><li><a href="oudsbulletlistitembuilder/index.html"><code>enum OUDSBulletListItemBuilder</code><p>A custom parameter attribute that constructs <code>OUDSBulletList.Item</code> from closures.</p></a></li><li><a href="oudscheckboxindicatorstate/index.html"><code>enum OUDSCheckboxIndicatorState</code><p>A checkbox indicator has three available states: <code>selected</code>, <code>unselected</code> and <code>indeterminate</code></p></a></li><li><a href="oudscheckboxpickerplacement/index.html"><code>enum OUDSCheckboxPickerPlacement</code><p>Enumerates the types of layouts a <a href="oudscheckboxpicker/index.html"><code>OUDSCheckboxPicker</code></a> can have</p></a></li><li><a href="oudsdividercolor/index.html"><code>enum OUDSDividerColor</code><p>List of colors available for dividers (i.e. <code>OUDSHorizontalDivider</code> or <code>OUDSVerticalDivider</code>)</p></a></li><li><a href="oudsradiopickerplacement/index.html"><code>enum OUDSRadioPickerPlacement</code><p>Enumerates the types of layouts a <a href="oudsradiopicker/index.html"><code>OUDSRadioPicker</code></a> can have</p></a></li><li><a href="oudstoolbaritemsbuilder/index.html"><code>enum OUDSToolBarItemsBuilder</code><p>A result builder to group <a href="oudstoolbaritem/index.html"><code>OUDSToolBarItem</code></a> instances.</p></a></li></ul><h3>Extended Modules</h3><ul><li><a href="foundation/index.html"><code></code></a></li><li><a href="swift/index.html"><code></code></a></li><li><a href="swiftui/index.html"><code></code></a></li><li><a href="swiftuicore/index.html"><code></code></a></li></ul></article></noscript><div id="app"></div></body></html>
