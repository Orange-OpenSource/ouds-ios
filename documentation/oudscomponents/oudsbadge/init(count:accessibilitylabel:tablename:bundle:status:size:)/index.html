s</h2><dl><dt>count</dt><dd><p>The number displayed in the badge.</p></dd><dt>key</dt><dd><p>The text to vocalize with <i>Voice Over</i> the component must have, as as <code>LocalizedStringKey</code> for the given <code>Bundle</code></p></dd><dt>tableName</dt><dd><p>The name of the <code>.strings</code> file, or <code>nil</code> for the default</p></dd><dt>bundle</dt><dd><p>The bundle in which to look up the localized string. Defaults to <code>Bundle.main</code>.</p></dd><dt>status</dt><dd><p>The status of this badge, default set to <i>neutral</i></p></dd><dt>size</dt><dd><p>The size of this badge, default set to <i>medium</i></p></dd></dl><h2>Discussion</h2><p>Use the <code>View/disabled(_:)</code> method to have badge in disabled state.</p><pre class="swift"><code>    OUDSBadge(count: 9, accessibilityLabel: LocalizedStringKey("new_messages"), bundle: Bundle.module, status: .negative)
