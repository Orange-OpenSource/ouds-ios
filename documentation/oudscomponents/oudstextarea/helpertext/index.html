<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSTextArea.HelperText</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Describes the content of the helper text displayed below the text area." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../../index.html">Components</a></li><li><a href="../index.html">OUDSTextArea</a></li><li>OUDSTextArea.HelperText</li></ul><p>Enumeration</p><h1>OUDSTextArea.HelperText</h1><p>Describes the content of the helper text displayed below the text area.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>visionOS 1.0+</li></ul><pre><code>@frozen enum HelperText</code></pre></section><h2>Overview</h2><p>Use <code>.plain(_:)</code> for arbitrary helper text, or <code>.charactersMaxCount(_:)</code> to let the component manage a character-count display automatically. Pass the <b>maximum allowed length</b> — the component computes how many characters remain and displays them in <b>bold</b>. When the user exceeds the limit the component switches to an error-style sentence showing how many characters are over the limit.</p><pre class="swift"><code>    // Plain helper text

</code></pre><blockquote class="aside since"><p class="label">Since</p><p>1.4.0</p></blockquote><h2>Topics</h2><h3>Enumeration Cases</h3><ul><li><a href="charactersmaxcount(_:)/index.html"><code>case charactersMaxCount(UInt16)</code><p>The <b>maximum number of characters</b> allowed in the text area. The component automatically computes and displays the number of characters remaining (rendered <b>bold</b>) and switches to an error-style sentence if the limit is exceeded.</p></a></li><li><a href="plain(_:)/index.html"><code>case plain(String)</code><p>A plain helper string defined by the caller.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
