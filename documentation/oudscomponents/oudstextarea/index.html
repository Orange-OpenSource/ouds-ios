<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSTextArea</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Text area is a UI element that allows to type, edit, or select longer blocks of textual data, such as comments, messages or descriptions; by expanding vertically and offering more space to input text. It provides a visual and interactive affordance for multiline text entry while supporting labels, placeholders, descriptions, and validation feedback." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSTextArea</li></ul><p>Structure</p><h1>OUDSTextArea</h1><p>Text area is a UI element that allows to type, edit, or select longer blocks of textual data, such as comments, messages or descriptions; by expanding vertically and offering more space to input text. It provides a visual and interactive affordance for multiline text entry while supporting labels, placeholders, descriptions, and validation feedback.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>visionOS 1.0+</li></ul><pre><code>@MainActor struct OUDSTextArea</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../controls/index.html">Controls</a></li></ul><h2>Layout</h2><p>Text area is based on several configurable UI elements:</p><ul><li><p><b>label</b>: It is used to describe the purpose of the text area. In some UI contexts, especially when space is limited or when the text area is part of a compact layout, the label can be hidden. However, hiding the label should only be done if the purpose remains clear thanks to a placeholder or contextual icon and if the label is still accessible to screen readers. Hiding a label is a design choice that must balance visual simplicity and clarity of intent, without compromising inclusiveness or form guidance.</p></li><li><p><b>placeholder</b>: If the text of the text area is empty a placeholder provides a hint or guidance inside the field to suggest expected input.</p></li></ul><h2>Status</h2><p>Five status are proposed for all layouts:</p><ul><li><p><b>enabled (by default)</b>: Default neutral appearance, whether empty or filled. It allows users to click, focus, and type freely without restrictions.</p></li><li><p><b>error</b>: The <code>error</code> status indicates that the user input does not meet validation rules or expected formatting. It provides immediate visual feedback, typically through a red border, an error icon, and a clear, accessible error message positioned below the text area. The error message replaces the helper text.</p></li><li><p><b>loading</b>: The <code>loading</code> state indicates that the system is processing or retrieving data related to the text entered. A progress indicator appears to inform the user that an action is in progress. The field remains editable while loading.</p></li><li><p><b>readOnly</b>: The <code>readOnly</code> status lets the text visible but not editable.</p></li><li><p><b>disabled</b>: In <code>disabled</code> status, the field is non-interactive and grayed out to indicate it cannot be changed. Note the SwiftUI <code>View.disabled()</code> is ignored.</p></li></ul><h2>Helpers</h2><ul><li><p><b>Helper text (plain)</b>: A supporting text conveys additional information about the text area, such as how it will be used. It should ideally only take up a single line, though may wrap to multiple lines if required, and be either persistently visible or visible only on focus.</p></li><li><p><b>Helper text (characters max count)</b>: Uses an internal message displaying the count of remaining characters depending to the given value. This is a specific iOS library feature with 1.4.0</p></li><li><p><b>Helper link</b>: If the helper text is not sufficient, it’s possible to offer the user an additional help link (the link can be external or open a modal).</p></li></ul><h2>Accessibility considerations</h2><p>By default no haptics are done by the component. However you should think about cases where you will have to make the devices vibrate. You can refer to the <a href="https://developer.apple.com/design/human-interface-guidelines/playing-haptics">Human Interface Guidelines of Apple</a>.</p><h2>Mandatory field indication</h2><p>If all fields are mandatory (several fields present): display the message “All fields are mandatory” at the top of your formular. Do not use an asterisk at the end of each field label, nor the word “mandatory.”</p><p>If not all fields are mandatory (several fields present): display the message “All fields marked with an * are mandatory” at the top of your formular. Use an asterisk (*) at the end of each mandatory field label, and ensures this is well vocalized.</p><p>UI rendering of the asterisk must be done with <i>bold font weight</i> and <i>negative content color</i> (red on light backgrounds).</p><p>Use the mention “(optional)” at the end of each optional field label. Note that this rule is not systematic, it remains an option, to be used if needed.</p><p>If there is only one field in the formular, or if the mandatory nature is obvious, no mention is necessary since the fields are essential to the formular’s functionality.</p><h2>Outlined style</h2><p>By <b>default</b>, the text area uses a subtle background fill and a bottom border only, creating a softer and more contained look.</p><p>When <b>outlined</b>, the text area uses a transparent background and a visible stroke on all four sides. This style may be appropriate for contexts where inputs need to feel lightweight and unobtrusive, for example inside a card, a dialog, or a filtering panel.</p><pre class="swift"><code>    // An outlined text area
    OUDSTextArea(label: "Comments", text: $text, isOutlined: true)
</code></pre><h2>Code samples</h2><pre class="swift"><code>    // The text to display and edit
    @State var text: String = ""

    // Empty text and no placeholder
    OUDSTextArea(label: "Comments", text: $text)

    // Empty text with placeholder
    OUDSTextArea(label: "Comments", text: $text, placeholder: "Describe your issue in detail")

    // With a plain helper text
    OUDSTextArea(label: "Comments",
                 text: $text,
                 placeholder: "Describe your issue in detail",
                 helperText: .plain("Maximum 500 characters."))

    // With a maximum character count — the component shows "X characters remaining" (bold)
    // and switches to an error style when exceeded.
    OUDSTextArea(label: "Comments",
                 text: $text,
                 helperText: .charactersMaxCount(500))

    // With helper link
    @Environment(\.openURL) private var openUrl

    let helperLink = OUDSTextArea.Helperlink(text: "Helper Link") {
       openUrl.callAsFunction(url)
    }

    OUDSTextArea(label: "Comments", text: $text, placeholder: "Placeholder", helperLink: helperLink)

    // With error status
    OUDSTextArea(label: "Comments", text: $text, status: .error(message: "This field can't be empty."))

    // Outlined style
    OUDSTextArea(label: "Comments", text: $text, isOutlined: true)
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-text-area">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A text area component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/textareas/component_textarea_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A text area component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/textareas/component_textarea_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A text area component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/textareas/component_textarea_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A text area component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/textareas/component_textarea_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.1.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>1.4.0</p></blockquote><h2>Topics</h2><h3>Structures</h3><ul><li><a href="helperlink/index.html"><code>struct Helperlink</code><p>Used to describe the helper link below the text area.</p></a></li></ul><h3>Initializers</h3><ul><li><a href="init(_:tablename:bundle:text:placeholder:helpertext:helperlink:isoutlined:constrainedmaxwidth:status:)/index.html"><code>init(LocalizedStringKey, tableName: String?, bundle: Bundle, text: Binding&lt;String&gt;, placeholder: String?, helperText: OUDSTextArea.HelperText?, helperLink: OUDSTextArea.Helperlink?, isOutlined: Bool, constrainedMaxWidth: Bool, status: OUDSTextArea.Status)</code><p>Creates a text area with a localized label, looking up the key in the given bundle.</p></a></li><li><a href="init(label:text:placeholder:helpertext:helperlink:isoutlined:constrainedmaxwidth:status:)/index.html"><code>init(label: String, text: Binding&lt;String&gt;, placeholder: String?, helperText: OUDSTextArea.HelperText?, helperLink: OUDSTextArea.Helperlink?, isOutlined: Bool, constrainedMaxWidth: Bool, status: OUDSTextArea.Status)</code><p>Creates a text area.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul><h3>Enumerations</h3><ul><li><a href="helpertext/index.html"><code>enum HelperText</code><p>Describes the content of the helper text displayed below the text area.</p></a></li><li><a href="status/index.html"><code>enum Status</code><p>Define all available status for the text area</p></a></li></ul></article></noscript><div id="app"></div></body></html>
