</code></pre></section><h2>Return Value</h2><p>A view that hides the tab bar and propagates the hidden state to <code>OUDSTabBar</code> overlay items.</p><h2>Discussion</h2><p>Use this modifier instead of <code>.toolbar(.hidden, for: .tabBar)</code> whenever a view inside a <code>NavigationStack</code> embedded in an <code>OUDSTabBar</code> needs to hide the tab bar. Without this modifier, <code>OUDSTabBar</code> cannot detect the visibility change and its overlay elements remain visible on top of the content. This helper must be used for apps with nested views and tab bars.</p><p>Otherwise for simple app <code>.toolbar(.hidden, for: .tabBar)</code> is enough.</p><pre class="swift"><code>struct DetailView: View {
    var body: some View {
        Text("Detail")
            .hideTabBar()
    }
}
</code></pre></article></noscript><div id="app"></div></body></html>
