<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSBulletList</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Bullet list is a UI element that helps to view in related individual text items grouped together; items usually starting with a number or a bullet. Bullet list is also known as Unordered list or Ordered list and is not an interactive element by default." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSBulletList</li></ul><p>Structure</p><h1>OUDSBulletList</h1><p>Bullet list is a UI element that helps to view in related individual text items grouped together; items usually starting with a number or a bullet. Bullet list is also known as <i>Unordered list</i> or <i>Ordered list</i> and is not an interactive element by default.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor struct OUDSBulletList</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../contentdisplay/index.html">Content Display</a></li></ul><h2>Types</h2><p>Three types are proposed:</p><ul><li><p><b>Unordered (by default)</b>: Collects related items that don’t need to be in a specific order or sequence.</p></li><li><p><b>Ordered</b>: Collects related items with numeric order or sequence.</p></li><li><p><b>Bare</b>: An unordered list without any bullets or alphanumeric sequence.</p></li></ul><p>Types can be mixed in list, but must be identical for the same <code>OUDSBulletList.NestedLevel</code>.</p><h2>Levels</h2><p>Lists can include nested items to indicate hierarchy or subcategories, with indentation distinguishing each level. Arrange ordered list items logically, such as ranking by importance, highest to lowest values, or in alphabetical / numeric order. Three levels are maximum.</p><h2>Text Style</h2><p>List can be used with different font sizes:</p><ul><li><p><b>Body Large</b>: If the text accompanying the list component is the Body Large text. This variant is designed for more visual, engaging experiences.</p></li><li><p><b>Body Medium</b>: If the text accompanying the list component is the Body Medium text. This variant is best suited for functional, task-oriented experiences.</p></li></ul><h2>Cases forbidden by design</h2><p><b>it is not allowed to have a depth of items greater than 3</b></p><h2>Internationalisation considerations</h2><p>For latin-based speaking countries, like France, Spain, United Kingdom or Belgium, the european “arabic” numbers are used for the first level of depth of the ordered bullet list. For the second and third levels, the european alphabets are used with upper and lower case values.</p><p>However for countries speaking arabic, these rules can’t be applied. Indeed, there is no notion of upper and lower case characters in arabic alphabet. In addition, the numbers in use (i.e. the european “arabic” numbers like “1, 2, 3”) are accepted in arabic countries, even if the “true arabic” numbers (like “ ٢ ٣ ١”) are used in middle-east arabic countries and for official documents. Thus the OUDS ordered bullet list will use “european” numbers for first level, and arabic alphabets for second and third levels.</p><h2>Code samples</h2><pre class="swift"><code>       // 1. Unordered list with bullets
       OUDSBulletList {
           OUDSBulletList.Item("Label 1")
           OUDSBulletList.Item("Label 2")
           OUDSBulletList.Item("Label 3")
       }

       // 1.1. Item of Unordered list with bullet as tick, a text style
       // body medium and text bold
       OUDSBulletList(type: .unordered(asset: .tick),
                      textStyle: .bodyMedium,
                      isBold: true)  {
           OUDSBulletList.Item("Label 1")
           OUDSBulletList.Item("Label 2")
           OUDSBulletList.Item("Label 3")
       }

       // 2. Bare list with 3 items
       OUDSBulletList(type: .bare) {
           OUDSBulletList.Item("Label 1")
           OUDSBulletList.Item("Label 2")
           OUDSBulletList.Item("Label 3")
       }

       // 3. Ordered list with 3 items
       OUDSBulletList(type: .ordered) {
           OUDSBulletList.Item("Label 1")
           OUDSBulletList.Item("Label 2")
           OUDSBulletList.Item("Label 3")
       }

       // 3.1. Ordered list with 3 items in first level,
       // and one item as sub item (second level),
       // and 2 items as sub item in (third level)
       OUDSBulletList(type: .ordered) {
           OUDSBulletList.Item("Label 1") {
               OUDSBulletList.Item("Label 1.1") {
                   OUDSBulletList.Item("Label 1.1.1")
                   OUDSBulletList.Item("Label 1.1.2")
               }
           }
           OUDSBulletList.Item("Label 2")
           OUDSBulletList.Item("Label 3")
       }

       // Same Bullet list but items in third level with free icon as bullet
       let icon = Image(decorative: "ic_heart")
       OUDSBulletList(type: .ordered) {
           OUDSBulletList.Item("Label 1") {
               OUDSBulletList.Item("Label 1.1", subListType: .unordered(asset: .icon(icon))) {
                   OUDSBulletList.Item("Label 1.1.1")
                   OUDSBulletList.Item("Label 1.1.2")
               }
           }
           OUDSBulletList.Item("Label 2")
           OUDSBulletList.Item("Label 3")
       }
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-bullet-list">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A bullet list component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/contentdisplay/bulletlist/component_bullet_list_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A bullet list component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/contentdisplay/bulletlist/component_bullet_list_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A bullet list component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/contentdisplay/bulletlist/component_bullet_list_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A bullet list component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/contentdisplay/bulletlist/component_bullet_list_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.0.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>1.2.0</p></blockquote><h2>Topics</h2><h3>Structures</h3><ul><li><a href="item/index.html"><code>struct Item</code><p>The item of bullet list with text and optional sub items.</p></a></li></ul><h3>Initializers</h3><ul><li><a href="init(type:textstyle:isbold:items:)/index.html"><code>init(type: OUDSBulletList.Type, textStyle: OUDSBulletList.TextStyle, isBold: Bool, items: () -&gt; [OUDSBulletList.Item])</code><p>Creates a bullet list with a bullet type, text style and bold.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul><h3>Enumerations</h3><ul><li><a href="textstyle/index.html"><code>enum TextStyle</code><p>The typography style for the list item</p></a></li><li><a href="type/index.html"><code>enum Type</code><p>The visual type of the list</p></a></li><li><a href="unorderedasset/index.html"><code>enum UnorderedAsset</code><p>The type of asset in the unordered list</p></a></li></ul></article></noscript><div id="app"></div></body></html>
