    OUDSInlineAlert(label: "Label")
    // From a localizable in a bundle
    OUDSInlineAlert(LocalizedStringKey("label_wording"), bundle: Bundle.module)

    // An inline alert
    OUDSInlineAlert(label: "Warning", status: .warning)

    // Add a custom icon for accent and neutral status
    OUDSInlineAlert(label: "Label", status: .accent(icon: OUDSIcon(asset: Image("ic_heart"))))
    OUDSInlineAlert(label: "Label", status: .neutral(icon: OUDSIcon(asset: Image("ic_heart"))))
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-alert-message">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="An inline alert component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/dialogs/alert/inlinealert/component_inlinealert_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="An inline alert component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/dialogs/alert/inlinealert/component_inlinealert_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="An inline alert component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/dialogs/alert/inlinealert/component_inlinealert_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="An inline alertcomponent in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/dialogs/alert/inlinealert/component_inlinealert_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.0.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>1.3.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(_:tablename:bundle:status:)/index.html"><code>init(LocalizedStringKey, tableName: String?, bundle: Bundle, status: OUDSAlertStatus)</code><p>Creates an inline alert with a
