ecific width constraint is applied, allowing the component to size itself or follow external modifier. Defaults to <code>false</code>.</p></dd><dt>status</dt><dd><p>The current status of the text input, by default to set <i>enabled</i></p></dd></dl><h2>Discussion</h2><pre class="swift"><code>    OUDSTextInput(label: "Email", text: $text)
