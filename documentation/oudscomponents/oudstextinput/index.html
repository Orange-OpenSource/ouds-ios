<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSTextInput</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Text input is a UI element that allows to enter, edit, or select single-line textual data. Text input is one of the most fundamental form elements used to capture user input such as names, emails, passwords, or search queries. It provides a visual and interactive affordance for text entry while supporting labels, placeholders, icons, descriptions, and validation feedback." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSTextInput</li></ul><p>Structure</p><h1>OUDSTextInput</h1><p>Text input is a UI element that allows to enter, edit, or select single-line textual data. Text input is one of the most fundamental form elements used to capture user input such as names, emails, passwords, or search queries. It provides a visual and interactive affordance for text entry while supporting labels, placeholders, icons, descriptions, and validation feedback.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>visionOS 1.0+</li></ul><pre><code>@MainActor struct OUDSTextInput</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../controls/index.html">Controls</a></li></ul><h2>Layout</h2><p>Text input is based on several configurable UI elements:</p><ul><li><p><b>label</b>: It is used to describe the purpose of the input. In some UI contexts, especially when space is limited or when the input is part of a compact layout (search bars, filters, inline forms), the label can be hidden. However, hiding the label should only be done if the purpose of the input remains clear thanks to a placeholder or contextual icon and if the label is still accessible to screen readers Hiding a label is a design choice that must balance visual simplicity and clarity of intent, without compromising inclusiveness or form guidance.</p></li><li><p><b>placeholder</b>: if the text of the text input is empty a placeholder provides a hint or guidance inside the field to suggest expected input. A prefix and a suffix can be added to give more context.</p></li><li><p><b>leading icon</b>: it helps indicate the purpose of the input (magnifying glass for search, envelope for email, phone device for phone number). Only use a leading icon if it adds clear functional or contextual value.</p></li><li><p><b>trailing action</b>: it is used to provide actions related to the field: clear input, toggle password visibility, open a date picker, etc. Can also indicate status or feedback (error checkmark, loading spinner).</p></li></ul><h2>Outlined style</h2><p>By <b>default</b>, the input is with a subtle background fill and invisible bottom border, creating a softer and more contained look. Best suited for dense layouts or to enhance visibility.</p><p>When <b>outlined</b>, the text input is a minimalist design with a transparent background and a visible stroke outlining the field. This style may be interesting for contexts other than form pages:</p><ul><li><p>When inputs need to feel lightweight and unobtrusive</p></li><li><p>In a header (search field)</p></li><li><p>In a selection/filtering feature in a product catalog</p></li></ul><pre class="swift"><code>   // An outlined text input
   OUDSTextInput(label: "Label", text: $text, isOutlined: true)

   // With a localizable and a bundle
   OUDSTextInput(LocalizedStringKey("label_wording"), bundle: Bundle.module, text: $text)
</code></pre><h3>Rounded layout</h3><p>Text input can have rounded layouts to be favored in more emotional, immersive contexts or those tied to specific visual identities. For standard or business-oriented journeys, keep the default corners. This evolution addresses the need for flexibility in adapting the design to some brand contexts.</p><p>To activate the rounded corner behavior, set to true the <code>hasRoundedTextInputs</code> values of the <code>Tuning</code> object in your theme configuration (if the theme exposes this property at init). Some themes do not have this flexibility like <code>SoshTheme</code> and <code>WireframeTheme</code>.</p><h2>Status</h2><p>Five status are proposed for all layouts:</p><ul><li><p><b>default (by default)</b>: Default neutral appearance, whether empty or filled. It allows users to click, focus, and type freely without restrictions.</p></li><li><p><b>error</b>: The <code>error</code> status indicates that the user input does not meet validation rules or expected formatting. It provides immediate visual feedback, typically through a red border, error icon, and a clear, accessible error message positioned below the input. The error messages replaces the helper text.</p></li><li><p><b>loading</b>: The <code>loading</code> state indicates that the system is processing or retrieving data related to the text entered. A progress indicator appears to inform the user that an action is in progress.</p></li><li><p><b>readOnly</b> :The<code>readOnly</code>, lets the text visible but not editable</p></li><li><p><b>disabled</b>: In <code>disabled</code> status, the field is non-interactive and grayed out to indicate it cannot be changed. Note the SwiftUI <code>View.disabled()</code> is ignored.</p></li></ul><h2>Helpers</h2><ul><li><p><b>Helper text</b>:  A supporting text conveys additional information about the input field, such as how it will be used. It should ideally only take up a single line, though may wrap to multiple lines if required, and be either persistently visible or visible only on focus.</p></li><li><p><b>Helper link</b>: If the helper text is not sufficient, it’s possible to offer the user an additional help link (the link can be external or open a modal).</p></li></ul><h2>Accessibility considerations</h2><p>By default no haptics are done by the component for the trailing action. However you should think about cases wher you will have to make the devices vibrates. You can refer to the <a href="https://developer.apple.com/design/human-interface-guidelines/playing-haptics">Human Interface Guidelines of Apple</a>.</p><h2>Mandatory field indication</h2><p>If all fields are mandatory (several fields present): display the message “All fields are mandatory” at the top of your formular. Do not use an asterisk at the end of each field label, nor the word “mandatory.”</p><p>If not all fields are mandatory (several fields present): display the message “All fields marked with an * are mandatory” at the top of your formular. Use an asterisk (*) at the end of each mandatory field label, and ensures this is well vocalized.</p><p>UI rendering of the asterisk must be done with <i>bold font weight</i> and <i>negative content color</i> (red on light backgrounds).</p><p>Use the mention “(optional)” at the end of each optional field label. Note that this rule is not systematic, it remains an option, to be used if needed.</p><p>If there is only one field in the formular, or if the mandatory nature is obvious (such as login/password), no mention is necessary since the fields are essential to the formular’s functionality.</p><h2>Code samples</h2><pre class="swift"><code>    // The text to display and edit
    @State var text: String = ""

    // Empty text and no placeholder
    OUDSTextInput(label: "Email", text: $text)

    // Empty text with placeholder and suffix
    OUDSTextInput(label: "Email", text: $text, placeholder: "firstName.lastName", suffix: "@orange.com")

    // Empty text with prefix and suffix
    OUDSTextInput(label: "Email", text: $text, prefix: "Distance", suffix: "km")

    // Add a leading icon for more context
    OUDSTextInput(label: "Email", text: $text, placeholder: "firstName.lastName", suffix: "@orange.com", leadingIcon: Image(systemName: "envelope"))

    // Add a trailing button with local image namde "ic_cross" for additional action
    let trailingAction = OUDSTextInput.TrailingAction(icon: Image("ic_cross"), actionHint: "Delete") { text = "" }
    OUDSTextInput(label: "Email", text: $text, trailingAction: trailingAction)

    // With helper text
    OUDSTextInput(label: "Email",
                  text: $text,
                  placeholder: "firstName.lastName",
                  suffix: "@orange.com",
                  helperText: "The email will be automatically completed with @orange.com")

    // With helper link
    @Environment(\.openURL) private var openUrl

    let helperLink = OUDSTextInput.HelperLink(text: "Helper Link") {
       openUrl.callAsFunction(url)
    }

    OUDSTextInput(label: "Label", text: $text, placeholder: "Placeholder", helperLink: helperLink)
</code></pre><p>If you need to flip your icon depending to the layout direction or not (e.g. if RTL mode lose semantics  / meanings):</p><pre class="swift"><code>    @Environment(\.layoutDirection) var layoutDirection

    OUDSTextInput(label: "Label", text: $text, flipLeadingIcon: layoutDirection == .rightToLeft)
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-text-input">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A text input component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/textinputs/component_textinput_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A text input component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/textinputs/component_textinput_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A text input component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/textinputs/component_textinput_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A text input component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/textinputs/component_textinput_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.3.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>0.20.0</p></blockquote><h2>Topics</h2><h3>Structures</h3><ul><li><a href="helperlink/index.html"><code>struct Helperlink</code><p>Used to describe the helper link above the helper text.</p></a></li><li><a href="trailingaction/index.html"><code>struct TrailingAction</code><p>Used to describe the trailing action of the text input</p></a></li></ul><h3>Initializers</h3><ul><li><a href="init(_:tablename:bundle:text:placeholder:prefix:suffix:leadingicon:flipleadingicon:trailingaction:helpertext:helperlink:isoutlined:constrainedmaxwidth:status:)/index.html"><code>init(LocalizedStringKey, tableName: String?, bundle: Bundle, text: Binding&lt;String&gt;, placeholder: String?, prefix: String?, suffix: String?, leadingIcon: Image?, flipLeadingIcon: Bool, trailingAction: OUDSTextInput.TrailingAction?, helperText: String?, helperLink: OUDSTextInput.Helperlink?, isOutlined: Bool, constrainedMaxWidth: Bool, status: OUDSTextInput.Status)</code><p>Creates a text input with a localized label, looking up the key in the given bundle.</p></a></li><li><a href="init(label:text:placeholder:prefix:suffix:leadingicon:flipleadingicon:trailingaction:helpertext:helperlink:isoutlined:constrainedmaxwidth:status:)/index.html"><code>init(label: String, text: Binding&lt;String&gt;, placeholder: String?, prefix: String?, suffix: String?, leadingIcon: Image?, flipLeadingIcon: Bool, trailingAction: OUDSTextInput.TrailingAction?, helperText: String?, helperLink: OUDSTextInput.Helperlink?, isOutlined: Bool, constrainedMaxWidth: Bool, status: OUDSTextInput.Status)</code><p>Creates a text input.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul><h3>Enumerations</h3><ul><li><a href="status/index.html"><code>enum Status</code><p>Define all available status for the text input</p></a></li></ul></article></noscript><div id="app"></div></body></html>
