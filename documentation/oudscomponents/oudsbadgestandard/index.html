<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSBadgeStandard</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Badge is a UI element that emphasizes system notifications, status, or the categorization of an information, throughout colour only. Badge is rendered as a coloured shape, without icon, text or number; and its chosen size remains unchanged regardless of the changes of the interface size. ``doc://OUDSComponents/documentation/OUDSComponents/OUDSBadgeStandard`` displays only a colored pastille." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSBadgeStandard</li></ul><p>Structure</p><h1>OUDSBadgeStandard</h1><p>Badge is a UI element that emphasizes system notifications, status, or the categorization of an information, throughout colour only. Badge is rendered as a coloured shape, without icon, text or number; and its chosen size remains unchanged regardless of the changes of the interface size. <a href="."><code>OUDSBadgeStandard</code></a> displays only a colored pastille.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor struct OUDSBadgeStandard</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../indicators/index.html">Indicators</a></li></ul><h2>Code samples</h2><pre class="swift"><code>    // Default badge is neutral with medium size
    OUDSBadgeStandard(accessibilityLabel: "New feature available")

    // Accent badge in small size without information
    OUDSBadgeStandard(accessibilityLabel: "New feature available", status: .accent, size: .small)
</code></pre><h2>Accessibility considerations</h2><h3>Sizes</h3><p>Users may need to increase their text sizes. However by design their is no tokens for such cases. Thus, if large text is used, a factor is applied on the largest token value based on the size percentage rate. Thus it will make users able to have bigger badges.</p><h3>Vocalizations</h3><p>A badge needs an accessibility label to decribe the meaning that will be vocalized.</p><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-badge">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A badge component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/3_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/indicators/badge/badgestandard/component_badge_standard_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A badge component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/3_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/indicators/badge/badgestandard/component_badge_standard_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A badge component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/3_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/indicators/badge/badgestandard/component_badge_standard_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A badge component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/3_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/indicators/badge/badgestandard/component_badge_standard_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.2.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>2.2.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(accessibilitylabel:status:size:)/index.html"><code>init(accessibilityLabel: String, status: OUDSBadgeStandard.Status, size: OUDSBadgeStandard.Size)</code><p>Creates a basic badge.</p></a></li><li><a href="init(accessibilitylabel:tablename:bundle:status:size:)/index.html"><code>init(accessibilityLabel: LocalizedStringKey, tableName: String?, bundle: Bundle, status: OUDSBadgeStandard.Status, size: OUDSBadgeStandard.Size)</code><p>Creates a basic badge.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul><h3>Enumerations</h3><ul><li><a href="size/index.html"><code>enum Size</code><p>All available sizes of a badge as <i>standard</i> type</p></a></li><li><a href="status/index.html"><code>enum Status</code><p>The status depends on the context of the information it represents. Badges components like <a href="../oudsbadge/index.html"><code>OUDSBadge</code></a> and <a href="../oudsbadgecount/index.html"><code>OUDSBadgeCount</code></a> share the sames status.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
