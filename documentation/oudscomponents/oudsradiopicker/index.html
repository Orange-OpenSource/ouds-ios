<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSRadioPicker</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A picker allowing to expose several radio buttons and choose only one within the others. Each radio button contains a “tag”, i.e. a supposed to be unique value. The picker will expose the choosen value through this “tag”. It has also some configuration elements which will override the one applied to nested ``doc://OUDSComponents/documentation/OUDSComponents/OUDSRadioItem`` (divider, read only and error mode, layout and outlined)" name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSRadioPicker</li></ul><p>Structure</p><h1>OUDSRadioPicker</h1><p>A picker allowing to expose several radio buttons and choose only one within the others. Each radio button contains a “tag”, i.e. a supposed to be unique value. The picker will expose the choosen value through this “tag”. It has also some configuration elements which will override the one applied to nested <a href="../oudsradioitem/index.html"><code>OUDSRadioItem</code></a> (divider, read only and error mode, layout and outlined)</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>visionOS 1.0+</li></ul><pre><code>@MainActor struct OUDSRadioPicker&lt;Tag&gt; where Tag : Hashable</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../controls/index.html">Controls</a></li></ul><h2>Accessibility considerations</h2><p><i>Voice Over</i> will use several elements to describe the component: if component disabled / read only, if error context, the label and helper texts and a custom radio trait. The picker itself does no have any defined accessiiblity value, label or identifier ; it remains in the users hands to define which one will be used. However if defined in the <a href="../oudsradiopickerdata/index.html"><code>OUDSRadioPickerData</code></a> the items inside the picker will have such accessibility identifiers.</p><h2>Forbidden by design</h2><p>The design system does not allow to have <a href="../oudsradioitem/index.html"><code>OUDSRadioItem</code></a> in both an error situation and a read only state. The design system does not allow to have <a href="../oudsradioitem/index.html"><code>OUDSRadioItem</code></a> in both an error situation and a disabled state. The design system does not allow to have <a href="../oudsradioitem/index.html"><code>OUDSRadioItem</code></a> in both a read only and a disabled state.</p><h2>Code samples</h2><pre class="swift"><code>    // Define the elements to display in radio buttons using OUDSRadioPickerData.
    // This object has the same properties as the OUDSRadioItem,
    // and some of them are optional withdefault values set
    var someDataToPopulate: [OUDSRadioPickerData&lt;String&gt;] {
        [
            OUDSRadioPickerData&lt;String&gt;(tag: "Choice_1",
                                        label: "Virgin Holy Lava",
                                        extraLabel: "Very spicy",
                                        description: "No alcohol, only tasty flavors",
                                        icon: Image(systemName: "flame")),

            OUDSRadioPickerData&lt;String&gt;(tag: "Choice_2",
                                        label: "IPA beer",
                                        description: "From Brewdog company",
                                        icon: Image(systemName: "dog.fill")),

            OUDSRadioPickerData&lt;String&gt;(tag: "Choice_3",
                                        label: "Mineral water",
                                        icon: Image(systemName: "waterbottle.fill")),
        ]
    }

    // Prepare the selection, with a value previously selected
    // Use the data and the binding for the picker.
    @State var selection: String = "Choice_1"

    // Here the picker is vertical
    OUDSRadioPicker(selection: $selection, radios: someDataToPopulate)

    // The picker can apply some settings to all its radio buttons.
    // It can be also horitzontal with a scroll indicator.
    // Here all the the radio buttons are in read only mode and use reversed layout.
    OUDSRadioPicker(selection: $selection,
                    radios: someDataToPopulate,
                    isReversed: true,
                    isReadOnly: true,
                    placement: .horitzontal(true))
</code></pre><h2>Design documentation</h2><p>There is no online specification as this component is not an official OUDS one</p><h2>Theme rendering</h2><h3>Orange</h3><p><picture><img alt="A radio picker component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/radios/radiopicker/component_radiopicker_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A radio picker component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/radios/radiopicker/component_radiopicker_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A radio picker component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/radios/radiopicker/component_radiopicker_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A radio picker component in light and dark modes with Wirefraùe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/radios/radiopicker/component_radiopicker_wireframe.png"/></picture></p><blockquote class="aside since"><p class="label">Since</p><p>0.14.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(selection:radios:placement:isoutlined:isreversed:iserror:isreadonly:hasdivider:itemsspacing:)/index.html"><code>init(selection: Binding&lt;Tag&gt;, radios: [OUDSRadioPickerData&lt;Tag&gt;], placement: OUDSRadioPickerPlacement, isOutlined: Bool, isReversed: Bool, isError: Bool, isReadOnly: Bool, hasDivider: Bool, itemsSpacing: SpaceSemanticToken?)</code><p>Defines the picker view which displays using <a href="../oudsradioitem/index.html"><code>OUDSRadioItem</code></a> view the <a href="../oudsradiopickerdata/index.html"><code>OUDSRadioPickerData</code></a></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul></article></noscript><div id="app"></div></body></html>
