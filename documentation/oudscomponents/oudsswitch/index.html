<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSSwitch</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Switch is a UI element that allows to toggle between two states, typically “On” and “Off”, and used to enable or disable features, options or settings. Switch that does not show icon or text, provides greater flexibility when creating other components that require a Switch to be displayed." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSSwitch</li></ul><p>Structure</p><h1>OUDSSwitch</h1><p>Switch is a UI element that allows to toggle between two states, typically “On” and “Off”, and used to enable or disable features, options or settings. Switch that does not show icon or text, provides greater flexibility when creating other components that require a Switch to be displayed.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor struct OUDSSwitch</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../controls/index.html">Controls</a></li></ul><h2>Accessibility considerations</h2><p>Note also the component must be instanciated with a string parameter used as accessibility label. It is a good pratice (at least) to define a label for a component without text for accessibility reasons. This label will be vocalized by <i>Voice Over</i>. The vocalization tool will also use, after the label, a description of the component (if disabled, if error context), and a fake trait for switch.</p><h2>Cases forbidden by design</h2><p><b>The design system does not allow to have both a read only situation and a disabled component.</b></p><h2>Code samples</h2><pre class="swift"><code>    // Supposing we have an unselected state
    @Published var isOn: Bool = false

    // A simple switch, no error, not in read only mode
    OUDSSwitch(isOn: $isOn, accessibilityLabel: "The cake is a lie")
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-switch">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A switch component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/switches/switch/component_switch_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A switch component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/switches/switch/component_switch_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A switch component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/switches/switch/component_switch_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A switch component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/switches/switch/component_switch_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.5.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>0.14.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(ison:accessibilitylabel:isreadonly:)/index.html"><code>init(isOn: Binding&lt;Bool&gt;, accessibilityLabel: String, isReadOnly: Bool)</code><p>Creates a switch with only an indicator.</p></a></li><li><a href="init(ison:accessibilitylabel:tablename:bundle:isreadonly:)/index.html"><code>init(isOn: Binding&lt;Bool&gt;, accessibilityLabel: LocalizedStringKey, tableName: String?, bundle: Bundle, isReadOnly: Bool)</code><p>Creates a switch with only an indicator.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul></article></noscript><div id="app"></div></body></html>
