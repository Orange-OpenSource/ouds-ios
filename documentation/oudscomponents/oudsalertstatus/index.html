<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSAlertStatus</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="The status of the alerts. ``doc://OUDSComponents/documentation/OUDSComponents/OUDSAlertMessage`` background color and its icon color are based on this status. ``doc://OUDSComponents/documentation/OUDSComponents/OUDSInlineAlert`` icon and text color are based on this status." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSAlertStatus</li></ul><p>Enumeration</p><h1>OUDSAlertStatus</h1><p>The status of the alerts. <a href="../oudsalertmessage/index.html"><code>OUDSAlertMessage</code></a> background color and its icon color are based on this status. <a href="../oudsinlinealert/index.html"><code>OUDSInlineAlert</code></a> icon and text color are based on this status.</p><pre><code>@frozen enum OUDSAlertStatus</code></pre></section><h2>Overview</h2><p>There are two types of statuses:</p><ul><li><p>Non-functional statuses used for informational or decorative alert messages. They provide context or highlight content without implying a specific state, system event, or user action. These alerts are not tied to UX patterns such as success, error, or warning, and may use contextual or brand-related icons to enhance recognition or storytelling.</p></li><li><p>Functional statuses communicate specific system statuses, results, or user feedback: Each variant conveys a clear semantic meaning and must always be paired with its dedicated functional icon to ensure clarity and accessibility. Use functional alerts to inform user about state changes, confirmations, or issues that are directly connected to system logic or user actions. These messages carry functional meaning and help guide user response or acknowledgment.</p></li></ul><h2>Topics</h2><h3>Enumeration Cases</h3><ul><li><a href="accent(icon:)/index.html"><code>case accent(icon: OUDSIcon?)</code><p>Accent status uses brand colours to draw attention to promotional or highlighted information while remaining non-critical. Ideal for marketing content, announcements, or feature highlights, where you want to subtly engage users without introducing functional semantics. Ideal for promotional banners, product updates, or customer engagement moments.</p></a></li><li><a href="info/index.html"><code>case info</code><p>Info status is used to share neutral system information or service updates that do not require immediate action. Ideal for background processes or status messages where users simply need to stay informed. This status displays a dedicated default icon.</p></a></li><li><a href="negative/index.html"><code>case negative</code><p>Negative status communicates a critical issue or error that prevents the user from proceeding until it is resolved. These alerts remain visible until the problem is fixed or dismissed by the user. This status displays a dedicated default icon.</p></a></li><li><a href="neutral(icon:)/index.html"><code>case neutral(icon: OUDSIcon?)</code><p>Neutral status can be used as a generic informative alert without semantic meaning or colour association. Suitable for a wide range of contexts — such as tips, general information, or descriptive labels — where no specific feedback or urgency is required. Appropriate for help sections, dashboards, or onboarding flows.</p></a></li><li><a href="positive/index.html"><code>case positive</code><p>Positive status indicates that a task or process has been completed successfully. These alerts reassure users and confirm that no further action is needed. This status displays a dedicated default icon.</p></a></li><li><a href="warning/index.html"><code>case warning</code><p>Used to draw attention to potential issues or upcoming changes that might affect the user’s service or experience. Warnings encourage awareness but typically do not block actions. This status displays a dedicated default icon.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
