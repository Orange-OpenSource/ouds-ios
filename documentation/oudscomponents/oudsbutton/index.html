<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSButton</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Button is a UI element that triggers an action or event, and is used to initiate tasks or confirming an action. Button appears in different layouts, styles and states to indicate hierarchy or emphasis." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSButton</li></ul><p>Structure</p><h1>OUDSButton</h1><p>Button is a UI element that triggers an action or event, and is used to initiate tasks or confirming an action. Button appears in different layouts, styles and states to indicate hierarchy or emphasis.</p><ul id="availability"><li>iOS 15.0+</li><li>macOS 13.0+</li><li>tvOS 16.0+</li><li>visionOS 1.0+</li><li>watchOS 11.0+</li></ul><pre><code>@MainActor struct OUDSButton</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../layouts/index.html">Layouts</a></li><li><a href="../actions/index.html">Actions</a></li></ul><h2>Appearances</h2><p>Five appearances are proposed for all layouts:</p><ul><li><p><b>default (by default)</b>: Default buttons are used for actions which are not mandatory or essential for the user.</p></li><li><p><b>strong</b>: Should be singular and prominent, limited to one per view. It should be reserved for the most critical action, such as “Next,” “Save,” “Submit,” etc. It is a “call for action”.</p></li><li><p><b>brand</b>: A brand primary color alternative to the <i>strong</i> button. To be used sparingly for high-value specific actions or to visually anchor a brand moment. Do not use it as the default primary button in your interfaces. A button with <code>OUDSButton.Appearance.Brand</code> appearance is not allowed as a direct or indirect child of an <code>OUDSColoredSurface</code>.</p></li><li><p><b>minimal</b>: Minimal buttons are commonly used for actions that are considered less crucial. They can be used independently or together with a strong button.</p></li><li><p><b>negative</b>: Negative buttons should be used sparingly to warn of a destructive action, for example, delete or remove, typically resulting in the opening of a confirmation dialog. A button with <code>OUDSButton.Appearance.Negative</code> appearance is not allowed as a direct or indirect child of an <code>OUDSColoredSurface</code>.</p></li></ul><h2>Code samples</h2><pre class="swift"><code>    // Icon only with default appearance
    OUDSButton(icon: Image("ic_heart"), accessibilityLabel: "Like", appearance: .default) { /* the action to process */ }
    // Or simpler
    OUDSButton(icon: Image("ic_heart"), accessibilityLabel: "Like") { /* the action to process */ }

    // Text only with negative appearance
    OUDSButton(text: "Delete", appearance: .negative,  style: .default) { /* the action to process */ }
    // Or simpler
    OUDSButton(text: "Delete", appearance: .negative) { /* the action to process */ }

    // A loading button
    OUDSButton(text: "Delete", style: .loading) { /* the action to process */ }

    // Text and icon with strong appearance
    OUDSButton(text: "Validate", icon: Image("ic_heart"), appearance: .strong) { /* the action to process */ }

    // Text and icon with strong appearance and button taking full width
    OUDSButton(text: "Validate", icon: Image("ic_heart"), appearance: .strong, isFullWidth: true) { /* the action to process */ }

    // Localizable from bundle can also be used
    OUDSButton(LocalizedStringKey("validate_button"), bundle: Bundle.module, appearance: .strong) { }
</code></pre><p>If you need to flip your icon depending to the layout direction or not (e.g. if RTL mode lose semantics  / meanings):</p><pre class="swift"><code>    @Environment(\.layoutDirection) var layoutDirection

    OUDSButton(text: "Button",
               icon: Image(systemName: "figure.handball"),
               flipIcon: layoutDirection == .rightToLeft)
</code></pre><h2>Styles</h2><p>Two style are available:</p><ul><li><p><b>default (by default)</b>: used in the normal usage of button. The aspect of the button changes for  states <i>disabled</i>, <i>pressed</i>, <i>hovered</i> or normal (i.e. <i>enabled</i>)</p></li><li><p><b>loading</b>: used after button was clicked and probably data are requested before navigate to a next screen or get updated data.</p></li></ul><h2>Rounded layout</h2><p>Buttons can have rounded layouts to be favored in more emotional, immersive contexts or those tied to specific visual identities. For standard or business-oriented journeys, keep the default corners. This evolution addresses the need for flexibility in adapting the design to some brand contexts.</p><p>To activate the rounded button behavior, set to true the <code>hasRoundedButtons</code> values of the <code>Tuning</code> object in your theme configuration (if the theme exposes this property at init). Some themes do not have this flexibility like <code>SoshTheme</code> and <code>WireframeTheme</code>.</p><h2>Colored surface</h2><p>If button is placed on colored surface using <code>OUDSColoredSurface</code>, the default colors (content, background and border) are automatically adjusted to switch to monochrome mode.</p><p><b>Remark: Today it is not allowed to place a Negative nor a Brand button on a colored surface.</b></p><h2>Specific behavior</h2><p>For accessibility reasons, if the system settings for reducing motion is enabled, the loading indicator does not move. For ecodesign reasons, if the device is in low power mode, the loading indicator does not move.</p><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-button">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A button component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/actions/button/component_button_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A button component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/actions/button/component_button_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A button component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/actions/button/component_button_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A button component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/actions/button/component_button_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>3.2.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>0.10.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(_:tablename:bundle:appearance:style:isfullwidth:action:)/index.html"><code>init(LocalizedStringKey, tableName: String?, bundle: Bundle, appearance: OUDSButton.Appearance, style: OUDSButton.Style, isFullWidth: Bool, action: () -&gt; Void)</code><p>Creates a button with a localized text only, looking up the key in the given bundle.</p></a></li><li><a href="init(_:tablename:bundle:icon:flipicon:appearance:style:isfullwidth:action:)/index.html"><code>init(LocalizedStringKey, tableName: String?, bundle: Bundle, icon: Image, flipIcon: Bool, appearance: OUDSButton.Appearance, style: OUDSButton.Style, isFullWidth: Bool, action: () -&gt; Void)</code><p>Creates a button with a localized text and icon, looking up the key in the given bundle.. A raw string can also be given to be displayed.</p></a></li><li><a href="init(icon:accessibilitylabel:flipicon:appearance:style:isfullwidth:action:)/index.html"><code>init(icon: Image, accessibilityLabel: String, flipIcon: Bool, appearance: OUDSButton.Appearance, style: OUDSButton.Style, isFullWidth: Bool, action: () -&gt; Void)</code><p>Creates a button with an icon only.</p></a></li><li><a href="init(icon:accessibilitylabel:tablename:bundle:flipicon:appearance:style:isfullwidth:action:)/index.html"><code>init(icon: Image, accessibilityLabel: LocalizedStringKey, tableName: String?, bundle: Bundle, flipIcon: Bool, appearance: OUDSButton.Appearance, style: OUDSButton.Style, isFullWidth: Bool, action: () -&gt; Void)</code><p>Creates a button with an icon only.</p></a></li><li><a href="init(text:appearance:style:isfullwidth:action:)/index.html"><code>init(text: String, appearance: OUDSButton.Appearance, style: OUDSButton.Style, isFullWidth: Bool, action: () -&gt; Void)</code><p>Create a button with a text only.</p></a></li><li><a href="init(text:icon:flipicon:appearance:style:isfullwidth:action:)/index.html"><code>init(text: String, icon: Image, flipIcon: Bool, appearance: OUDSButton.Appearance, style: OUDSButton.Style, isFullWidth: Bool, action: () -&gt; Void)</code><p>Creates a button with text and icon.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul><h3>Enumerations</h3><ul><li><a href="appearance/index.html"><code>enum Appearance</code><p>Represents the appearance of an OUDS button, i.e. a kind of type</p></a></li><li><a href="style/index.html"><code>enum Style</code><p>Defines the style of the button, e.g. loading or not</p></a></li></ul></article></noscript><div id="app"></div></body></html>
