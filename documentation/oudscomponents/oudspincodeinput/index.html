<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSPinCodeInput</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="PIN code input is a UI element that allows to capture short, fixed-length numeric codes, typically for authentication or confirmation purposes, such as a four, six or eight-digit personal identification number (PIN). PIN code input is presented as a series of individual input fields or boxes, each representing a single digit, to enhance readability and encourage accurate input, while supporting smooth keyboard navigation and secured input masking if needed." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>OUDSPinCodeInput</li></ul><p>Structure</p><h1>OUDSPinCodeInput</h1><p>PIN code input is a UI element that allows to capture short, fixed-length numeric codes, typically for authentication or confirmation purposes, such as a four, six or eight-digit personal identification number (PIN). PIN code input is presented as a series of individual input fields or boxes, each representing a single digit, to enhance readability and encourage accurate input, while supporting smooth keyboard navigation and secured input masking if needed.</p><ul id="availability"><li>iOS 15.0+</li><li>visionOS 1.0+</li></ul><pre><code>@MainActor struct OUDSPinCodeInput</code></pre></section><h2>Mentioned In</h2><ul><li><a href="../controls/index.html">Controls</a></li></ul><h2>Layouts</h2><p>The component can be rendered as two different layouts:</p><ul><li><p><i>outlined</i> layout: A minimalist input with a transparent background and a visible stroke outlining the field. This style may be interesting for contexts other than form pages, e.g. when inputs need to feel lightweight and unobtrusive, in a header (search field), or in a selection/filtering feature in a product catalog</p></li><li><p><i>not outlined</i> (default): An input with a subtle background fill and visible bottom border, creating a softer and more contained look. Best suited for dense layouts or to enhance visibility.</p></li></ul><p>The component provides 3 layouts for the input: 4 boxes, 6 boxes or 8 boxes.</p><p>A helper text can be used to support text to convey additional information about the input field, such as how it will be used. It should ideally only take up a single line, though may wrap to multiple lines if required, and be either persistently visible or visible only on focus.</p><h2>Error status</h2><p>The Error status indicates that the user input does not meet validation rules or expected formatting. It provides immediate visual feedback, typically through a red border, error icon, and a clear, accessible error message positioned below the input (mandatory). This state helps users quickly identify and correct mistakes by explaining what went wrong and, when possible, how to fix it. The input remains editable, encouraging users to revise their input without starting over. The error state must be triggered by an explicit validation (submission, API response), and not in real time with each keystroke. This can occur either because the entered code does not match the expected code, because the user entered an expired or already used code, or finally if the maximum number of attempts has been exceeded.</p><h2>Specific design guidelines</h2><p>In the context of a PIN code input, in addition to the input’s “Error” UI rendering, it is essential to also include an “Alert” component (also in its “Error” status) in the interface.</p><h2>Particular cases</h2><p>The <a href="."><code>OUDSPinCodeInput</code></a> component supports autofill feature of values like OTP code. For example if the user receives a message with inside a code the system can extract, the keyboard can suggest to the user to fill it. If the digits fits the component, it will be filled. If the digits are longer, they will be truncated. If the digits are shorter, they will be filled, letting other fields empty.</p><p>The copy/paste feature is also available and has the same behavior.</p><h2>Technical considerations</h2><p>For some cases, on phones screens or with 8 boxes in iPhone, you may need to use a <code>ScrollView</code> to embed the component and let user move it.</p><pre class="swift"><code>ScrollView(.horizontal) {
    OUDSPinCodeInput($value,
                     length: .eight,
                     helperText: "Enter your secret code sent to your phone")
}
</code></pre><p><b>Note also the exposed <i>value</i> <code>Binding</code> will be updated when all digits are written.</b></p><h2>Accessibility considerations</h2><p>The content of the fields is vocalized by Voice Over; the placeholders (defined in <a href="obfuscationcharacter/index.html"><code>obfuscationCharacter</code></a> and <a href="placeholdercharacter/index.html"><code>placeholderCharacter</code></a>) are not vocalized to let users know what they wrote.</p><p>The component gets only numeric values, not letters or symbols, only numbers.</p><p>Depending on the component configuration, autofocus can still be used when the component appears, and focus is moved to the next field as digits are entered. For example if Voice Over is enavled, the autoficus is disabled.</p><p>The component and its digit fields are vocalized with internal wording.</p><p>When using the error status, provide a clear, concise error message explaining what went wrong and, when possible, how to fix it (for example: <i>“The code you entered is invalid. Try again.”</i>).</p><p>Use helper text to communicate additional guidance (for example: <i>“Check the 6‑digit code sent by SMS”</i>), and keep this text short so it remains easy to vocalize and understand.</p><h2>Code samples</h2><pre class="swift"><code>    // The value with the code
    @State private var pinCode: String = ""

    // By default, the PIN code input displays only 6 boxes
    OUDSPinCodeInput($pinCode)

    // It can have also up 4 or 8 boxes, with an helper text
    OUDSPinCodeInput($pinCode, length: .eight, helperText: "Enter your 8 secret digits")

    // The component can be used in error contexts
    OUDSPinCodeInput($pinCode, length: .six, status: .error(message: "The OTP code you entered is not correct"))
</code></pre><h2>Design documentation</h2><p><a href="https://r.orange.fr/r/S-ouds-doc-pin-code-input">unified-design-system.orange.com</a></p><h2>Themes rendering</h2><h3>Orange</h3><p><picture><img alt="A PIN code input component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/pincodeinputs/component_pincodeinput_orange.png"/></picture></p><h3>Orange Compact</h3><p><picture><img alt="A PIN code input  component in light and dark modes with Orange Compact theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/pincodeinputs/component_pincodeinput_orangecompact.png"/></picture></p><h3>Sosh</h3><p><picture><img alt="A PIN code input  component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/pincodeinputs/component_pincodeinput_sosh.png"/></picture></p><h3>Wireframe</h3><p><picture><img alt="A PIN code input component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../../users/pylapersonne/documents/5_projects/17-ouds/ouds-ios/ouds/core/components/sources/_oudscomponents.docc/resources/controls/pincodeinputs/component_pincodeinput_wireframe.png"/></picture></p><blockquote class="aside version"><p class="label">Version</p><p>1.2.0 (Figma component design version)</p></blockquote><blockquote class="aside since"><p class="label">Since</p><p>1.4.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(_:length:helpertext:isoutlined:status:autofocus:)/index.html"><code>init(Binding&lt;String&gt;, length: OUDSPinCodeInput.Length, helperText: String?, isOutlined: Bool, status: OUDSPinCodeInput.Status, autofocus: Bool)</code><p>Defines a PIN code imput component with several boxes to fill the code</p></a></li><li><a href="init(_:length:helpertext:tablename:bundle:isoutlined:status:autofocus:)/index.html"><code>init(Binding&lt;String&gt;, length: OUDSPinCodeInput.Length, helperText: LocalizedStringKey, tableName: String?, bundle: Bundle, isOutlined: Bool, status: OUDSPinCodeInput.Status, autofocus: Bool)</code><p>Defines a PIN code imput component with several boxes to fill the code</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="body/index.html"><code>var body: some View</code></a></li></ul><h3>Type Properties</h3><ul><li><a href="obfuscationcharacter/index.html"><code>static let obfuscationCharacter: String</code><p>The symbol used to hide a written digit.</p></a></li><li><a href="placeholdercharacter/index.html"><code>static let placeholderCharacter: String</code><p>The symbol used as a placeholder for a digit not yet filled.</p></a></li></ul><h3>Enumerations</h3><ul><li><a href="length/index.html"><code>enum Length</code><p>The type of layout to apply to the <i>pin code input</i> to define the size of the input</p></a></li><li><a href="status/index.html"><code>enum Status</code><p>Define all available status for the PIN code input</p></a></li></ul></article></noscript><div id="app"></div></body></html>
