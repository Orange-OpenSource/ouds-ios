<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Actions</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Some components can be used for actions." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Components</a></li><li>Actions</li></ul><p>Article</p><h1>Actions</h1><p>Some components can be used for <b>actions</b>.</p></section><h2>Overview</h2><h3>Buttons</h3><p>The <a href="../oudsbutton/index.html"><code>OUDSButton</code></a> proposes layout with text only, icon only or text and icon. Four hierarchies are proposed for all layouts: <i>default</i>, <i>strong</i>, <i>minimal</i> and <i>negative</i>. Two style are available: <i>default</i> and <i>loading</i>. If button is placed on colored surface using <code>OUDSColoredSurface</code>, the default colors (content, background and border) are automatically adjusted to switch to monochrom. A button with <code>OUDSButton.Appearance.Negative</code> appearance is not allowed as a direct or indirect child of an <code>OUDSColoredSurface</code>.</p><pre class="swift"><code>    // Icon only with default appearance
    OUDSButton(icon: Image("ic_heart"), accessibilityLabel: "Like", appearance: .default) { /* the action to process */ }

    // Text only with negative appearance
    OUDSButton(text: "Delete", appearance: .negative) {}
</code></pre><p>For accessibility reasons, if the user in the system settings toggles the option to reduce the animations, the loading indicator will be frozen to be more comfortable for the user.</p><p>For ecodesign reasons, if the user toggles the low power mode, the loading indicator will be frozen to prevent the CPU to work and waste energy.</p></article></noscript><div id="app"></div></body></html>
