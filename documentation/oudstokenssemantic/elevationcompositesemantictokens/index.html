<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>ElevationCompositeSemanticTokens</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="This is a group of semantic tokens for elevations, but only composite tokens. There are splitted and not declared in ``doc://OUDSTokensSemantic/documentation/OUDSTokensSemantic/ElevationSemanticTokens`` as the tokenator tool parsing Figma JSON to Swift code is not able to manage them. Thus we need to declare them in another file to prevent them to be erased. It declares in fact box shadows effects." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Tokens for semantics</a></li><li>ElevationCompositeSemanticTokens</li></ul><p>Protocol</p><h1>ElevationCompositeSemanticTokens</h1><p>This is a group of semantic tokens for <b>elevations</b>, but only <b>composite tokens</b>. There are splitted and not declared in <a href="../elevationsemantictokens/index.html"><code>ElevationSemanticTokens</code></a> as the <i>tokenator</i> tool parsing <i>Figma</i> JSON to Swift code is not able to manage them. Thus we need to declare them in another file to prevent them to be erased. It declares in fact box shadows effects.</p><pre><code>protocol ElevationCompositeSemanticTokens</code></pre></section><h2>Overview</h2><p>This protocol makes themes able to provide and override <a href="../elevationcompositesemantictoken/index.html"><code>ElevationCompositeSemanticToken</code></a>. <a href="../elevationcompositesemantictoken/index.html"><code>ElevationCompositeSemanticToken</code></a> refers to <a href="../multipleelevationcompositerawtoken/index.html"><code>MultipleElevationCompositeRawToken</code></a>, which contains for light and dark color schemes <code>ElevationCompositeRawToken</code>. This <code>ElevationCompositeRawToken</code> is not managed by tokenator yet as it is composed by three properties.</p><p>This <a href="."><code>ElevationCompositeSemanticTokens</code></a> protocol contains a set of <a href="../elevationcompositesemantictoken/index.html"><code>ElevationCompositeSemanticToken</code></a>. They can be applied to views and components using <code>shadow(elevation:)</code> or <code>elevation(for:)</code>:</p><pre class="swift"><code>     @Environment(\.theme) var theme
     @Environment(\.colorScheme) var colorScheme

    // Given you want to apply the elevation token "raised"
    var body: some View {
        // Apply the token of elevation for the shadow effect without managing yourself the color scheme
        Rectangle()
            .shadow(elevation: theme.elevations.raised))
    }
</code></pre><pre class="swift"><code>    // Or get the token depending to the color scheme and do whatever you want with
    theme.elevations.raised.elevation(for: colorScheme)
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Instance Properties</h3><ul><li><a href="default/index.html"><code>var `default`: ElevationCompositeSemanticToken</code></a></li><li><a href="drag/index.html"><code>var drag: ElevationCompositeSemanticToken</code></a></li><li><a href="emphasized/index.html"><code>var emphasized: ElevationCompositeSemanticToken</code></a></li><li><a href="none/index.html"><code>var none: ElevationCompositeSemanticToken</code></a></li><li><a href="raised/index.html"><code>var raised: ElevationCompositeSemanticToken</code></a></li><li><a href="sticky/index.html"><code>var sticky: ElevationCompositeSemanticToken</code></a></li></ul></article></noscript><div id="app"></div></body></html>
