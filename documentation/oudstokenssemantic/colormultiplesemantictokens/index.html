be used easily thanks to this <a href="."><code>ColorMultipleSemanticTokens</code></a> which must be updated manually.</p><p>In few words:</p><pre class="swift"><code>        // Some color raw tokens, defined by the tokenator (in ColorRawTokens+Values.swift)
        public static let colorDecorativeAmber100: ColorRawToken = "#FFF0CC00"
        public static let colorDecorativeAmber200: ColorRawToken = "#FFE199FF"

        // The color semantic tokens using them
        // declared (in ColorSemanticTokens.swift) and defined (in OUDSTheme+ColorSemanticTokens.swift) by the tokenator
        var bgPrimary: ColorSemanticTokens { ColorRawTokens.colorDecorativeAmber100 }
        var bgPrimaryDark: ColorSemanticTokens { ColorRawTokens.colorDecorativeAmber200 }

        // The 'higher level' color semantic tokens wrapping them and exposed to users
        // declared (in this ColorMultipleSemanticTokens.swift) and defined manualy (in OUDSTheme+ColorMultipleSemanticTokens.swift)
        var bgPrimary: MultipleColorSemanticToken { MultipleColorSemanticToken(: bgPrimaryLight, dark: bgPrimaryDark) }

        // Thus users can in their components use bgPrimary as defined in their design system
        // (even if they are still able to use 'lower level' semantic tokens but it is more error-prone)
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Instance Properties</h3><ul><li><a href="actiondisabled/index.html"><code>var actionDisabled: MultipleColorSemanticToken</code></a></li><li><a href="actionenabled/index.html"><code>var actionEnabled: MultipleColorSemanticToken</code></a></li><li><a href="actionfocus/index.html"><code>var actionFocus: MultipleColorSemanticToken</code></a></li><li><a href="actionhighlighted/index.html"><code>var actionHighlighted: MultipleColorSemanticToken</code></a></li><li><a href="actionhover/index.html"><code>var actionHover: MultipleColorSemanticToken</code></a></li><li><a href="actionloading/index.html"><code>var actionLoading: MultipleColorSemanticToken</code></a></li><li><a href="actionnegativeenabled/index.html"><code>var actionNegativeEnabled: MultipleColorSemanticToken</code></a></li><li><a href="actionnegativefocus/index.html"><code>var actionNegativeFocus: MultipleColorSemanticToken</code></a></li><li><a href="actionnegativehover/index.html"><code>var actionNegativeHover: MultipleColorSemanticToken</code></a></li><li><a href="actionnegativeloading/index.html"><code>var actionNegativeLoading: MultipleColorSemanticToken</code></a></li><li><a href="actionnegativepressed/index.html"><code>var actionNegativePressed: MultipleColorSemanticToken</code></a></li><li><a href="actionpressed/index.html"><code>var actionPressed: MultipleColorSemanticToken</code></a></li><li><a href="actionreadonlyprimary/index.html"><code>var actionReadOnlyPrimary: MultipleColorSemanticToken</code></a></li><li><a href="actionreadonlysecondary/index.html"><code>var actionReadOnlySecondary: MultipleColorSemanticToken</code></a></li><li><a href="actionselected/index.html"><code>var actionSelected: MultipleColorSemanticToken</code></a></li><li><a href="actionsupportdisabled/index.html"><code>var actionSupportDisabled: MultipleColorSemanticToken</code></a></li><li><a href="actionsupportenabled
