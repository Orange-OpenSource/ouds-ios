<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>FontCompositeSemanticTokens</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="This is a group of semantic tokens for fonts, but only composite tokens in the end. There are splitted and not declared in ``doc://OUDSTokensSemantic/documentation/OUDSTokensSemantic/FontSemanticTokens`` as the tokenator tool parsing Figma JSON to Swift code is not able to manage them. Thus we need to declare them in another file to prevent them to be erased." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Tokens for semantics</a></li><li>FontCompositeSemanticTokens</li></ul><p>Protocol</p><h1>FontCompositeSemanticTokens</h1><p>This is a group of semantic tokens for <b>fonts</b>, but only <b>composite tokens</b> in the end. There are splitted and not declared in <a href="../fontsemantictokens/index.html"><code>FontSemanticTokens</code></a> as the <i>tokenator</i> tool parsing <i>Figma</i> JSON to Swift code is not able to manage them. Thus we need to declare them in another file to prevent them to be erased.</p><pre><code>protocol FontCompositeSemanticTokens</code></pre></section><h2>Overview</h2><p>It defines all composite font semantic tokens a theme must have, i.e. tokens including properties for font family, font weight, font size or line height for example.</p><p>This protocol makes themes able to provide and override <code>FontCompositeSemanticToken</code> gathered in <a href="../multiplefontcompositesemantictoken/index.html"><code>MultipleFontCompositeSemanticToken</code></a> instances. This <code>FontCompositeSemanticToken</code> is not managed by tokenator yet as it is composed by several properties.</p><p>This <a href="."><code>FontCompositeSemanticTokens</code></a> protocol contains a set of <a href="../multiplefontcompositesemantictoken/index.html"><code>MultipleFontCompositeSemanticToken</code></a>. They can be applied to views and components using the helpers provided through <code>View</code>, loading four the the font famoly to use:</p><pre class="swift"><code>     @Environment(\.theme) var theme

     // Apply theme.fonts.displayLarge
     Text("Foo bar wizz").displayLarge(theme)

     // Apply theme.fonts.headingMedium
     Text("Foo bar wizz").headingMedium(theme)

     // Apply theme.fonts.bodyDefaultSmall
     Text("Foo bar wizz").bodyDefaultSmall(theme)

     // Etc.
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Instance Properties</h3><ul><li><a href="bodydefaultlarge/index.html"><code>var bodyDefaultLarge: MultipleFontCompositeSemanticToken</code></a></li><li><a href="bodydefaultmedium/index.html"><code>var bodyDefaultMedium: MultipleFontCompositeSemanticToken</code></a></li><li><a href="bodydefaultsmall/index.html"><code>var bodyDefaultSmall: MultipleFontCompositeSemanticToken</code></a></li><li><a href="bodymoderatelarge/index.html"><code>var bodyModerateLarge: MultipleFontCompositeSemanticToken</code></a></li><li><a href="bodymoderatemedium/index.html"><code>var bodyModerateMedium: MultipleFontCompositeSemanticToken</code></a></li><li><a href="bodymoderatesmall/index.html"><code>var bodyModerateSmall: MultipleFontCompositeSemanticToken</code></a></li><li><a href="bodystronglarge/index.html"><code>var bodyStrongLarge: MultipleFontCompositeSemanticToken</code></a></li><li><a href="bodystrongmedium/index.html"><code>var bodyStrongMedium: MultipleFontCompositeSemanticToken</code></a></li><li><a href="bodystrongsmall/index.html"><code>var bodyStrongSmall: MultipleFontCompositeSemanticToken</code></a></li><li><a href="codemedium/index.html"><code>var codeMedium: MultipleFontCompositeSemanticToken</code></a></li><li><a href="displaylarge/index.html"><code>var displayLarge: MultipleFontCompositeSemanticToken</code></a></li><li><a href="displaymedium/index.html"><code>var displayMedium: MultipleFontCompositeSemanticToken</code></a></li><li><a href="displaysmall/index.html"><code>var displaySmall: MultipleFontCompositeSemanticToken</code></a></li><li><a href="headinglarge/index.html"><code>var headingLarge: MultipleFontCompositeSemanticToken</code></a></li><li><a href="headingmedium/index.html"><code>var headingMedium: MultipleFontCompositeSemanticToken</code></a></li><li><a href="headingsmall/index.html"><code>var headingSmall: MultipleFontCompositeSemanticToken</c
