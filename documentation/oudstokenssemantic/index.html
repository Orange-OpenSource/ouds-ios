<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Tokens for semantics</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="These tokens can be used mainly for component tokens to apply some style and configuration values ; today component tokens or components are not defined yet. They can be seen as an high level of usage with functional meanings." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li>Tokens for semantics</li></ul><p>Framework</p><h1>Tokens for semantics</h1><p>These <i>tokens</i> can be used mainly for <i>component tokens</i> to apply some style and configuration values ; today <i>component tokens</i> or <i>components</i> are not defined yet. They can be seen as an high level of usage with functional meanings.</p></section><h2>Overview</h2><pre><code>🧬 Core version: 1.10.0
</code></pre><p>If we need for example to change a warning color for a button (which has its component tokens, see <a href="https://ios.unified-design-system.orange.com/documentation/oudstokenscomponent/">OUDSTokensComponent</a>), supposing this color is defined as a <i>semantic token</i>, we only have to change its assigned value and all components using the <i>semantic token</i> won’t be impacted in their definition. In fact, semantic tokens are here to bring meaning, semantic, between raw values and components.</p><p>In addition, there are hundreds of <i>semantics tokens</i> which must be exposed in the end through the theme. Each <i>semantic token</i> “family” is declared in its dedicated <i>Swift protocol</i>. This protocol is then used for the tokens providers embeded inside the theme.</p><p>Because we choose to split responsabilities and objects into their own modules, we faced troubles to make possible for children themes to override properties declared in <i>protocols</i> and defined in <i>extensions</i>. That is the reason why tokens are exposed as <code>@objc open</code> to be available and overridable anywhere.</p><p>To keep the same semantics as the ones used in our specifications, <i>typealias</i> are used so as to make the links to <i>primitive types</i> and our logic of <i>tokens</i>. These type aliases are available for those who want to make their own theme.</p><p>Example with <a href="colorsemantictokens/index.html"><code>ColorSemanticTokens</code></a>:</p><pre class="swift"><code>// Declare the semantic tokens
protocol ColorSemanticTokens {

    var bgPrimary: ColorSemanticToken { get }
    var bgSecondary: ColorSemanticToken { get }
    var bgTertiary: ColorSemanticToken { get }
    // ...
}

// Ensure you have a provider
open class OrangeThemeColorSemanticTokensProvider { }

// Define the semantic tokens to expose through the theme thanks to the provider
extension OrangeThemeColorSemanticTokensProvider: ColorSemanticTokens {
    @objc open var bgPrimary: ColorSemanticToken { ColorRawTokens.functionalWhite }
    @objc open var bgSecondary: ColorSemanticToken { OrangeBrandColorRawTokens.colorOrange200 }
    @objc open var bgTertiary: ColorSemanticToken { bgSecondary }
}

// An instance of OrangeThemeColorSemanticTokensProvider will be assigned to OUDSTheme as AllColorSemanticTokensProvider
</code></pre><h2>Architecture</h2><p>The <i>Multiples</i> objects are <i>composite class</i> defined to pack double values for dedicated needs, like size classes management (<i>regular</i> or <i>compact</i> device modes), and also for color schemes management (<i>light</i> and <i>dark</i> modes). Such <i>composites</i> are not the same as the ones defined in the <i>Figma</i> design system, they are just utilities to handle tuple of values, without the syntax of tuples and with some helper functions.</p><p>We would like to define one class for all combinations of things depending to light and dark modes, and another for regular and compact modes. However, it implies to use <i>Swift generics</i> and it is not compatible with Objective-C runtime (we use through <code>@objc</code> keyword).</p><p>There are also several <i>typealias</i> values used for the semantic tokens. Indeed these aliases are here to bring clarity and meanings in the library, and also to help users (i.e. developers) to know what kind of objects they handle with the same vocabulary as the one used in <i>Figma</i>, and in general, in the whole design system. They can be seen as a light level of abstraction with meanings, without having to define real types with <code>struct</code> or <code>class</code>. Type aliases here point to raw tokens aliases, thus by transition they point to real types.</p><p>The semantic tokens are declared through protocols. These protocols will be then implemented by the providers in higher level (i.e. theme level like <i>OrangeTheme</i>).</p><p>The tokens providers are <i>Swift class</i> used to wrap semantic tokens definitions by implementing the protocols. We do not want to store all the semantic and component tokens in the theme, and the use of providers will improve the developer experience. It will wrap all tokens by “family” and should expose them through the suitable protocols. Type aliases are also defined to merge protocols for the same tokens groups. Thus the <code>OUDSTheme</code> will contain wrappers exposed and use through a subset of protocols.</p><pre class="swift"><code>// Colors are declared in two protocols: the "simple" and the "multiple"
public protocol ColorSemanticToken { ... }
public protocol ColorMultipleSemanticTokens { ... }

// These protoocols are merged in type aliase
public typealias AllColorSemanticTokensProvider = ColorSemanticTokens &amp; ColorMultipleSemanticTokens

// For example, the provider for the colors basically is:
open class OrangeThemeColorSemanticTokensProvider { ... }

// The provider is composed by protocols containing tokens
extension OrangeThemeColorSemanticTokensProvider: ColorSemanticTokens {
    @objc open var opacityTransparentLight: ColorSemanticToken { ColorRawTokens.opacityBlack0 }
    @objc open var opacityTransparentDark: ColorSemanticToken { ColorRawTokens.white0 }
    ...
}
extension OrangeThemeColorSemanticTokensProvider: ColorMultipleSemanticTokens {
    @objc open var opacityTransparent: MultipleColorSemanticToken { MultipleColorSemanticToken(light: opacityTransparentLight, dark: opacityTransparentDark) }
    ...
}

// The "abstract" object of theme exposes the provider through this subset of protocols
open class OUDSTheme: @unchecked Sendable {
    public let colors: AllColorSemanticTokensProvider
}

// And finaly, the default theme, which can be subclassed, exposes the tokens through the provider
open class OrangeTheme: OUDSTheme, @unchecked Sendable { ... }

// e.g.: theme.colors.invisibleBlack
</code></pre><h2>Semantic tokens management</h2><h3>Some note about composites</h3><p>The <i>tokenator</i> is not able today to generate composites tokens, i.e. tokens which contain by definition several properties.</p><p>For example, <i>elevation semantic token</i> dedicated to box shadows are composed by several properties (x, y, blur, shadow). <i>Font semantic token</i> can be token containing several properties too (weight, size, spacing, font family). These are considered as <i>composite tokens</i>. They are defined in dedicated protocols and files. Thus when the <i>tokenator</i> generates tokens without managing composites, the file can still be used as is with generated tokens, and the composites are not erased.</p><h3>Particular cases with semantic tokens</h3><h4>Closed semantic tokens</h4><p>There are some semantic tokens of colors which must not be overridable ; this is a rule defined in the design system kit. These tokens are all <code>repository*</code> tokens. They are only defined at once and are considered as “closed tokens”.</p><p>Also the <i>dimension</i> semantic tokens are closed.</p><h4>Semantic tokens with forbidden values</h4><p>It is possible to have some undefined color semantic tokens. Indeed some themes can use just a smaller set of colors, thus some semantic tokens of colors are not relevant. Because Figma cannot manage “optional” tokens, and because it will make heavier the management of tokens in Swift pakcage side, the forbidden value is used. This forbidden value is in tokenator side the “transparent red”, i.e. #FF000000. But in Swift package side, this value is converted to “ouds-forbidden-color-value”, and associated documentation updated.</p><blockquote class="aside important"><p class="label">Important</p><p>Then, even if users use these tokens, even if not specified in theme and documentation and Figma specifications, this value won’t be successfully parsed as color and program will crash.</p></blockquote><h2>How to use semantic tokens</h2><p>In fact, the semantic tokens are declared and gathered in <i>Swift protocol</i> so as to force any theme to implement them, and also to allow any theme to expose such properties wathever the implementation of the theme is, across providers. Because <i>semantic tokens</i> have for values <i>raw tokens</i>, and these <i>raw tokens</i> have for values primitive types, and all these tokens are declared with <i>type aliases</i> refering all together, you can handle a <i>semantic token</i> directly in your view because the final value will be used. Thus, get the theme and call the needed property with some helpers.</p><pre class="swift"><code>struct SomeView: View {

    @Environment(\.theme) private var theme // Supposed you used in your root view the `OUDSThemeableView` to register the theme
    @Environment(\.colorScheme) private var colorScheme

    var body: some View {
        Rectangle()
            .frame(width: theme.sizes.iconDecorative2Xl, height: theme.sizes.iconDecorativeXl)
            .foregroundColor(theme.colors.bgSecondary.color(for: colorScheme))
            .shadow(elevation: theme.elevations.raised.elevation(for: colorScheme))
            .padding(.bottom, theme.spaces.fixedNone)
    }
/*
    - The theme provides size semantic tokens "iconDecorative2Xl" and "iconDecorativeXl"
    - The theme provides a color semantic token "bgSecondary" with values for light and dark scheme, and you can use the color(for:) helper
    - The theme provides an elevation semantic token "raised" with values for compact and regualr size classes, and you can use the elevation(for:) helper
    - The theme provides a space semantic token "fixedNone" usable as is
    - Environment variables like color scheme must be retrieved through View, and then given to theme
*/
}

// Do not forget in your app to use the `OUDSThemeableView` for your theme, e.g. `OrangeTheme`
@main
struct DesignToolbox: App {

    var body: some Scene {
        WindowGroup {
            OUDSThemeableView(theme: OrangeTheme()) {
                // Your root view
                ...
            }
        }
    }
}
</code></pre><p>The semantic tokens are wrapped in tokens provider acessible through the themes:</p><table><thead><tr><th>Semantic tokens provider</th><th>Description</th></tr></thead><tbody><tr><td>borders</td><td>For borders (width, styles, radius…)</td></tr><tr><td>colors</td><td>For colors with also meta objects combining light and dark versions)</td></tr><tr><td>colorModes</td><td>Kind of frozen and not generated tokens about management of colors</td></tr><tr><td>charts</td><td>For charts, but optional and not defined in all themes</td></tr><tr><td>effects</td><td>For effects to apply to some component like navigation bars</td></tr><tr><td>elevations</td><td>For elevations to product shadow effects</td></tr><tr><td>fonts</td><td>For fonts (weights, letter spacings, sizes, line heights…)</td></tr><tr><td>grids</td><td>For grids</td></tr><tr><td>opacities</td><td>For opacities</td></tr><tr><td>sizes</td><td>For size of elements</td></tr><tr><td>spaces</td><td>For paddings and margins</td></tr></tbody></table><h2>Topics</h2><h3>Group</h3><ul><li><a href="bordersemantictokens/index.html"><code>protocol BorderSemanticTokens</code><p>This is a group of semantic tokens for <b>borders</b>. It defines all <a href="borderwidthsemantictoken/index.html"><code>BorderWidthSemanticToken</code></a>, <a href="borderradiussemantictoken/index.html"><code>BorderRadiusSemanticToken</code></a> and <a href="borderstylesemantictoken/index.html"><code>BorderStyleSemanticToken</code></a> a theme must have. Any border semantic token must be declared there as providers like <code>OUDSBorderSemanticTokensProvider</code> will then expose them through <code>OUDSTheme</code>.</p></a></li><li><a href="colorsemantictokens/index.html"><code>protocol ColorSemanticTokens</code><p>This is a group of semantic tokens for <b>colors</b>. It defines all <a href="colorsemantictoken/index.html"><code>ColorSemanticToken</code></a>  a theme must have. These tokens are then gathered inside <a href="multiplecolorsemantictoken/index.html"><code>MultipleColorSemanticToken</code></a> objects defined in <a href="colormultiplesemantictokens/index.html"><code>ColorMultipleSemanticTokens</code></a>. If it possible a theme won’t have such semantic tokens of colors defined as not specified nor used in Figma. Thus the value for these tokens will be “ouds-forbidden-color-value” as returned by the tokenator. Thus if the token is still used, even if explained in the documentation it should not, this special value won’t be successfully parsed as color and the app will crash like expected.</p></a></li><li><a href="colormodesemantictokens/index.html"><code>protocol ColorModeSemanticTokens</code><p>This is a group of semantic tokens for <b>colors modes</b>, used for example** for background colors on surface**. It defines all <a href="colormodesemantictoken/index.html"><code>ColorModeSemanticToken</code></a>  a theme must have for surfaced colors. These tokens are then gathered inside <a href="multiplecolormodesemantictoken/index.html"><code>MultipleColorModeSemanticToken</code></a> defined in <a href="colormodemultiplesemantictokens/index.html"><code>ColorModeMultipleSemanticTokens</code></a>.</p></a></li><li><a href="colormultiplesemantictokens/index.html"><code>protocol ColorMultipleSemanticTokens</code><p>This is a group of semantic tokens for <b>colors</b> but using <a href="multiplecolorsemantictoken/index.html"><code>MultipleColorSemanticToken</code></a>.</p></a></li><li><a href="colormodemultiplesemantictokens/index.html"><code>protocol ColorModeMultipleSemanticTokens</code><p>This is a group of semantic tokens for <b>colors modes</b> but using <a href="multiplecolormodesemantictoken/index.html"><code>MultipleColorModeSemanticToken</code></a>.</p></a></li><li><a href="colorchartsemantictokens/index.html"><code>protocol ColorChartSemanticTokens</code><p>This is a group of semantic tokens for <b>color charts</b>.</p></a></li><li><a href="colorchartmultiplesemantictokens/index.html"><code>protocol ColorChartMultipleSemanticTokens</code><p>This is a group of semantic tokens for <b>colors charts</b>. It defines all <a href="colorsemantictoken/index.html"><code>ColorSemanticToken</code></a>  a theme must have for charts. These tokens are then gathered inside <a href="multiplecolorsemantictoken/index.html"><code>MultipleColorSemanticToken</code></a> objects defined in <a href="colormultiplesemantictokens/index.html"><code>ColorMultipleSemanticTokens</code></a>.</p></a></li><li><a href="colordecorativesemantictokens/index.html"><code>protocol ColorDecorativeSemanticTokens</code><p>This is a group of semantic tokens for <b>color decorative</b>.</p></a></li><li><a href="effectsemantictokens/index.html"><code>protocol EffectSemanticTokens</code><p>This is a group of semantic tokens for <b>effects</b>. It defines all <a href="effectsemantictoken/index.html"><code>EffectSemanticToken</code></a> a theme must have. Any effect semantic token must be declared there.</p></a></li><li><a href="elevationsemantictokens/index.html"><code>protocol ElevationSemanticTokens</code><p>This is a group of semantic tokens for <b>elevations</b>. It defines all elevation semantic tokens a theme must have (<a href="elevationxsemantictoken/index.html"><code>ElevationXSemanticToken</code></a>, <a href="elevationysemantictoken/index.html"><code>ElevationYSemanticToken</code></a>, <a href="elevationblursemantictoken/index.html"><code>ElevationBlurSemanticToken</code></a> and <a href="elevationcolorsemantictoken/index.html"><code>ElevationColorSemanticToken</code></a>). However the composite tokens (here for box shadows) are defined in <a href="elevationcompositesemantictokens/index.html"><code>ElevationCompositeSemanticTokens</code></a> because the <i>tokenator</i> is not able to generate them yet, and they must be defined elsewhere to not be deleted. Any elevation semantic token must be declared there (except <a href="elevationcompositesemantictokens/index.html"><code>ElevationCompositeSemanticTokens</code></a>)</p></a></li><li><a href="elevationmultiplesemantictokens/index.html"><code>protocol ElevationMultipleSemanticTokens</code><p>This is a group of semantic tokens for <b>elevations</b> but multiple so as to pack light and dark variants It wraps elevation colors as tokens.</p></a></li><li><a href="elevationcompositesemantictokens/index.html"><code>protocol ElevationCompositeSemanticTokens</code><p>This is a group of semantic tokens for <b>elevations</b>, but only <b>composite tokens</b>. There are splitted and not declared in <a href="elevationsemantictokens/index.html"><code>ElevationSemanticTokens</code></a> as the <i>tokenator</i> tool parsing <i>Figma</i> JSON to Swift code is not able to manage them. Thus we need to declare them in another file to prevent them to be erased. It declares in fact box shadows effects.</p></a></li><li><a href="gridsemantictokens/index.html"><code>protocol GridSemanticTokens</code><p>This is a group of semantic tokens for <b>grids</b>. It defines all <code>GridSemanticToken</code> a theme must have. Any grid semantic token must be declared there.</p></a></li><li><a href="opacitysemantictokens/index.html"><code>protocol OpacitySemanticTokens</code><p>This is a group of semantic tokens for <b>opacity.</b> It defines all <a href="opacitysemantictoken/index.html"><code>OpacitySemanticToken</code></a> a theme must have. Any opacity semantic token must be declared there as providers like <code>OrangeThemeOpacitySemanticTokensProvider</code> will then expose them through <code>OUDSTheme</code>.</p></a></li><li><a href="sizesemantictokens/index.html"><code>protocol SizeSemanticTokens</code><p>This is a group of semantic tokens for <b>sizing</b>. It defines all <a href="sizesemantictoken/index.html"><code>SizeSemanticToken</code></a> a theme must have. Any size semantic token must be declared there.</p></a></li><li><a href="sizemultiplesemantictokens/index.html"><code>protocol SizeMultipleSemanticTokens</code><p>This is a group of semantic tokens for <b>size</b> but using <a href="multiplesizesemantictoken/index.html"><code>MultipleSizeSemanticToken</code></a></p></a></li><li><a href="spacesemantictokens/index.html"><code>protocol SpaceSemanticTokens</code><p>This is a group of semantic tokens for <b>spacing</b>. It defines all <a href="spacesemantictoken/index.html"><code>SpaceSemanticToken</code></a> a theme must have. Any space semantic token must be declared there.</p></a></li><li><a href="spacemultiplesemantictokens/index.html"><code>protocol SpaceMultipleSemanticTokens</code><p>This is a group of semantic tokens for <b>spacings</b> but using <a href="multiplespacesemantictoken/index.html"><code>MultipleSpaceSemanticToken</code></a>.</p></a></li><li><a href="fontsemantictokens/index.html"><code>protocol FontSemanticTokens</code><p>This is a group of semantic tokens for <b>font</b>. It defines all font semantic tokens a theme must have (<a href="fontfamilysemantictoken/index.html"><code>FontFamilySemanticToken</code></a>, <a href="fontweightsemantictoken/index.html"><code>FontWeightSemanticToken</code></a>, <a href="fontsizesemantictoken/index.html"><code>FontSizeSemanticToken</code></a>, <a href="fontlineheightsemantictoken/index.html"><code>FontLineHeightSemanticToken</code></a>). However the composite tokens (here the ones gathering each type of semantic token here) are defined in <a href="fontcompositesemantictokens/index.html"><code>FontCompositeSemanticTokens</code></a> because the <i>tokenator</i> is not able to generate them yet, and they must be defined elsewhere to not be deleted. Any font semantic token must be declared there (except <a href="fontcompositesemantictokens/index.html"><code>FontCompositeSemanticTokens</code></a>).</p></a></li><li><a href="fontcompositesemantictokens/index.html"><code>protocol FontCompositeSemanticTokens</code><p>This is a group of semantic tokens for <b>fonts</b>, but only <b>composite tokens</b> in the end. There are splitted and not declared in <a href="fontsemantictokens/index.html"><code>FontSemanticTokens</code></a> as the <i>tokenator</i> tool parsing <i>Figma</i> JSON to Swift code is not able to manage them. Thus we need to declare them in another file to prevent them to be erased.</p></a></li><li><a href="fontmultiplesemantictokens/index.html"><code>protocol FontMultipleSemanticTokens</code><p>This is a group of semantic tokens for <b>fonts</b> but using <a href="multiplefontletterspacingsemantictoken/index.html"><code>MultipleFontLetterSpacingSemanticToken</code></a> for <i>letter spacings</i>, <a href="multiplefontlineheightsemantictoken/index.html"><code>MultipleFontLineHeightSemanticToken</code></a> for <i>line heights</i> and <a href="multiplefontsizesemantictoken/index.html"><code>MultipleFontSizeSemanticToken</code></a> for <i>font sizes</i>.</p></a></li></ul><h3>Classes</h3><ul><li><a href="multiplecolormodesemantictoken/index.html"><code>class MultipleColorModeSemanticToken</code><p>Kind of semantic tokens which will wrap a combination of <a href="colormodesemantictoken/index.html"><code>ColorModeSemanticToken</code></a> depending to <i>color scheme</i> (i.e. light mode or dark mode). Kind of composite token with multiple values, but not named “composite” because this word is already used in the design system.</p></a></li><li><a href="multiplecolorsemantictoken/index.html"><code>class MultipleColorSemanticToken</code><p>Kind of semantic tokens which will wrap a combination of <a href="colorsemantictoken/index.html"><code>ColorSemanticToken</code></a> depending to <i>color scheme</i> (i.e. ligh mode or dark mode). Kind of composite token with multiple values, but not named “composite” because this word is already used in the design system. Allows to gather the multiple-value tokens from <i>Figma</i> inside one object. If a color token exists with its value depending to the color scheme, it must be packed in such ``MultipleColorSemanticToken`</p></a></li><li><a href="multipleelevationcompositerawtoken/index.html"><code>class MultipleElevationCompositeRawToken</code><p>Semantic tokens which will wrap a combination of <code>ElevationCompositeRawToken</code> depending to color scheme (i.e. light mode or dark mode) Kind of composite token with multiple values, but not named “composite” because this word is already used in the design system. Allows to gather the multiple-value tokens from <i>Figma</i> inside one object. If an elevation token exists with its value depending to the color scheme, it must be packed in such ``MultipleElevationCompositeRawToken`</p></a></li><li><a href="multiplefontcompositesemantictoken/index.html"><code>class MultipleFontCompositeSemanticToken</code><p>Kind of semantic tokens which will wrap a combination of <code>FontCompositeSemanticToken</code> depending to size classes. Kind of composite token with multiple values, but not named “composite” because this word is already used in the design system. Allows to gather the multiple-value tokens from <i>Figma</i> inside one object. If a font token exists with its value depending to the size class, it must be packed in such <a href="multiplefontcompositesemantictoken/index.html"><code>MultipleFontCompositeSemanticToken</code></a>.</p></a></li><li><a href="multiplefontletterspacingsemantictoken/index.html"><code>class MultipleFontLetterSpacingSemanticToken</code><p>Kind of semantic tokens which will wrap a combination of <a href="multiplefontletterspacingsemantictoken/index.html"><code>MultipleFontLetterSpacingSemanticToken</code></a> depending to size classes. Allows to gather the multiple-value tokens from <i>Figma</i> inside one object. If a font letter spacing token exists with its value depending to the size class (i.e. comapct or regular mode), it must be packed in such <a href="multiplefontletterspacingsemantictoken/index.html"><code>MultipleFontLetterSpacingSemanticToken</code></a></p></a></li><li><a href="multiplefontlineheightsemantictoken/index.html"><code>class MultipleFontLineHeightSemanticToken</code><p>Kind of semantic tokens which will wrap a combination of <a href="fontlineheightsemantictoken/index.html"><code>FontLineHeightSemanticToken</code></a> depending to size classes. Allows to gather the multiple-value tokens from <i>Figma</i> inside one object. If a font line height token exists with its value depending to the size class, it must be packed in such ``MultipleFontLineHeightSemanticToken`</p></a></li><li><a href="multiplefontsizesemantictoken/index.html"><code>class MultipleFontSizeSemanticToken</code><p>Kind of semantic tokens which will wrap a combination of <a href="fontsizesemantictoken/index.html"><code>FontSizeSemanticToken</code></a> depending to size classes. Allows to gather the multiple-value tokens from Figma inside one object. If a font size exists with its value depending to the size class, it must be packed in such <a href="multiplefontsizesemantictoken/index.html"><code>MultipleFontSizeSemanticToken</code></a>.</p></a></li><li><a href="multiplesizesemantictoken/index.html"><code>class MultipleSizeSemanticToken</code><p>Kind of semantic tokens which will wrap a combination of <a href="sizesemantictoken/index.html"><code>SizeSemanticToken</code></a> depending to viewports / size classes. Kind of composite token with multiple values, but not named “composite” because this word is already used in the design system. Allows to gather the multiple-value tokens from Figma inside one object. If a size token exists with its value depending to the size class, it must be packed in such <a href="multiplesizesemantictoken/index.html"><code>MultipleSizeSemanticToken</code></a>.</p></a></li><li><a href="multiplespacesemantictoken/index.html"><code>class MultipleSpaceSemanticToken</code><p>Kind of semantic tokens which will wrap a combination of <code>DimensionRawToken</code> depending to size classes. Kind of composite token with multiple values, but not named “composite” because this word is already used in the design system. Allows to gather the multiple-value tokens from Figma inside one object. If a space token exists with its value depending to the size class, it must be packed in such <a href="multiplespacesemantictoken/index.html"><code>MultipleSpaceSemanticToken</code></a>.</p></a></li></ul><h3>Protocols</h3><ul><li><a href="dimensionsemantictokens/index.html"><code>protocol DimensionSemanticTokens</code><p>This is a group of semantic tokens for <b>dimensions</b>. It defines all <a href="dimensionsemantictoken/index.html"><code>DimensionSemanticToken</code></a> a theme must have. Any dimension semantic token must be declared there.</p></a></li></ul><h3>Structures</h3><ul><li><a href="fontcompositesemantictoken/index.html"><code>struct FontCompositeSemanticToken</code><p>In the <i>Figma</i> global design system, composite tokens are defined for font-related things. Composite tokens are tokens defined in <i>Figma</i> by other tokens. Here a <i>font</i> thing is caracterized by a <i>font size</i>, a <i>line height</i>, a <i>font weight</i> and <i>letter spacing</i> values. All these elements are <i>raw tokens</i>, and together define a <i>composite raw token</i> for <i>font</i> thing.</p></a></li></ul><h3>Type Aliases</h3><ul><li><a href="borderradiussemantictoken/index.html"><code>typealias BorderRadiusSemanticToken</code><p>Type alias precising <code>BorderRadiusRawToken</code> is used as a value of this <b>border raw semantic token</b>, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="borderstylesemantictoken/index.html"><code>typealias BorderStyleSemanticToken</code><p>Type alias precising <code>BorderStyleRawToken</code> is used as a value of this <b>border style semantic token</b>, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="borderwidthsemantictoken/index.html"><code>typealias BorderWidthSemanticToken</code><p>Type alias precising <code>BorderWidthRawToken</code> is used as a value of this <b>border width semantic token</b>, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="colormodesemantictoken/index.html"><code>typealias ColorModeSemanticToken</code><p>Basically a color mode semantic token is a <code>ColorModeRawToken</code></p></a></li><li><a href="colorsemantictoken/index.html"><code>typealias ColorSemanticToken</code><p>Basically a color semantic  token is a <code>ColorRawToken</code>, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="dimensionsemantictoken/index.html"><code>typealias DimensionSemanticToken</code><p>Basically a semantic token for dimensions is a raw token for dimensions, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="effectsemantictoken/index.html"><code>typealias EffectSemanticToken</code><p>Basically a semantic token for effect is a raw token for effect, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="elevationblursemantictoken/index.html"><code>typealias ElevationBlurSemanticToken</code><p>Basically an elevation semantic token for blur effect is a raw token for elevation, with the same final type, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="elevationcolorsemantictoken/index.html"><code>typealias ElevationColorSemanticToken</code><p>Basically an elevation color semantic token, used mainly for shadow colors, is a color semantic token.</p></a></li><li><a href="elevationcompositesemantictoken/index.html"><code>typealias ElevationCompositeSemanticToken</code><p>Basically an elevationcomposite  semantic token, used mainly for box shadow, is a pair of elevation composite raw tokens used depending to the color scheme. A <a href="multipleelevationcompositerawtoken/index.html"><code>MultipleElevationCompositeRawToken</code></a> contains <code>ElevationCompositeRawToken</code> objects for light and dark modes, which contains <code>ElevationRawToken</code> and <code>ColorRawToken</code> values.</p></a></li><li><a href="elevationmultiplecolorsemantictoken/index.html"><code>typealias ElevationMultipleColorSemanticToken</code><p>Basically a multiple elevation color semantic token, used mainly for shadow colors, is a multiple color semantic token.</p></a></li><li><a href="elevationxsemantictoken/index.html"><code>typealias ElevationXSemanticToken</code><p>Basically an elevation semantic token for X offset is a raw token for elevation, with the same final type, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="elevationysemantictoken/index.html"><code>typealias ElevationYSemanticToken</code><p>Basically an elevation semantic token for Y Index is a raw token for elevation, with the same final type, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="fontfamilysemantictoken/index.html"><code>typealias FontFamilySemanticToken</code><p>The global design system tools uses verbs of semantic token for font family, which is basically a raw token for font family</p></a></li><li><a href="fontletterspacingsemantictoken/index.html"><code>typealias FontLetterSpacingSemanticToken</code><p>The global design system tools uses verbs of semantic token for font letter spacing, which is basically a raw token for font letter spacing</p></a></li><li><a href="fontlineheightsemantictoken/index.html"><code>typealias FontLineHeightSemanticToken</code><p>The global design system tools uses verbs of semantic token for font line height, which is basically a raw token for font line height</p></a></li><li><a href="fontsizesemantictoken/index.html"><code>typealias FontSizeSemanticToken</code><p>The global design system tools uses verbs of semantic token for font size, which is basically a raw token for font size</p></a></li><li><a href="fontweightsemantictoken/index.html"><code>typealias FontWeightSemanticToken</code><p>The global design system tools uses verbs of semantic token for font weight, which is basically a raw token for font weight</p></a></li><li><a href="gridsemantictoken/index.html"><code>typealias GridSemanticToken</code><p>Basically a grid semantic token, for iOS Extra Compact, Compact or Regular values, is a <code>GridRawToken</code>. This word is used to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="opacitysemantictoken/index.html"><code>typealias OpacitySemanticToken</code><p>Basically an opacity semantic token is an opacity raw token, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="sizesemantictoken/index.html"><code>typealias SizeSemanticToken</code><p>Basically a size semantic token, used for width and height values, is a _ raw token, it has the same final type, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="spacesemantictoken/index.html"><code>typealias SpaceSemanticToken</code><p>Basically a space semantic token is a _ raw token, it has the same final type, to keep grammar clean and clear with design system grammar.</p></a></li></ul><h3>Extended Modules</h3><ul><li><a href="oudsfoundations/index.html"><code></code></a></li><li><a href="swift/index.html"><code></code></a></li></ul></article></noscript><div id="app"></div></body></html>
