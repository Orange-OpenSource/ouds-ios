<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>MultipleColorModeSemanticToken</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Kind of semantic tokens which will wrap a combination of ``doc://OUDSTokensSemantic/documentation/OUDSTokensSemantic/ColorModeSemanticToken`` depending to color scheme (i.e. light mode or dark mode). Kind of composite token with multiple values, but not named “composite” because this word is already used in the design system." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Tokens for semantics</a></li><li>MultipleColorModeSemanticToken</li></ul><p>Class</p><h1>MultipleColorModeSemanticToken</h1><p>Kind of semantic tokens which will wrap a combination of <a href="../colormodesemantictoken/index.html"><code>ColorModeSemanticToken</code></a> depending to <i>color scheme</i> (i.e. light mode or dark mode). Kind of composite token with multiple values, but not named “composite” because this word is already used in the design system.</p><pre><code>final class MultipleColorModeSemanticToken</code></pre></section><h2>Overview</h2><pre class="swift"><code>        // There are some components which must be used in colored surface providing a specific background color.
        // There are several cases depending to the color scheme and the monochrome mode:
        // - Non monochome for components, light and dark modes to apply on texts
        // - Monochrome on components, light and dark modes to apply on texts
        // - Monochrome on components, light and dark modes reversed
        // It can result with several combinations:

        // Use the "monochrome light" mode anytime
        var onBrandPrimaryLight: ColorModeSemanticToken { ColorModeRawTokens.monochromeLight }
        var onBrandPrimaryDark: ColorModeSemanticToken { ColorModeRawTokens.monochromeLight }
        var onBrandPrimary: MultipleColorModeSemanticToken {
            MultipleColorModeSemanticToken("some unique name", onBrandPrimary)
        }

        // Use light mode in light soclor scheme, dark mode in dark color scheme
        var onStatusNegativeMutedLight: BackgroundSurfaceColorSemanticToken { ColorModeRawTokens.light }
        var onStatusNegativeMutedDark: BackgroundSurfaceColorSemanticToken { ColorModeRawTokens.dark }
        var onStatusNegativeMuted: MultipleColorModeSemanticToken {
            MultipleColorModeSemanticToken("some unique name",
                                            light: onStatusNegativeMutedLight,
                                            dark: onStatusNegativeMutedDark)
        }

        // Use if light color scheme the monochrome dark mode, and if dark color scheme the monochrome light mode
        var onStatusNeutralEmphasizedLight: ColorModeSemanticToken { ColorModeRawTokens.monochromeDark }
        var onStatusNeutralEmphasizedDark: ColorModeSemanticToken { ColorModeRawTokens.monochromeLight }
        var onStatusNeutralEmphasized: MultipleColorModeSemanticToken {
            MultipleColorModeSemanticToken("some unique name",
                                            light: onStatusNeutralEmphasizedLight,
                                            dark: onStatusNeutralEmphasizedDark)
        }
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.13.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(_:_:)/index.html"><code>init(String, ColorModeSemanticToken)</code><p>Initializes a new color mode color multiple semantic token with the same value for light and dark modes</p></a></li><li><a href="init(_:light:dark:)/index.html"><code>init(String, light: ColorModeSemanticToken, dark: ColorModeSemanticToken)</code><p>Initializes a new color mode multiple semantic token with two values</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="dark/index.html"><code>let dark: ColorModeSemanticToken</code><p>For <b>dark</b> mode scheme</p></a></li><li><a href="light/index.html"><code>let light: ColorModeSemanticToken</code><p>For <b>light</b> mode scheme</p></a></li><li><a href="name/index.html"><code>let name: String</code><p>Because such tokens can have the same light and dark values, a name can be used to identity them</p></a></li></ul><h3>Instance Methods</h3><ul><li><a href="hasundefinedvalue()/index.html"><code>func hasUndefinedValue() -&gt; Bool</code><p>Because some color semantic tokens can be forbidden values, making some color mode semantic tokens undefined, this helpers returns a flag saying if its the case or not</p></a></li><li><a href="isequal(_:)/index.html"><code>func isEqual(Any?) -&gt; Bool</code><p>Returns <code>true</code> if <code>self</code> and <code>object</code> has the same <code>name</code> and with <code>object</code> as a <code>MultipleColorModeSemanticToken</code>. Otherwise returns <code>false</code>. <code>isEqual</code> override is preferred for <code>NSObject</code>.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
