        // two semantic font line height spacing tokens will be defined in Figma and generated by tokenator because
        // its value can vary if compact or regular modes.
        // They can be declared in protocol FontSemanticTokens,
        // and defined automaticaly in OUDSTheme+FontSemanticTokens extension
        var lineHeightLabelXLargeMobile: FontLineHeightSemanticToken { FontRawTokens.lineHeight450 }
        var lineHeightLabelXLargeTablet: FontLineHeightSemanticToken { FontRawTokens.lineHeight450 }

        // Then the develoment team declares an "higher" level line height semantic token for lineHeightLabelXLarge
        // inside FontMultipleSemanticTokens protocol,
        // and defined inside OUDSTheme+FontMultipleSemanticTokens extension
        var lineHeightLabelXLarge: MultipleFontLineHeightSemanticToken {
            MultipleFontLineHeightSemanticToken(compact: lineHeightLabelXLargeMobile, regular: lineHeightLabelXLargeTablet)
        }

        // If the same value is used whatever the size class is
        var lineHeightLabelXLarge: MultipleFontLineHeightSemanticToken { MultipleFontLineHeightSemanticToken(lineHeightLabelXLargeMobile) }

        // The theme exposes both generated font line height semantic tokens and "crafted" higher level color semantic tokens.
        // It is recommended to use the higher level version as it is less error-prone.
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Operators</h3><ul><li><a href="_(_:_:)/index.html"><code>static func &lt; (MultipleFontLineHeightSemanticToken, MultipleFontLineHeightSemanticToken) -&gt; Bool</code><p>Operator which will return <code>true</code> if <code>lhs</code> is smaller than <code>rhs</code>. By “smaller” we mean smaller <code>FontLineHeightSemanticToken</code></p></a></li></ul><h3>Initializers</h3><ul><li><a href="init(_:)/index.html"><code>init(FontLineHeightSemanticToken)</code><p>Initializes a new multiple font token with the same value for both <i>compact</i> and <i>regular</i> size classes</p></a></li><li><a href="init(compact:regular:)/index.html"><code>init(compact: FontLineHeightSemanticToken, regular: FontLineHeightSemanticToken)</code><p>Initializes a new multiple font token.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="compact/index.html"><code>let compact: FontLineHeightSemanticToken</code><p>For <b>extra-compact</b> and <b>compact</b> viewports</p></a></li><li><a href="regular/index.html"><code>let regular: FontLineHeightSemanticToken</code><p>For <b>regular</b> and <b>medium</b> viewports</p></a></li></ul><h3>Instance Methods</h3><ul><li><a href="isequal(_:)/index.html"><code>func isEqual(Any?) -&gt; Bool</code><p>Returns <code>true</code> if <code>self</code> and <code>object</code> has the same <code>compact</code> and <code>regular</code> values and with <code>object</code> as a <code>MultipleFontTokens</code>. Otherwise returns <code>false</code>. <code>isEqual</code> override is preferred for <code>NSObject</code>.</p></a></li><li><a href="lineheight(for:)/index.html"><code>func lineHeight(for: UserInterfaceSizeClass) -&gt; FontLineHeightSemanticToken</code><p>Returns the right line height semantic token according to the <code>userInterfaceSizeClass</code>.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
