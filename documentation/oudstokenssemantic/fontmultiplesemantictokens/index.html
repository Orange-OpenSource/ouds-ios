<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>FontMultipleSemanticTokens</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="This is a group of semantic tokens for fonts but using ``doc://OUDSTokensSemantic/documentation/OUDSTokensSemantic/MultipleFontLetterSpacingSemanticToken`` for letter spacings, ``doc://OUDSTokensSemantic/documentation/OUDSTokensSemantic/MultipleFontLineHeightSemanticToken`` for line heights and ``doc://OUDSTokensSemantic/documentation/OUDSTokensSemantic/MultipleFontSizeSemanticToken`` for font sizes." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Tokens for semantics</a></li><li>FontMultipleSemanticTokens</li></ul><p>Protocol</p><h1>FontMultipleSemanticTokens</h1><p>This is a group of semantic tokens for <b>fonts</b> but using <a href="../multiplefontletterspacingsemantictoken/index.html"><code>MultipleFontLetterSpacingSemanticToken</code></a> for <i>letter spacings</i>, <a href="../multiplefontlineheightsemantictoken/index.html"><code>MultipleFontLineHeightSemanticToken</code></a> for <i>line heights</i> and <a href="../multiplefontsizesemantictoken/index.html"><code>MultipleFontSizeSemanticToken</code></a> for <i>font sizes</i>.</p><pre><code>protocol FontMultipleSemanticTokens</code></pre></section><h2>Overview</h2><p>In fact these <a href="../multiplefontletterspacingsemantictoken/index.html"><code>MultipleFontLetterSpacingSemanticToken</code></a>, <a href="../multiplefontlineheightsemantictoken/index.html"><code>MultipleFontLineHeightSemanticToken</code></a> and  <a href="../multiplefontsizesemantictoken/index.html"><code>MultipleFontSizeSemanticToken</code></a> classes will help users (i.e. developers) to handle one semantic token for font things depending to size class (whether it could be compact / mobile or regular / tablet). Because <i>Figma</i> is not able to manage pair of values for one token, and its produced JSON does not reflect this mecanism, the <i>tokenator</i> cannot provide such <a href="../multiplefontletterspacingsemantictoken/index.html"><code>MultipleFontLetterSpacingSemanticToken</code></a>, <a href="../multiplefontlineheightsemantictoken/index.html"><code>MultipleFontLineHeightSemanticToken</code></a> and <a href="../multiplefontsizesemantictoken/index.html"><code>MultipleFontSizeSemanticToken</code></a> tokens. Thus the “real” letter spacing, line height and font size tokens are declared in <a href="../fontsemantictokens/index.html"><code>FontSemanticTokens</code></a> protocol and defined inside <code>OUDSTheme</code> (to be overridable then by subthemes). These tokens are updated by the <i>tokenator</i>. Then they are gathered and wrapped so as to be used easily thanks to this <a href="."><code>FontMultipleSemanticTokens</code></a> which must be updated manually.</p><p>However the composite tokens (here the ones gathering each type of semantic token here) are defined in <a href="../fontcompositesemantictokens/index.html"><code>FontCompositeSemanticTokens</code></a> because the <i>tokenator</i> is not able to generate them yet, and they must be defined elsewhere to not be deleted.</p><p>In few words:</p><pre class="swift"><code>        // Some font size raw tokens, defined by the tokenator (in FontRawTokens+Values.swift)
        public static let size850: FontSizeRawToken = 40
        public static let size1450: FontSizeRawToken = 64

        // The font size semantic tokens using them
        // declared (in FontMultipleSemanticTokens.swift) and defined (in OUDSTheme+FontSemanticTokens.swift) by the tokenator
        var sizeDisplayLargeMobile: FontSizeSemanticToken { FontRawTokens.size850 }
        var sizeDisplayLargeTablet: FontSizeSemanticToken { FontRawTokens.size1450 }

        // The 'higher level' font semantic tokens wrapping them and exposed to users
        // declared (in this FontMultipleSemanticTokens.swift) and defined manualy (in OUDSTheme+FontMultipleSemanticTokens.swift)
        var sizeDisplayLarge: MultipleFontSizeSemanticToken { MultipleFontSizeSemanticToken(compact: sizeDisplayLargeMobile, regular: sizeDisplayLargeTablet) }

        // Thus users can in their components use colorNone as defined in their design system
        // (even if they are still able to use 'lower level' semantic tokens but it is more error-prone)
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Instance Properties</h3><ul><li><a href="letterspacingbodylarge/index.html"><code>var letterSpacingBodyLarge: MultipleFontLetterSpacingSemanticToken</code></a></li><li><a href="letterspacingbodymedium/index.html"><code>var letterSpacingBodyMedium: MultipleFontLetterSpacingSemanticToken</code></a></li><li><a href="letterspacingbodysmall/index.html"><code>var letterSpacingBodySmall: MultipleFontLetterSpacingSemanticToken</code></a></li><li><a href="letterspacingdisplaylarge/index.html"><code>var letterSpacingDisplayLarge: MultipleFontLetterSpacingSemanticToken</code></a></li><li><a href="letterspacingdisplaymedium/index.html"><code>var letterSpacingDisplayMedium: MultipleFontLetterSpacingSemanticToken</code></a></li><li><a href="letterspacingdisplaysmall/index.html"><code>var letterSpacingDisplaySmall: MultipleFontLetterSpacingSemanticToken</code></a></li><li><a href="letterspacingheadinglarge/index.html"><code>var letterSpacingHeadingLarge: MultipleFontLetterSpacingSemanticToken</code></a></li><li><a href="letterspacingheadingmedium/index.html"><code>var letterSpacingHeadingMedium: MultipleFontLetterSpacingSemanticToken</code></a></li><li><a href="letterspacingheadingsmall/index.html"><code>var letterSpacingHeadingSmall: MultipleFontLetterSpacingSemanticToken</code></a></li><li><a href="letterspacingheadingxlarge/index.html"><code>var letterSpacingHeadingXlarge: MultipleFontLetterSpacingSemanticToken</code></a></li><li><a href="lineheightbodylarge/index.html"><code>var lineHeightBodyLarge: MultipleFontLineHeightSemanticToken</code></a></li><li><a href="lineheightbodymedium/index.html"><code>var lineHeightBodyMedium: MultipleFontLineHeightSemanticToken</code></a></li><li><a href="lineheightbodysmall/index.html"><code>var lineHeightBodySmall: MultipleFontLineHeightSemanticToken</code></a></li><li><a href="lineheightdisplaylarge/index.html"><code>var lineHe
