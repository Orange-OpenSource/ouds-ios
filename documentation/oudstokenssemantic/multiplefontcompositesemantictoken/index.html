 a font semantic token displayLarge,

        let bold850 = FontCompositeSemanticToken(size: size850, lineHeight: lineHeight1050, weight: weight700, letterSpacing: letterSpacing850)
        let bold1450 = FontCompositeSemanticToken(size: size1450, lineHeight: lineHeight1850, weight: weight700, letterSpacing: letterSpacing1450)

        // Then the develoment team declares an "higher" level font semantic token
        // inside FontCompositeSemanticTokens protocol,
        // and defined inside OrangeTheme+FontCompositeSemanticTokens extension
        var displayLarge: MultipleFontCompositeSemanticToken {
            MultipleFontCompositeSemanticToken(compact: bold850, regular: bold1450)
        }

        // If the same font is used whatever the size class is
        var displayLarge: MultipleFontCompositeSemanticToken { MultipleFontCompositeSemanticToken(bold650) }

</code></pre><p>The case of this <a href="."><code>MultipleFontCompositeSemanticToken</code></a> is quite particular because in fact it contains <code>FontCompositeSemanticToken</code> (i.e. raw tokens) instead of semantic tokens. In fact there is not “font composite semantic tokens” defined in the <i>Figma</i> kit.</p><blockquote class="aside since"><p class="label">Since</p><p>0.22.0</p></blockquote><h2>Topics</h2><h3>Operators</h3><ul><li><a href="_(_:_:)/index.html"><code>static func &lt; (MultipleFontCompositeSemanticToken, MultipleFontCompositeSemanticToken) -&gt; Bool</code><p>Operator which will return <code>true</code> if <code>lhs</code> is smaller than <code>rhs</code>. By “smaller” we mean smaller <code>FontCompositeSemanticToken</code></p></a></li></ul><h3>Initializers</h3><ul><li><a href="init(_:)/index.html"><code>init(FontCompositeSemanticToken)</code><p>Initializes a new font composite semantic token.</p></a></li><li><a href="init(compact:regular:)/index.html"><code>init(compact: FontCompositeSemanticToken, regular: FontCompositeSemanticToken)</code><p>Initializes a new font composite semantic token.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="compact/index.html"><code>let compact: FontCompositeSemanticToken</code><p>For <b>extra-compact</b> and <b>compact</b> viewports</p></a></li><li><a href="regular/index.html"><code>let regular: FontCompositeSemanticToken</code><p>For <b>regular</b> and <b>medium</b> viewports</p></a></li></ul><h3>Instance Methods</h3><ul><li><a href="fonttoken(for:)/index.html"><code>func fontToken(for: UserInterfaceSizeClass) -&gt; FontCompositeSemanticToken</code><p>Returns the composite raw token of font to use according to the <code>userInterfaceSizeClass</code> (i.e. <code>compact</code> or <code>regular</code>)</p></a></li><li><a href="isequal(_:)/index.html"><code>func isEqual(Any?) -&gt; Bool</code><p>Returns <code>true</code> if <code>self</code> and <code>object</code> has the same <code>compact</code> and <code>regular</code> values and with <code>object</code> as a <code>MultipleFontCompositeSemanticToken</code>. Otherwise returns <code>false</code>. <code>isEqual</code> override is preferred for <code>NSObject</code>.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
