<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>SpaceMultipleSemanticTokens</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="This is a group of semantic tokens for spacings but using ``doc://OUDSTokensSemantic/documentation/OUDSTokensSemantic/MultipleSpaceSemanticToken``." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Tokens for semantics</a></li><li>SpaceMultipleSemanticTokens</li></ul><p>Protocol</p><h1>SpaceMultipleSemanticTokens</h1><p>This is a group of semantic tokens for <b>spacings</b> but using <a href="../multiplespacesemantictoken/index.html"><code>MultipleSpaceSemanticToken</code></a>.</p><pre><code>protocol SpaceMultipleSemanticTokens</code></pre></section><h2>Overview</h2><p>In fact the <a href="../multiplespacesemantictoken/index.html"><code>MultipleSpaceSemanticToken</code></a> class will help users (i.e. developers) to handle one semantic token for spacing containing values for compact (mobile) or regular (tablet) size classes. Because <i>Figma</i> is not able to manage pair of values for one token, and its produced JSON does not reflect this mecanism, the <i>tokenator</i> cannot provide such <a href="../multiplespacesemantictoken/index.html"><code>MultipleSpaceSemanticToken</code></a>. Thus the “real” color semantic tokens are declared in <a href="../spacesemantictokens/index.html"><code>SpaceSemanticTokens</code></a> protocol and defined inside <code>OUDSTheme</code> (to be overridable then by subthemes). These tokens are updated by the <i>tokenator</i>. Then they are gathered and wrapped so as to be used easily thanks to this <a href="."><code>SpaceMultipleSemanticTokens</code></a> which must be updated manually.</p><p>Each token declared in this protocol must have its version <i>Mobile</i> and <i>Tablet</i> declared in <a href="../spacesemantictokens/index.html"><code>SpaceSemanticTokens</code></a> protocol in order to define <a href="../multiplespacesemantictoken/index.html"><code>MultipleSpaceSemanticToken</code></a> for each pair of them.</p><p>In few words:</p><pre class="swift"><code>        // Some spacing raw tokens, defined by the tokenator (in DimensionRawTokens+Values.swift)
        public static let _0: DimensionRawToken = 0
        public static let _25: DimensionRawToken = 2

        // The spacing semantic tokens using them,
        // declared (in SpaceSemanticTokens.swift) and defined (in OUDSTheme+SpaceSemanticTokens.swift) by the tokenator
        var scaledNoneMobile: SpaceSemanticToken { DimensionRawTokens._0 }
        var scaledNoneTablet: SpaceSemanticToken { DimensionRawTokens.outOfSystem50 }

        // The 'higher level' spacing semantic tokens wrapping them and exposed to users,
        // declared (in SpaceMultipleSemanticTokens.swift) and defined (in OUDSTheme+SpaceMultipleSemanticTokens.swift) manualy
        var scaledNone: MultipleSpaceSemanticToken { MultipleSpaceSemanticToken(compact: scaledNoneMobile, regular: scaledNoneTablet) }

        // Thus users can in their components use scaledNone as defined in their design system
        // (even if they are still able to use 'lower level' semantic tokens but it is more error-prone)
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Instance Properties</h3><ul><li><a href="scaled2xlarge/index.html"><code>var scaled2xlarge: MultipleSpaceSemanticToken</code></a></li><li><a href="scaled2xsmall/index.html"><code>var scaled2xsmall: MultipleSpaceSemanticToken</code></a></li><li><a href="scaled3xlarge/index.html"><code>var scaled3xlarge: MultipleSpaceSemanticToken</code></a></li><li><a href="scaled3xsmall/index.html"><code>var scaled3xsmall: MultipleSpaceSemanticToken</code></a></li><li><a href="scaledlarge/index.html"><code>var scaledLarge: MultipleSpaceSemanticToken</code></a></li><li><a href="scaledmedium/index.html"><code>var scaledMedium: MultipleSpaceSemanticToken</code></a></li><li><a href="scalednone/index.html"><code>var scaledNone: MultipleSpaceSemanticToken</code></a></li><li><a href="scaledsmall/index.html"><code>var scaledSmall: MultipleSpaceSemanticToken</code></a></li><li><a href="scaledxlarge/index.html"><code>var scaledXlarge: MultipleSpaceSemanticToken</code></a></li><li><a href="scaledxsmall/index.html"><code>var scaledXsmall: MultipleSpaceSemanticToken</code></a></li></ul></article></noscript><div id="app"></div></body></html>
