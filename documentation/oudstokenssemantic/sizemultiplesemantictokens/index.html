<i>tokenator</i>. Then they are gathered and wrapped so as to be used easily thanks to this <a href="../multiplesizesemantictoken/index.html"><code>MultipleSizeSemanticToken</code></a> which must be updated manually.</p><p>Each token declared in this protocol must have its version <i>Mobile</i> and <i>Tablet</i> deczlre in <a href="../sizesemantictokens/index.html"><code>SizeSemanticTokens</code></a> protocol in order to define <a href="../multiplesizesemantictoken/index.html"><code>MultipleSizeSemanticToken</code></a> for each pair of them.</p><p>In few words:</p><pre class="swift"><code>        // Some sizing raw tokens, defined by the tokenator (in DimensionRawTokens+Values.swift)
        public static let _550: DimensionRawToken = 44
        public static let _650: DimensionRawToken = 52

        // The sizing semantic tokens using them,
        // declared (in SizeSemanticTokens.swift) and defined (in OUDSTheme+SizeSemanticTokens.swift) by the tokenator
        var iconWithHeadingXlargeSizeSmMobile: SizeSemanticToken { DimensionRawTokens._550 }
        var iconWithHeadingXlargeSizeSmTablet: SizeSemanticToken { DimensionRawTokens._650 }

        // The 'higher level' size semantic tokens wrapping them and exposed to users,
        // declared (in SizeMultipleSemanticTokens.swift) and defined (in OUDSTheme+SizeMultipleSemanticTokens.swift) manualy
        var iconWithHeadingXlargeSizeSmall: MultipleSizeSemanticToken {
            MultipleSizeSemanticToken(compact: iconWithHeadingXlargeSizeSmMobile, regular: iconWithHeadingXlargeSizeSmTablet)
        }

        // Thus users can in their components use iconWithHeadingXlargeSizeSm as defined in their design system
        // (even if they are still able to use 'lower level' semantic tokens but it is more error-prone)
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Instance Properties</h3><ul><li><a href="iconwithbodylargesizelarge/index.html"><code>var iconWithBodyLargeSizeLarge: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithbodylargesizemedium/index.html"><code>var iconWithBodyLargeSizeMedium: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithbodylargesizesmall/index.html"><code>var iconWithBodyLargeSizeSmall: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithbodymediumsizelarge/index.html"><code>var iconWithBodyMediumSizeLarge: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithbodymediumsizemedium/index.html"><code>var iconWithBodyMediumSizeMedium: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithbodymediumsizesmall/index.html"><code>var iconWithBodyMediumSizeSmall: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithbodysmallsizelarge/index.html"><code>var iconWithBodySmallSizeLarge: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithbodysmallsizemedium/index.html"><code>var iconWithBodySmallSizeMedium: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithbodysmallsizesmall/index.html"><code>var iconWithBodySmallSizeSmall: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithheadinglargesizelarge/index.html"><code>var iconWithHeadingLargeSizeLarge: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithheadinglargesizemedium/index.html"><code>var iconWithHeadingLargeSizeMedium: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithheadinglargesizesmall/index.html"><code>var iconWithHeadingLargeSizeSmall: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithheadingmediumsizelarge/index.html"><code>var iconWithHeadingMediumSizeLarge: MultipleSizeSemanticToken</code></a></li><li><a href="iconwithheadingmediumsizemedium/index.html"><code>var iconWithHeadingMediumSizeMedium: MultipleSizeSe
