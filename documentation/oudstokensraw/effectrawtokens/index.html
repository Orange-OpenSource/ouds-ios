<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>EffectRawTokens</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Defined as the group of all raw tokens related to effects. Values are defined in EffectRawTokens+Values.swift file and generated by the tokenator. ``doc://OUDSTokensRaw/documentation/OUDSTokensRaw/EffectRawTokens`` are tokens to use to define effects for some components like navigation bars." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Tokens with raw values</a></li><li>EffectRawTokens</li></ul><p>Enumeration</p><h1>EffectRawTokens</h1><p>Defined as the group of all <b>raw tokens</b> related to <b>effects</b>. Values are defined in <i>EffectRawTokens+Values.swift</i> file and generated by the tokenator. <a href="."><code>EffectRawTokens</code></a> are tokens to use to define <i>effects</i> for some components like navigation bars.</p><pre><code>@frozen enum EffectRawTokens</code></pre></section><h2>Overview</h2><p>Primitive types such as <code>Double</code> must be used to as to allow to use <code>@objc</code> keywords in extensions for overriding. Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p><blockquote class="aside since"><p class="label">Since</p><p>0.22.0</p></blockquote><h2>Topics</h2><h3>Type Properties</h3><ul><li><a href="blur320/ind
