cessible from everywhere). More optimized than dimensionstruct_.</p><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Type Properties</h3><ul><li><a href="base/index.html"><code>static let base: Double</code><p>Has for value 4</p></a></li><li><a href="outofsystem150/index.html"><code>static let outOfSystem150: DimensionRawToken</code><p>Has for value 6</p></a></li><li><a href="outofsystem25/index.html"><code>static let outOfSystem25: DimensionRawToken</code><p>Has for value 1</p></a></li><li><a href="outofsystem250/index.html"><code>static let outOfSystem250: DimensionRawToken</code><p>Has for value 10</p></a></li><li><a href="outofsystem50/index.html"><code>static let outOfSystem50: DimensionRawToken</code><p>Has for value 2</p></a></li><li><a href="outofsystem75/index.html"><code>static let outOfSystem75: DimensionRawToken</code><p>Has for value 3</p></a></li></ul></article></noscript><div id="app"></div></body></html>
