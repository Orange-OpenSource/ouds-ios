<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>ColorModeRawTokens</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Defined as the group of all raw tokens related to colors mode. Values are defined in ColorModeRawTokens+Values.swift file and not generated by the tokenator, as frozen values. ``doc://OUDSTokensRaw/documentation/OUDSTokensRaw/ColorModeRawTokens`` are tokens to use to define color mode of components, i.e. if a component or something must be considered in light or dark color scheme, or in monochrome mode. Primitive types such as  `String` must be used to as to allow to use `@objc` keywords in extensions for overriding. Such tokens are packed in a Swift enum so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Tokens with raw values</a></li><li>ColorModeRawTokens</li></ul><p>Enumeration</p><h1>ColorModeRawTokens</h1><p>Defined as the group of all <b>raw tokens</b> related to <b>colors mode</b>. Values are defined in <i>ColorModeRawTokens+Values.swift</i> file and not generated by the tokenator, as frozen values. <a href="."><code>ColorModeRawTokens</code></a> are tokens to use to define <i>color mode</i> of components, i.e. if a component or something must be considered in light or dark color scheme, or in monochrome mode. Primitive types such as  <code>String</code> must be used to as to allow to use <code>@objc</code> keywords in extensions for overriding. Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p><pre><code>@frozen enum ColorModeRawTokens</code></pre></section><h2>Overview</h2><blockquote class="aside since"><p class="label">Since</p><p>0.13.0</p></blockquote><h2>Topics</h2><h3>Type Properties</h3><ul><li><a href="dark/index.html"><code>static let dark: ColorModeRawToken</code><p>Related to the dark mdoe color scheme</p></a></li><li><a href="light/index.html"><code>static let light: ColorModeRawToken</code><p>Related to the light mode color scheme</p></a></li><li><a href="monochromedark/index.html"><code>static let monochromeDark: ColorModeRawToken</code><p>Related to a dark monochrome mode</p></a></li><li><a href="monochromelight/index.html"><code>static let monochromeLight: ColorModeRawToken</code><p>Related to a light monochrome mode</p></a></li><li><a href="undefined/index.html"><code>static let undefined: ColorModeRawToken</code><p>The component in use does not have a defined color mode</p></a></li></ul><h3>Type Methods</h3><ul><li><a href="colorscheme(for:)/index.html"><code>static func colorScheme(for: ColorModeRawToken) -&gt; ColorScheme?</code><p>Depending to the given value, defines the color scheme to consider</p></a></li><li><a href="ismonochrome(mode:)/index.html"><code>static func isMonochrome(mode: ColorModeRawToken) -&gt; Bool?</code><p>Depending to the given value, defines if the monochrome mode must be considered or not</p></a></li></ul></article></noscript><div id="app"></div></body></html>
