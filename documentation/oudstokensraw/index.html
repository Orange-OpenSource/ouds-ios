<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Tokens with raw values</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Raw tokens are smallest tokens possible. They are associated to raw values and will be finaly the values assigned to the components properties." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li>Tokens with raw values</li></ul><p>Framework</p><h1>Tokens with raw values</h1><p><i>Raw tokens</i> are smallest <i>tokens</i> possible. They are associated to raw values and will be finaly the values assigned to the <i>components</i> properties.</p></section><h2>Overview</h2><pre><code>🧬 Core version: 1.10.0
</code></pre><p>In fact, we choose to use as most as possible primitive types for raw values, like <code>Int</code>, <code>Double</code>, <code>CGFloat</code> or <code>String</code> so as to handle the smallest types with few impacts on the memory for ecodesign principles. Indeed with hundreds of raw tokens, it will be more efficient to store primitive small types than Swift <code>struct</code> or <code>class</code> objects. Keeping primitive types helps today to expose objects using Objective-C runtime.</p><p>So we expose also in higher level some properties so as to convert when needed some of these types to <code>SwiftUI</code> types (like <code>Font.Weight</code> and <code>Color</code>).</p><p>To keep the same semantics as the ones used in our <i>Figma</i> specifications, <i>typealias</i> are used to as to make the links to <i>primitive types</i> and our logic of <i>tokens</i>. These type aliases are here for those who want to make their own theme. The idea is to use the same words and grammar as the one used in the <i>Figma</i> kit and generaly in the global design system. Then users won’t feel lost and will be able to see the same notions the design team handle.</p><p>Using more simple and primitive types will help also to test the library. With also type aliases we force users to use our types and not higher level types like <i>SwiftUI</i> types. Type aliases pointing to raw values will improve also to use of thes values wuthout needing to deal with intermediate types.</p><p>We also choose to add in <i>extension</i> all the tokens values in a separated file so as to help the <i>tokenator</i> to build files to copy and paste easily in the project and keeping all the other objects. In fact, declaring the tokens <i>enums</i> in separated file helps us to document the associated tokens. The tokens are defined in an extension inside dedicated file which can be overriden anytime ; the result is trasnparent for the users.</p><p>Example for <a href="colorrawtokens/index.html"><code>ColorRawTokens</code></a>:</p><pre class="swift"><code>// Define types for color raw tokens
public typealias ColorRawToken = String

/// Possible to write documentation in a separated file
public enum ColorRawTokens { } // Gathers all color raw tokens (in the end, in dedicated file)

/// Place in another file which can be updated anytime
extension ColorRawTokens { // All the values

    public static let functionalWhite: ColorRawToken = "#FFFFF00F"
    public static let functionalScarlet400: ColorRawToken = "#FF4D4E00"
    public static let opacityBlack0: ColorRawToken = "#00000000"
    ...
}

extension String {
    public var color: Color { // Helper for SwiftUI
        Color(hexadecimalCode: self)
    }
}
</code></pre><h2>Architecture</h2><p>There are several <i>composite class</i> defined to match the objects available in <i>Figma</i>. In fact the design system implementations should expose pack of values so as to gather several tokens in one object. All such <i>composites</i> instances are defined in separated files. In fact <i>tokenator</i> cannot generate such tokens as they are not defined in its JSON file to process because <i>Figma</i> is not able to manage <i>composite tokens</i>, even if tinkered by the design team. These tokens are updated manualy by the development team.</p><p>The raw tokens groups are declared in <code>enum</code> objects which will gather the raw tokens in extensions. In fact, raw tokens are defined as <code>static let</code> dimensionstored properties_, an adding them in an <code>enum</code> is more optimized for namespaces reasons. Thus all <code>public enum</code> gathering raw tokens are defined there.</p><p>There are also <i>typealias</i> values used for the raw tokens. Indeed these aliases are here to bring clarity and meanings in the library, and also to help users (i.e. developers) to know what kind of objects they handle with the same vocabulary as the one used in <i>Figma</i>, and in general, in the whole design system. They can be seen as a light level of abstraction with meanings, without having to define real types with <code>struct</code> or <code>class</code>.</p><p>The raw tokens values are defined in extensions of <code>enum</code> in dedicated files for the tokenator. It contains only pure raw tokens Swift values, without any type aliases definitions or objects declarations. Non-composite raw tokens are generated by the <i>tokenator</i> but not the composites. Feel free <a href="https://github.com/Orange-OpenSource/ouds-ios/issues/new?template=token_update.yml">to submit an issue if you spot some bugs</a>.</p><h2>Raw tokens management</h2><h3>How to use raw tokens</h3><p>To use raw tokens you will have to make the suitable import for the <i>OUDS iOS Swift Package</i> product.</p><p>Then choose the tokens you want within the enums below:</p><table><thead><tr><th>Raw tokens enums</th><th>Description</th></tr></thead><tbody><tr><td><a href="borderrawtokens/index.html"><code>BorderRawTokens</code></a></td><td>For borders (width, styles, radius…)</td></tr><tr><td><a href="colorrawtokens/index.html"><code>ColorRawTokens</code></a></td><td>For colors common to all modules (different to <code>OrangeBrandColorRawTokens</code>)</td></tr><tr><td><a href="colormoderawtokens/index.html"><code>ColorModeRawTokens</code></a></td><td>Kind of frozen and not generated tokens about management of colors</td></tr><tr><td><a href="dimensionrawtokens/index.html"><code>DimensionRawTokens</code></a></td><td>For dimensions used in sizes and spaces</td></tr><tr><td><a href="elevationrawtokens/index.html"><code>ElevationRawTokens</code></a></td><td>For elevations to product shadow effects</td></tr><tr><td><a href="effectrawtokens/index.html"><code>EffectRawTokens</code></a></td><td>For effects to apply on some components like navigation bars</td></tr><tr><td><a href="fontrawtokens/index.html"><code>FontRawTokens</code></a></td><td>For fonts (weights, letter spacings, sizes, line heights…)</td></tr><tr><td><a href="gridrawtokens/index.html"><code>GridRawTokens</code></a></td><td>For grids</td></tr><tr><td><a href="opacityrawtokens/index.html"><code>OpacityRawTokens</code></a></td><td>For opacities</td></tr></tbody></table><h2>Topics</h2><h3>Group</h3><ul><li><a href="borderrawtokens/index.html"><code>enum BorderRawTokens</code><p>Defines a group of all <b>raw tokens</b> related to <b>borders</b>. Values are defined in <i>BorderRawTokens+Values.swift</i> file and generated by the tokenator. <a href="borderrawtokens/index.html"><code>BorderRawTokens</code></a> are tokens to use to define <i>borders</i> of components. Several types of <i>raw tokens</i> exist to render a border: radius (<a href="borderradiusrawtoken/index.html"><code>BorderRadiusRawToken</code></a>), style (<a href="borderstylerawtoken/index.html"><code>BorderStyleRawToken</code></a>) and width (<a href="borderwidthrawtoken/index.html"><code>BorderWidthRawToken</code></a>).</p></a></li><li><a href="colorrawtokens/index.html"><code>enum ColorRawTokens</code><p>Defined as the group of all <b>raw tokens</b> related to <b>colors</b>. Values are defined in <i>ColorRawTokens+Values.swift</i> file and generated by the tokenator. <a href="colorrawtokens/index.html"><code>ColorRawTokens</code></a> are tokens to use to define <i>colors</i> of components thants to <a href="colorrawtoken/index.html"><code>ColorRawToken</code></a> type. Some of these colors are “raw”, and others have transparancy effects. This enum contains also the shared colors, i.e. colors exposed to any theme. Some colors related to the Orange brand are defined elswhere in <code>OrangeBrandColorRawTokens</code>.</p></a></li><li><a href="colormoderawtokens/index.html"><code>enum ColorModeRawTokens</code><p>Defined as the group of all <b>raw tokens</b> related to <b>colors mode</b>. Values are defined in <i>ColorModeRawTokens+Values.swift</i> file and not generated by the tokenator, as frozen values. <a href="colormoderawtokens/index.html"><code>ColorModeRawTokens</code></a> are tokens to use to define <i>color mode</i> of components, i.e. if a component or something must be considered in light or dark color scheme, or in monochrome mode. Primitive types such as  <code>String</code> must be used to as to allow to use <code>@objc</code> keywords in extensions for overriding. Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p></a></li><li><a href="dimensionrawtokens/index.html"><code>enum DimensionRawTokens</code><p>Defined as the group of all <b>raw tokens</b> related to <b>dimensions</b>. Values are defined in <i>DimensionRawTokens+Values.swift</i> file and generated by the tokenator. <a href="dimensionrawtokens/index.html"><code>DimensionRawTokens</code></a> are tokens to use to define <i>dimensions</i> , i.e. kind of values to use for sizes or spaces thanks to <a href="dimensionrawtoken/index.html"><code>DimensionRawToken</code></a>.</p></a></li><li><a href="elevationrawtokens/index.html"><code>enum ElevationRawTokens</code><p>Defined as the group of all <b>raw tokens</b> related to <b>elevations</b>. Values are defined in <i>ElevationRawTokens+Values.swift</i> file updated by the tokenator and <i>ElevationRawTokens+Values.swift</i> updated manualy by the development team. <a href="elevationrawtokens/index.html"><code>ElevationRawTokens</code></a> are tokens to use to define <i>elevations</i> , i.e. in the end box shadow effects. These tokens are used to define these effects thanks to several types: the <i>blur</i>, the <i>X offset</i> and the <i>Y offset</i>, all of them being <a href="elevationrawtoken/index.html"><code>ElevationRawToken</code></a> type. Combinations of these three values can be defined inside <a href="elevationcompositerawtoken/index.html"><code>ElevationCompositeRawToken</code></a> i.e. <i>composite tokens</i> defining a whil box shadow to use for elevation effect.</p></a></li><li><a href="effectrawtokens/index.html"><code>enum EffectRawTokens</code><p>Defined as the group of all <b>raw tokens</b> related to <b>effects</b>. Values are defined in <i>EffectRawTokens+Values.swift</i> file and generated by the tokenator. <a href="effectrawtokens/index.html"><code>EffectRawTokens</code></a> are tokens to use to define <i>effects</i> for some components like navigation bars.</p></a></li><li><a href="gridrawtokens/index.html"><code>enum GridRawTokens</code><p>Defined as the group of all <b>raw tokens</b> related to <b>grid</b>. Values are defined in <i>GridRawTokens+Values.swift</i> file updated by the tokenator. <a href="gridrawtokens/index.html"><code>GridRawTokens</code></a> are tokens to use to define <i>grids</i>  using <a href="gridrawtoken/index.html"><code>GridRawToken</code></a> type.</p></a></li><li><a href="opacityrawtokens/index.html"><code>enum OpacityRawTokens</code><p>Defined as the group of all <b>raw tokens</b> related to <b>opacity</b>. Values are defined in <i>OpacityRawTokens+Values.swift</i> file and generated by the tokenator. <a href="opacityrawtokens/index.html"><code>OpacityRawTokens</code></a> are tokens to use to define <i>opacity</i> effects thanks to <a href="opacityrawtoken/index.html"><code>OpacityRawToken</code></a>.</p></a></li><li><a href="fontrawtokens/index.html"><code>enum FontRawTokens</code><p>Defined as the group of all <b>raw tokens</b> related to <b>font</b>. Values are defined in <i>FontRawTokens+Values.swift</i> file  generated by the tokenator and in <i>FontRawTokens+Composites.swift</i> updated manualy by the develoment team. <a href="fontrawtokens/index.html"><code>FontRawTokens</code></a> are tokens to use for <i>font</i> things , i.e. kind of values to use to render texts. These tokens define: - the <i>font family</i> to apply (<a href="fontfamilyrawtoken/index.html"><code>FontFamilyRawToken</code></a>) - the <i>font weight</i> (<a href="fontweightrawtoken/index.html"><code>FontWeightRawToken</code></a>), - the <i>font size</i> (<a href="fontsizerawtoken/index.html"><code>FontSizeRawToken</code></a>) - the line height (<a href="fontlineheightrawtoken/index.html"><code>FontLineHeightRawToken</code></a>) - and the <i>font letter spacing</i> (<a href="fontletterspacingrawtoken/index.html"><code>FontLetterSpacingRawToken</code></a>). Combinations of these raw tokens can be made inside <code>FontCompositeSemanticToken</code>, which are composite tokens defining in the end a specific font to apply.</p></a></li></ul><h3>Classes</h3><ul><li><a href="elevationcompositerawtoken/index.html"><code>class ElevationCompositeRawToken</code><p>In the <i>Figma</i> global design system, composite tokens are defined for elevation effects. Composite tokens are tokens defined in <i>Figma</i> by other tokens. Here an <i>elevation</i> is caracterized by <i>X and Y offsets</i>, a <i>radius</i> for the shadow and a <i>color</i> to apply on that shadow. All these elements are <i>raw tokens</i>, and together define a <i>composite raw token</i> for <i>elevation</i> effect. It is defined as a <code>final class</code> and <code>NSObject</code> so as to be shared through <code>@objc</code> with extensions and protocols within modules.</p></a></li></ul><h3>Type Aliases</h3><ul><li><a href="borderradiusrawtoken/index.html"><code>typealias BorderRadiusRawToken</code><p>Type alias precising <code>Double</code> value are used (because of multiplier factors) for a <b>border radius raw token</b>, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="borderstylerawtoken/index.html"><code>typealias BorderStyleRawToken</code><p>Type alias for <code>String</code> so as to help users (developers) to see that raw tokens are needed and linked to <code>String</code> for <b>border style raw token</b>. <code>String</code> are used here to prevent to rely on <i>SwiftUI</i> types which are not compatible with <code>@objc</code> and are heavier than primitive types. In addition, if new styles are defined in design team side (such as kind of composite styles) and need to be processed differently (because not available with <i>SwiftUI</i> because are composed of several styles), such  <code>String</code> values could be processed later without any API breaks. Keeps grammar clean and clear with design system grammar.</p></a></li><li><a href="borderwidthrawtoken/index.html"><code>typealias BorderWidthRawToken</code><p>Type alias precising <code>Double</code> value are used (because of multiplier factors) for a <b>border width raw token</b>, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="colormoderawtoken/index.html"><code>typealias ColorModeRawToken</code><p>A color mode raw token is finaly a <code>String</code> as a specific word.</p></a></li><li><a href="colorrawtoken/index.html"><code>typealias ColorRawToken</code><p>A color raw token is finaly a <code>String</code> containing the hexadecimal code of the color, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="dimensionrawtoken/index.html"><code>typealias DimensionRawToken</code><p>Raw tokens of dimensions are finaly <code>Double</code>, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="effectrawtoken/index.html"><code>typealias EffectRawToken</code><p>Type aliases precising <code>CGFloat</code> values are used (because used in <i>SwiftUI</i> API) for each <b>effect raw token</b>, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="elevationrawtoken/index.html"><code>typealias ElevationRawToken</code><p>Type aliases precising <code>CGFloat</code> values are used (because used in <i>SwiftUI</i> API) for each <b>elevation raw token</b>, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="fontfamilyrawtoken/index.html"><code>typealias FontFamilyRawToken</code><p>In the global design system tool, <i>font family</i> raw tokens are basically <code>String</code> values, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="fontletterspacingrawtoken/index.html"><code>typealias FontLetterSpacingRawToken</code><p>In the global design system tool, <i>font letter spacing</i> raw tokens are basically <code>CGFloat</code> values, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="fontlineheightrawtoken/index.html"><code>typealias FontLineHeightRawToken</code><p>In the global design system tool, <i>font line height</i> raw tokens are basically <code>CGFloat</code> values, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="fontsizerawtoken/index.html"><code>typealias FontSizeRawToken</code><p>In the global design system tool, <i>font size</i> raw tokens are basically <code>CGFloat</code> values, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="fontweightrawtoken/index.html"><code>typealias FontWeightRawToken</code><p>In the global design system tool, <i>font weight</i> raw tokens are basically <code>Int</code> values, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="gridrawtoken/index.html"><code>typealias GridRawToken</code><p>In the global design system tool, the notion of “raw tokens of grids” exist but refers always to _ raw tokens, to keep grammar clean and clear with design system grammar.</p></a></li><li><a href="opacityrawtoken/index.html"><code>typealias OpacityRawToken</code><p>Raw tokens of opacity are finaly <code>Double</code>, to keep grammar clean and clear with design system grammar.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
