tes.swift</i> updated manualy by the develoment team. <a href="."><code>FontRawTokens</code></a> are tokens to use for <i>font</i> things , i.e. kind of values to use to render texts. These tokens define: - the <i>font family</i> to apply (<a href="../fontfamilyrawtoken/index.html"><code>FontFamilyRawToken</code></a>) - the <i>font weight</i> (<a href="../fontweightrawtoken/index.html"><code>FontWeightRawToken</code></a>), - the <i>font size</i> (<a href="../fontsizerawtoken/index.html"><code>FontSizeRawToken</code></a>) - the line height (<a href="../fontlineheightrawtoken/index.html"><code>FontLineHeightRawToken</code></a>) - and the <i>font letter spacing</i> (<a href="../fontletterspacingrawtoken/index.html"><code>FontLetterSpacingRawToken</code></a>). Combinations of these raw tokens can be made inside <code>FontCompositeSemanticToken</code>, which are composite tokens defining in the end a specific font to apply.</p><pre><code>@frozen enum FontRawTokens</code></pre></section><h2>Overview</h2><p>Primitive types such as <code>Int</code> and <code>String</code> must be used to as to allow to use <code>@objc</code> keywords in extensions for overriding. Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Type Properties</h3><ul><li><a href="familymonospacecouriernew/index.html"><code>static let familyMonospaceCourierNew: FontFamilyRawToken</code><p>Has for value “Courier New”</p></a></li><li><a href="familymonospacemenlo/index.html"><code>static let familyMonospaceMenlo: FontFamilyRawToken</code><p>Has for value “Menlo”</p></a></li><li><a href="familymonospacemonaco/index.html"><code>static let familyMonospaceMonaco: FontFamilyRawToken</code><p>Has for value “Monaco”</p></a></
