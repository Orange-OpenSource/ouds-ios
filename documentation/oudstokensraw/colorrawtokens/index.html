m ColorRawTokens</code></pre></section><h2>Overview</h2><p>Primitive types such as  <code>String</code> must be used to as to allow to use <code>@objc</code> keywords in extensions for overriding. Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Type Properties</h3><ul><li><a href="dodgerblue520/index.html"><code>static let dodgerBlue520: ColorRawToken</code><p>Has for value “#00598A85”</p></a></li><li><a href="dodgerblue80/index.html"><code>static let dodgerBlue80: ColorRawToken</code><p>Has for value “#26B2FF14”</p></a></li><li><a href="functionalamethyst400/index.html"><code>static let functionalAmethyst400: ColorRawToken</code><p>Has for value “#A885D8FF”</p></a></li><li><a href="functionalamethyst600/index.html"><code>static let functionalAmethyst600: ColorRawToken</code><p>Has for value “#5B2F98FF”</p></a></li><li><a href="functionalblack/index.html"><code>static let functionalBlack: ColorRawToken</code><p>Has for value “#000000FF”</p></a></li><li><a href="functionaldodgerblue100/index.html"><code>static let functionalDodgerBlue100: ColorRawToken</code><p>Has for value “#F0FAFFFF”</p></a></li><li><a href="functionaldodgerblue200/index.html"><code>static let functionalDodgerBlue200: ColorRawToken</code><p>Has for value “#BDE7FFFF”</p></a></li><li><a href="functionaldodgerblue300/index.html"><code>static let functionalDodgerBlue300: ColorRawToken</code><p>Has for value “#8AD5FFFF”</p></a></li><li><a href="functionaldodgerblue400/index.html"><code>static let functionalDodgerBlue400: ColorRawToken</code><p>Has for value “#57C3FFFF”</p></a></li><li><a href="functionaldodgerblue500/index.html"><code>static let functionalDodgerBlue500: ColorRawToken</code><p>Has for value “#26
