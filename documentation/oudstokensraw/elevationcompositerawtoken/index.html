<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>ElevationCompositeRawToken</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="In the Figma global design system, composite tokens are defined for elevation effects. Composite tokens are tokens defined in Figma by other tokens. Here an elevation is caracterized by X and Y offsets, a radius for the shadow and a color to apply on that shadow. All these elements are raw tokens, and together define a composite raw token for elevation effect. It is defined as a `final class` and `NSObject` so as to be shared through `@objc` with extensions and protocols within modules." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Tokens with raw values</a></li><li>ElevationCompositeRawToken</li></ul><p>Class</p><h1>ElevationCompositeRawToken</h1><p>In the <i>Figma</i> global design system, composite tokens are defined for elevation effects. Composite tokens are tokens defined in <i>Figma</i> by other tokens. Here an <i>elevation</i> is caracterized by <i>X and Y offsets</i>, a <i>radius</i> for the shadow and a <i>color</i> to apply on that shadow. All these elements are <i>raw tokens</i>, and together define a <i>composite raw token</i> for <i>elevation</i> effect. It is defined as a <code>final class</code> and <code>NSObject</code> so as to be shared through <code>@objc</code> with extensions and protocols within modules.</p><pre><code>final class ElevationCompositeRawToken</code></pre></section><h2>Overview</h2><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(x:y:blur:color:)/index.html"><code>init(x: ElevationRawToken, y: ElevationRawToken, blur: ElevationRawToken, color: ColorRawToken)</code><p>Defines a composite elevation token and computes the <i>SwftUI radius</i> from the given <i>Figma blur</i> applying formula:</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="color/index.html"><code>let color: ColorRawToken</code><p>The color of the shadow effect</p></a></li><li><a href="radius/index.html"><code>let radius: ElevationRawToken</code><p>The <i>Figma</i> tool uses its own implementation of shadow or elevation effect with a <i>blur</i> and a <i>spread</i> values defined in the <i>tokens</i>, inherited from web universe. However <i>SwiftUI</i> for shadows effects uses only a <i>radius</i> which does not match the <i>Figma</i> <i>blur</i> and <i>spread</i> radiuses values.</p></a></li><li><a href="x/index.html"><code>let x: ElevationRawToken</code><p>The X offset for the elevation</p></a></li><li><a href="y/index.html"><code>let y: ElevationRawToken</code><p>The Y offset for the elevation</p></a></li></ul><h3>Instance Methods</h3><ul><li><a href="isequal(_:)/index.html"><code>func isEqual(Any?) -&gt; Bool</code><p>Compares the <code>self.x</code>, <code>self.y</code>, <code>self.blur</code> and <code>self.color</code> values between tokens. If <code>object</code> is not an <code>ElevationCompositeRawToken</code>, or ahs one of its four proeprties with another value than <code>self</code>, return <code>false</code>. Otherwise returns <code>true</code>. <code>isEqual</code> override is preferred for <code>NSObject</code>.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
