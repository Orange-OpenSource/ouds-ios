<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>BorderRawTokens</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Defines a group of all raw tokens related to borders. Values are defined in BorderRawTokens+Values.swift file and generated by the tokenator. ``doc://OUDSTokensRaw/documentation/OUDSTokensRaw/BorderRawTokens`` are tokens to use to define borders of components. Several types of raw tokens exist to render a border: radius (``doc://OUDSTokensRaw/documentation/OUDSTokensRaw/BorderRadiusRawToken``), style (``doc://OUDSTokensRaw/documentation/OUDSTokensRaw/BorderStyleRawToken``) and width (``doc://OUDSTokensRaw/documentation/OUDSTokensRaw/BorderWidthRawToken``)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Tokens with raw values</a></li><li>BorderRawTokens</li></ul><p>Enumeration</p><h1>BorderRawTokens</h1><p>Defines a group of all <b>raw tokens</b> related to <b>borders</b>. Values are defined in <i>BorderRawTokens+Values.swift</i> file and generated by the tokenator. <a href="."><code>BorderRawTokens</code></a> are tokens to use to define <i>borders</i> of components. Several types of <i>raw tokens</i> exist to render a border: radius (<a href="../borderradiusrawtoken/index.html"><code>BorderRadiusRawToken</code></a>), style (<a href="../borderstylerawtoken/index.html"><code>BorderStyleRawToken</code></a>) and width (<a href="../borderwidthrawtoken/index.html"><code>BorderWidthRawToken</code></a>).</p><pre><code>@frozen enum BorderRawTokens</code></pre></section><h2>Overview</h2><p>Primitive types such as <code>Double</code> and <code>String</code> must be used to as to allow to use <code>@objc</code> keywords in <i>Swift extensions</i> for overriding. Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Type Properties</h3><ul><li><a href="base/index.html"><code>static let base: Double</code><p>Has for value 4</p></a></li><li><a href="radius0/index.html"><code>static let radius0: BorderRadiusRawToken</code><p>Has for value 0</p></a></li><li><a href="radius100/index.html"><code>static let radius100: BorderRadiusRawToken</code><p>Has for value 4</p></a></li><li><a href="radius150/index.html"><code>static let radius150: BorderRadiusRawToken</code><p>Has for value 6</p></a></li><li><a href="radius200/index.html"><code>static let radius200: BorderRadiusRawToken</code><p>Has for value 8</p></a></li><li><a href="radius25/index.html"><code>static let radius25: BorderRadiusRawToken</code><p>Has for value 1</p></a></li><li><a href="radius300/index.html"><code>static let radius300: BorderRadiusRawToken</code><p>Has for value 12</p></a></li><li><a href="radius400/index.html"><code>static let radius400: BorderRadiusRawToken</code><p>Has for value 16</p></a></li><li><a href="radius50/index.html"><code>static let radius50: BorderRadiusRawToken</code><p>Has for value 2</p></a></li><li><a href="radius500/index.html"><code>static let radius500: BorderRadiusRawToken</code><p>Has for value 20</p></a></li><li><a href="radius600/index.html"><code>static let radius600: BorderRadiusRawToken</code><p>Has for value 24</p></a></li><li><a href="radius75/index.html"><code>static let radius75: BorderRadiusRawToken</code><p>Has for value 3</p>
