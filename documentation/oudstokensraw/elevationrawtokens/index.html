 define these effects thanks to several types: the <i>blur</i>, the <i>X offset</i> and the <i>Y offset</i>, all of them being <a href="../elevationrawtoken/index.html"><code>ElevationRawToken</code></a> type. Combinations of these three values can be defined inside <a href="../elevationcompositerawtoken/index.html"><code>ElevationCompositeRawToken</code></a> i.e. <i>composite tokens</i> defining a whil box shadow to use for elevation effect.</p><pre><code>@frozen enum ElevationRawTokens</code></pre></section><h2>Overview</h2><p>Primitive types such as <code>CGFloat</code> must be used to as to allow to use <code>@objc</code> keywords in extensions for overriding. Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Type Properties</h3><ul><li><a href="blur0/index.html"><code>static let blur0: ElevationRawToken</code><p>Has for value 0</p></a></li><li><a href="blur100/index.html"><code>static let blur100: ElevationRawToken</code><p>Has for value 1</p></a></li><li><a href="blur200/index.html"><code>static let blur200: ElevationRawToken</code><p>Has for value 2</p></a></li><li><a href="blur300/index.html"><code>static let blur300: ElevationRawToken</code><p>Has for value 3</p></a></li><li><a href="blur400/index.html"><code>static let blur400: ElevationRawToken</code><p>Has for value 4</p></a></li><li><a href="blur500/index.html"><code>static let blur500: ElevationRawToken</code><p>Has for value 8</p></a></li><li><a href="blur600/index.html"><code>static let blur600: ElevationRawToken</code><p>Has for value 12</p></a></li><li><a href="blur700/index.html"><code>static let blur700: ElevationRawToken</code><p>Has for value 20</p></a></li><li><a href="x0/index.html"><code>static let x0:
