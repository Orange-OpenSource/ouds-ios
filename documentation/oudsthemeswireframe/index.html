<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Theme Wireframe</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="This Wireframe theme is a theme for some specific usages, like for prototyping and design of journeys with non-Orange charted themes." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li>Theme Wireframe</li></ul><p>Framework</p><h1>Theme Wireframe</h1><p>This Wireframe theme is a theme for some specific usages, like for prototyping and design of journeys with non-Orange charted themes.</p></section><h2>Overview</h2><pre><code>🧬 Theme version: 2.5.0
</code></pre><blockquote class="aside note"><p class="label">Note</p><p>The Wireframe theme uses the Shantell Sans font family</p></blockquote><blockquote class="aside important"><p class="label">Important</p><p>The Wireframe theme does not embed charts colors yet, and is read only: it cannot be suclassed or derivated.</p></blockquote><h2>How to use the theme</h2><p>You can use <a href="wireframetheme/index.html"><code>WireframeTheme</code></a> directly. To use the <a href="wireframetheme/index.html"><code>WireframeTheme</code></a> without further modifications, you will have to use the <code>OUDSThemeableView</code> for your root view and give it an instance of <a href="wireframetheme/index.html"><code>WireframeTheme</code></a>. Keep in mind the themes are <i>Swift class objects</i> and can be heavy, so you may use only as instance as singleton and not store any properties.</p><pre class="swift"><code>@main
struct YourApp: App {
    var body: some Scene {
        WindowGroup {
            OUDSThemeableView(theme: WireframeTheme()) {
                // Your root view
            }
        }
    }
}
</code></pre><p>Then, in your views, you can simply use the theme through an environment variable to get the tokens:</p><pre class="swift"><code>struct SomeView: View {

    // Get OUDS environment variable for theme thanks to themeable view
    @Environment(\.theme) var theme
    
    var body: some View {
        
        // Use the theme to retrieve the tokens
        // For spaces: theme.spaces
        // For sizes: theme.sizes
        // For borders: theme.borders
        // For elevations: theme.elevations
        // For opacities: theme.opacities
        // For colors: theme.colors
        // For button configuration: theme.button
        // For link configuration: theme.link
        // Etc.
    }
}
</code></pre><h2>How to tune the theme</h2><p>You cannot tune the Sosh theme.</p><h2>Typography</h2><p>The Wireframe theme uses the Shantell Sans font family and must not use others.</p><h2>How to enrich the theme</h2><p>You cannot derivate the <i>Wireframe</i> theme.</p><h2>How it looks like</h2><h3>Actions</h3><p><picture><img alt="A button component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_button_wireframe.png"/></picture></p><h3>Content display</h3><h4>Bullet list</h4><p><picture><img alt="A bullet list component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_bullet_list_wireframe.png"/></picture></p><h3>Controls</h3><h4>Checkboxes</h4><h4>Radios</h4><h4>Switches</h4><h4>Chips</h4><h4>Text input</h4><p><picture><img alt="A text input component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_textinput_wireframe.png"/></picture></p><h3>Indicators</h3><h4>Badge</h4><p><picture><img alt="A badge component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_badge_wireframe.png"/></picture></p><h4>Tags</h4><h3>Layouts</h3><h4>Dividers</h4><h3>Navigations</h3><h4>Link</h4><p><picture><img alt="A link component in light and dark modes with Wireframe theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_link_wireframe.png"/></picture></p><h4>Tab bar</h4><h2>Topics</h2><h3>Group</h3><ul><li><a href="wireframetheme/index.html"><code>class WireframeTheme</code><p>This Wireframe theme is a theme for some specific usages, like for prototyping and design of journeys with non-Orange charted themes. This is an override of the default basic <code>OUDSTheme</code> for some usages. It can override any properties from its superclass, and but cannot be derived ; this is not allowed.</p></a></li><li><a href="wireframebrandcolorrawtokens/index.html"><code>enum WireframeBrandColorRawTokens</code><p>This enum helps to add new <b>color raw tokens</b> exclusive to this <a href="wireframetheme/index.html"><code>WireframeTheme</code></a>. Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p></a></li><li><a href="wireframebrandfontrawtokens/index.html"><code>enum WireframeBrandFontRawTokens</code><p>This enum helps to add new <b>font raw tokens</b> exclusive to this <a href="wireframetheme/index.html"><code>WireframeTheme</code></a> Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p></a></li></ul><h3>Type Aliases</h3><ul><li><a href="colorwireframebrandrawtoken/index.html"><code>typealias ColorWireframeBrandRawToken</code><p>In the global design system tool, the verbs of “brand colors” are used, and at this level mean simply raw tokens of colors.</p></a></li><li><a href="colorwireframedecorativerawtoken/index.html"><code>typealias ColorWireframeDecorativeRawToken</code><p>In the global design system tool, the verbs of “decorative colors” are used, and at this level mean simply raw tokens of colors, but decorative ones</p></a></li><li><a href="wireframebrandfontrawtoken/index.html"><code>typealias WireframeBrandFontRawToken</code><p>An <code>WireframeBrandFontRawToken</code> is just a  <code>FontFamilyRawToken</code> type</p></a></li></ul><h3>Extended Modules</h3><ul><li><a href="oudsthemescontract/index.html"><code></code></a></li><li><a href="swiftuicore/index.html"><code></code></a></li></ul></article></noscript><div id="app"></div></body></html>
