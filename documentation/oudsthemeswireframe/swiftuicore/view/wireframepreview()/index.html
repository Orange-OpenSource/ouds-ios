</code></pre></section><h2>Discussion</h2><ul><li><p>to debug a <code>View</code> in Xcode <code>#Preview</code> macro</p></li><li><p>to let end-users testing on their side in <code>#Preview</code> macro your <code>View</code> based on OUDS.</p></li></ul><pre class="swift"><code>    // In this case, apply the theme on the preview
    #Preview {
       SampleView().wireframePreview()
    }
</code></pre><pre class="swift"><code>    // In this case, you defined a `View` you provide to outside developers who use `#Preview` macro
    // In your side:
    struct YourView(): View {
        var body: some View {
           yourContentView.wireframePreview()
        }
    }

    // In their side:
    #Preview {
        TheirView() // Using your view
    }
</code></pre><p>Note this second case works only if <i>YourView</i> does not refer directly to the <code>theme</code> (see <a href="https://github.com/Orange-OpenSource/ouds-ios/issues/1268">#1268</a>)</p></article></noscript><div id="app"></div></body></html>
