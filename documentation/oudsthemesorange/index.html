<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Theme Orange</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="The Orange theme overrides some tokens from the basic `OUDSTheme` and should be seen as the default theme for the OUDS library with the Orange brand colors for example." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li>Theme Orange</li></ul><p>Framework</p><h1>Theme Orange</h1><p>The Orange theme overrides some tokens from the basic <code>OUDSTheme</code> and should be seen as the default theme for the OUDS library with the Orange brand colors for example.</p></section><h2>Overview</h2><pre><code>🧬 Theme version: 2.5.0
</code></pre><p>This is the default theme any Orange branded app should use, and can be subclassed to define for example themes dedicated to countries. It embeds also in its target the brand colors which are not shared nor exposed in lower level targets or outside any module not depending to it.</p><p>In other words, this <a href="orangetheme/index.html"><code>OrangeTheme</code></a> is based on the abstract <code>OUDSTheme</code>, uses all the <i>Orange Unified Design System</i> kit and brings the Orange brand colors and assets.</p><blockquote class="aside note"><p class="label">Note</p><p>It contains also colors dedicated to charts.</p></blockquote><h2>How to use the theme</h2><p>You can use <a href="orangetheme/index.html"><code>OrangeTheme</code></a> directly. To use the <a href="orangetheme/index.html"><code>OrangeTheme</code></a> without further modifications, you will have to use the <code>OUDSThemeableView</code> for your root view and give it an instance of <a href="orangetheme/index.html"><code>OrangeTheme</code></a>. Keep in mind the themes are <i>Swift class objects</i> and can be heavy, so you may use only as instance as singleton and not store any properties.</p><pre class="swift"><code>@main
struct YourApp: App {
    var body: some Scene {
        WindowGroup {
            OUDSThemeableView(theme: OrangeTheme()) {
                // Your root view
            }
        }
    }
}
</code></pre><p>Then, in your views, you can simply use the theme through an environment variable to get the tokens:</p><pre class="swift"><code>struct SomeView: View {

    // Get OUDS environment variable for theme thanks to themeable view
    @Environment(\.theme) var theme
    
    var body: some View {
        
        // Use the theme to retrieve the tokens
        // For spaces: theme.spaces
        // For sizes: theme.sizes
        // For borders: theme.borders
        // For elevations: theme.elevations
        // For opacities: theme.opacities
        // For colors: theme.colors
        // For button configuration: theme.button
        // For link configuration: theme.link
        // Etc.
    }
}
</code></pre><h2>Tunable theme</h2><p>The theme can be tuned with <code>Tuning</code> object to give at init. Some tuning object exists.</p><pre class="swift"><code>    // Define your theme tuning
    let tuning = Tuning(hasRoundedButtons: true, 
                        hasRoundedTextInputs: true,
                        hasRoundedAlertMessages: true)

    // Apply it to your theme
    let theme = OrangeTheme(tuning: tuning)
    // Or in one line
    let theme = OrangeTheme(tuning: Tuning(hasRoundedButtons: true, hasRoundedTextInputs: true, hasRoundedAlertMessages: true))

    // Or apply predefined tunings
    let orangeFranceTheme = OrangeTheme(tuning: Tuning.OrangeFrance)
    let orangeBusinessTheme = OrangeTheme(tuning: Tuning.OrangeBusiness)
    let maxitTheme = OrangeTheme(tuning: Tuning.MaxIt)
</code></pre><h3>“Orange France” tuning</h3><p>A predefined tuning configuration is also available for Orange France, which is also the default tuning:</p><pre class="swift"><code>let theme = OrangeTheme(tuning: Tuning.OrangeFrance)
</code></pre><p>It applies the following settings:</p><table><thead><tr><th>Tunable elements</th><th>Default values</th></tr></thead><tbody><tr><td>rounded corners buttons</td><td>❌ false</td></tr><tr><td>rounded corners text inputs</td><td>❌ false</td></tr><tr><td>rounded corners alert messages</td><td>❌ false</td></tr></tbody></table><h3>“Orange Business” tuning</h3><p>A predefined tuning configuration is also available for Orange Business:</p><pre class="swift"><code>let theme = OrangeTheme(tuning: Tuning.OrangeBusiness)
</code></pre><p>It applies the following settings:</p><table><thead><tr><th>Tunable elements</th><th>Default values</th></tr></thead><tbody><tr><td>rounded corners buttons</td><td>❌ false</td></tr><tr><td>rounded corners text inputs</td><td>✅ true</td></tr><tr><td>rounded corners alert messages</td><td>✅ true</td></tr></tbody></table><h3>“Max it” tuning</h3><p>A predefined tuning configuration is also available for “Max it”:</p><pre class="swift"><code>let theme = OrangeTheme(tuning: Tuning.MaxIt)
</code></pre><p>It applies the following settings:</p><table><thead><tr><th>Tunable elements</th><th>Default values</th></tr></thead><tbody><tr><td>rounded corners buttons</td><td>✅ true</td></tr><tr><td>rounded corners text inputs</td><td>✅ true</td></tr><tr><td>rounded corners alert messages</td><td>✅ true</td></tr></tbody></table><h2>Typography</h2><h3>Helvetica Neue</h3><p>The Orange theme uses <i>Helvetica Neue</i> typography. This font is already available through iOS. It is possible to use another typography, by the ones recommended are the ones defined in tokens. For Orange products the <i>Helevetica Neue</i> font family must be used.</p><pre class="swift"><code>// The three following instanciations are the same
let theme = OrangeTheme()
let theme = OrangeTheme(fontFamily: OrangeBrandFontRawTokens.familyBrandDefault)
let theme = OrangeTheme(fontFamily: "HelveticaNeue") // Which is PostScript name of the font

// This instanciation won't work as the font family is not recognised
let theme = OrangeTheme(fontFamily: "Helvetica Neue")
</code></pre><h3>Other fonts</h3><p>However if, in very particular cases, you need to use another font family, you can try using it by changing the value in the theme init.</p><pre class="swift"><code>// Supposing you want to use another font:
// - like the Luciole font (https://luciole-vision.com/) (very good for accessibility)
// - or the Robot font (https://fonts.google.com/specimen/Roboto) (to support arabic and cyrillic alphabets)
// 1. Add the TTF files in your project
    
// 2. Register the fonts with, for example, the function below
private func registerFonts() {
    let fonts = Bundle.main.urls(forResourcesWithExtension: "ttf", subdirectory: nil)
    fonts?.forEach { CTFontManagerRegisterFontsForURL($0 as CFURL, .process, nil) }
}

// 3. At theme init, given the font family name, add it to the theme.
// Keep in mind that it might not work because PostScript name is used combining
// font family name and font weight.
// For Luciole font, use "Luciole". For Roboto font, use "Roboto""
   let theme = OrangeTheme(fontFamily: theFontFamilyNameInPostScript)
</code></pre><blockquote class="aside note"><p class="label">Note</p><p>Specific rules to compute PostScript value are defined in <code>PostScriptFontNamesMap.swift</code></p></blockquote><blockquote class="aside tip"><p class="label">Tip</p><p>If your font family is not well managed, you can <a href="https://github.com/Orange-OpenSource/ouds-ios/issues">send an issue and explain your needs</a></p></blockquote><blockquote class="aside important"><p class="label">Important</p><p>For production products and official tools, <i>Helvetica Neue</i> is preferred</p></blockquote><blockquote class="aside tip"><p class="label">Tip</p><p>If for your needs Helvetica Neue is not relevant (because does not support cyrilic and arabic, or not enough accessible, or not aligned with your needs), <a href="https://github.com/Orange-OpenSource/ouds-ios/discussions">feel free to open a discussion</a></p></blockquote><blockquote class="aside caution"><p class="label">Caution</p><p>For ecodesign principles you should challenge the use of fonts because they can increase the needed storage of your apps</p></blockquote><blockquote class="aside important"><p class="label">Important</p><p>Always check the license and terms of uses of the font your are using (distribution, hsoting, usage for comemrcial things, etc.)</p></blockquote><h2>How to enrich the theme</h2><p>You can enrich the <a href="orangetheme/index.html"><code>OrangeTheme</code></a> by subclassing it or by overriding some tokens.</p><blockquote class="aside important"><p class="label">Important</p><p>Only the Orange theme can be subclassed today. If this theme does not fill your need you can also implement your own theme from scratch.</p></blockquote><blockquote class="aside tip"><p class="label">Tip</p><p>Because theme definition is based on thousands of tokens, you should contact the design team to get helped.</p></blockquote><h3>By using your own theme and subclassing existing token providers</h3><p>You may want to define your own theme, thus you can override the <a href="orangetheme/index.html"><code>OrangeTheme</code></a> with your own class or just override the providers.</p><p>You will have to consider the semantic tokens providers you need:</p><ul><li><p>spaces tokens are <code>OrangeThemeSpaceSemanticTokensProvider</code></p></li><li><p>sizes tokens are in <code>OrangeThemeSizeSemanticTokensProvider</code></p></li><li><p>colors tokens are all defined in <code>OrangeThemeColorSemanticTokensProvider</code></p></li><li><p>borders tokens are in <code>OUDSBorderSemanticTokensProvider</code></p></li><li><p>elevations tokens are in <code>OrangeThemeElevationSemanticTokensProvider</code></p></li><li><p>opacity tokens are in <code>OrangeThemeOpacitySemanticTokensProvider</code></p></li><li><p>grid tokens are in <code>OrangeThemeGridSemanticTokensProvider</code></p></li><li><p>font tokens are in <code>OrangeThemeFontSemanticTokensProvider</code></p></li><li><p>etc.</p></li></ul><p>The color semantic tokens of charts are not overridable as they are highly related to the brand. However it can change in the future.</p><p>You can also override the component tokens providers you need. Have a look <a href="https://ios.unified-design-system.orange.com/documentation/oudstokenscomponent/">on the documentation</a> to know which one you need to update.</p><p>Example for semantic tokens providers:</p><pre class="swift"><code>// MARK: - For semantic tokens

// Token provider for spaces

class YourAppThemeSpaceTokensProvider: OrangeThemeSpaceSemanticTokensProvider {
    override var fixedMedium: SpaceSemanticToken {
        DimensionRawTokens._400
    }
    override var scaledSmall: MultipleSpaceSemanticToken {
        MultipleSpaceSemanticToken(compact: fixed5xl, regular: fixed5xl)
    }
}

// Token provider for sizes

class YourAppThemeSizeTokensProvider: OrangeThemeSizeSemanticTokensProvider {
    override var iconDecorative2xl: SizeSemanticToken {
        DimensionRawTokens._300
    }
    override var iconDecorativeMd: SizeSemanticToken {
        DimensionRawTokens._900
    }
}

// Token provider for colors

class YourAppThemeColorTokensProvider: OrangeThemeColorSemanticTokensProvider {
    override var bgSecondary: MultipleColorSemanticToken {
        MultipleColorSemanticToken(light: ColorRawTokens.colorDecorativeAmber500, dark: OrangeBrandColorRawTokens.colorOrange900)
    }
    override var actionEnabled: MultipleColorSemanticToken {
        MultipleColorSemanticToken(light: ColorRawTokens.colorDecorativeShockingPink100, dark: ColorRawTokens.functionalScarlet600)
    }
}

// Token provider for border

class YourAppThemeBorderTokensProvider: OUDSBorderSemanticTokensProvider {
    override var styleDefault: BorderStyleSemanticToken {
        BorderRawTokens.styleDashed
    }
    override var widthMedium: BorderWidthSemanticToken {
        BorderRawTokens.width100
    }
    override var radiusLarge: BorderRadiusSemanticToken {
        BorderRawTokens.radius800
    }
}

// Token provider for elevation

class YourAppThemeElevationTokensProvider: OrangeThemeElevationSemanticTokensProvider {
    override var stickyEmphasized: ElevationCompositeSemanticToken {
        ElevationCompositeSemanticToken(ElevationRawTokens.bottom_4_600)
    }
}

// Token provider for opacity

class YourAppThemeOpacityTokensProvider: OrangeThemeOpacitySemanticTokensProvider {
    override var strong: OpacitySemanticToken {
        OpacityRawTokens._920
    }
}

// Token provider for grid

class YourAppThemeGridTokensProvider: OrangeThemeGridSemanticTokensProvider {
    override var extraCompactColumnGap: GridSemanticToken {
        GridRawTokens.columnGap200
    }
    override var compactColumnGap: GridSemanticToken {
        GridRawTokens.columnGap200
    }
    override var regularColumnGap: GridSemanticToken {
        GridRawTokens.columnGap200
    }
}

// Token provider for font

class YourAppThemeFontTokensProvider: OrangeThemeFontSemanticTokensProvider {
   
    override var displayLarge: MultipleFontCompositeSemanticToken { 
        MultipleFontCompositeSemanticToken(FontCompositeSemanticToken(
            size: sizeDisplayLargeMobile,
            lineHeight: lineHeightDisplayLargeMobile,
            weight: weightDisplay,
            letterSpacing: letterSpacingDisplayLargeMobile))) 
    }
}

// MARK: - And also for components tokens

class YourAppThemeButtonComponentTokensProvider: OrangeThemeButtonComponentTokensProvider {
    override public var sizeMaxHeightIconOnly: SizeSemanticToken { DimensionRawTokens._600 }
    override public var borderWidthDefault: BorderWidthSemanticToken { borders.widthThicker }
    override public var borderRadius: BorderRadiusSemanticToken { borders.radiusMedium }
    override public var colorBgDefaultPressedMono: MultipleColorSemanticToken { colors.repositoryOpacityBlackHigher }
    override public var spacePaddingBlock: SpaceSemanticToken { spaces.paddingInlineSpacious }
}

// Etc.
</code></pre><p>You can instead of overriding existing semantic tokens provider implement your own provider but it will imply to implement maybe hundreds of tokens. Your own provider must match the suitable signature.</p><p>Then define your own theme class and assign the providers you want to override. If some are missing, default implementation will be used.</p><pre class="swift"><code>// Define your theme
class YourAppTheme: OrangeTheme {
    
    override init() {
        super.init(colors: YourAppThemeColorTokensProvider(),
                   borders: YourAppThemeBorderTokensProvider(),
                   elevations: YourAppThemeElevationTokensProvider(),
                   fonts: YourAppThemeFontTokensProvider(),
                   grids: YourAppThemeGridTokensProvider(),
                   opacities: YourAppThemeOpacityTokensProvider(),
                   sizes: YourAppThemeSizeTokensProvider(),
                   spaces: YourAppThemeSpaceTokensProvider(),
                   button: YourAppThemeButtonComponentTokensProvider,
                   // Etc. ...
    }
}
</code></pre><p>Then add the theme:</p><pre class="swift"><code>@main
struct YourApp: App {
    var body: some Scene {
        WindowGroup {
            OUDSThemeableView(theme: YourAppTheme()) {
                // Your root view
            }
        }
    }
}
</code></pre><h3>By overriding only existing tokens providers</h3><p>Quite simple and similar to the previous solution, but give only the providers to the <a href="orangetheme/index.html"><code>OrangeTheme</code></a>. But we recommend to define your own theme for clarity reasons.</p><pre class="swift"><code>@main
struct YourApp: App {
    var body: some Scene {
        WindowGroup {
            OUDSThemeableView(theme: 
                OrangeTheme(colors: ..., spaces: ..., button: ...)) { 
                // Your root view
            }
        }
    }
}
</code></pre><h2>How it looks like</h2><h3>Actions</h3><h4>Button</h4><p><picture><img alt="A button component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_button_orange.png"/></picture></p><h3>Content display</h3><h4>Bullet list</h4><p><picture><img alt="A bullet list component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_bullet_list_orange.png"/></picture></p><h3>Controls</h3><h4>Checkboxes</h4><h4>Radios</h4><h4>Switches</h4><h4>Chips</h4><h4>Text input</h4><p><picture><img alt="A text input component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_textinput_orange.png"/></picture></p><h3>Indicators</h3><h4>Badge</h4><p><picture><img alt="A badge component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_badge_orange.png"/></picture></p><h4>Tags</h4><h3>Layouts</h3><h4>Dividers</h4><h3>Navigations</h3><h4>Link</h4><p><picture><img alt="A link component in light and dark modes with Orange theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_link_orange.png"/></picture></p><h4>Tab bar</h4><h2>Topics</h2><h3>Group</h3><ul><li><a href="orangetheme/index.html"><code>class OrangeTheme</code><p>The Orange theme is the bsic, default, theme for any Orange products. This is an override of the abtract <code>OUDSTheme</code> and <b>must be seen as the default theme for the OUDS library</b>. It can override any properties from its superclass, and can be derived too.</p></a></li><li><a href="orangebrandcolorrawtokens/index.html"><code>enum OrangeBrandColorRawTokens</code><p>This enum helps to add new <b>color raw tokens</b> exclusive to this <a href="orangetheme/index.html"><code>OrangeTheme</code></a>. Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p></a></li><li><a href="orangebrandfontrawtokens/index.html"><code>enum OrangeBrandFontRawTokens</code><p>This enum helps to add new <b>font raw tokens</b> exclusive to this <a href="orangetheme/index.html"><code>OrangeTheme</code></a> Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p></a></li></ul><h3>Classes</h3><ul><li><a href="orangethemealertcomponenttokensprovider/index.html"><code>class OrangeThemeAlertComponentTokensProvider</code><p>A class which wraps all <b>component  tokens of alert</b> for <i>alert</i> objects like <code>OUDSAlert</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllAlertComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="orangethemealertcomponenttokensprovider/index.html"><code>OrangeThemeAlertComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>AlertComponentTokens</code> so as to expose the component tokens for <i>alert</i> through any <code>OUDSTheme</code>. <i>Alert</i> components tokens are defined with semantic tokens of borders (<code>AllBorderSemanticTokensProviders</code>), spaces (from <code>AllSpaceSemanticTokensProvider</code>) and sizes (from <code>AllSizeSemanticTokensProvider</code>).</p></a></li><li><a href="orangethemebadgecomponenttokensprovider/index.html"><code>class OrangeThemeBadgeComponentTokensProvider</code><p>A class which wraps all <b>component  tokens of badge</b> for <i>badge</i> objects like <code>OUDSBadge</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllBadgeComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="orangethemebadgecomponenttokensprovider/index.html"><code>OrangeThemeBadgeComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>BadgeComponentTokens</code> so as to expose the component tokens for <i>badge</i> through any <code>OUDSTheme</code>. <i>Badge</i> components tokens are defined with semantic tokens of dimensions (<code>AllDimensionSemanticTokensProviders</code>), and spaces (from <code>AllSpaceSemanticTokensProvider</code>).</p></a></li><li><a href="orangethemebarcomponenttokensprovider/index.html"><code>class OrangeThemeBarComponentTokensProvider</code><p>A class which wraps all <b>component  tokens of bar</b>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllBarComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="orangethemebarcomponenttokensprovider/index.html"><code>OrangeThemeBarComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>BarComponentTokens</code> so as to expose the component tokens for <i>bar</i> through any <code>OUDSTheme</code>. <i>Bar</i> components tokens are defined with semantic tokens of colors (<code>AllColorSemanticTokensProviders</code>), sizes (from <code>AllSizeSemanticTokensProvider</code>), borders (from <code>AllBorderSemanticTokensProvider</code>) and effects (from <code>AllEffectSemanticTokensProvider</code>).</p></a></li><li><a href="orangethemebordersemantictokensprovider/index.html"><code>class OrangeThemeBorderSemanticTokensProvider</code><p>A class which wraps all <b>border semantic tokens</b> and expose them. This provider should be integrated as a <code>AllBorderSemanticTokensProvider</code> implementation inside some <code>OUDSTheme</code> so as to provide all tokens to the users. It helps also users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use.</p></a></li><li><a href="orangethemebulletlistcomponenttokensprovider/index.html"><code>class OrangeThemeBulletListComponentTokensProvider</code><p>A class which wraps all <b>component  tokens of bullet list</b> for <i>bullet list</i> objects like <code>OUDSBulletList</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllBulletListComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="orangethemebulletlistcomponenttokensprovider/index.html"><code>OrangeThemeBulletListComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>BulletListComponentTokens</code> so as to expose the component tokens for <i>bullet list</i> through any <code>OUDSTheme</code>. <i>Bullet list</i> components tokens are defined with raw and semantic tokens of spaces (from <code>AllSpaceSemanticTokensProvider</code>).</p></a></li><li><a href="orangethemebuttoncomponenttokensprovider/index.html"><code>class OrangeThemeButtonComponentTokensProvider</code><p>A class which wraps all <b>component  tokens of buttons</b> for <i>button</i> objects like <code>OUDSButton</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllButtonComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="orangethemebuttoncomponenttokensprovider/index.html"><code>OrangeThemeButtonComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>ButtonComponentTokens</code> so as to expose the component tokens for <i>buttons</i> through any <code>OUDSTheme</code>. <i>Button</i> components tokens are defined with raw and semantic tokens of sizes (from <code>AllSizeSemanticTokensProvider</code>), borders spaces (from <code>AllSpaceSemanticTokensProvider</code>).</p></a></li><li><a href="orangethemecheckboxcomponenttokensprovider/index.html"><code>class OrangeThemeCheckboxComponentTokensProvider</code><p>A class which wraps all <b>component  tokens of checkbox</b> for  <i>checkboxes</i> objects like <code>OUDSCheckbox</code> and <code>OUDSCheckboxItem</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllCheckboxComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="orangethemecheckboxcomponenttokensprovider/index.html"><code>OrangeThemeCheckboxComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>CheckboxComponentTokens</code> so as to expose the component tokens for <i>checkboxes</i> through any <code>OUDSTheme</code>. <i>Checkboxes</i> components tokens are defined with raw and semantic tokens of sizes (from <code>SizeSemanticToken</code>) and borders (<code>BorderRadiusSemanticToken</code>, <code>BorderWidthSemanticToken</code>). These components share the same type of tokens which are all gather edhere.</p></a></li><li><a href="orangethemechipcomponenttokensprovider/index.html"><code>class OrangeThemeChipComponentTokensProvider</code><p>A class which wraps all <b>component  tokens of chip</b> for <i>chip</i> objects like <code>OUDSFilterChip</code> and <code>OUDSSuggestionChip</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllChipComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="orangethemechipcomponenttokensprovider/index.html"><code>OrangeThemeChipComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>ChipComponentTokens</code> so as to expose the component tokens for <i>chip</i> through any <code>OUDSTheme</code>. <i>Chip</i> components tokens are defined with semantic tokens of colors (from <code>AllColorSemanticTokensProvider</code>) , spaces (from <code>AllSpaceSemanticTokensProvider</code>), dimensions (<code>AllDimensionSemanticTokensProvider</code>) and border  (from <code>AllBorderSemanticTokensProvider</code>).</p></a></li><li><a href="orangethemecolorchartsemantictokensprovider/index.html"><code>cl
