<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeBadgeComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of badge for badge objects like `OUDSBadge`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllBadgeComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeBadgeComponentTokensProvider`` and apply the provider they need. It implements also the protocol `BadgeComponentTokens` so as to expose the component tokens for badge through any `OUDSTheme`. Badge components tokens are defined with semantic tokens of dimensions (`AllDimensionSemanticTokensProviders`), and spaces (from `AllSpaceSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeBadgeComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeBadgeComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of badge</b> for <i>badge</i> objects like <code>OUDSBadge</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllBadgeComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeBadgeComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>BadgeComponentTokens</code> so as to expose the component tokens for <i>badge</i> through any <code>OUDSTheme</code>. <i>Badge</i> components tokens are defined with semantic tokens of dimensions (<code>AllDimensionSemanticTokensProviders</code>), and spaces (from <code>AllSpaceSemanticTokensProvider</code>).</p><pre><code>class OrangeThemeBadgeComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for badge component tokens
    // by inheriting from existing provider
    class CustomBadgeComponentTokensProvider: OrangeThemeBadgeComponentTokensProvider {

        // Then override the badge component tokens you want.

        override var sizeXsmall: SizeSemanticToken { DimensionRawTokens._100 }

        override var spaceInset: SpaceSemanticToken { DimensionRawTokens.outOfSystem75 }

        // ...
    }

    // Or define your own provider from scratch
    class CustomBadgeComponentTokensProvider: BadgeComponentTokens {

        // And implement hundreds of tokens.
        // You are allowed to give semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomBadgeComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(badge: CustomBadgeComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(badge: CustomBadgeComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeSizeSemanticTokensProvider for sizes
    let badgeComponentTokensProvider = OrangeThemeBadgeComponentTokensProvider()

    // Or use your own dimension and space semantic tokens provider
    let badgeComponentTokensProvider = OrangeThemeBadgeComponentTokensProvider(
                    spaces: CustomSpaceSemanticTokensProvider(),
                    dimensions: CustomDimensionSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.10.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(spaces:dimensions:)/index.html"><code>init(spaces: (any AllSpaceSemanticTokensProvider)?, dimensions: (any AllDimensionSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSBadge</code></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="dimensions/index.html"><code>let dimensions: any AllDimensionSemanticTokensProvider</code><p>Provider of <i>dimensions</i> semantic tokens to use for spaces as the Swift package exposes “closed” tokens of Figma</p></a></li><li><a href="spaces/index.html"><code>let spaces: any AllSpaceSemanticTokensProvider</code><p>Provider of spaces semantic tokens to use for badge spaces</p></a></li></ul></article></noscript><div id="app"></div></body></html>
