<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeColorModeSemanticTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all color mode semantic tokens, multiple or not, and expose them. This provider should be integrated as a `AllColorModeSemanticTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeColorModeSemanticTokensProvider</li></ul><p>Class</p><h1>OrangeThemeColorModeSemanticTokensProvider</h1><p>A class which wraps all <b>color mode semantic tokens</b>, <i>multiple</i> or not, and expose them. This provider should be integrated as a <code>AllColorModeSemanticTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use.</p><pre><code>class OrangeThemeColorModeSemanticTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for color mode semantic tokens
    class CustomColorModeTokensProviderr: OrangeThemeColorModeSemanticTokensProvider {

        // Then override the color mode semantic tokens you want, using the color mode raw tokens available

        override var onBrandSecondaryLight: ColorModeSemanticToken {
             ColorModeRawTokens.light
        }

        override var onBrandSecondaryDark: ColorModeSemanticToken {
             ColorModeRawTokens.dark
        }

        override var onStatusAccentEmphasized: MultipleColorModeSemanticToken {
            MultipleColorModeSemanticToken(light: ColorModeRawTokens.dark, dark: ColorModeRawTokens.light)
        }
}
</code></pre><p>Then, you can give this <code>CustomColorTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(colorModes: CustomColorModeTokensProviderr())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(colorModes: CustomColorModeTokensProviderr())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.13.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(colors:)/index.html"><code>init(colors: (any AllColorSemanticTokensProvider)?)</code><p>Defines a provider of color mode semantic tokens</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="colors/index.html"><code>let colors: any AllColorSemanticTokensProvider</code><p>Provider of color semantic tokens to use for depending to some color modes</p></a></li><li><a href="onbginversehighdark/index.html"><code>var onBgInverseHighDark: ColorModeSemanticToken</code><p>Has for value token ColorModeRawTokens.light</p></a></li><li><a href="onbginversehighlight/index.html"><code>var onBgInverseHighLight: ColorModeSemanticToken</code><p>Has for value token ColorModeRawTokens.dark</p></a></li><li><a href="onbginverselowdark/index.html"><code>var onBgInverseLowDark: ColorModeSemanticToken</code><p>Has for value token ColorModeRawTokens.dark</p></a></li><li><a href="onbginverselowlight/index.html"><code>var onBgInverseLowLight: ColorModeSemanticToken</code><p>Has for value token ColorModeRawTokens.dark</p></a></li><li><a href="onsurfaceinversehighdark/index.html"><code>var onSurfaceInverseHighDark: ColorModeSemanticToken</code><p>Has for value token ColorModeRawTokens.light</p></a></li><li><a href="onsurfaceinversehighlight/index.html"><code>var onSurfaceInverseHighLight: ColorModeSemanticToken</code><p>Has for value token ColorModeRawTokens.dark</p></a></li><li><a href="onsurfaceinverselowdark/index.html"><code>var onSurfaceInverseLowDark: ColorModeSemanticToken</code><p>Has for value token ColorModeRawTokens.dark</p></a></li><li><a href="onsurfaceinverselowlight/index.html"><code>var onSurfaceInverseLowLight: ColorModeSemanticToken</code><p>Has for value token ColorModeRawTokens.dark</p></a></li><li><a href="onsurfaceprimarydark/index.html"><code>var onSurfacePrimaryDark: ColorModeSemanticToken</code><p>Has for value
