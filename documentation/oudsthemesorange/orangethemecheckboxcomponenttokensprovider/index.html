<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeCheckboxComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of checkbox for  checkboxes objects like `OUDSCheckbox` and `OUDSCheckboxItem`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllCheckboxComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeCheckboxComponentTokensProvider`` and apply the provider they need. It implements also the protocol `CheckboxComponentTokens` so as to expose the component tokens for checkboxes through any `OUDSTheme`. Checkboxes components tokens are defined with raw and semantic tokens of sizes (from `SizeSemanticToken`) and borders (`BorderRadiusSemanticToken`, `BorderWidthSemanticToken`). These components share the same type of tokens which are all gather edhere." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeCheckboxComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeCheckboxComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of checkbox</b> for  <i>checkboxes</i> objects like <code>OUDSCheckbox</code> and <code>OUDSCheckboxItem</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllCheckboxComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeCheckboxComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>CheckboxComponentTokens</code> so as to expose the component tokens for <i>checkboxes</i> through any <code>OUDSTheme</code>. <i>Checkboxes</i> components tokens are defined with raw and semantic tokens of sizes (from <code>SizeSemanticToken</code>) and borders (<code>BorderRadiusSemanticToken</code>, <code>BorderWidthSemanticToken</code>). These components share the same type of tokens which are all gather edhere.</p><pre><code>class OrangeThemeCheckboxComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for checkbox component tokens
    // by inheriting from existing provider
    class CustomCheckboxComponentTokensProvider: OrangeThemeCheckboxComponentTokensProvider {

        // Then override the checkbox component tokens you want.

        override var sizeMinWidth: SizeSemanticToken { sizes.iconWithLabelLargeSizeXl }

        override var borderWidthSelected: BorderWidthSemanticToken { borders.widthThin }

        // ...
    }

    // Or define your own provider from scratch
    class CustomCheckboxComponentTokensProvider: CheckboxComponentTokens {

        // And implement hundreds of tokens.
        // You are allowed to give semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomCheckboxComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(checkbox: CustomCheckboxComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(checkbox: CustomCheckboxComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeSizeSemanticTokensProvider for sizes
    // - OrangeThemeBorderSemanticTokensProvider for borders
    let checkboxComponentTokensProvider = OrangeThemeCheckboxComponentTokensProvider()

    // Or use your own size, border, color and opacity semantic tokens providers (or only some)
    let checkboxComponentTokensProvider = OrangeThemeCheckboxComponentTokensProvider(
                                                sizes: CustomSizeSemanticTokensProvider(),
                                                borders: CustomBorderSemanticTokensProvider()))
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.10.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(sizes:borders:)/index.html"><code>init(sizes: (any AllSizeSemanticTokensProvider)?, borders: (any AllBorderSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSCheckbox</code> and <code>OUDSCheckboxItem</code></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="borders/index.html"><code>let borders: any AllBorderSemanticTokensProvider</code><p>Provider of border semantic tokens to use for checkbox borders</p></a></li><li><a href="sizes/index.html"><code>let sizes: any AllSizeSemanticTokensProvider</code><p>Provider of size semantic tokens to use for checkbox sizes</p></a></li></ul></article></noscript><div id="app"></div></body></html>
