<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeTextAreaComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component tokens of text area objects like `OUDSTextArea`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllTextAreaComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeTextAreaComponentTokensProvider`` and apply the provider they need. It implements also the protocol `TextAreaComponentTokens` so as to expose the component tokens for text area through any `OUDSTheme`. Text area components tokens are defined with semantic tokens of sizes (from `AllSizeSemanticTokensProvider`) and spaces (from `AllSpaceSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeTextAreaComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeTextAreaComponentTokensProvider</h1><p>A class which wraps all <b>component tokens of text area</b> objects like <code>OUDSTextArea</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllTextAreaComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeTextAreaComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>TextAreaComponentTokens</code> so as to expose the component tokens for <i>text area</i> through any <code>OUDSTheme</code>. <i>Text area</i> components tokens are defined with semantic tokens of sizes (from <code>AllSizeSemanticTokensProvider</code>) and spaces (from <code>AllSpaceSemanticTokensProvider</code>).</p><pre><code>class OrangeThemeTextAreaComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for text area component tokens
    // by inheriting from existing provider
    class CustomTextAreaComponentTokensProvider: OrangeThemeTextAreaComponentTokensProvider {

        // Then override the text area component tokens you want.

        override var spacePaddingBlock: SpaceSemanticToken { spaces.paddingBlockXl }
        override var sizeMinHeightInput: SizeSemanticToken { DimensionRawTokens._1000 }

        // ...
    }

    // Or define your own provider from scratch
    class CustomTextAreaComponentTokensProvider: TextAreaComponentTokens {

        // And implement maybe hundreds of tokens.
        // You are allowed to use semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomTextAreaComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(textArea: CustomTextAreaComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(textArea: CustomTextAreaComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeSpaceSemanticTokensProvider for spaces
    // - OrangeThemeSizeSemanticTokensProvider for sizes
    let textAreaComponentTokensProvider = OrangeThemeTextAreaComponentTokensProvider()

    // Or use your own size and space semantic tokens providers (or only some)
    let textAreaComponentTokensProvider = OrangeThemeTextAreaComponentTokensProvider(
                                            sizes: CustomSizeSemanticTokensProvider(),
                                            spaces: CustomSpaceSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.17.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(sizes:spaces:)/index.html"><code>init(sizes: (any AllSizeSemanticTokensProvider)?, spaces: (any AllSpaceSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSTextArea</code></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="sizes/index.html"><code>let sizes: any AllSizeSemanticTokensProvider</code><p>Provider of sizes semantic tokens to use for text area sizes</p></a></li><li><a href="spaces/index.html"><code>let spaces: any AllSpaceSemanticTokensProvider</code><p>Provider of spaces semantic tokens to use for text area spaces</p></a></li></ul></article></noscript><div id="app"></div></body></html>
