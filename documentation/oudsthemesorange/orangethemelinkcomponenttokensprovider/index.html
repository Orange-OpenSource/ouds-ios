<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeLinkComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of links for link objects like `OUDSLink`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllLinkComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeLinkComponentTokensProvider`` and apply the provider they need. It implements also the protocol `LinkComponentTokens` so as to expose the component tokens for links through any `OUDSTheme`. Link components tokens are defined with raw and semantic tokens of sizes (from `AllSizeSemanticTokensProvider`), colors (from `AllColorSemanticTokensProvider`) and spaces (from `AllSpaceSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeLinkComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeLinkComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of links</b> for <i>link</i> objects like <code>OUDSLink</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllLinkComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeLinkComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>LinkComponentTokens</code> so as to expose the component tokens for <i>links</i> through any <code>OUDSTheme</code>. <i>Link</i> components tokens are defined with raw and semantic tokens of sizes (from <code>AllSizeSemanticTokensProvider</code>), colors (from <code>AllColorSemanticTokensProvider</code>) and spaces (from <code>AllSpaceSemanticTokensProvider</code>).</p><pre><code>class OrangeThemeLinkComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for link component tokens
    // by inheriting from existing provider
    class CustomLinkComponentTokensProvider: OrangeThemeLinkComponentTokensProvider {

        // Then override the link component tokens you want.

        override var sizeMinHeightMedium: SizeSemanticToken { DimensionRawTokens._600 }

        override var colorChevronHover: MultipleColorSemanticToken { colors.repositoryOpacityBlackHigher }

        override var spaceColumnGapIconSmall: SpaceSemanticToken { spaces.paddingInlineSpacious }

        // ...
    }

    // Or define your own provider from scratch
    class CustomLinkComponentTokensProvider: LinkComponentTokens {

        // And implement hunders of tokens.
        // You are allowed to give semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomLinkComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(link: CustomLinkComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(link: CustomLinkComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeSizeSemanticTokensProvider for sizes
    // - OrangeThemeColorSemanticTokensProvider for colors
    // - OrangeThemeSpaceSemanticTokensProvider for spaces
    let linkComponentTokensProvider = OrangeThemeLinkComponentTokensProvider()

    // Or use your own size, color and space semantic tokens providers (or only some)
    let linkComponentTokensProvider = OrangeThemeLinkComponentTokensProvider(
                                                sizes: CustomSizeSemanticTokensProvider(),
                                                colors: CustomColorSemanticTokensProvider(),
                                                space: CustomSpaceSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.9.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(sizes:colors:spaces:)/index.html"><code>init(sizes: (any AllSizeSemanticTokensProvider)?, colors: (any AllColorSemanticTokensProvider)?, spaces: (any AllSpaceSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSLink</code></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="colors/index.html"><code>let colors: any AllColorSemanticTokensProvider</code><p>Provider of color semantic tokens to use for link colors</p></a></li><li><a href="sizes/index.html"><code>let sizes: any AllSizeSemanticTokensProvider</code><p>Provider of size semantic tokens to use for link sizes</p></a></li><li><a href="spaces/index.html"><code>let spaces: any AllSpaceSemanticTokensProvider</code><p>Provider of spaces semantic tokens to use for link spaces</p></a></li></ul></article></noscript><div id="app"></div></body></html>
