<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeBarComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of bar. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllBarComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeBarComponentTokensProvider`` and apply the provider they need. It implements also the protocol `BarComponentTokens` so as to expose the component tokens for bar through any `OUDSTheme`. Bar components tokens are defined with semantic tokens of colors (`AllColorSemanticTokensProviders`), sizes (from `AllSizeSemanticTokensProvider`), borders (from `AllBorderSemanticTokensProvider`) and effects (from `AllEffectSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeBarComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeBarComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of bar</b>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllBarComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeBarComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>BarComponentTokens</code> so as to expose the component tokens for <i>bar</i> through any <code>OUDSTheme</code>. <i>Bar</i> components tokens are defined with semantic tokens of colors (<code>AllColorSemanticTokensProviders</code>), sizes (from <code>AllSizeSemanticTokensProvider</code>), borders (from <code>AllBorderSemanticTokensProvider</code>) and effects (from <code>AllEffectSemanticTokensProvider</code>).</p><pre><code>class OrangeThemeBarComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for bar component tokens
    // by inheriting from existing provider
    class CustomBarComponentTokensProvider: OrangeThemeBarComponentTokensProvider {

        // Then override the bar component tokens you want.

        override var colorBgOpaque: MultipleColorSemanticToken { colors.bgTertiary }

        override var effectBgBlur: EffectSemanticToken { EffectRawTokens.blur320 }

        override var borderRadiusCurrentIndicatorCustomTop: BorderRadiusSemanticToken { borders.radiusPill }

        override var sizeWidthCurrentIndicatorCustomBottom: SizeSemanticToken { DimensionRawTokens._650 }
        // ...
    }

    // Or define your own provider from scratch
    class CustomBarComponentTokensProvider: BarComponentTokens {

        // And implement maybe hundreds of tokens.
        // You are allowed to give semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomBBarComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(bar: CustomBarComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(bar: CustomBarComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeSizeSemanticTokensProvider for sizes
    // - OrangeThemeColorSemanticTokensProvider for colors
    // - OrangeThemeBordersSemanticTokensProvider for borders
    // - OrangeThemeEffectSemanticTokensProvider for effects
    // - OrangeThemeOpacitiySemanticTokensProvider for opacities
    let barComponentTokensProvider = OrangeThemeBarComponentTokensProvider()

    // Or use your own providers
    let barComponentTokensProvider = OrangeThemeBarComponentTokensProvider(
                    sizes: CustomSizesSemanticTokensProvider(),
                    colors: CustomColorsSemanticTokensProvider(), ...)
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.22.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(sizes:borders:colors:opacities:effects:)/index.html"><code>init(sizes: (any AllSizeSemanticTokensProvider)?, borders: (any AllBorderSemanticTokensProvider)?, colors: (any AllColorSemanticTokensProvider)?, opacities: (any AllOpacitySemanticTokensProvider)?, effects: (any AllEffectSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to bars components</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="borders/index.html"><code>let borders: any AllBorderSemanticTokensProvider</code><p>Provider of borders semantic tokens to use for bar borders</p></a></li><li><a href="colors/index.html"><code>let colors: any AllColorSemanticTokensProvider</code><p>Provider of colors semantic tokens to use for bar colors</p></a></li><li><a href="effects/index.html"><code>let effects: any AllEffectSemanticTokensProvider</code><p>Provider of effects semantic tokens to use for bar effects</p></a></li><li><a href="opacities/index.html"><code>let opacities: any AllOpacitySemanticTokensProvider</code><p>Provider of opacities semantic tokens to use for bar opacities</p></a></li><li><a href="sizes/index.html"><code>let sizes: any AllSizeSemanticTokensProvider</code><p>Provider of sizes semantic tokens to use for bar sizes</p></a></li></ul></article></noscript><div id="app"></div></body></html>
