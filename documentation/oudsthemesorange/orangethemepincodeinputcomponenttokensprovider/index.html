<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemePinCodeInputComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of pin code input objects like `OUDSPinCodeInput`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllPinCodeInputComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemePinCodeInputComponentTokensProvider`` and apply the provider they need. It implements also the protocol `PinceCodeInputComponentTokens` so as to expose the component tokens for pin code input through any `OUDSTheme`. Pin code input components tokens are defined with raw and semantic tokens of dimensions (from `AllDimensionSemanticTokensProvider`), and spaces (from `AllSpaceSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemePinCodeInputComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemePinCodeInputComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of pin code input</b> objects like <code>OUDSPinCodeInput</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllPinCodeInputComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemePinCodeInputComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>PinceCodeInputComponentTokens</code> so as to expose the component tokens for <i>pin code input</i> through any <code>OUDSTheme</code>. <i>Pin code input</i> components tokens are defined with raw and semantic tokens of dimensions (from <code>AllDimensionSemanticTokensProvider</code>), and spaces (from <code>AllSpaceSemanticTokensProvider</code>).</p><pre><code>class OrangeThemePinCodeInputComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for pin code input component tokens
    // by inheriting from existing provider
    class CustomPinCodeInputComponentTokensProvider: OrangeThemePinCodeInputComponentTokensProvider {

        // Then override the input text component tokens you want.

        override var inputTextSizeMaxWidth: SizeSemanticToken { DimensionRawTokens._3000 }

        override var inputTextSpacePaddingBlock: SpaceSemanticToken { spaces.paddingInlineSmall }

        // ...
    }

    // Or define your own provider from scratch
    class CustomPinCodeInputComponentTokensProvider: AllIPinCodeInputComponentTokensProvider {

        // And implement hunders of tokens.
        // You are allowed to give semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomPinCodeInputComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(pinCodeInput: CustomPinCodeInputComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(pinCodeInput: CustomPinCodeInputComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeSpaceSemanticTokensProvider for spaces
    // - OrangeThemeDimensionSemanticTokensProvider for dimensions
    let pintCodeInputComponentTokensProvider = OrangeThemePinCodeInputComponentTokensProvider()

    // Or use your own dimension and space semantic tokens providers (or only some)
    let pintCodeInputComponentTokensProvider = OrangeThemePinCodeInputComponentTokensProvider(
                                                sizes: CustomSpaceSemanticTokensProvider(),
                                                dimensions: CustomDimensionSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.17.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(spaces:dimensions:)/index.html"><code>init(spaces: (any AllSpaceSemanticTokensProvider)?, dimensions: (any AllDimensionSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSPinCodeInput</code></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="dimensions/index.html"><code>let dimensions: any AllDimensionSemanticTokensProvider</code><p>Provider of dimensions semantic tokens to use for pin code input dimensions</p></a></li><li><a href="spaces/index.html"><code>let spaces: any AllSpaceSemanticTokensProvider</code><p>Provider of spaces semantic tokens to use for pin code input spaces</p></a></li></ul></article></noscript><div id="app"></div></body></html>
