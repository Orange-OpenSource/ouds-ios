<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeDividerComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of divider for divider objects like `OUDSHorizontalDivider` and `OUDSVerticalDivider`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllDividerComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeDividerComponentTokensProvider`` and apply the provider they need. It implements also the protocol `DividerComponentTokens` so as to expose the component tokens for divider through any `OUDSTheme`. Divider components tokens are defined with raw and semantic tokens of borders (from `AllBorderSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeDividerComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeDividerComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of divider</b> for <i>divider</i> objects like <code>OUDSHorizontalDivider</code> and <code>OUDSVerticalDivider</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllDividerComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeDividerComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>DividerComponentTokens</code> so as to expose the component tokens for <i>divider</i> through any <code>OUDSTheme</code>. <i>Divider</i> components tokens are defined with raw and semantic tokens of borders (from <code>AllBorderSemanticTokensProvider</code>).</p><pre><code>class OrangeThemeDividerComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for chip component tokens
    // by inheriting from existing provider
    class CustomDividerComponentTokensProvider: OrangeThemeDividerComponentTokensProvider {

        // Then override the chip component tokens you want.

        override var borderWidth: BorderWidthSemanticToken { borders.widthmediumt }

        // ...
    }

    // Or define your own provider from scratch
    class CustomDividerComponentTokensProvider: ChipComponentTokens {

        // And implement hunders of tokens.
        // You are allowed to give semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomDividerComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(divider: CustomDividerComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(divider: CustomDividerComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeBorderSemanticTokensProvider for borders
    let dividerComponentTokensProvider = OrangeThemeDividerComponentTokensProvider()

    // Or use your own border semantic tokens providers
    let dividerComponentTokensProvider = OrangeThemeDividerComponentTokensProvider(
                                                borders: CustomBorderSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.13.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(borders:)/index.html"><code>init(borders: (any AllBorderSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSHorizontalDivider</code> and <code>OUDSVerticalDivider</code></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="borders/index.html"><code>let borders: any AllBorderSemanticTokensProvider</code><p>Provider of border semantic tokens to use for chip sizes</p></a></li></ul></article></noscript><div id="app"></div></body></html>
