<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeAlertComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of alert for alert objects like `OUDSAlert`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllAlertComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeAlertComponentTokensProvider`` and apply the provider they need. It implements also the protocol `AlertComponentTokens` so as to expose the component tokens for alert through any `OUDSTheme`. Alert components tokens are defined with semantic tokens of borders (`AllBorderSemanticTokensProviders`), spaces (from `AllSpaceSemanticTokensProvider`) and sizes (from `AllSizeSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeAlertComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeAlertComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of alert</b> for <i>alert</i> objects like <code>OUDSAlert</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllAlertComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeAlertComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>AlertComponentTokens</code> so as to expose the component tokens for <i>alert</i> through any <code>OUDSTheme</code>. <i>Alert</i> components tokens are defined with semantic tokens of borders (<code>AllBorderSemanticTokensProviders</code>), spaces (from <code>AllSpaceSemanticTokensProvider</code>) and sizes (from <code>AllSizeSemanticTokensProvider</code>).</p><pre><code>class OrangeThemeAlertComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for alert component tokens
    // by inheriting from existing provider
    class CustomAlertComponentTokensProvider: OrangeThemeAlertComponentTokensProvider {

        // Then override the alert component tokens you want.

        override var sizeIcon: SizeSemanticToken { DimensionRawTokens._100 }

        override var spacePaddingBlock: SpaceSemanticToken { DimensionRawTokens.outOfSystem75 }

        // ...
    }

    // Or define your own provider from scratch
    class CustomAlertComponentTokensProvider: AlertComponentTokens {

        // And implement hundreds of tokens.
        // You are allowed to give semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomAlertComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(alert: CustomAlertComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(alert: CustomAlertComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeSizeSemanticTokensProvider for sizes
    // - OrangeThemeSpaceSemanticTokensProvider for sizes
    // - OrangeThemeBorderSemanticTokensProvider for sizes
    let alertComponentTokensProvider = OrangeThemeAlertComponentTokensProvider()

    // Or use your own semantic tokens providers
    let alertComponentTokensProvider = OrangeThemeAlertComponentTokensProvider(
                    sizes: CustomSizeSemanticTokensProvider(),
                    borders: CustomBorderSemanticTokensProvider(),
                    spaces: CustomSpaceSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>1.2.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(sizes:borders:spaces:)/index.html"><code>init(sizes: (any AllSizeSemanticTokensProvider)?, borders: (any AllBorderSemanticTokensProvider)?, spaces: (any AllSpaceSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSAlert</code></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="borders/index.html"><code>let borders: any AllBorderSemanticTokensProvider</code><p>Provider of borders semantic tokens to use for alert borders</p></a></li><li><a href="sizes/index.html"><code>let sizes: any AllSizeSemanticTokensProvider</code><p>Provider of sizes semantic tokens to use for alert sizes</p></a></li><li><a href="spaces/index.html"><code>let spaces: any AllSpaceSemanticTokensProvider</code><p>Provider of spaces semantic tokens to use for alert spaces</p></a></li></ul></article></noscript><div id="app"></div></body></html>
