<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeSkeletonComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of skeleton for skeleton objects like `OUDSSkeleton`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllSkeletonComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeSkeletonComponentTokensProvider`` and apply the provider they need. It implements also the protocol `SkeletonComponentTokens` so as to expose the component tokens for skeleton through any `OUDSTheme`. Skeleton components tokens are defined with semantic tokens of colors (from `AllColorSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeSkeletonComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeSkeletonComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of skeleton</b> for <i>skeleton</i> objects like <code>OUDSSkeleton</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllSkeletonComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeSkeletonComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>SkeletonComponentTokens</code> so as to expose the component tokens for <i>skeleton</i> through any <code>OUDSTheme</code>. <i>Skeleton</i> components tokens are defined with semantic tokens of colors (from <code>AllColorSemanticTokensProvider</code>).</p><pre><code>class OrangeThemeSkeletonComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for skeleton component tokens
    // by inheriting from existing provider
    class CustomSkeletonComponentTokensProvider: OrangeThemeSkeletonComponentTokensProvider {

        // Then override the skeleton component tokens you want.

        override var colorGradientMiddle:  MultipleColorSemanticToken { colors.repositoryOpacityBlackHigher }

        // ...
    }

    // Or define your own provider from scratch
    class CustomSkeletonComponentTokensProvider: SkeletonComponentTokens {

        // And implement maybe hundreds of tokens.
        // You are allowed to use semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomSkeletonComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(skeleton: CustomSkeletonComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(skeleton: CustomSkeletonComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeColorSemanticTokensProvider for colors
    let skeletonComponentTokensProvider = OrangeThemeSkeletonComponentTokensProvider()

    // Or use your own color semantic tokens providers (or only some)
    let skeletonComponentTokensProvider = OrangeThemeSkeletonComponentTokensProvider(
                                                colors: CustomColorSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.9.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(colors:)/index.html"><code>init(colors: (any AllColorSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSSkeleton</code></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="colors/index.html"><code>let colors: any AllColorSemanticTokensProvider</code><p>Provider of color semantic tokens to use for link colors</p></a></li></ul></article></noscript><div id="app"></div></body></html>
