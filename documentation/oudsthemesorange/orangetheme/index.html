<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeTheme</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="The Orange theme is the bsic, default, theme for any Orange products. This is an override of the abtract `OUDSTheme` and must be seen as the default theme for the OUDS library. It can override any properties from its superclass, and can be derived too." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeTheme</li></ul><p>Class</p><h1>OrangeTheme</h1><p>The Orange theme is the bsic, default, theme for any Orange products. This is an override of the abtract <code>OUDSTheme</code> and <b>must be seen as the default theme for the OUDS library</b>. It can override any properties from its superclass, and can be derived too.</p><pre><code>class OrangeTheme</code></pre></section><h2>Overview</h2><h1>Usages</h1><p>Any Orange products must use this theme. It provides core and Orange colors and any elements for sizings, spacings and dimensions for example. The system font families are used; no <i>Helevetica</i> font family is embeded nor providd  by OUDS. This theme also provides colors charts tokens.</p><p>The theme can be got through environment variable:</p><pre class="swift"><code>    @Environment(\.theme) var theme
</code></pre><h2>Integration</h2><p>To use this theme, inject it to your view using <code>OUDSThemeableView</code> and get it through environment variable.</p><pre class="swift"><code>    @main
    struct YourApp: App {
        var body: some Scene {
            WindowGroup {
                OUDSThemeableView(theme: OrangeTheme()) {
                    // Your root view
                }
            }
        }
    }
</code></pre><h2>Theme tuning</h2><p>The theme can be customized a bit for more flexibility thanks to <code>Tuning</code> object. You just need to give a predefined tuning configuration at theme init to build the one you need.</p><p>To apply the tuning:</p><pre class="swift"><code>    // Define your theme tuning
    let tuning = Tuning(hasRoundedButtons: true, hasRoundedTextInputs: true, hasRoundedAlertMessages: true)

    // Apply it to your theme
    let theme = OrangeTheme(tuning: tuning)
    // Or in one line
    let theme = OrangeTheme(tuning: Tuning(hasRoundedButtons: true, hasRoundedTextInputs: true, hasRoundedAlertMessages: true))

    // Or apply predefined tunings
    let orangeFranceTheme = OrangeTheme(tuning: Tuning.OrangeFrance)
    let orangeBusinessTheme = OrangeTheme(tuning: Tuning.OrangeBusiness)
    let maxitTheme = OrangeTheme(tuning: Tuning.MaxIt)
</code></pre><h2>Typography</h2><h3>Helvetica Neue</h3><p>The Orange brand strongly relies on the <i>Helvetica Neue</i> font family. Thus each Orange brand should, or must, use it. For iOS the <i>Helvetica Neue</i> font family is available at system level, so it is not needed to get it through external assets. By default an instance of <code>OrangeTheme</code> uses as font family the token <code>OrangeBrandFontRawTokens.familyBrandDefault</code>, which is today <i>Helvetica Neue</i>. If you want to use another font family, you will have to send the suitable token or the suitable font family. However, beware, iOS API relies also on the PostScript name of the font. To be sure of the value to use, look at the font book of your device. It is recommended to use the font raw tokens.</p><pre class="swift"><code>    // The following instanciations work
    let orangeTheme = OrangeTheme()
    let orangeTheme = OrangeTheme(fontFamily: OrangeBrandFontRawTokens.familyBrandDefault)
    let orangeTheme = OrangeTheme(fontFamily: "HelveticaNeue") // Which is PostScript name of the font
    let orangeTheme = OrangeTheme(fontFamily: "Helvetica Neue") // Which is font family nale
</code></pre><h3>Helvetica Neue Arabic</h3><p>Because the <i>Helvetica Neue</i> font family does not manage arabic alphabet but latin one, it is possible apply another font family to the theme like the <i>Helvetica Neue Arabic</i>. This font family assets can be retrieved through the <a href="https://brand.orange.com/en/brand-basics/typography">Orange Brand website (authentication needed)</a>. PostScript name management has been implemented for this font family, thus the weight are managed and it is only needed to add the font assets to the project, register them and define the font family name to use.</p><pre class="swift"><code>    let orangeTheme = OrangeTheme(family: "Helvetica Neue Arabic")
</code></pre><h2>Tokens loading</h2><p>You can also use some tokens providers defined in your side, but they must match the same type as the one used on the themes (see <code>OUDSTheme</code>). For example:</p><pre class="swift"><code>   // Use some already defined providers
   let borders = OrangeThemeBorderSemanticTokensProvider()
   let sizes = OrangeThemeSizeSemanticTokensProvider()
   let spaces = OrangeThemeSpaceSemanticTokensProvider()

   // For example, use your own provider of color semantic tokens
   // It must inherit from OrangeThemeBorderSemanticTokensProvider (which is instance of AllColorSemanticTokensProvider) or directly implement AllColorSemanticTokensProvider
   let colors = YourOwnColorSemanticTokensProvider()

   // Some providers need other providers to use their tokens
   let button = OrangeThemeButtonComponentTokensProvider(sizes: sizes, borders: borders, colors: colors, spaces: spaces)

   // But you can also use the providers as they are without assigning semantic tokens providers
   // and just use the default ones
   let badge = OrangeThemeBadgeComponentTokensProvider()

   // Define in the end your theme by overriding some providers.
   // You can override all providers, or only some, or just keep the theme as is.
   // However you should uses thhese providers in a dedicated Orange theme subclass for clarity reasons.
   let yourOwnOrangeTheme = OrangeTheme(colors: colors, borders: borders, sizes: sizes, spaces: spaces, button: button, badge: badge)
</code></pre><h2>Tokens versions</h2><ul><li><p>Core OUDS version: 1.10.0</p></li><li><p>Core Orange version: 1.2.0</p></li><li><p>Brand Orange version: 2.5.0</p></li></ul><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(borders:colors:colormodes:colorscharts:colorsdecorative:effects:elevations:fonts:grids:opacities:dimensions:sizes:spaces:alert:badge:bar:bulletlist:button:checkbox:chip:controlitem:divider:icon:link:pincodeinput:quantityinput:radiobutton:selectinput:skeleton:switch:tag:inputtag:textarea:textinput:resourcesbundle:name:fontfamily:tuning:)/index.html"><code>init(borders: (any AllBorderSemanticTokensProvider)?, colors: (any AllColorSemanticTokensProvider)?, colorModes: (any AllColorModeSemanticTokensProvider)?, colorsCharts: (any AllColorChartSemanticTokensProvider)?, colorsDecorative: (any AllColorDecorativeSemanticTokensProvider)?, effects: (any AllEffectSemanticTokensProvider)?, elevations: (any AllElevationSemanticTokensProvider)?, fonts: (any AllFontSemanticTokensProvider)?, grids: (any AllGridSemanticTokensProvider)?, opacities: (any AllOpacitySemanticTokensProvider)?, dimensions: (any AllDimensionSemanticTokensProvider)?, sizes: (any AllSizeSemanticTokensProvider)?, spaces: (any AllSpaceSemanticTokensProvider)?, alert: (any AllAlertComponentTokensProvider)?, badge: (any AllBadgeComponentTokensProvider)?, bar: (any AllBarComponentTokensProvider)?, bulletList: (any AllBulletListComponentTokensProvider)?, button: (any AllButtonComponentTokensProvider)?, checkbox: (any AllCheckboxComponentTokensProvider)?, chip: (any AllChipComponentTokensProvider)?, controlItem: (any AllControlItemComponentTokensProvider)?, divider: (any AllDividerComponentTokensProvider)?, icon: (any AllIconComponentTokensProvider)?, link: (any AllLinkComponentTokensProvider)?, pinCodeInput: (any AllPinCodeInputComponentTokensProvider)?, quantityInput: (any AllQuantityInputComponentTokensProvider)?, radioButton: (any AllRadioButtonComponentTokensProvider)?, selectInput: (any AllSelectInputComponentTokensProvider)?, skeleton: (any AllSkeletonComponentTokensProvider)?, switch: (any AllSwitchComponentTokensProvider)?, tag: (any AllTagComponentTokensProvider)?, inputTag: (any AllInputTagComponentTokensProvider)?, textArea: (any AllTextAreaComponentTokensProvider)?, textInput: (any AllTextInputComponentTokensProvider)?, resourcesBundle: Bundle, name: String, fontFamily: FontFamilySemanticToken?, tuning: Tuning)</code><p>Constructor of the Orange theme. It needs several tokens providers for semantic tokens and component tokens. If a nil token provider is given, the default version associated fo the theme is used.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
