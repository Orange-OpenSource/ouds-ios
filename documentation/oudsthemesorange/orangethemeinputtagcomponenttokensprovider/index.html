<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeInputTagComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of tag input objects like `OUDSInputTag`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllInputTagComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeInputTagComponentTokensProvider`` and apply the provider they need. It implements also the protocol `InputTagComponentTokens` so as to expose the component tokens for tag inputs through any `OUDSTheme`. Tag inputs components tokens are defined with semantic tokens of colors (from `AllColorSemanticTokensProvider`), and borders (from `AllBorderSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeInputTagComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeInputTagComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of tag input</b> objects like <code>OUDSInputTag</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllInputTagComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeInputTagComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>InputTagComponentTokens</code> so as to expose the component tokens for <i>tag inputs</i> through any <code>OUDSTheme</code>. <i>Tag inputs</i> components tokens are defined with semantic tokens of colors (from <code>AllColorSemanticTokensProvider</code>), and borders (from <code>AllBorderSemanticTokensProvider</code>).</p><pre><code>class OrangeThemeInputTagComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for tag input component tokens
    // by inheriting from existing provider
    class CustomInputTagComponentTokensProvider: OrangeThemeInputTagComponentTokensProvider {

        // Then override the tag component tokens you want.

        override var borderRadius: BorderRadiusSemanticToken  { borders.radiusNone }

        override var colorBgPressed: MultipleColorSemanticToken { colors.actionPressed }

        // ...
    }

    // Or define your own provider from scratch
    class CustomInputTagComponentTokensProvider: InputTagComponentTokens {

        // And implement maybe hundreds of tokens.
        // You are allowed to use semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomInputTagComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(inputTag: CustomInputTagComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(inputTag: CustomInputTagComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeBorderSemanticTokensProvider for borders
    // - OrangeThemColorSemanticTokensProvider for colors
    let inputTagComponentTokensProvider = OrangeThemeInputTagComponentTokensProvider()

    // Or use your own space, size and border semantic tokens providers (or only some)
    let inputTagComponentTokensProvider = OrangeThemeInputTagComponentTokensProvider(
                                            borders: CustomBorderSemanticTokensProvider(),
                                            colors: CustomColorSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.17.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(borders:colors:)/index.html"><code>init(borders: (any AllBorderSemanticTokensProvider)?, colors: (any AllColorSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSInputTag</code></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="borders/index.html"><code>let borders: any AllBorderSemanticTokensProvider</code><p>Provider of border semantic tokens to use for tag input borders</p></a></li><li><a href="colors/index.html"><code>let colors: any AllColorSemanticTokensProvider</code><p>Provider of space semantic tokens to use for tag input colors</p></a></li></ul></article></noscript><div id="app"></div></body></html>
