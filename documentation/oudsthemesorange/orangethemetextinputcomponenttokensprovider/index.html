<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeTextInputComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of input text for input text objects like `OUDSTextInput`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllTextInputComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeTextInputComponentTokensProvider`` and apply the provider they need. It implements also the protocol `TextInputComponentTokens` so as to expose the component tokens for input text through any `OUDSTheme`. Inout text components tokens are defined with raw and semantic tokens of colors (`AllColorSemanticTokensProvider`), borders (from `AllBorderSemanticTokensProvider`), spaces (from `AllSpaceSemanticTokensProvider`) and  dimensions (from `AllDimensionSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeTextInputComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeTextInputComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of input text</b> for <i>input text</i> objects like <code>OUDSTextInput</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllTextInputComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeTextInputComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>TextInputComponentTokens</code> so as to expose the component tokens for <i>input text</i> through any <code>OUDSTheme</code>. <i>Inout text</i> components tokens are defined with raw and semantic tokens of colors (<code>AllColorSemanticTokensProvider</code>), borders (from <code>AllBorderSemanticTokensProvider</code>), spaces (from <code>AllSpaceSemanticTokensProvider</code>) and  dimensions (from <code>AllDimensionSemanticTokensProvider</code>).</p><pre><code>class OrangeThemeTextInputComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for input text component tokens
    // by inheriting from existing provider
    class CustomTextInputComponentTokensProvider: OrangeThemeTextInputComponentTokensProvider {

        // Then override the text input component tokens you want.

        override var sizeMaxWidth: SizeSemanticToken { DimensionRawTokens._3000 }

        override var spacePaddingBlockDefault: SpaceSemanticToken { spaces.paddingInlineSmall }

        override var colorBorderEnabled: MultipleColorSemanticToken { colors.repositoryOpacityBlackHigher }

        override var borderWidthDefault: BorderWidthSemanticToken { borders.widthMedium}

        // ...
    }

    // Or define your own provider from scratch
    class CustomTextInputComponentTokensProvider: TextInputComponentTokens {

        // And implement hunders of tokens.
        // You are allowed to give semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomTextInputComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(textInput: CustomTextInputComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(textInput: CustomTextInputComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeSizeSemanticTokensProvider for sizes
    // - OrangeThemeColorSemanticTokensProvider for colors
    // - OrangeThemeBorderSemanticTokensProvider for borders
    // - OrangeThemeSpaceSemanticTokensProvider for spaces
    // - OrangeThemeDimensionSemanticTokensProvider for dimensions
    let inputTextComponentTokensProvider = OrangeThemeTextInputComponentTokensProvider()

    // Or use your own size, border, color, space and _ semantic tokens providers (or only some)
    let inputTextComponentTokensProvider = OrangeThemeTextInputComponentTokensProvider(
                                                sizes: CustomSizeSemanticTokensProvider(),
                                                borders: CustomBorderSemanticTokensProvider(),
                                                colors: CustomColorSemanticTokensProvider(),
                                                space: CustomSpaceSemanticTokensProvider(),
                                                dimensions: CustomDimensionSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.17.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(sizes:borders:colors:spaces:dimensions:)/index.html"><code>init(sizes: (any AllSizeSemanticTokensProvider)?, borders: (any AllBorderSemanticTokensProvider)?, colors: (any AllColorSemanticTokensProvider)?, spaces: (any AllSpaceSemanticTokensProvider)?, dimensions: (any AllDimensionSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSTextInput</code></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="borders/index.html"><code>let borders: any AllBorderSemanticTokensProvider</code><p>Provider of borders semantic tokens to use for text input colors</p></a></li><li><a href="colors/index.html"><code>let colors: any AllColorSemanticTokensProvider</code><p>Provider of color semantic tokens to use for text input colors</p></a></li><li><a href="dimensions/index.html"><code>let dimensions: any AllDimensionSemanticTokensProvider</code><p>Provider of dimensions semantic tokens to use for text input dimensions</p></a></li><li><a href="sizes/index.html"><code>let sizes: any AllSizeSemanticTokensProvider</code><p>Provider of sizes semantic tokens to use for text input sizes</p></a></li><li><a href="spaces/index.html"><code>let spaces: any AllSpaceSemanticTokensProvider</code><p>Provider of spaces semantic tokens to use for text input spaces</p></a></li></ul></article></noscript><div id="app"></div></body></html>
