<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeControlItemComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens for components with a control item layout like `OUDSSwitch`, `OUDSRadioButton` and `OUDSCheckboItem`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllControlItemComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeControlItemComponentTokensProvider`` and apply the provider they need. It implements also the protocol `ControlItemComponentTokens` so as to expose the component tokens for control-item-layout-basded components through any `OUDSTheme`. Such components tokens are defined with raw and semantic tokens of sizes (from `SizeSemanticTokensProvider`), borders (from `AllBorderSemanticTokensProvider`),  colors (from `AllColorSemanticTokensProvider`)  and spaces (from `AllSpaceSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeControlItemComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeControlItemComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens</b> for components with a <i>control item</i> layout like <code>OUDSSwitch</code>, <code>OUDSRadioButton</code> and <code>OUDSCheckboItem</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllControlItemComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeControlItemComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>ControlItemComponentTokens</code> so as to expose the component tokens for control-item-layout-basded components through any <code>OUDSTheme</code>. Such components tokens are defined with raw and semantic tokens of sizes (from <code>SizeSemanticTokensProvider</code>), borders (from <code>AllBorderSemanticTokensProvider</code>),  colors (from <code>AllColorSemanticTokensProvider</code>)  and spaces (from <code>AllSpaceSemanticTokensProvider</code>).</p><pre><code>class OrangeThemeControlItemComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for control-item-layout-based component tokens
    // by inheriting from existing provider
    class CustomControlItemComponentTokensProvider: OrangeThemeControlItemComponentTokensProvider {

        // Then override the control-item-layout-based component tokens you want.

        override var sizeMinHeight: SizeSemanticToken { DimensionRawTokens._500 }

        override var colorBgFocus: MultipleColorSemanticToken { colors.contentDefault }

        override var spaceRowGap: SpaceSemanticToken { spaces.paddingInlineTall }

        // ...
    }

    // Or define your own provider from scratch
    class CustomControlItemComponentTokensProvider: ControlItemComponentTokens {

        // And implement hundreds of tokens.
        // You are allowed to give semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomControlItemComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(controlItem: CustomControlItemComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(controlItem: CustomControlItemComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeSizeSemanticTokensProvider for sizes
    // - OrangeThemeBorderSemanticTokensProvider for borders
    // - OrangeThemeColorSemanticTokensProvider for colors
    // - OrangeThemeSpaceSemanticTokensProvider for spaces
    let controlItemComponentTokensProvider = OrangeThemeControlItemComponentTokensProvider()

    // Or use your own size, color and space semantic tokens providers (or only some)
    let controlItemComponentTokensProvider = OrangeThemeControlItemComponentTokensProvider(
                                                sizes: CustomSizeSemanticTokensProvider(),
                                                borders: CustomBorderSemanticTokensProvider(),
                                                colors: CustomColorSemanticTokensProvider(),
                                                space: CustomSpaceSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.10.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(sizes:borders:colors:spaces:opacities:dimensions:)/index.html"><code>init(sizes: (any AllSizeSemanticTokensProvider)?, borders: (any AllBorderSemanticTokensProvider)?, colors: (any AllColorSemanticTokensProvider)?, spaces: (any AllSpaceSemanticTokensProvider)?, opacities: (any AllOpacitySemanticTokensProvider)?, dimensions: (any AllDimensionSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to control-item-layout-based components.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="borders/index.html"><code>let borders: any AllBorderSemanticTokensProvider</code><p>Provider of border semantic tokens to use for button borders</p></a></li><li><a href="colors/index.html"><code>let colors: any AllColorSemanticTokensProvider</code><p>Provider of color semantic tokens to use for control-item-layout-based colors</p></a></li><li><a href="dimensions/index.html"><code>let dimensions: any AllDimensionSemanticTokensProvider</code><p>Provider of dimension semantic tokens to use for control-item-layout-based dimensions</p></a></li><li><a href="opacities/index.html"><code>let opacities: any AllOpacitySemanticTokensProvider</code><p>Provider of opacity semantic tokens to use for control-item-layout-based opacities</p></a></li><li><a href="sizes/index.html"><code>let sizes: any AllSizeSemanticTokensProvider</code><p>Provider of size semantic tokens to use for control-item-layout-based sizes</p></a></li><li><a href="spaces/index.html"><code>let spaces: any AllSpaceSemanticTokensProvider</code><p>Provider of spaces semantic tokens to use for control-item-layout-based spaces</p></a></li></ul></article></noscript><div id="app"></div></body></html>
