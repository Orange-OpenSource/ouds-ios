<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeOpacitySemanticTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all opacity semantic tokens and expose them. This provider should be integrated as a `AllOpacitySemanticTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeOpacitySemanticTokensProvider</li></ul><p>Class</p><h1>OrangeThemeOpacitySemanticTokensProvider</h1><p>A class which wraps all <b>opacity semantic tokens</b> and expose them. This provider should be integrated as a <code>AllOpacitySemanticTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use.</p><pre><code>class OrangeThemeOpacitySemanticTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for opacity semantic tokens
    class CustomOpacityTokensProvider: OrangeThemeOpacitySemanticTokensProvider {

        // Then override the opacity semantic tokens you want, using the opacity raw tokens available

        override var strong: OpacitySemanticToken {
            OpacityRawTokens._920
        }
}
</code></pre><p>Then, you can give this <code>CustomOpacityTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(opacities: CustomOpacityTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(opacities: CustomOpacityTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init()/index.html"><code>init()</code><p>Intializes the provider</p></a></li></ul></article></noscript><div id="app"></div></body></html>
