<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeIconComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of icons for icons used in some components like `OUDSTag`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllIconComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeIconComponentTokensProvider`` and apply the provider they need. It implements also the protocol `IconomponentTokens` so as to expose the component tokens for icons through any `OUDSTheme`. Icons components tokens are defined with raw and semantic tokens of colors (from `AllColorSemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeIconComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeIconComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of icons</b> for <i>icons</i> used in some components like <code>OUDSTag</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllIconComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeIconComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>IconomponentTokens</code> so as to expose the component tokens for <i>icons</i> through any <code>OUDSTheme</code>. <i>Icons</i> components tokens are defined with raw and semantic tokens of colors (from <code>AllColorSemanticTokensProvider</code>).</p><pre><code>class OrangeThemeIconComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for icons component tokens
    // by inheriting from existing provider
    class CustomIconComponentTokensProvider: OrangeThemeIconComponentTokensProvider {

        // Then override the icon component tokens you want.

        override var colorContentStatusWarningExternalShape: MultipleColorSemanticToken { colors.repositoryOpacityBlackHigher }

        // ...
    }

    // Or define your own provider from scratch
    class CustomIconComponentTokensProvider: IconComponentTokens {

        // And implement hunders of tokens.
        // You are allowed to give semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomIconComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(icon: CustomIconComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(icon: CustomIconComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeColorSemanticTokensProvider for colors
    let iconComponentTokensProvider = OrangeThemeIconComponentTokensProvider()

    // Or use your color semantic tokens providers (or only some)
    let iconComponentTokensProvider = OrangeThemeIconComponentTokensProvider(
                                                colors: CustomColorSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.20.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(colors:)/index.html"><code>init(colors: (any AllColorSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to icons</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="colors/index.html"><code>let colors: any AllColorSemanticTokensProvider</code><p>Provider of color semantic tokens to use for link colors</p></a></li></ul></article></noscript><div id="app"></div></body></html>
