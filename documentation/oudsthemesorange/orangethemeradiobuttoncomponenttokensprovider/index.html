<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeRadioButtonComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of radio button for  radios objects like `OUDSRadioButton` and `OUDSRadioButtonItem`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllRadioButtonComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeRadioButtonComponentTokensProvider`` and apply the provider they need. It implements also the protocol `RadioButtonComponentTokens` so as to expose the component tokens for radio buttons through any `OUDSTheme`. Radio buttons components tokens are defined with raw and semantic tokens of sizes (from `SizeSemanticToken`) and borders (`BorderRadiusSemanticToken`, `BorderWidthSemanticToken`). These components share the same type of tokens which are all gathered here." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeRadioButtonComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeRadioButtonComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of radio button</b> for  <i>radios</i> objects like <code>OUDSRadioButton</code> and <code>OUDSRadioButtonItem</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllRadioButtonComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeRadioButtonComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>RadioButtonComponentTokens</code> so as to expose the component tokens for <i>radio buttons</i> through any <code>OUDSTheme</code>. <i>Radio buttons</i> components tokens are defined with raw and semantic tokens of sizes (from <code>SizeSemanticToken</code>) and borders (<code>BorderRadiusSemanticToken</code>, <code>BorderWidthSemanticToken</code>). These components share the same type of tokens which are all gathered here.</p><pre><code>class OrangeThemeRadioButtonComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for radio button component tokens
    // by inheriting from existing provider
    class CustomRadioButtonComponentTokensProvider: OrangeThemeRadioButtonComponentTokensProvider {

        // Then override the radio button component tokens you want.

        override var sizeMinWidth: SizeSemanticToken { sizes.iconWithLabelLargeSizeXl }

        override var borderWidthSelected: BorderWidthSemanticToken { borders.widthThin }

        // ...
    }

    // Or define your own provider from scratch
    class CustomRadioButtonComponentTokensProvider: RadioButtonComponentTokens {

        // And implement hundreds of tokens.
        // You are allowed to give semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomRadioButtonComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(radioButton: CustomRadioButtonComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(radioButton: CustomRadioButtonComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeSizeSemanticTokensProvider for sizes
    // - OrangeThemeBorderSemanticTokensProvider for borders
    let radioButtonComponentTokensProvider = OrangeThemeRadioButtonComponentTokensProvider()

    // Or use your own size, border, color and opacity semantic tokens providers (or only some)
    let radioButtonComponentTokensProvider = OrangeThemeRadioButtonComponentTokensProvider(
                                                sizes: CustomSizeSemanticTokensProvider(),
                                                borders: CustomBorderSemanticTokensProvider()))
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.12.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(sizes:borders:)/index.html"><code>init(sizes: (any AllSizeSemanticTokensProvider)?, borders: (any AllBorderSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSRadioButton</code> and <code>OUDSRadioButtonItem</code>.</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="borders/index.html"><code>let borders: any AllBorderSemanticTokensProvider</code><p>Provider of border semantic tokens to use for check / radio borders</p></a></li><li><a href="sizes/index.html"><code>let sizes: any AllSizeSemanticTokensProvider</code><p>Provider of size semantic tokens to use for check / radio sizes</p></a></li></ul></article></noscript><div id="app"></div></body></html>
