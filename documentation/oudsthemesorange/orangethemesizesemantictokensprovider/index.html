<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeSizeSemanticTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all size semantic tokens, multiple or not, and expose them. This provider should be integrated as a `AllSizeSemanticTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Closed tokens of dimensions (`AllDimensionSemanticTokensProvider`) are used so as to keep consistancy beweetn Figma specifications and library for developers." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeSizeSemanticTokensProvider</li></ul><p>Class</p><h1>OrangeThemeSizeSemanticTokensProvider</h1><p>A class which wraps all <b>size semantic tokens</b>, <i>multiple</i> or not, and expose them. This provider should be integrated as a <code>AllSizeSemanticTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Closed tokens of dimensions (<code>AllDimensionSemanticTokensProvider</code>) are used so as to keep consistancy beweetn Figma specifications and library for developers.</p><pre><code>class OrangeThemeSizeSemanticTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for size semantic tokens
    class CustomSizeTokensProvider: OrangeThemeSizeSemanticTokensProvider {

        // Then override the size semantic tokens you want, using the _ raw tokens available

        override var iconDecorative2xl: SizeSemanticToken {
            DimensionRawTokens._300
        }

        override var iconDecorativeMd: SizeSemanticToken {
            DimensionRawTokens._900
        }
}
</code></pre><p>Then, you can give this <code>CustomSizeTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(sizes: CustomSizeTokensProvider(dimensions: CustomDimensionSemanticTokensProvider()))
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(sizes: CustomSizeTokensProvider(dimensions: CustomDimensionSemanticTokensProvider()))
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(dimensions:)/index.html"><code>init(dimensions: (any AllDimensionSemanticTokensProvider)?)</code><p>Intializes the provider</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="dimensions/index.html"><code>let dimensions: any AllDimensionSemanticTokensProvider</code><p>Provider of <i>dimensions</i> semantic tokens to use for spaces as the Swift package exposes “closed” tokens of Figma</p></a></li></ul></article></noscript><div id="app"></div></body></html>
