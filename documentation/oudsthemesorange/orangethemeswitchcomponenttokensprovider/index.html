<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeSwitchComponentTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all component  tokens of switch for switch / toggle objects like `OUDSSwitch`. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a `AllSwitchComponentTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use. Custom themes can use subclass of ``doc://OUDSThemesOrange/documentation/OUDSThemesOrange/OrangeThemeSwitchComponentTokensProvider`` and apply the provider they need. It implements also the protocol `SwitchComponentTokens` so as to expose the component tokens for switch / toggle through any `OUDSTheme`. Switch components tokens are defined with semantic tokens of colors (from `AllColorSemanticTokensProvider`), spaces (from `AllSpacesSemanticTokensProvider`) ,  dimensions (`AllDimensionSemanticTokensProvider`), sizes (`AllSizeSemanticTokensProvider`), borders (`AllBorderSemanticTokensProvider`) and opacities (`AllOpacitiySemanticTokensProvider`)." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeSwitchComponentTokensProvider</li></ul><p>Class</p><h1>OrangeThemeSwitchComponentTokensProvider</h1><p>A class which wraps all <b>component  tokens of switch</b> for <i>switch / toggle</i> objects like <code>OUDSSwitch</code>. Contains also references to semantic tokens providers so as to be able to use them to define the component tokens. This provider should be integrated as a <code>AllSwitchComponentTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use. Custom themes can use subclass of <a href="."><code>OrangeThemeSwitchComponentTokensProvider</code></a> and apply the provider they need. It implements also the protocol <code>SwitchComponentTokens</code> so as to expose the component tokens for <i>switch / toggle</i> through any <code>OUDSTheme</code>. <i>Switch</i> components tokens are defined with semantic tokens of colors (from <code>AllColorSemanticTokensProvider</code>), spaces (from <code>AllSpacesSemanticTokensProvider</code>) ,  dimensions (<code>AllDimensionSemanticTokensProvider</code>), sizes (<code>AllSizeSemanticTokensProvider</code>), borders (<code>AllBorderSemanticTokensProvider</code>) and opacities (<code>AllOpacitiySemanticTokensProvider</code>).</p><pre><code>class OrangeThemeSwitchComponentTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for switch component tokens
    // by inheriting from existing provider
    class CustomSwitchComponentTokensProvider: OrangeThemeSwitchComponentTokensProvider {

        // Then override the switch component tokens you want.

        override var colorCursor: MultipleColorSemanticToken { colors.repositoryPositiveMedium }

        override var spacePaddingInlineUnselected: SpaceSemanticToken { spaces.fixed2xsmall }

        override var size: SizeSemanticToken { sizes.iconWithLabelLargeSizeXl }
        // ...
    }

    // Or define your own provider from scratch
    class CustomSwitchComponentTokensProvider: SwitchComponentTokens {

        // And implement maybe hundreds of tokens.
        // You are allowed to use semantic tokens providers if you want to define values.
    }
</code></pre><p>Then, you can give this <code>CustomSwitchComponentTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(switch: CustomSwitchComponentTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(switch: CustomSwitchComponentTokensProvider())
</code></pre><p>It is also possible to use your own semantic tokens providers for this component tokens providers:</p><pre class="swift"><code>    // Uses by default here:
    // - OrangeThemeColorSemanticTokensProvider for colors
    // - OrangeThemeDimensionSemanticTokensProvider for dimensions
    // - OrangeThemeSpaceSemanticTokensProvider for spaces
    // - OrangeThemeOpacitySemanticTokensProvider for opacities
    // - OrangeThemeBorderSemanticTokensProvider for borders
    // - OrangeThemeSizeSemanticTokensProvider for sizes
    let switchComponentTokensProvider = OrangeThemeSwitchComponentTokensProvider()

    // Or use your own dimension, color, border, space and opacities semantic tokens providers (or only some)
    let switchComponentTokensProvider = OrangeThemeSwitchComponentTokensProvider(
                                                sizes: CustomSizesSemanticTokensProvider(),
                                                borders: CustomBorderSemanticTokensProvider(),
                                                colors: CustomColorSemanticTokensProvider(),
                                                spaces: CustomSpaceSemanticTokensProvider(),
                                                opacities: CustomOpacitySemanticTokensProvider()
                                                dimensions: CustomDimensionSemanticTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.9.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(sizes:borders:colors:spaces:opacities:dimensions:)/index.html"><code>init(sizes: (any AllSizeSemanticTokensProvider)?, borders: (any AllBorderSemanticTokensProvider)?, colors: (any AllColorSemanticTokensProvider)?, spaces: (any AllSpaceSemanticTokensProvider)?, opacities: (any AllOpacitySemanticTokensProvider)?, dimensions: (any AllDimensionSemanticTokensProvider)?)</code><p>Defines a provider of component tokens dedicated to <code>OUDSSwitch</code> and <code>OUDSSwitchItem</code></p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="borders/index.html"><code>let borders: any AllBorderSemanticTokensProvider</code><p>Provider of border semantic tokens to use for switch borders</p></a></li><li><a href="colorcheckinteraction/index.html"><code>var colorCheckInteraction: MultipleColorSemanticToken</code><p>Has for value token colors.contentDefault</p></a></li><li><a href="colors/index.html"><code>let colors: any AllColorSemanticTokensProvider</code><p>Provider of color semantic tokens to use for switch colors</p></a></li><li><a href="dimensions/index.html"><code>let dimensions: any AllDimensionSemanticTokensProvider</code><p>Provider of <i>dimensions</i> semantic tokens to use for spaces as the Swift package exposes “closed” tokens of Figma</p></a></li><li><a href="opacities/index.html"><code>let opacities: any AllOpacitySemanticTokensProvider</code><p>Provider of opacities semantic tokens to use for switch spaces</p></a></li><li><a href="sizeminheightinteractivearea/index.html"><code>var sizeMinHeightInteractiveArea: SizeSemanticToken</code><p>Has for value token sizes.minInteractiveArea</p></a></li><li><a href="sizes/index.html"><code>let sizes: any AllSizeSemanticTokensProvider</code><p>Provider of size semantic tokens to use for switch sizes</p></a></li><li><a href="spaces/index.html"><code>let spaces: any AllSpaceSemanticTokensProvider</code><p>Provider of spaces semantic tokens to use for switch spaces</p></a></li></ul></article></noscript><div id="app"></div></body></html>
