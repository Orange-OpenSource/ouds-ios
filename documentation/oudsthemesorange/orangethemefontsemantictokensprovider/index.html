<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OrangeThemeFontSemanticTokensProvider</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="A class which wraps all font semantic tokens, multiple, composite or not, and expose them. This provider should be integrated as a `AllFontSemanticTokensProvider` implementation inside `OUDSTheme` so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an `OUDSTheme` implementation to use." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Theme Orange</a></li><li>OrangeThemeFontSemanticTokensProvider</li></ul><p>Class</p><h1>OrangeThemeFontSemanticTokensProvider</h1><p>A class which wraps all <b>font semantic tokens</b>, <i>multiple</i>, <i>composite</i> or not, and expose them. This provider should be integrated as a <code>AllFontSemanticTokensProvider</code> implementation inside <code>OUDSTheme</code> so as to provide all tokens to the users. It helps users to override some of the tokens and assign them to an <code>OUDSTheme</code> implementation to use.</p><pre><code>class OrangeThemeFontSemanticTokensProvider</code></pre></section><h2>Overview</h2><pre class="swift"><code>    // Define your own provider for font semantic tokens
    class CustomFontTokensProvider: OrangeThemeFontSemanticTokensProvider {

        // Then override the font semantic tokens you want, using the font raw tokens available

        override var displayLarge: MultipleFontCompositeSemanticToken {
            MultipleFontCompositeSemanticToken(compact: FontRawTokens.regular150, regular: FontRawTokens.regular150)
        }

        override var displayLarge: MultipleFontCompositeSemanticToken {
            MultipleFontCompositeSemanticToken(compact:
                FontCompositeSemanticToken(size: sizeDisplayLargeMobile,
                                           lineHeight: lineHeightDisplayLargeMobile,
                                           weight: weightDisplay,
                                           letterSpacing: letterSpacingDisplayLargeMobile),
                                                regular:
               FontCompositeSemanticToken(size: sizeDisplayLargeTablet,
                                          lineHeight: lineHeightDisplayLargeTablet,
                                          weight: weightDisplay,
                                          letterSpacing: letterSpacingDisplayLargeTablet)) }
}
</code></pre><p>Then, you can give this <code>CustomFontTokensProvider</code> to your own theme implementation:</p><pre class="swift"><code>class LocalTheme: OrangeTheme {

    override init() {
        super.init(fonts: CustomFontTokensProvider())
    }
}
</code></pre><p>or to an already existing theme for example:</p><pre class="swift"><code>    OrangeTheme(fonts: CustomFontTokensProvider())
</code></pre><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init()/index.html"><code>init()</code><p>Intializes the provider</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="weightsystemmoderate/index.html"><code>var weightSystemModerate: FontWeightSemanticToken</code><p>Has for value token FontRawTokens.weight500</p></a></li></ul></article></noscript><div id="app"></div></body></html>
