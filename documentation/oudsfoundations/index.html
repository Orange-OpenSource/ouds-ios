<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Foundations</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Contains a set of helpers and extensions shared for higher level targets." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li>Foundations</li></ul><p>Framework</p><h1>Foundations</h1><p>Contains a set of helpers and extensions shared for higher level targets.</p></section><h2>Overview</h2><ul><li><p>Helpers to create a <i>SwiftUI</i> <code>Color</code> from string in hexadecimal format</p></li><li><p>Helper to get <i>SwiftUI</i> <code>Font.Weight</code> from a string value</p></li><li><p>Logger for logging logs in console</p></li><li><p>Some constants for accessibility</p></li><li><p>Definition of PostScript names of fonts</p></li><li><p>Helpers to mange size classes and low power energy</p></li></ul><h2>Topics</h2><h3>Classes</h3><ul><li><a href="oudslowpowermodeobserver/index.html"><code>class OUDSLowPowerModeObserver</code><p>An <code>ObservableObject</code> providing through a published state a flag saying if the device  is in low pover mode or not. This object is exposed as <i>environement object</i> through the <code>OUDSThemeableView</code>, and can be used in any view inside it to apply a specific behavior when the device is in low power mode.</p></a></li></ul><h3>Structures</h3><ul><li><a href="oudslogger/index.html"><code>struct OUDSLogger</code><p>The <code>os.Logger</code> wrapper used in the <i>OUDS iOS</i> library so as to logs things in standard output or elsewhere.</p></a></li><li><a href="oudswcag21ratio/index.html"><code>struct OUDSWCAG21Ratio</code><p>Some countries set up new laws so as to force companies to have a better accessibility of their digital services. This is for example the case for France with the <a href="https://accessibilite.numerique.gouv.fr">Référentiel Général d’Amélioration de l’Accessibilité</a>, also named “RGAA”. The WCAG specifications, for AA level, defines a contrast ratio of 4.5:1 for textual elements (i.e. texts), and 3:1 for non-textual elements (i.e. link’s chevron). However it is higly recommended for mobile devices to reach AAA level because of the screen sizes and luminosity issues, i.e. 7:1 for textual and 4.5:1 for non-textual elements. This utility helps to define whether a set of contrast ratio matches AA and AAA or not. See for example <a href="https://system.design.orange.com/0c1af118d/p/2531b9-accessibility-compliance">the following guidelines</a></p></a></li><li><a href="postscriptfontnamesmapkey/index.html"><code>struct PostScriptFontNamesMapKey</code><p>Key of the map containing PostScript name to use for a font depending to its family name and weight.</p></a></li></ul><h3>Variables</h3><ul><li><a href="kapplepostscriptfontnames/index.html"><code>let kApplePostScriptFontNames: PostScriptFontNamesMap</code><p>Contains the Apple PostScript name of a font given a font family name and a font weight. Such values have been picked from the Apple Font Book.</p></a></li><li><a href="kminimaltouchareaheight/index.html"><code>let kMinimalTouchAreaHeight: CGFloat</code><p>A touch area with an height equal to 44 pt at least is preferred for accessibility reasons See https://a11y-guidelines.orange.com/en/mobile/ios/design/#touch-target</p></a></li><li><a href="kminimaltouchareawidth/index.html"><code>let kMinimalTouchAreaWidth: CGFloat</code><p>A touch area with a width equal to 44 pt at least is preferred for accessibility reasons See https://a11y-guidelines.orange.com/en/mobile/ios/design/#touch-target</p></a></li></ul><h3>Type Aliases</h3><ul><li><a href="ol/index.html"><code>typealias OL</code><p>To keep code smaller</p></a></li><li><a href="psfnmk/index.html"><code>typealias PSFNMK</code><p>PostScriptFontNamesMapKey in shorter</p></a></li><li><a href="postscriptfontnamesmap/index.html"><code>typealias PostScriptFontNamesMap</code><p>Some font family cannot be used as they are because their “marketing” names are unknown to the OS except their PostScript names. This dictionnary defines the expected PostScript names of font families known in iOS. Depending to the font family, several rules are applied, with for example removal of whitespaces and adding of prefixes of suffixes after the font family name or the weight.</p></a></li><li><a href="wcag21requirements/index.html"><code>typealias WCAG21Requirements</code><p>WCAG 2.1 AA and AAA requirements use ratio for textual and non textual components</p></a></li></ul><h3>Enumerations</h3><ul><li><a href="oudsuserinterfacesizeclass/index.html"><code>enum OUDSUserInterfaceSizeClass</code><p>Enumerates the size classes defined by the design system. The <b>extraCompact</b> size class if for screens with width &lt; 389. The <b>compact</b> and <b>regular</b> size classes are the standard Apple classes.</p></a></li><li><a href="oudsutils/index.html"><code>enum OUDSUtils</code><p>A set of utilities from OUDS library shared with love ⸜(｡˃ ᵕ ˂)⸝♡♡♡</p></a></li><li><a href="iphonedevice/index.html"><code>enum iPhoneDevice</code><p>List some iPhone devices which can use OUDS, i.e. supposed to support at least iOS 15. Helps to define some metrics like tab bar heights.</p></a></li></ul><h3>Extended Modules</h3><ul><li><a href="foundation/index.html"><code></code></a></li><li><a href="swift/index.html"><code></code></a></li><li><a href="swiftuicore/index.html"><code></code></a></li></ul></article></noscript><div id="app"></div></body></html>
