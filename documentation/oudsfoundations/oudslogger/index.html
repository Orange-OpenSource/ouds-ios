<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSLogger</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="The `os.Logger` wrapper used in the OUDS iOS library so as to logs things in standard output or elsewhere." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Foundations</a></li><li>OUDSLogger</li></ul><p>Structure</p><h1>OUDSLogger</h1><p>The <code>os.Logger</code> wrapper used in the <i>OUDS iOS</i> library so as to logs things in standard output or elsewhere.</p><pre><code>struct OUDSLogger</code></pre></section><h2>Overview</h2><p>By default, debug and log level messages are suppressed even in DEBUG builds. Set <code>OUDSLogger.verbose = true</code> to enable them.</p><blockquote class="aside since"><p class="label">Since</p><p>0.8.0</p></blockquote><h2>Topics</h2><h3>Type Properties</h3><ul><li><a href="verbose/index.html"><code>static var verbose: Bool</code><p>When <code>true</code>, debug and log level messages are written to the console. Defaults to <code>false</code> so that OUDS internal logs do not pollute host-app output. Can be toggled at any time by library consumers.</p></a></li></ul><h3>Type Methods</h3><ul><li><a href="debug(_:)/index.html"><code>static func debug(String)</code><p>If compile mode is set as DEBUG and <a href="verbose/index.html"><code>verbose</code></a> is <code>true</code>, logs the message with a “debug” prefix and the <code>debug</code> method of the <code>os.Logger</code></p></a></li><li><a href="error(_:)/index.html"><code>static func error(String)</code><p>Logs the message with a “error” prefix and the <code>error</code> method of the <code>os.Logger</code></p></a></li><li><a href="fatal(_:)/index.html"><code>static func fatal(String) -&gt; Never</code><p>Triggers a <code>fatalError</code> signal with the given message</p></a></li><li><a href="info(_:)/index.html"><code>static func info(String)</code><p>Logs the message with a “info” prefix and the <code>info</code> method of the <code>os.Logger</code></p></a></li><li><a href="log(_:)/index.html"><code>static func log(String)</code><p>Logs the message with a “log” prefix and the <code>log</code> method of the <code>os.Logger</code> if <a href="verbose/index.html"><code>verbose</code></a> is <code>true</code></p></a></li><li><a href="warning(_:)/index.html"><code>static func warning(String)</code><p>Logs the message with a “warning” prefix and the <code>warning</code> method of the <code>os.Logger</code></p></a></li></ul></article></noscript><div id="app"></div></body></html>
