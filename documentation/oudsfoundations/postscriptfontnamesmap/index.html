<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>PostScriptFontNamesMap</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Some font family cannot be used as they are because their “marketing” names are unknown to the OS except their PostScript names. This dictionnary defines the expected PostScript names of font families known in iOS. Depending to the font family, several rules are applied, with for example removal of whitespaces and adding of prefixes of suffixes after the font family name or the weight." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Foundations</a></li><li>PostScriptFontNamesMap</li></ul><p>Type Alias</p><h1>PostScriptFontNamesMap</h1><p>Some font family cannot be used as they are because their “marketing” names are unknown to the OS except their PostScript names. This dictionnary defines the expected PostScript names of font families known in iOS. Depending to the font family, several rules are applied, with for example removal of whitespaces and adding of prefixes of suffixes after the font family name or the weight.</p><pre><code>typealias PostScriptFontNamesMap = [PostScriptFontNamesMapKey : String]</code></pre></section><h2>Discussion</h2><p>Entries of the dictionnary are font family names (as defined in raw tokens and sent by tokenator) and font weights. Dictionary results are the PostScript named as defined in the font book.</p></article></noscript><div id="app"></div></body></html>
