<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>subscript(orKey:)</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="If there is no value for the given `key`, returns the description of this key, i.e.font family name without the font weight in the end and without whitespaces." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../../../index.html">Foundations</a></li><li><a href="../../index.html">Swift</a></li><li><a href="../index.html">Dictionary</a></li><li>subscript(orKey:)</li></ul><p>Instance Subscript</p><h1>subscript(orKey:)</h1><p>If there is no value for the given <code>key</code>, returns the description of this key, i.e.font family name without the font weight in the end and without whitespaces.</p><pre><code>subscript(orKey key: Key) -&gt; String { get }</code></pre></section><h2>Parameters</h2><dl><dt>key</dt><dd><p>The key to use to get a value</p></dd></dl><h2>Overview</h2><p>In fact if it seems some rules are missing, or weight are not managed, if the font family only is returned the user has an higher probability to use the expected font. Because if a mashup of family name and weight is returned it can produce a PostScript identifier not available, so not usable, so implying a fallback to default system font like <i>San Francisco</i>. Because PostScript identifiers in most of cases do not have whitespaces, remove them.</p><pre class="swift"><code>    // Given a dictionary with one value
    let myDict: PostScriptFontNamesMap = [PSFNMK("Arial", Font.Weight.bold): "Aria-BoldMT"]

    // The given value is returned if the key exists
    let keyExists = myDict[PSFNMK("Arial", Font.Weight.bold)] // Arial-BoldMT

    // But if the key does not exist, the only the key is returned
    let keyDoesNotExist = myDict[PSFNMK("Luciole", Font.Weight.bold)] // Luciole
</code></pre></article></noscript><div id="app"></div></body></html>
