<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>OUDSWCAG21Ratio</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="Some countries set up new laws so as to force companies to have a better accessibility of their digital services. This is for example the case for France with the Référentiel Général d’Amélioration de l’Accessibilité, also named “RGAA”. The WCAG specifications, for AA level, defines a contrast ratio of 4.5:1 for textual elements (i.e. texts), and 3:1 for non-textual elements (i.e. link’s chevron). However it is higly recommended for mobile devices to reach AAA level because of the screen sizes and luminosity issues, i.e. 7:1 for textual and 4.5:1 for non-textual elements. This utility helps to define whether a set of contrast ratio matches AA and AAA or not. See for example the following guidelines" name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li><a href="../index.html">Foundations</a></li><li>OUDSWCAG21Ratio</li></ul><p>Structure</p><h1>OUDSWCAG21Ratio</h1><p>Some countries set up new laws so as to force companies to have a better accessibility of their digital services. This is for example the case for France with the <a href="https://accessibilite.numerique.gouv.fr">Référentiel Général d’Amélioration de l’Accessibilité</a>, also named “RGAA”. The WCAG specifications, for AA level, defines a contrast ratio of 4.5:1 for textual elements (i.e. texts), and 3:1 for non-textual elements (i.e. link’s chevron). However it is higly recommended for mobile devices to reach AAA level because of the screen sizes and luminosity issues, i.e. 7:1 for textual and 4.5:1 for non-textual elements. This utility helps to define whether a set of contrast ratio matches AA and AAA or not. See for example <a href="https://system.design.orange.com/0c1af118d/p/2531b9-accessibility-compliance">the following guidelines</a></p><pre><code>@frozen struct OUDSWCAG21Ratio</code></pre></section><h2>Overview</h2><blockquote class="aside since"><p class="label">Since</p><p>0.15.0</p></blockquote><h2>Topics</h2><h3>Initializers</h3><ul><li><a href="init(ratio:)/index.html"><code>init(ratio: Double)</code><p>Defines a WCAG 2.1 ratio with the given contrast ratio value</p></a></li></ul><h3>Instance Properties</h3><ul><li><a href="meets3to1/index.html"><code>var meets3to1: Bool</code><p>If the computed contrast ratio between two given colors meets the 3:1 requirement</p></a></li><li><a href="meets4_5to1/index.html"><code>var meets4_5to1: Bool</code><p>If the computed contrast ratio between two given colors meets the 4.5:1 requirement</p></a></li><li><a href="meets7to1/index.html"><code>var meets7to1: Bool</code><p>If the computed contrast ratio between two given colors meets the 7:1 requirement</p></a></li><li><a href="ratio/index.html"><code>let ratio: Double</code><p>The computed contrast ratio between two given colors</p></a></li><li><a href="requirementsaa/index.html"><code>var requirementsAA: WCAG21Requirements</code><p>WCAG 2.1 requirement for AA level needs to have textual component matching 4.5:1 contrast ratio and non textual component matching 3:1 contrast ratio. This is recommended for web projects.</p></a></li><li><a href="requirementsaaa/index.html"><code>var requirementsAAA: WCAG21Requirements</code><p>WCAG 2.1 requirement for AAA level needs to have textual component matching 7:1 contrast ratio and non textual component matching 4.5:1 contrast ratio. This is recommended for mobiles devices projects (because of screen sizes and luminosity issues).</p></a></li></ul><h3>Type Methods</h3><ul><li><a href="contrastratio(_:_:)/index.html"><code>static func contrastRatio(Color, Color) -&gt; Double?</code><p>According to the  WCAG 2.1 algorithm, computes the contrat ratio between the current color and another See https://www.w3.org/WAI/WCAG21/Techniques/general/G18.html#procedure</p></a></li><li><a href="contrastratios(_:_:)/index.html"><code>static func contrastRatios(String, String) -&gt; OUDSWCAG21Ratio?</code><p>Computes accessibility contrast ratio between two colors in hexadecimal strings. If the hexadecimal strings are colors format in RGBA, will use their format in RGB (i.e. apply opacity, not truncate).</p></a></li><li><a href="luminance(for:)/index.html"><code>static func luminance(for: Color) -&gt; CGFloat?</code><p>Returns the luminance of the given color using the WCAG 2.1 algorithm. See https://www.w3.org/WAI/WCAG21/Techniques/general/G18.html#procedure</p></a></li></ul></article></noscript><div id="app"></div></body></html>
