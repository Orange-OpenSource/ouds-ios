<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Tokens for components</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="These tokens are defined for components and refer to semantic tokens or raw tokens. They can be seen as a kind of bridge between components and in the end primitive values of the design kit." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li>Tokens for components</li></ul><p>Framework</p><h1>Tokens for components</h1><p>These <i>tokens</i> are defined for components and refer to semantic tokens or raw tokens. They can be seen as a kind of bridge between components and in the end primitive values of the design kit.</p></section><h2>Overview</h2><pre><code>🧬 Core version: 1.10.0
</code></pre><p>Thus if a component need to change for example its <i>background color</i>, and if a <i>component token</i> is used for it, then only the value of this <i>token</i> should be changed without any modification on the <i>component</i> definition. <i>Components</i> use <i>component tokens</i> exposed through the <i>theme</i> thanks to token providers to get their style values.</p><p>Components tokens are defined and gathered inside <i>Swift protocol</i> so as to be exposed then through implementation of <code>OUDSTheme</code> thanks to dedicated tokens providers. Because we choose to split responsabilities and objects into their own modules, we faced troubles to make possible for children themes or providers to override properties declared in <i>protocols</i> and defined in <i>extensions</i>. That is the reason why tokens are exposed as <code>@objc open</code> to be available and overridable anywhere.</p><p>Example with <a href="buttoncomponenttokens/index.html"><code>ButtonComponentTokens</code></a>:</p><pre class="swift"><code>// Declare some component tokens for buttons with properties they must apply
public protocol ButtonComponentTokens {
    var sizeMaxHeightIconOnly: SizeSemanticToken { get }
    var borderWidthDefault: BorderWidthSemanticToken { get }
    var borderRadius: BorderRadiusSemanticToken { get }
    var colorBgDefaultPressedMono: MultipleColorSemanticToken { get }
    var spacePaddingBlock: SpaceSemanticToken { get }
}

// There is an existing provider for such tokens
open class OrangeThemeButtonComponentTokensProvider { }

// Define the components tokens exposed through the theme thanks to provider
extension OrangeThemeButtonComponentTokensProvider: ButtonComponentTokens {

    // Raw tokens can be used

    @objc open var sizeMaxHeightIconOnly: SizeSemanticToken { DimensionRawTokens._600 }
    
    // And also semantic tokens

    @objc open var borderWidthDefault: BorderWidthSemanticToken { borders.widthThicker }
    @objc open var borderRadius: BorderRadiusSemanticToken { borders.radiusMedium }
    @objc open var colorBgDefaultPressedMono: MultipleColorSemanticToken { colors.repositoryOpacityBlackHigher }
    @objc open var spacePaddingBlock: SpaceSemanticToken { spaces.paddingInlineSpacious }
}

// This provider is then exposed through OUDSTheme as an AllButtonComponentTokensProvider
</code></pre><h2>How to use component tokens</h2><p>In fact, the component tokens are declared and gathered in <i>Swift protocol</i> so as to force any theme to implement them, and also to allow any theme to expose such properties whathever the implementation of the theme is, across providers. Because <i>component tokens</i> have for values <i>raw tokens</i> or <i>semantic tokens</i>, and in the end for values primitive types, and all these tokens are declared with <i>type aliases</i> refering all together, you can handle a <i>component token</i> directly in your view because the final value will be used. Thus, get the theme and call the needed property with some helpers.</p><pre class="swift"><code>struct SomeView: View {

    @Environment(\.theme) private var theme // Supposed you used in your root view the `OUDSThemeableView` to register the theme
    @Environment(\.colorScheme) private var colorScheme

    var body: some View {
        Button {
            // Some action
        } label: {
            Text("Some label")
                .cornerRadius(theme.button.borderRadius)
        }
        .padding(.leading, theme.button.spacePaddingInlineChevronStart)
        .padding(.trailing, theme.button.spacePaddingInlineChevronEnd)
        .background(theme.button.colorBgStrongEnabledMono)
        .overlay(
            RoundedRectangle(cornerRadius: theme.button.borderRadius)
                .stroke(Color.blue, lineWidth: theme.button.borderWidthDefault)
        )
    }
/*
    - The theme provides border semantic tokens "borderRadius" and "borderWidthDefault"
    - The theme provides a color semantic token "colorBgStrongEnabledMono"
    - The theme provides spaces semantic token "spacePaddingInlineChevronStart" and "spacePaddingInlineChevronEnd"
*/
}

// Do not forget in your app to use the `OUDSThemeableView` for your theme, e.g. `OrangeTheme`
@main
struct DesignToolbox: App {

    var body: some Scene {
        WindowGroup {
            OUDSThemeableView(theme: OrangeTheme()) {
                // Your root view
                ...
            }
        }
    }
}
</code></pre><p>The components tokens are wrapped in tokens provider acessible through the themes:</p><table><thead><tr><th>Components tokens provider</th><th>Target component</th></tr></thead><tbody><tr><td>bar</td><td>For bars components like bottom and navigation bars</td></tr><tr><td>badge</td><td>For badges like <code>OUDSBadge</code></td></tr><tr><td>button</td><td>For buttons like <code>OUDSButton</code></td></tr><tr><td>bulletList</td><td>For list of elements with bullets</td></tr><tr><td>checkbox</td><td>For checkboxes like <code>OUDSCheckbox</code>, <code>OUDSCheckboxItem</code> and their indeterminate variants</td></tr><tr><td>chip</td><td>For chips like <code>OUDSSuggestionChip</code> and <code>OUDSFilterChip</code></td></tr><tr><td>controlItem</td><td>Shared and used for switch, checkbox and radio items layouts</td></tr><tr><td>divider</td><td>For dividers like <code>OUDSHorizontalDivider</code> and <code>OUDSVerticalDivider</code></td></tr><tr><td>icon</td><td>For components containing icons like <code>OUDSTag</code></td></tr><tr><td>link</td><td>For links like <code>OUDSLink</code></td></tr><tr><td>pinCodeInput</td><td/></tr><tr><td>quantityInput</td><td/></tr><tr><td>radioButton</td><td>For radio components like <code>OUDSRadio</code> and <code>OUDSRadioItem</code></td></tr><tr><td>selectInput</td><td/></tr><tr><td>skeleton</td><td/></tr><tr><td>switch</td><td>For switch components like <code>OUDSSwitch</code> and <code>OUDSSwitchItem</code></td></tr><tr><td>tag</td><td>For tag components like <code>OUDSTag</code></td></tr><tr><td>inputTag</td><td>For input tag components like <code>OUDSInputTag</code></td></tr><tr><td>textArea</td><td>For text area components like <code>OUDSTextArea</code></td></tr><tr><td>textInput</td><td>For text field input components like <code>OUDSTextInput</code></td></tr></tbody></table><h2>Topics</h2><h3>Group</h3><ul><li><a href="alertcomponenttokens/index.html"><code>protocol AlertComponentTokens</code><p>Declares all component tokens for alert components like <code>OUDSAlert</code> Used for tokens providers like <code>OrangeThemeAlertComponentTokensProvider</code> etc.</p></a></li><li><a href="barcomponenttokens/index.html"><code>protocol BarComponentTokens</code><p>Declares all component tokens for bar components l Use for tokens providers like <code>OrangeThemeBarComponentTokensProvider</code>.</p></a></li><li><a href="badgecomponenttokens/index.html"><code>protocol BadgeComponentTokens</code><p>Declares all component tokens for badge components like <code>OUDSBadge</code> Use for tokens providers like <code>OrangeThemeBadgeComponentTokensProvider</code>.</p></a></li><li><a href="bulletlistcomponenttokens/index.html"><code>protocol BulletListComponentTokens</code><p>Declares all component tokens for bullet list components like <code>OUDSBulletList</code> Use for tokens providers like <code>OrangeThemeBulletListComponentTokensProvider</code>.</p></a></li><li><a href="buttoncomponenttokens/index.html"><code>protocol ButtonComponentTokens</code><p>Declares all component tokens for buttons components like <code>OUDSButton</code> Use for tokens providers like <code>OrangeThemeButtonComponentTokensProvider</code>.</p></a></li><li><a href="checkboxcomponenttokens/index.html"><code>protocol CheckboxComponentTokens</code><p>Declares all component tokens for checkboxes components like <code>OUDSCheckbox</code> and <code>OUDSCheckboxItem</code>. Used for tokens providers like <code>OrangeThemeCheckboxComponentTokensProvider</code>.</p></a></li><li><a href="chipcomponenttokens/index.html"><code>protocol ChipComponentTokens</code><p>Declares all component tokens for chips components like <code>OUDSFilterChip</code> and <code>OUDSSuggestionChip</code> Use for tokens providers like <code>OrangeThemeChipComponentTokensProvider</code>.</p></a></li><li><a href="controlitemcomponenttokens/index.html"><code>protocol ControlItemComponentTokens</code><p>Declares all component tokens for components using control item layout like <code>OUDSSwitch</code>, <code>OUDSCheckboxItem</code> and <code>OUDSRadioButton</code> Use for tokens providers like <code>OrangeThemeControlItemComponentTokensProvider</code>.</p></a></li><li><a href="dividercomponenttokens/index.html"><code>protocol DividerComponentTokens</code><p>Declares all component tokens for divider components like <code>OUDSHorizontalDivider</code> and <code>OUDSVerticalDivider</code> Use for tokens providers like <code>OrangeThemeDividerComponentTokensProvider</code>.</p></a></li><li><a href="expandlinkcomponenttokens/index.html"><code>protocol ExpandLinkComponentTokens</code><p>Declares all component tokens for expand link components like <code>OUDSLink</code> Use for tokens providers like <code>OrangeThemeLinkComponentTokensProvider</code>.</p></a></li><li><a href="iconcomponenttokens/index.html"><code>protocol IconComponentTokens</code><p>Declares all component tokens for components using icons (like <code>OUDSTag</code>). Use for tokens providers like <code>OrangeThemeIconComponentTokensProvider</code>.</p></a></li><li><a href="linkcomponenttokens/index.html"><code>protocol LinkComponentTokens</code><p>Declares all component tokens for links components like <code>OUDSLink</code> Use for tokens providers like <code>OrangeThemeLinkComponentTokensProvider</code>.</p></a></li><li><a href="pincodeinputcomponenttokens/index.html"><code>protocol PinCodeInputComponentTokens</code><p>Declares all component tokens for input components like <code>OUDSPinCodeInput</code> Use for tokens providers like <code>OrangeThemePinCodeInputComponentTokensProvider</code>.</p></a></li><li><a href="quantityinputcomponenttokens/index.html"><code>protocol QuantityInputComponentTokens</code><p>Declares all component tokens for input components like <code>OUDSQuantityInput</code> Used for tokens providers like <code>OrangeThemeQuantityInputComponentTokensProvider</code>.</p></a></li><li><a href="radiobuttoncomponenttokens/index.html"><code>protocol RadioButtonComponentTokens</code><p>Declares all component tokens for radio button components like <code>OUDSRadioButton</code> and <code>OUDSRadioButtonItem</code>. Use for tokens providers like <code>OrangeThemeRadioButtonComponentTokensProvider</code>.</p></a></li><li><a href="selectinputcomponenttokens/index.html"><code>protocol SelectInputComponentTokens</code><p>Declares all component tokens for input components like <code>OUDSSelectInput</code> Use for tokens providers like <code>OrangeThemeSelectInputComponentTokensProvider</code>.</p></a></li><li><a href="skeletoncomponenttokens/index.html"><code>protocol SkeletonComponentTokens</code><p>Declares all component tokens for skeleton components like <code>OUDSSkeleton</code> Use for tokens providers like <code>OrangeThemeSkeletonComponentTokensProvider</code>.</p></a></li><li><a href="switchcomponenttokens/index.html"><code>protocol SwitchComponentTokens</code><p>Declares all component tokens for switch components like <code>OUDSSwitch</code> Use for tokens providers like <code>OrangeThemeSwitchComponentTokensProvider</code>.</p></a></li><li><a href="tagcomponenttokens/index.html"><code>protocol TagComponentTokens</code><p>Declares all component tokens for tags components like <code>OUDSTag</code> Used for tokens providers like <code>OrangeThemeTagComponentTokensProvider</code>.</p></a></li><li><a href="inputtagcomponenttokens/index.html"><code>protocol InputTagComponentTokens</code><p>Declares all component tokens for tags components like <code>OUDSInputTag</code> Used for tokens providers like <code>OrangeThemeInputTagComponentTokensProvider</code>.</p></a></li><li><a href="textareacomponenttokens/index.html"><code>protocol TextAreaComponentTokens</code><p>Declares all component tokens for input components like <code>OUDSTextArea</code> Used for tokens providers like <code>OrangeThemeTextAreaComponentTokensProvider</code>.</p></a></li><li><a href="textinputcomponenttokens/index.html"><code>protocol TextInputComponentTokens</code><p>Declares all component tokens for input components like <code>OUDSTextInput</code> Use for tokens providers like <code>OrangeThemeTextInputComponentTokensProvider</code>.</p></a></li></ul><h3>Protocols</h3><ul><li><a href="buttonmonocomponenttokens/index.html"><code>protocol ButtonMonoComponentTokens</code><p>Declares all component tokens for buttons components like <code>OUDSButton</code> in <b>monochrome mode</b>. Use for tokens providers like <code>OrangeThemeButtonComponentTokensProvider</code>.</p></a></li><li><a href="linkmonocomponenttokens/index.html"><code>protocol LinkMonoComponentTokens</code><p>Declares all component tokens for links components like <code>OUDSLink</code> in <b>monochrome mode</b>. Used for tokens providers like <code>OrangeThemeLinkComponentTokensProvider</code>.</p></a></li></ul></article></noscript><div id="app"></div></body></html>
