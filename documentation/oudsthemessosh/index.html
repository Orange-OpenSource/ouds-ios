<!doctype html><html lang="en-US" class="no-js"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="icon" href="/favicon.ico"><link rel="mask-icon" href="/favicon.svg" color="#333333"><title>Theme Sosh</title><script>var baseUrl = "/"</script><script defer="defer" src="/js/chunk-vendors.0b7dc663.js"></script><script defer="defer" src="/js/index.b232e9de.js"></script><link href="/css/index.19043b1e.css" rel="stylesheet"><meta content="The Sosh theme is the theme dedicated to the Sosh brand only." name="description"/></head><body data-color-scheme="auto"><noscript><article><section><ul><li>Theme Sosh</li></ul><p>Framework</p><h1>Theme Sosh</h1><p>The Sosh theme is the theme dedicated to the Sosh brand only.</p></section><h2>Overview</h2><pre><code>🧬 Theme version: 2.5.0
</code></pre><p>This is the Sosh theme any Sosh product must use, and cannot be subclassed. It embeds also in its target the Sosh brand colors which are not shared nor exposed in lower level targets or outside any module not depending to it. In other words, this <a href="soshtheme/index.html"><code>SoshTheme</code></a> is based on the abstract <code>OUDSTheme</code>, uses all the <i>Orange Unified Design System</i> kit and brings the Sosh brand colors and assets.</p><blockquote class="aside tip"><p class="label">Tip</p><p>This theme embeds and registers the fonts for the Sosh theme, you just need to use the theme object as is.</p></blockquote><blockquote class="aside important"><p class="label">Important</p><p>The Sosh theme does not embed colors for charts yet and is read only: it cannot be subclassed or derivated</p></blockquote><h2>How to use the theme</h2><p>You can use <a href="soshtheme/index.html"><code>SoshTheme</code></a> directly. To use the <a href="soshtheme/index.html"><code>SoshTheme</code></a> without further modifications, you will have to use the <code>OUDSThemeableView</code> for your root view and give it an instance of <a href="soshtheme/index.html"><code>SoshTheme</code></a>. Keep in mind the themes are <i>Swift class objects</i> and can be heavy, so you may use only as instance as singleton and not store any properties.</p><pre class="swift"><code>@main
struct YourApp: App {
    var body: some Scene {
        WindowGroup {
            OUDSThemeableView(theme: SoshTheme()) {
                // Your root view
            }
        }
    }
}
</code></pre><p>Then, in your views, you can simply use the theme through an environment variable to get the tokens:</p><pre class="swift"><code>struct SomeView: View {

    // Get OUDS environment variable for theme thanks to themeable view
    @Environment(\.theme) var theme
    
    var body: some View {
        
        // Use the theme to retrieve the tokens
        // For spaces: theme.spaces
        // For sizes: theme.sizes
        // For borders: theme.borders
        // For elevations: theme.elevations
        // For opacities: theme.opacities
        // For colors: theme.colors
        // For button configuration: theme.button
        // For link configuration: theme.link
        // Etc.
    }
}
</code></pre><h2>How to tune the theme</h2><p>You cannot tune the Sosh theme.</p><h2>Typography</h2><p>The Sosh theme uses its Sosh font and must not use others.</p><h2>How to enrich the theme</h2><p>You cannot derivate the Sosh theme.</p><h2>How it looks like</h2><h3>Actions</h3><h4>Button</h4><p><picture><img alt="A button component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_button_sosh.png"/></picture></p><h3>Content display</h3><h4>Bullet list</h4><p><picture><img alt="A bullet list component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_bullet_list_sosh.png"/></picture></p><h3>Controls</h3><h4>Checkboxes</h4><h4>Radios</h4><h4>Switches</h4><h4>Chips</h4><h4>Text input</h4><p><picture><img alt="A text input component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_textinput_sosh.png"/></picture></p><h3>Indicators</h3><h4>Badge</h4><p><picture><img alt="A badge component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_badge_sosh.png"/></picture></p><h4>Tags</h4><h3>Layouts</h3><h4>Dividers</h4><h3>Navigations</h3><h4>Link</h4><p><picture><img alt="A link component in light and dark modes with Sosh theme" decoding="async" loading="lazy" src="../../images/oudscomponents/component_link_sosh.png"/></picture></p><h4>Tab bar</h4><h2>Topics</h2><h3>Group</h3><ul><li><a href="soshtheme/index.html"><code>class SoshTheme</code><p>This is the theme for Sosh brand? This is an override of the default basic <code>OUDSTheme</code> for the <b>Sosh brand theme</b> It can override any properties from its superclass, and but cannot be derived ; this is not allowed.</p></a></li><li><a href="soshbrandcolorrawtokens/index.html"><code>enum SoshBrandColorRawTokens</code><p>This enum helps to add new <b>color raw tokens</b> exclusive to this <a href="soshtheme/index.html"><code>SoshTheme</code></a>. Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p></a></li><li><a href="soshbrandfontrawtokens/index.html"><code>enum SoshBrandFontRawTokens</code><p>This enum helps to add new <b>font raw tokens</b> exclusive to this <a href="soshtheme/index.html"><code>SoshTheme</code></a> Such tokens are packed in a <i>Swift enum</i> so as to gather them in one object with the suitable namespace and avoid to have just constants in nothing else (i.e. publicly accessible from everywhere). More optimized than dimensionstruct_.</p></a></li></ul><h3>Type Aliases</h3><ul><li><a href="colorsoshbrandrawtoken/index.html"><code>typealias ColorSoshBrandRawToken</code><p>In the global design system tool, the verbs of “brand colors” are used, and at this level mean simply raw tokens of colors.</p></a></li><li><a href="colorsoshdecorativerawtoken/index.html"><code>typealias ColorSoshDecorativeRawToken</code><p>In the global design system tool, the verbs of “decorative colors” are used, and at this level mean simply raw tokens of colors, but decorative ones</p></a></li><li><a href="soshbrandfontrawtoken/index.html"><code>typealias SoshBrandFontRawToken</code><p>An <code>SoshBrandFontRawToken</code> is just a  <code>FontFamilyRawToken</code> type</p></a></li></ul><h3>Extended Modules</h3><ul><li><a href="oudsthemescontract/index.html"><code></code></a></li><li><a href="swiftuicore/index.html"><code></code></a></li></ul></article></noscript><div id="app"></div></body></html>
